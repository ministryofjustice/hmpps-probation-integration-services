                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">procedure ES_Load as&#10;--==============================================================================&#10;--&#10;-- Description  : Package to Load ES Data on Initial Load or Reload&#10;--                This uses the _bulk API and Load all the contact for one CRN in a single API call.&#10;--&#10;-- Author       : Roy Pilmoor&#10;-- Date         : 30 June 2021&#10;--&#10;--  Change History:&#10;--&#10;--  Version PDM    Date        Who             Description&#10;--  ------- ----   ----------- --------------- ---------------------------------&#10;--  1.01          30 June 2021  Roy Pilmoor     Initial Version&#10;--  1.02          03/08/2021    Roy Pilmoor     Load into GIT&#10;--&#10;--&#10;-- This package run in a multi threaded mode, with each thread loading one CRN&#39;s worth of contacts&#10;--&#10;    --&#10;    GC_PARALLEL_FLAG       CONSTANT BOOLEAN := TRUE;&#10;    --&#10;    GC_MASTER_COMPONENT_ID CONSTANT INTEGER := 5000;&#10;    GC_MASTER_MAX_THREADS  NUMBER := 64;&#10;    --&#10;    g_component_name VARCHAR2(30) := &#39;ES_Load&#39;;&#10;    g_procedure_name VARCHAR2(30);&#10;    --&#10;    l_thread_id            INTEGER;&#10;    l_thread_status        INTEGER;&#10;    l_all_threads_finished BOOLEAN;&#10;    l_thread_label         VARCHAR2(30);&#10;    --&#10;    l_max_threads          INTEGER;&#10;    l_program_action       VARCHAR2(4000);&#10;    l_failed_threads       NUMBER;&#10;    --&#10;    CURSOR cs IS&#10;      WITH T AS (&#10;        SELECT&#10;        O.offender_id offender_id from offender o where&#10;        offender_id not in (select offender_id from contact_es_status /* where soft_deleted = 0 */ )&#10; --      and rownum &lt; 100&#10; --      group by offender_id&#10; --       having count(1) &gt; 0&#10; --      order by count(1) desc&#10;     )&#10;      --&#10;      SELECT offender_id&#10;      FROM T&#10;      WHERE 1=1&#10;&#10;    ;&#10;    --&#10;    l_total_processed INTEGER := 0;&#10;    l_offender_id     INTEGER;&#10;    --&#10;&#10;    --&#10;    FUNCTION get_max_threads RETURN INTEGER IS&#10;    BEGIN&#10;        RETURN GC_MASTER_MAX_THREADS;&#10;    END get_max_threads;&#10;    --&#10;    PROCEDURE message(p_msg VARCHAR2) IS&#10;    BEGIN&#10;        DBMS_OUTPUT.put_line(p_msg) ;&#10;    END message;&#10;&#10;--&#10;PROCEDURE do_rebuild IS&#10;    BEGIN&#10;        --&#10;        LOOP&#10;            l_thread_id := PKG_MTHREAD.get_available_thread(&#10;                                p_component_id =&gt; GC_MASTER_COMPONENT_ID,&#10;                                p_wait         =&gt; 1,&#10;                                p_timeout      =&gt; 30,&#10;                                p_max_threads  =&gt; get_max_threads );&#10;            EXIT WHEN l_thread_id &gt; 0;&#10;        END LOOP;&#10;        --&#10;&#10;      --  DBMS_OUTPUT.put_line(&#39;DO_REBUILD: [offender_id=&#39; || l_offender_id || &#39;][max_threads=&#39; || get_max_threads || &#39;][thread_id=&#39; || l_thread_id || &#39;]&#39;);&#10;        --batch_crn_to_es_contact(L_offender_id);&#10;&#10;        COMMIT;&#10;        --&#10;        IF l_thread_id &gt; 0 THEN&#10;            l_program_action :=&#10;               &#39;DECLARE&#10;                   l_thread_id    NUMBER := &#39; || l_thread_id || &#39;;&#10;                   l_component_id NUMBER := &#39; || GC_MASTER_COMPONENT_ID || &#39;;&#10;                   l_offender_id  NUMBER := &#39; || l_offender_ID || &#39;;&#10;                   --&#10;                   PROCEDURE update_thread_status(p_status INTEGER, p_err_msg VARCHAR2 DEFAULT NULL) IS&#10;                   BEGIN&#10;                       PKG_MThread.update_thread_status(&#10;                           p_component_id   =&gt; l_component_id,&#10;                           p_thread_id      =&gt; l_thread_id,&#10;                           p_status         =&gt; p_status,&#10;                           p_err_msg        =&gt; p_err_msg );&#10;                   END update_thread_status;&#10;                   --&#10;                   PROCEDURE update_thread_progress(p_rows INTEGER, p_info_msg VARCHAR2 DEFAULT NULL) IS&#10;                   BEGIN&#10;                       PKG_MThread.update_thread_progress(&#10;                           p_component_id   =&gt; l_component_id,&#10;                           p_thread_id      =&gt; l_thread_id,&#10;                           p_rows           =&gt; p_rows,&#10;                           p_current_id_val =&gt; l_offender_id,&#10;                           p_info_msg       =&gt; p_info_msg);&#10;                    END update_thread_progress;&#10;                    --&#10;                BEGIN&#10;                    --&#10;                    update_thread_status(1);&#10;                    update_thread_progress(0);&#10;                    --&#10;&#10;                        declare&#10;                        x number := 0;&#10;                        begin&#10;&#10;&#10;                        es_search.batch_crn_to_es_contact(L_offender_id,l_thread_id);&#10;                        EXCEPTION&#10;                          WHEN OTHERS THEN&#10;                          ES_SEARCH.WRITE_LOG (&#10;                          p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;                          p_log_context =&gt; &#39;&#39;ES_CRN_DRIVER&#39;&#39;,&#10;                            p_PROC_Instance =&gt; l_thread_id,&#10;                            p_LOG_MESSAGE =&gt; &#39;&#39;Failed:&#39;&#39;||l_offender_id,&#10;                            p_log_CLOB =&gt; sqlerrm);&#10;&#10;                            INSERT INTO contact_es_single_q SELECT&#10;                            contact_es_single_q_id_seq.NEXTVAL,&#10;                            c.offender_id,c.contact_id,&#10;                            c.last_updated_datetime + 1,&#10;                            &#39;&#39;r&#39;&#39;,0,0,&#10;                              sysdate, NULL, NULL&#10;                            FROM&#10;                             contact c&#10;                                LEFT OUTER JOIN contact_es_status   es ON es.contact_id = c.contact_id&#10;                                WHERE&#10;                                c.soft_deleted = 0&#10;                             AND es.contact_id IS NULL AND c.offender_id =l_offender_id ;&#10;&#10;                        end;&#10;&#10;                    update_thread_progress(1);&#10;                    update_thread_status(3);&#10;                    --&#10;                    COMMIT;&#10;                    --&#10;                EXCEPTION WHEN OTHERS THEN&#10;                    update_thread_status(2, &#39;&#39;Fatal error exception: &#39;&#39; || SQLERRM);&#10;                END;&#39;;&#10;            --&#10;            --PKG_MThread.wait_for_threads_to_finish( p_component_id=&gt;GC_MASTER_COMPONENT_ID, p_thread_id=&gt;l_thread_id, p_wait=&gt;0.5 );&#10;            --&#10;            PKG_MTHREAD.create_thread_process(&#10;                p_component_id      =&gt; GC_MASTER_COMPONENT_ID,&#10;                p_thread_id         =&gt; l_thread_id,&#10;                p_program_action    =&gt; l_program_action,&#10;                p_job_name          =&gt; g_component_name || &#39;_&#39; || l_offender_id,&#10;                p_thread_label      =&gt; l_thread_label,&#10;                p_instance_number   =&gt; 1 );&#10;            --&#10;            --COMMIT;&#10;            --&#10;        END IF;&#10;        --&#10;    END do_rebuild;&#10;    --&#10;BEGIN&#10;    --&#10;    IF GC_PARALLEL_FLAG THEN&#10;        PKG_MThread.reset_threads(GC_MASTER_COMPONENT_ID);&#10;    END IF;&#10;    --&#10;    OPEN cs;&#10;    LOOP&#10;        FETCH cs INTO l_offender_id;&#10;&#10;&#10;        EXIT WHEN cs%NOTFOUND;&#10;        EXIT WHEN PKG_MTHREAD.check_semaphore( p_component_code=&gt;TO_CHAR(GC_MASTER_COMPONENT_ID), p_signal=&gt;&#39;STOP&#39; ) = &#39;Y&#39;;&#10;        --&#10;        IF GC_PARALLEL_FLAG THEN&#10;            l_failed_threads := PKG_MThread.get_num_of_failed_threads(p_component_id =&gt; GC_MASTER_COMPONENT_ID);&#10;            IF l_failed_threads &gt; 0 THEN&#10;                raise_application_error(-20001, &#39;ERROR: There are &#39; || l_failed_threads || &#39; threads that have failed - please check the PDT_THREAD and PDT_DEBUG tables for more details&#39;);&#10;                EXIT;&#10;            END IF;&#10;            --&#10;            do_rebuild;&#10;        ELSE&#10;&#10;&#10;&#10;                      DBMS_OUTPUT.put_line(&#39;Process: &#39;||l_offender_id||&#39;  NO thead: &#39;);&#10;        END IF;&#10;        --&#10;        l_total_processed := l_total_processed +1;&#10;        COMMIT;&#10;        --&#10;    END LOOP;&#10;    CLOSE cs;&#10;    COMMIT;&#10;    --&#10;    IF GC_PARALLEL_FLAG THEN&#10;        PKG_MThread.wait_for_threads_to_finish( p_component_id=&gt;GC_MASTER_COMPONENT_ID );&#10;    END IF;&#10;    --&#10;&#10;    message(&#39;Total offenders processed=&#39; || l_total_processed);&#10;    --&#10;END es_load;</textarea>
