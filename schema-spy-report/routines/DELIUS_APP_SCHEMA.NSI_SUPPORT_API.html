                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">PACKAGE BODY nsi_support_api&#10;IS&#10;--&#10;PROCEDURE do_set_rbac_levels( OffenderIdIn  NUMBER,&#10;                              L1Out         OUT NUMBER,&#10;                              L2Out         OUT NUMBER,&#10;                              L3Out         OUT NUMBER )&#10;IS&#10;BEGIN&#10;    PKG_SEARCH.do_set_rbac_levels(  p_offender_id =&gt; OffenderIdIn,&#10;                                    p_L1          =&gt; L1Out,&#10;                                    p_L2          =&gt; L2Out,&#10;                                    p_L3          =&gt; L3Out);&#10;END do_set_rbac_levels;&#10;--&#10;--&#10;FUNCTION getNSISummaryListSQL (eventBasedin IN VARCHAR2 DEFAULT &#39;N&#39;) RETURN CLOB&#10;IS&#10;  l_ret     CLOB;&#10;BEGIN&#10;  --&#10;  l_ret := &#39;SELECT  n.nsi_id,&#10;                    n.offender_id,&#10;                    n.event_id,&#10;                    n.nsi_type_id,&#10;                    rnt.code nsi_type_code,&#10;                    rnt.description nsi_type_desc,&#10;                    n.length,&#10;                    n.referral_date,&#10;                    n.actual_start_date,&#10;                    n.actual_end_date,&#10;                    n.nsi_status_id,&#10;                    rns.code nsi_status_code,&#10;                    rns.description nsi_status_desc,&#10;                    n.active_flag,&#10;                    e.event_number,&#10;                    NULL L1,&#10;                    NULL L2,&#10;                    NULL L3&#10;&#10;            FROM nsi n&#10;&#10;            INNER JOIN r_nsi_type rnt&#10;            ON n.nsi_type_id = rnt.nsi_type_id&#10;&#10;            INNER JOIN r_nsi_status rns&#10;            ON n.nsi_status_id = rns.nsi_status_id&#10;&#10;            &#39; ||&#10;            CASE&#10;              WHEN eventBasedin = &#39;Y&#39; THEN &#39; INNER JOIN event e &#39;&#10;              ELSE &#39; LEFT OUTER JOIN event e &#39;&#10;            END || &#39;&#10;            ON n.event_id = e.event_id&#10;&#10;            LEFT OUTER JOIN r_standard_reference_list r1&#10;            ON n.nsi_sub_type_id = r1.standard_reference_list_id&#10;            AND r1.reference_data_master_id IN ( SELECT reference_data_master_id&#10;                                                FROM r_reference_data_master&#10;                                                WHERE code_set_name = &#39;&#39;NSI SUB TYPE&#39;&#39;)&#10;&#10;            WHERE n.offender_id = :offender_id&#10;            AND n.active_flag = :active_flag&#10;            &#39; ||&#10;            CASE&#10;              WHEN eventBasedIn = &#39;Y&#39; THEN &#39; AND n.event_id = :event_id &#39;&#10;              ELSE &#39; &#39;&#10;            END || &#39;&#10;            AND n.soft_deleted = :soft_deleted&#10;&#10;            ORDER BY n.nsi_status_date&#39;;&#10;    --&#10;    RETURN l_ret;&#10;    --&#10;END getNSISummaryListSQL;&#10;--&#10;--&#10;FUNCTION getNSISummaryDataTab(  OffenderIdIn  IN nsi.offender_id%TYPE,&#10;                                EventIdIn     IN nsi.event_id%TYPE DEFAULT NULL,&#10;                                ActiveFlagIn  IN nsi.active_flag%TYPE DEFAULT 1,&#10;                                SoftDeletedIn IN nsi.soft_deleted%TYPE DEFAULT 0) RETURN nsi_pipeline.nsi_summary_tab PIPELINED&#10;IS&#10;    l_sql_statement     CLOB;&#10;    l_ref_cursor        SYS_REFCURSOR;&#10;    l_nsi_summary_tab   nsi_pipeline.nsi_summary_tab;&#10;    l_counter           INTEGER;&#10;    l_event_flag        VARCHAR2(1);&#10;BEGIN&#10;    l_counter := 0;&#10;    --&#10;    l_event_flag := CASE WHEN EventIdIn IS NOT NULL THEN &#39;Y&#39; ELSE &#39;N&#39; END;&#10;    --&#10;    l_sql_statement := getNSISummaryListSQL(eventBasedIn =&gt; l_event_flag);&#10;    --&#10;    IF l_event_flag = &#39;N&#39; THEN&#10;        OPEN l_ref_cursor FOR l_sql_statement USING OffenderIdIn, ActiveFlagIn, SoftDeletedIn;&#10;    ELSE&#10;        OPEN l_ref_cursor FOR l_sql_statement USING OffenderIdIn, ActiveFlagIn, EventIdIn, SoftDeletedIn;&#10;    END IF;&#10;    LOOP&#10;        FETCH l_ref_cursor BULK COLLECT INTO l_nsi_summary_tab LIMIT 100;&#10;        l_counter := l_counter + l_nsi_summary_tab.COUNT;&#10;        FOR i IN 1 .. l_nsi_summary_tab.COUNT&#10;        LOOP&#10;          --&#10;          do_set_rbac_levels(   OffenderIdIn  =&gt; l_nsi_summary_tab(i).offender_id,&#10;                                L1Out         =&gt; l_nsi_summary_tab(i).L1,&#10;                                L2Out         =&gt; l_nsi_summary_tab(i).L2,&#10;                                L3Out         =&gt; l_nsi_summary_tab(i).L3);&#10;          --&#10;          PIPE ROW (l_nsi_summary_tab(i));&#10;          --&#10;        END LOOP;&#10;        EXIT WHEN l_nsi_summary_tab.COUNT = 0;&#10;    END LOOP;&#10;    CLOSE l_ref_cursor;&#10;    RETURN;&#10;END getNSISummaryDataTab;&#10;--&#10;--&#10;PROCEDURE getNSISummaryData(  OffenderIdIn  IN nsi.offender_id%TYPE,&#10;                              EventIdIn     IN nsi.event_id%TYPE DEFAULT NULL,&#10;                              ActiveFlagIn  IN nsi.active_flag%TYPE DEFAULT 1,&#10;                              SoftDeletedIn IN nsi.soft_deleted%TYPE DEFAULT 0,&#10;                              OutCursor     OUT SYS_REFCURSOR)&#10;IS&#10;BEGIN&#10;    OPEN OutCursor FOR&#10;      SELECT&#10;        nsi_id,&#10;        offender_id,&#10;        event_id,&#10;        nsi_type_id,&#10;        nsi_type_code,&#10;        nsi_type_desc,&#10;        length,&#10;        referral_date,&#10;        actual_start_date,&#10;        actual_end_date,&#10;        nsi_status_id,&#10;        nsi_status_code,&#10;        nsi_status_desc,&#10;        active_flag,&#10;        event_number,&#10;        L1,&#10;        L2,&#10;        L3&#10;      FROM TABLE(nsi_support_api.getNSISummaryDataTab(  OffenderIdIn  =&gt; OffenderIdIn,&#10;                                                        EventIdIn     =&gt; EventIdIn,&#10;                                                        ActiveFlagIn  =&gt; ActiveFlagIn,&#10;                                                        SoftDeletedIn =&gt; SoftDeletedIn));&#10;END getNSISummaryData;&#10;--&#10;--&#10;FUNCTION getNSIListSQL( StaffIdIn               IN staff.staff_id%TYPE DEFAULT NULL,&#10;                        NsiTypeIdIn             IN nsi.nsi_type_id%TYPE DEFAULT NULL,&#10;                        NsiSubTypeIdIn          IN nsi.nsi_sub_type_id%TYPE DEFAULT NULL,&#10;                        NsiStatusIdIn           IN nsi.nsi_status_id%TYPE DEFAULT NULL,&#10;                        BoroughIdIn             IN borough.borough_id%TYPE DEFAULT NULL,&#10;                        DistrictIdIn            IN district.district_id%TYPE DEFAULT NULL,&#10;                        LocalDeliveryUnitIdIn   IN local_delivery_unit.local_delivery_unit_id%TYPE DEFAULT NULL,&#10;                        EventIdIn               IN event.event_id%TYPE DEFAULT NULL,&#10;                        ActiveFlagIn            IN nsi.active_flag%TYPE DEFAULT 1,&#10;                        LevelIn             IN VARCHAR2 DEFAULT &#39;ALL&#39;,&#10;                        PagedSyntax             IN VARCHAR2 DEFAULT &#39;N&#39;) RETURN CLOB&#10;IS&#10;    l_ret   CLOB;&#10;BEGIN&#10;&#10;    l_ret := &#39;SELECT  n.nsi_id,&#10;                      n.offender_id,&#10;                      n.event_id,&#10;                      n.nsi_type_id,&#10;                      rnt.code nsi_type_code,&#10;                      rnt.description nsi_type_desc,&#10;                      n.length,&#10;                      n.referral_date,&#10;                      n.actual_start_date,&#10;                      n.actual_end_date,&#10;                      n.nsi_status_id,&#10;                      rns.code nsi_status_code,&#10;                      rns.description nsi_status_desc,&#10;                      n.pending_transfer,&#10;                      n.nsi_status_date,&#10;                      n.active_flag,&#10;                      nm.probation_area_id,&#10;                      pa.code probation_area_code,&#10;                      nm.staff_id,&#10;                      s.officer_code,&#10;                      nm.team_id,&#10;                      t.code team_code,&#10;                      d.district_id,&#10;                      b.code level2_code,&#10;                      b.borough_id,&#10;                      d.code level3_code,&#10;                      ldu.local_delivery_unit_id,&#10;                      ldu.code team_type_code,&#10;                      e.event_number,&#10;                      o.first_name,&#10;                      o.second_name,&#10;                      o.surname,&#10;                      o.third_name,&#10;                      o.crn,&#10;                      o.current_highest_risk_colour,&#10;                      o.current_exclusion,&#10;                      o.current_restriction,&#10;                      di.disposal_id,&#10;                      di.termination_date,&#10;                      di.upw,&#10;                      rdt.sentence_type,&#10;                      rdt.cja2003,&#10;                      rdt.pre_cja2003,&#10;                      NULL L1,&#10;                      NULL L2,&#10;                      NULL L3 &#39; ||&#10;              CASE&#10;                WHEN PagedSyntax = &#39;Y&#39; THEN &#39; , ROW_NUMBER() OVER (ORDER BY n.nsi_status_date, n.nsi_id) AS row_number, COUNT(1) OVER() AS total_rows, &#39;&#10;                ELSE &#39; , NULL AS row_number, NULL AS total_rows, NULL AS total_pages, &#39;&#10;              END || &#39;&#10;&#9;&#9;&#9;  n.document_linked,&#10;              nm.start_date,&#10;              nm.nsi_manager_id,&#10;              rnt.RATE_CARD_FLAG          AS nsi_rate_card_flag&#10;              FROM nsi n&#10;&#10;              INNER JOIN nsi_manager nm&#10;              ON n.nsi_id = nm.nsi_id&#10;              AND nm.active_flag = 1&#10;&#10;              INNER JOIN offender o&#10;              ON n.offender_id = o.offender_id&#10;&#10;              INNER JOIN staff s&#10;              ON nm.staff_id = s.staff_id&#10;&#10;              INNER JOIN team t&#10;              ON nm.team_id = t.team_id&#10;&#10;              INNER JOIN district d&#10;              ON t.district_id = d.district_id&#10;&#10;              INNER JOIN borough b&#10;              ON d.borough_id = b.borough_id&#10;&#10;              INNER JOIN local_delivery_unit ldu&#10;              ON t.local_delivery_unit_id = ldu.local_delivery_unit_id&#10;&#10;              INNER JOIN probation_area pa&#10;              ON nm.probation_area_id = pa.probation_area_id&#10;&#10;              INNER JOIN r_nsi_type rnt&#10;              ON n.nsi_type_id = rnt.nsi_type_id&#10;&#10;              INNER JOIN r_nsi_status rns&#10;              ON n.nsi_status_id = rns.nsi_status_id&#10;&#10;              &#39; ||&#10;              CASE&#10;                WHEN EventIdIn IS NOT NULL OR LevelIn IN (&#39;EVENT&#39;) THEN &#39; INNER JOIN event e &#39;&#10;                ELSE &#39; LEFT OUTER JOIN event e &#39;&#10;              END || &#39;&#10;              ON n.event_id = e.event_id&#10;              &#39; ||&#10;              CASE&#10;                WHEN EventIdIn IS NOT NULL OR LevelIn IN (&#39;EVENT&#39;) THEN &#39; INNER JOIN disposal di &#39;&#10;                ELSE &#39; LEFT OUTER JOIN disposal di &#39;&#10;              END || &#39;&#10;              ON di.event_id = e.event_id&#10;&#10;              LEFT OUTER JOIN r_disposal_type rdt&#10;              ON di.disposal_type_id = rdt.disposal_type_id&#10;&#10;              LEFT OUTER JOIN r_standard_reference_list r1&#10;              ON n.nsi_sub_type_id = r1.standard_reference_list_id&#10;              AND r1.reference_data_master_id IN ( SELECT reference_data_master_id&#10;                                                  FROM r_reference_data_master&#10;                                                  WHERE code_set_name = &#39;&#39;NSI SUB TYPE&#39;&#39;)&#10;&#10;              WHERE 1=1&#10;              AND nm.probation_area_id = :probation_area_id&#10;              AND nm.team_id = :team_id&#10;              &#39;;&#10;    --&#10;    IF StaffIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND nm.staff_id = :staff_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :staff_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF NsiTypeIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.nsi_type_id = :nsi_type_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :nsi_type_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF NsiSubTypeIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.nsi_sub_type_id = :nsi_sub_type_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :nsi_sub_type_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF NsiStatusIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.nsi_status_id = :nsi_status_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :nsi_status_id IS NULL &#39;;&#10;    END IF;&#10;&#9;--&#10;    IF BoroughIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND d.borough_id = :borough_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :borough_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF DistrictIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND d.district_id = :district_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :district_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF LocalDeliveryUnitIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND t.local_delivery_unit_id = :local_delivery_unit_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :local_delivery_unit_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF EventIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.event_id = :event_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :event_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF LevelIn = &#39;EVENT&#39;&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.event_id IS NOT NULL &#39;;&#10;    END IF;&#10;    IF LevelIn = &#39;OFFENDER&#39; THEN&#10;        l_ret := l_ret || &#39; AND n.event_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF ActiveFlagIn = 1 THEN&#10;        l_ret := l_ret || &#39; AND n.active_flag = 1 &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND n.active_flag IN (0,1) &#39;;&#10;    END IF;&#10;    --&#10;    l_ret := l_ret || &#39; AND n.soft_deleted = :soft_deleted&#10;&#10;                        ORDER BY n.nsi_status_date, n.nsi_id&#39;;&#10;    --&#10;    RETURN l_ret;&#10;END getNSIListSQL;&#10;--&#10;--&#10;FUNCTION getNSIListDataTab( ProbationAreaIdIn       IN probation_area.probation_area_id%TYPE,&#10;                            TeamIdIn                IN team.team_id%TYPE,&#10;                            StaffIdIn               IN staff.staff_id%TYPE DEFAULT NULL,&#10;                            NsiTypeIdIn             IN nsi.nsi_type_id%TYPE DEFAULT NULL,&#10;                            NsiSubTypeIdIn          IN nsi.nsi_sub_type_id%TYPE DEFAULT NULL,&#10;                            NsiStatusIdIn           IN nsi.nsi_status_id%TYPE DEFAULT NULL,&#10;                            BoroughIdIn             IN borough.borough_id%TYPE DEFAULT NULL,&#10;                            DistrictIdIn            IN district.district_id%TYPE DEFAULT NULL,&#10;                            LocalDeliveryUnitIdIn   IN local_delivery_unit.local_delivery_unit_id%TYPE DEFAULT NULL,&#10;                            EventIdIn               IN event.event_id%TYPE DEFAULT NULL,&#10;                            LevelIn                 IN VARCHAR2 DEFAULT &#39;ALL&#39;,&#10;                            ActiveFlagIn            IN nsi.active_flag%TYPE DEFAULT 1,&#10;                            SoftDeletedIn           IN nsi.soft_deleted%TYPE DEFAULT 0,&#10;                            MaxRowsIn               IN NUMBER DEFAULT -1)&#10;RETURN nsi_pipeline.nsi_list_tab PIPELINED&#10;IS&#10;    --&#10;    l_sql_statement     CLOB;&#10;    l_ref_cursor        SYS_REFCURSOR;&#10;    l_nsi_list_tab      nsi_pipeline.nsi_list_tab;&#10;    --&#10;    l_counter           INTEGER := 0;&#10;    --&#10;    l_rows              INTEGER := 0;&#10;    l_max_rows          INTEGER := NVL(MaxRowsIn, -1);&#10;    l_exit_flag         BOOLEAN := FALSE;&#10;    --&#10;BEGIN&#10;    --&#10;    l_sql_statement := getNSIListSQL( StaffIdIn               =&gt; StaffIdIn,&#10;                                      NsiTypeIdIn             =&gt; NsiTypeIdIn,&#10;                                      NsiSubTypeIdIn          =&gt; NsiSubTypeIdIn,&#10;                                      NsiStatusIdIn           =&gt; NsiStatusIdIn,&#10;                                      BoroughIdIn             =&gt; BoroughIdIn,&#10;                                      DistrictIdIn            =&gt; DistrictIdIn,&#10;                                      LocalDeliveryUnitIdIn   =&gt; LocalDeliveryUnitIdIn,&#10;                                      EventIdIn               =&gt; EventIdIn,&#10;                                      LevelIn                 =&gt; LevelIn,&#10;                                      ActiveFlagIn            =&gt; ActiveFlagIn);&#10;    --&#10;    OPEN l_ref_cursor FOR l_sql_statement USING   ProbationAreaIdIn,&#10;                                                  TeamIdIn,&#10;                                                  StaffIdIn,&#10;                                                  NsiTypeIdIn,&#10;                                                  NsiSubTypeIdIn,&#10;                                                  NsiStatusIdIn,&#10;                                                  BoroughIdIn,&#10;                                                  DistrictIdIn,&#10;                                                  LocalDeliveryUnitIdIn,&#10;                                                  EventIdIn,&#10;                                                  SoftDeletedIn;&#10;    LOOP&#10;        FETCH l_ref_cursor BULK COLLECT INTO l_nsi_list_tab LIMIT 100;&#10;        l_counter := l_counter + l_nsi_list_tab.COUNT;&#10;        --&#10;        FOR i IN 1 .. l_nsi_list_tab.COUNT LOOP&#10;            --&#10;            do_set_rbac_levels(&#10;                OffenderIdIn =&gt; l_nsi_list_tab(i).offender_id,&#10;                L1Out        =&gt; l_nsi_list_tab(i).L1,&#10;                L2Out        =&gt; l_nsi_list_tab(i).L2,&#10;                L3Out        =&gt; l_nsi_list_tab(i).L3 );&#10;            --&#10;            PIPE ROW (l_nsi_list_tab(i));&#10;            --&#10;            l_rows := l_rows + 1;&#10;            IF l_max_rows &gt; 0 AND l_rows &gt;= l_max_rows THEN&#10;                l_exit_flag := TRUE;&#10;            END IF;&#10;            --&#10;            EXIT WHEN l_exit_flag;&#10;          --&#10;        END LOOP;&#10;        --&#10;        EXIT WHEN l_nsi_list_tab.COUNT = 0 OR l_exit_flag;&#10;        --&#10;    END LOOP;&#10;    CLOSE l_ref_cursor;&#10;    --&#10;    RETURN;&#10;    --&#10;END getNSIListDataTab;&#10;--&#10;--&#10;PROCEDURE getNSIListData( ProbationAreaIdIn       IN probation_area.probation_area_id%TYPE,&#10;                          TeamIdIn                IN team.team_id%TYPE,&#10;                          StaffIdIn               IN staff.staff_id%TYPE DEFAULT NULL,&#10;                          NsiTypeIdIn             IN nsi.nsi_type_id%TYPE DEFAULT NULL,&#10;                          NsiSubTypeIdIn          IN nsi.nsi_sub_type_id%TYPE DEFAULT NULL,&#10;                          NsiStatusIdIn           IN nsi.nsi_status_id%TYPE DEFAULT NULL,&#10;                          BoroughIdIn             IN borough.borough_id%TYPE D ;                                          LevelIn             =&gt; LevelIn,&#10;                                          PagedSyntax             =&gt; &#39;Y&#39;) || &#39; ) pag&#10;              WHERE pag.row_number BETWEEN &#39; || l_first_row || &#39; AND &#39; || l_last_row || &#39; ORDER BY pag.row_number&#39;;&#10;    --&#10;    OPEN cur FOR l_sql&#10;    USING   ProbationAreaIdIn,&#10;            TeamIdIn,&#10;            StaffIdIn,&#10;            NsiTypeIdIn,&#10;            BoroughIdIn,&#10;            DistrictIdIn,&#10;            LocalDeliveryUnitIdIn,&#10;            EventIdIn,&#10;            ActiveFlagIn,&#10;            SoftDeletedIn;&#10;    LOOP&#10;        FETCH cur BULK COLLECT INTO l_rows LIMIT l_fetch_size;&#10;        EXIT WHEN l_rows.COUNT = 0;&#10;        FOR i IN 1 .. l_rows.COUNT&#10;        LOOP&#10;            do_set_rbac_levels(   OffenderIdIn  =&gt; l_rows(i).offender_id,&#10;                                  L1Out         =&gt; l_rows(i).L1,&#10;                                  L2Out         =&gt; l_rows(i).L2,&#10;                                  L3Out         =&gt; l_rows(i).L3);&#10;            --&#10;            PIPE ROW(l_rows(i));&#10;        END LOOP;&#10;    END LOOP;&#10;    CLOSE cur;&#10;    RETURN;&#10;END getNSIListData_Paged;&#10;--&#10;--&#10;PROCEDURE getNSIListData_Paged (  ProbationAreaIdIn       IN probation_area.probation_area_id%TYPE,&#10;                                  TeamIdIn                IN team.team_id%TYPE,&#10;                                  StaffIdIn               IN staff.staff_id%TYPE DEFAULT NULL,&#10;                                  NsiTypeIdIn             IN nsi.nsi_type_id%TYPE DEFAULT NULL,&#10;                                  BoroughIdIn             IN borough.borough_id%TYPE DEFAULT NULL,&#10;                                  DistrictIdIn            IN district.district_id%TYPE DEFAULT NULL,&#10;                                  LocalDeliveryUnitIdIn   IN local_delivery_unit.local_de IdIn            IN district.district_id%TYPE DEFAULT NULL,&#10;                              LocalDeliveryUnitIdIn   IN local_delivery_unit.local_delivery_unit_id%TYPE DEFAULT NULL,&#10;                              PagedSyntax IN VARCHAR2 DEFAULT &#39;N&#39; ) RETURN CLOB&#10;IS&#10;    l_ret     CLOB;&#10;BEGIN&#10;    l_ret := &#39;SELECT  n.nsi_id,&#10;                      n.offender_id,&#10;                      n.event_id,&#10;                      n.nsi_type_id,&#10;                      rnt.code nsi_type_code,&#10;                      rnt.description nsi_type_desc,&#10;                      n.length,&#10;                      n.referral_date,&#10;                      n.actual_start_date,&#10;                      n.actual_end_date,&#10;                      n.nsi_status_id,&#10;                      rns.code nsi_status_code,&#10;                      rns.description nsi_status_desc,&#10;                      n.pending_transfer,&#10;                      n.nsi_status_date,&#10;                      n.active_flag,&#10;                      nm.probation_area_id,&#10;                      pa.code probation_area_code,&#10;                      nm.staff_id,&#10;                      s.officer_code,&#10;                      nm.team_id,&#10;                      t.code team_code,&#10;                      d.district_id,&#10;                      b.code level2_code,&#10;                      b.borough_id,&#10;                      d.code level3_code,&#10;                      ldu.local_delivery_unit_id,&#10;                      ldu.code team_type_code,&#10;                      o.first_name,&#10;                      o.second_name,&#10;                      o.surname,&#10;                      o.third_name,&#10;                      o.crn,&#10;                      o.current_highest_risk_colour,&#10;                      o.current_exclusion,&#10;                      o.current_restriction,&#10;                      NULL L1,&#10;                      NULL L2,&#10;                      NULL L3 &#39; ||&#10;              CASE&#10;                WHEN PagedSyntax = &#39;Y&#39; THEN &#39; , ROW_NUMBER() OVER (ORDER BY n.nsi_status_date, n.nsi_id) AS row_number, COUNT(1) OVER() AS total_rows &#39;&#10;                ELSE &#39; , NULL AS row_number, NULL AS total_rows, NULL AS total_pages &#39;&#10;              END || &#39;&#10;              FROM nsi n&#10;&#10;              INNER JOIN nsi_manager nm&#10;              ON n.nsi_id = nm.nsi_id&#10;              AND nm.active_flag = 1&#10;              AND n.active_flag = :active_flag&#10;              AND n.soft_deleted = :soft_deleted&#10;&#10;              INNER JOIN offender o&#10;              ON n.offender_id = o.offender_id&#10;&#10;              INNER JOIN staff s&#10;              ON nm.staff_id = s.staff_id&#10;&#10;              INNER JOIN team t&#10;              ON nm.team_id = t.team_id&#10;&#10;              INNER JOIN district d&#10;              ON t.district_id = d.district_id&#10;&#10;              INNER JOIN borough b&#10;              ON d.borough_id = b.borough_id&#10;&#10;              INNER JOIN local_delivery_unit ldu&#10;              ON t.local_delivery_unit_id = ldu.local_delivery_unit_id&#10;&#10;              INNER JOIN probation_area pa&#10;              ON nm.probation_area_id = pa.probation_area_id&#10;&#10;              INNER JOIN r_nsi_type rnt&#10;              ON n.nsi_type_id = rnt.nsi_type_id&#10;              AND rnt.enforcement_type = 1&#10;&#10;              INNER JOIN r_nsi_status rns&#10;              ON n.nsi_status_id = rns.nsi_status_id&#10;&#10;              LEFT OUTER JOIN r_standard_reference_list r1&#10;              ON n.nsi_sub_type_id = r1.standard_reference_list_id&#10;              AND r1.reference_data_master_id IN ( SELECT reference_data_master_id&#10;                                                  FROM r_reference_data_master&#10;                                                  WHERE code_set_name = &#39;&#39;NSI SUB TYPE&#39;&#39;)&#10;&#10;              WHERE 1=1&#39;;&#10;    --&#10;    IF TeamIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND nm.team_id = :team_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :team_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF StaffIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND nm.staff_id = :staff_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :staff_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF NsiTypeIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.nsi_type_id = :nsi_type_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :nsi_type_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF NsiStatusIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND n.nsi_status_id = :nsi_status_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :nsi_status_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF ProbationAreaIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND nm.probation_area_id = :probation_area_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :probation_area_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF BoroughIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND d.borough_id = :borough_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :borough_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF DistrictIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND d.district_id = :district_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :district_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    IF LocalDeliveryUnitIdIn IS NOT NULL&#10;    THEN&#10;        l_ret := l_ret || &#39; AND t.local_delivery_unit_id = :local_delivery_unit_id &#39;;&#10;    ELSE&#10;        l_ret := l_ret || &#39; AND :local_delivery_unit_id IS NULL &#39;;&#10;    END IF;&#10;    --&#10;    l_ret := l_ret || &#39; ORDER BY n.nsi_status_date&#39;;&#10;    --&#10;    RETURN l_ret;&#10;END getBreachRecallSQL;&#10;--&#10;--&#10;FUNCTION getBreachRecallInterventions(  TeamIdIn                IN team.team_id%TYPE DEFAULT NULL,&#10;                                        StaffIdIn               IN staff.staff_id%TYPE DEFAULT NULL,&#10;                                        NsiTypeIdIn             IN nsi.nsi_type_id%TYPE DEFAULT NULL,&#10;                                        NsiStatusIdIn           IN nsi.nsi_status_id%TYPE DEFAULT NULL,&#10;                                        ProbationAreaIdIn       IN probation_area.probation_area_id%TYPE DEFAULT NULL,&#10;                                        BoroughIdIn             IN borough.borough_id%TYPE DEFAULT NULL,&#10;                                        DistrictIdIn            IN district.district_id%TYPE DEFAULT NULL,&#10;                                        LocalDeliveryUnitIdIn   IN local_delivery_unit.local_delivery_unit_id%TYPE DEFAULT NULL,&#10;                                        ActiveFlagIn            IN nsi.active_flag%TYPE DEFAULT 1,&#10;                                        SoftDeletedIn           IN nsi.soft_deleted%TYPE DEFAULT 0) RETURN nsi_pipeline.nsi_bcreachrecall_tab PIPELINED&#10;IS&#10;    l_sql_statement     CLOB;&#10;    l_ref_cursor        SYS_REFCURSOR;&#10;    l_nsi_list_tab      nsi_pipeline.nsi_bcreachrecall_tab;&#10;    l_counter           INTEGER;&#10;BEGIN&#10;    l_counter := 0;&#10;    --&#10;    l_sql_statement := getBreachRecallSQL(  TeamIdIn              =&gt; TeamIdIn,&#10;                                            StaffIdIn             =&gt; StaffIdIn,&#10;                                            NsiTypeIdIn           =&gt; NsiTypeIdIn,&#10;                                            NsiStatusIdIn         =&gt; NsiStatusIdIn,&#10;                                            ProbationAreaIdIn     =&gt; ProbationAreaIdIn,&#10;                                            Borough
