                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">PACKAGE BODY                     &quot;ES_SEARCH&quot; as&#10;&#10;--==============================================================================&#10;--&#10;-- Description  : Package to test Contact FULL text search using Elastice Search&#10;--&#10;-- Author       : Roy Pilmoor&#10;-- Date         : 30 June 2021&#10;--&#10;--  Change History:&#10;--&#10;--  Version PDM    Date        Who             Description&#10;--  ------- ----   ----------- --------------- ---------------------------------------&#10;--  1.01          30 June 2021  Roy Pilmoor     Initial Version&#10;--  1.02          03/08/2021    Roy Pilmoor     Load into GIT&#10;--  1.03          16/09/2021    Roy Pilmoor     Add http_strip to analyser&#10;&#10;&#10;-- -----------------------------------------------------------------------------&#10;-- ES Package.&#10;-- -----------------------------------------------------------------------------&#10;   g_pri_sec VARCHAR2(3)    := null;&#10;&#10;   g_host  VARCHAR2(4000)    := null;    --  see es_get_param(p_param_name =&gt;  &#39;HOST&#39;)&#10;   g_wallet varchar2(4000)   := null;&#10;   g_wallet_pw varchar2(4000) := null;&#10;&#10;&#10;   g_es_index  varchar2(100) := null ;   -- see es_get_param(p_param_name&#10;   g_port  varchar2(10)      := Null;    -- see es_get_param(p_param_name&#10;   g_batch_size number       :=  1000;&#10;&#10;   g_merge number            := 1;   -- merge result into contact_es_status&#10;   g_delete number           := 1;  -- dont delete from contact_es_single_q&#10;   g_inbound_message number  := 1;&#10;   g_outbound_message number := 0;  -- This produces a lot of log file&#10;&#10;   g_user varchar2(100)      := null;  -- -- see es_get_param(p_param_name&#10;   g_password varchar2(100)  := null;  -- -- see es_get_param(p_param_name&#10;&#10;   g_keepalive varchar(100)  := &#39;1m&#39;;  --keep alive for pit in searches&#10;&#10;   g_http varchar2(10)       := null;  -- or http/https  -- see es_get_param(p_param_name&#10;&#10;   g_index_created varchar2(10) := null;  --&#39;Y&#39; if the index has been created.&#10; --&#10; -- ANalysis Tasks&#10; --&#10;&#10;-- ascii folding (change european characters to ascci&#10;-- Standardise all dates in Notes to be yyyy-mm-dd&#10;-- Standardize telephone numbers to be 0nnnnnnnnnn  (spaces are removed in extract)&#10;-- Standardize Postcode split RG128TX to RG12 8TX   (spaces are removed in extract)&#10;-- Standardize times change 9:30pm to 9:30 pm&#10;-- Standardize Currancy change ��30 to �� 30.&#10;-- Split email into individual componenets ie roy.pilmoor@hotmail.com =&gt; roy pilmoor hotmail com&#10;-- remove any remaining punctuation&#10;-- Remove empty terms and trinm terms&#10;-- stemming&#10;&#10;   g_schema clob             :=&#10;   &#39;&#10;{&#10;&quot;settings&quot; : {&#10;     &quot;index&quot; : {&#10;            &quot;number_of_shards&quot; : 3,&#10;            &quot;number_of_replicas&quot; : 6&#10;        },&#10;     &quot;index.mapping.ignore_malformed&quot; : true,&#10;     &quot;analysis&quot; : {&#10;          &quot;analyzer&quot; : {&#10;              &quot;nps_analyzer&quot; : {&#10;                   &quot;tokenizer&quot;  : &quot;classic&quot;,&#10;                   &quot;char_filter&quot; : [&quot;phonenowithspace&quot;,&quot;dateWithBlanks&quot;,&quot;lf&quot;,&quot;postcode-withspace&quot;,&quot;xtime&quot;],&#10;                   &quot;filter&quot; : [&#10;                   &quot;lowercase&quot;,&#10;                   &quot;asciifolding&quot;,&#10;                   &quot;standard_dates_dt5&quot;,&#10;                   &quot;standard_dates_jan&quot;,&#10;                   &quot;standard_dates_feb&quot;,&#10;                   &quot;standard_dates_mar&quot;,&#10;                   &quot;standard_dates_apr&quot;,&#10;                   &quot;standard_dates_may&quot;,&#10;                   &quot;standard_dates_jun&quot;,&#10;                   &quot;standard_dates_jul&quot;,&#10;                   &quot;standard_dates_aug&quot;,&#10;                   &quot;standard_dates_sep&quot;,&#10;                   &quot;standard_dates_oct&quot;,&#10;                   &quot;standard_dates_nov&quot;,&#10;                   &quot;standard_dates_dec&quot;,&#10;                   &quot;standard_dates_ymd&quot;,&#10;                   &quot;standard_dates_dt1&quot;,&#10;                   &quot;standard_dates_dt2&quot;,&#10;                   &quot;standard_dates_dt3&quot;,&#10;                   &quot;standard_dates_dt4&quot;,&#10;                   &quot;standard_dates_rv&quot;,&#10;                   &quot;telno&quot;,&#10;&#10;                   &quot;ampm&quot;,&#10;                   &quot;spliteq&quot;,&#10;                   &quot;emailcn&quot;,&#10;                   &quot;emailcm&quot;,&#10;&#10;                   &quot;synonym_filter_spell_expand&quot;,&#10;                   &quot;synonym_filter_no_expand&quot;,&#10;                   &quot;synonym_filter_phrase_exp&quot;,&#10;                   &quot;email&quot;,&#10;                   &quot;trim&quot;,&#10;                   &quot;length&quot;,&#10;                   &quot;noblank&quot;,&#10;                   &quot;remove_duplicates&quot;,&#10;                   &quot;stemmer_exceptions&quot; ,&#10;                            &quot;nps_stemmer&quot;,&#10;                            &quot;nps_stemmer_1&quot;&#10;                   ]&#10;                }&#10;             },&#10;             &quot;char_filter&quot; :&#10;                 { &quot;dateWithBlanks&quot; :&#10;                            {&#10;                                &quot;type&quot; : &quot;pattern_replace&quot;,&#10;                                &quot;pattern&quot; :  &quot;\\s([0-9]{1,2})((st|nd|rd|th){0,1})(\\s|-|/|\\.)(january|february|march|april|may|june|july|August|september|october|november|december|jan|feb|mar|april|may|june|july|aug|sep|sept|oct|nov|dec|[0-9]{1,2})(\\s|-|/|\\.)([0-9]{2,4})\\s&quot;,&#10;                                &quot;replacement&quot; : &quot;$1-$5-$7&quot;,&#10;                                &quot;flags&quot; : &quot;CASE_INSENSITIVE|MULTILINE&quot;&#10;                            },&#10;                  &quot;xtime&quot; :&#10;                            {&#10;                                &quot;type&quot; : &quot;pattern_replace&quot;,&#10;                                &quot;pattern&quot; : &quot;([0-9]{1,2}):([0-9][0-9)])([\\sam|\\spm])&quot;,&#10;                                &quot;replacement&quot; : &quot;$1.$2 $3&quot;,&#10;                                &quot;flags&quot; : &quot;CASE_INSENSITIVE|MULTILINE&quot;&#10;                            },&#10;                &quot;lf&quot;: {&#10; &#9;&#9;&#9;&#9;&#9;&#9;&quot;type&quot;: &quot;mapping&quot;,&#10; &#9;&#9;&#9;&#9;&#9;&#9;&quot;mappings&quot;:  [ &quot;\\n =&gt; \\u0020&quot;]&#10;       &#9;&#9;&#9;&#9;&#9;},&#10;&#9;&#9;&#9;&#9;&quot;postcode-withspace&quot;: {&#10; &#9;&#9;&#9;&#9;&#9;&#9;&quot;type&quot;: &quot;pattern_replace&quot;,&#10; &#9;&#9;&#9;&#9;&#9;&#9;&quot;pattern&quot;: &quot;([a-z]{1,2}[0-9]{1,2})[ ]{0,1}([0-9]{1,2}[a-z][a-z])&quot;,&#10; &#9;&#9;&#9;&#9;&#9;&#9;&quot;replacement&quot;: &quot;PostCode $1$2 &quot;,&#10; &#9;&#9;&#9;&#9;&#9;&#9;&quot;flags&quot; : &quot;CASE_INSENSITIVE|MULTILINE&quot;&#10; &#9;&#9;&#9;&#9;&#9;},&#10;&#10;                   &quot;phonenowithspace&quot; :&#10;                            {&#10;                                &quot;type&quot; : &quot;pattern_replace&quot;,&#10;                                &quot;pattern&quot; : &quot;([0-9]{3,5})\\s([0-9]{2,7})(\\s{0,2})([0-9]{2,7})&quot;,&#10;                                &quot;replacement&quot; : &quot;PhoneNo $1$2$4&quot;,&#10;        &#9;&#9;&#9;&#9;&#9;&#9;&quot;flags&quot; : &quot;CASE_INSENSITIVE|MULTILINE&quot;&#10;                            }&#10;                   },&#10;             &quot;filter&quot; : {&#10;                 &quot;length&quot; : {&#10;                        &quot;type&quot; : &quot;length&quot;, &quot;min&quot; : 1},&#10;                 &quot;nps_stemmer&quot; : {&#10;                        &quot;type&quot; : &quot;stemmer&quot;,&#10;                        &quot;name&quot; : &quot;possessive_english&quot;},&#10;                 &quot;nps_stemmer_1&quot; : {&#10;                        &quot;type&quot; : &quot;stemmer&quot; },&#10;                 &quot;standard_dates_jan&quot; :&#10;                       {&quot;type&quot; : &quot;pattern_replace&quot;,  &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](january|jan)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.01.$4&quot;,&#10;                         &quot;lowercase&quot; : true&#10;                        },&#10;                 &quot;standard_dates_feb&quot; :&#10;                      {&quot;type&quot; : &quot;pattern_replace&quot;,   &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](february|feb)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.02.$4&quot;,&#10;                        &quot;lowercase&quot; : true},&#10;                 &quot;standard_dates_mar&quot; :&#10;                      {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;(^[0-9]{1,2})(st|nd|rd|th){0,1}[./-](march|mar)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.03.$4&quot;,&#10;                        &quot;lowercase&quot; : true},&#10;                 &quot;standard_dates_apr&quot; :&#10;                     {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](april|apr)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.04.$4&quot;,&#10;                       &quot;lowercase&quot; : true},&#10;                 &quot;standard_dates_may&quot; :&#10;                     {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})[./-](st|nd|rd|th){0,1}(may|may)[./-]([0-9]{1,4})&quot;,&quot;replacement&quot; : &quot;$1.05.$4&quot;,&#10;                     &quot;lowercase&quot; : true},&#10;                &quot;standard_dates_jun&quot; :&#10;                    {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](june|jun)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.06.$4&quot;, &quot;lowercase&quot; : true},&#10;                &quot;standard_dates_jul&quot; :&#10;                    {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})[./-](st|nd|rd|th){0,1}(july|jul)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.07.$4&quot;, &quot;lowercase&quot; : true},&#10;                &quot;standard_dates_aug&quot; :&#10;                    {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](august|aug)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.08.$4&quot;, &quot;lowercase&quot; : true}    ,&#10;                &quot;standard_dates_sep&quot; :&#10;                    {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](sep|sept|september)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.09.$4&quot;, &quot;lowercase&quot; : true},&#10;                &quot;standard_dates_oct&quot; :&#10;                    {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](october|oct)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.10.$4&quot;, &quot;lowercase&quot; : true}    ,&#10;                &quot;standard_dates_nov&quot; :&#10;                    {&quot;type&quot; : &quot;pattern_replace&quot;, &quot;pattern&quot; : &quot;([0-9]{1,2})(st|nd|rd|th){0,1}[./-](november|nov)[./-]([0-9]{1,4})&quot;, &quot;replacement&quot; : &quot;$1.11.$4&qu CHAR2(4000);&#10;    buffer CLOB;&#10;    content CLOB;&#10;    result CLOB;&#10;&#10;&#10;    P_CODE varchar2(10) := null;&#10;&#10;--    result clob := &#39;{&quot;took&quot;:12,&quot;errors&quot;:false,&quot;items&quot;:[{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000003&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:62,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000006&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:63,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000007&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:64,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000008&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:65,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000012&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:66,&quot;_primary_term&quot;:2,&quot;status&quot;:201}}]}&#10;--}&#39;;&#10;&#10;&#10;    l_chunkStart number := 1;&#10;    l_chunkLength number := 2000;&#10;    l_chunkdata varchar(4000);&#10;&#10;&#10; begin&#10;&#10;  content := p_content;&#10;  case&#10;     when lower(p_ACTION) = &#39;_cluster&#39; then p_code :=&#39;GET&#39;;&#10;     when lower(p_ACTION) = &#39;delete&#39; then p_code :=&#39;DELETE&#39;;&#10;     when lower(p_ACTION) = &#39;delete_doc&#39; then p_code :=&#39;DELETE&#39;;&#10;     when lower(p_ACTION) = &#39;put&#39; then p_code :=&#39;PUT&#39;;&#10;     when lower(p_ACTION) = &#39;get&#39; then p_code :=&#39;GET&#39;;&#10;     else p_code := &#39;POST&#39;;&#10;  end case;&#10;&#10;&#10;  case&#10;     when lower(p_ACTION) in (&#39;_bulk&#39;) then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||p_action||&#39;/?refresh=true&#39;;&#10;    when lower(p_ACTION) in (&#39;_count&#39;) then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||p_action||&#39;?pretty=true&#39;;&#10;    when lower(p_ACTION) in (&#39;_update&#39;) then&#10;--             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/_doc/&#39;||p_action||&#39;/&#39;||p_id||&#39;?routing=&#39;||p_routing||&#39;?version_type=external,version=&#39;||&#39;000&#39;||p_scn;&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||&#39;_doc&#39;||&#39;/&#39;||&#39;000&#39;||p_id||&#39;?version=&#39;||&#39;000&#39;||p_scn||&#39;&amp;version_type=external_gt&#39;;&#10;    when lower(p_ACTION)  = &#39;delete&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;);&#10;    when lower(p_ACTION)  = &#39;delete_doc&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||&#39;_doc&#39;||&#39;/&#39;||&#39;000&#39;||p_id||&#39;?refresh=true&#39; ;&#10;    when lower(p_ACTION)  = &#39;_cluster&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;;&#10;    when lower(p_ACTION)  = &#39;_search&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||p_action||&#39;?pretty=true&#39;;&#10;    when lower(p_ACTION)  = &#39;_pit_search&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||&#39;_search&#39;||&#39;?pretty=true&#39;;&#10;    when lower(p_ACTION)  = &#39;put&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;);&#10;    when lower(p_ACTION)  = &#39;_pit&#39; then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||p_action||content;&#10;             content := null;&#10;    else&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||&#39;/&#39;||es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)||&#39;/&#39;||p_action||&#39;/&#39;;&#10;  end case;&#10;&#10;  if p_cmd is not null then&#10;             URL := es_get_param(p_param_name =&gt;  &#39;HTTP&#39;)||&#39;://&#39;||es_get_param(p_param_name =&gt;  &#39;HOST&#39;)||es_get_param(p_param_name =&gt;  &#39;PORT&#39;)||p_cmd;&#10;  end if;&#10;&#10;  if g_outbound_message  = 1 or p_debug = 1  then&#10;  begin&#10;&#10;  WRITE_LOG (&#10;  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;  p_log_context =&gt; &#39;PROCESS_HTTP&#39;,&#10;  p_PROC_Instance =&gt; p_instance,&#10;  p_LOG_MESSAGE =&gt; &#39;Outbound Message: &#39;||P_code||&#39;:&#39;||p_action||&#39;:&#39;||P_ID,&#10;  p_log_CLOB =&gt; p_content);&#10;&#10;     if p_debug = 1 then&#10;     WRITE_LOG (&#10;         p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;         p_log_context =&gt; &#39;PROCESS_HTTP&#39;,&#10;         p_PROC_Instance =&gt; p_instance,&#10;         p_LOG_MESSAGE =&gt; &#39;Outbound Message: &#39;||P_ID|| &#39;:&#39; || url,&#10;         p_log_CLOB =&gt; URL);&#10;&#10;     end if;&#10;&#10;end;&#10;end if;&#10;&#10;  if g_http = &#39;https&#39; then&#10;     utl_http.set_wallet(es_get_param(p_param_name =&gt;  &#39;WALLET&#39;), es_get_param(p_param_name =&gt;  &#39;WALLET_PW&#39;));&#10;  end if;&#10;&#10;  req := utl_http.begin_request(url, P_CODE,&#39; HTTP/1.1&#39;);&#10;&#10;  if g_http = &#39;https&#39; then&#10;     Utl_Http.set_authentication(req, username =&gt; es_get_param(p_param_name =&gt;  &#39;USER&#39;), PASSWORD =&gt; es_get_param(p_param_name =&gt;  &#39;PASSWORD&#39;))   ;&#10;  end if;&#10;&#10;  utl_http.set_header        (req, &#39;user-agent&#39;,        &#39;mozilla/4.0&#39;);&#10;  utl_http.set_header        (req, &#39;content-type&#39;,      &#39;application/json&#39;);&#10;  utl_http.set_header        (req, &#39;Content-Length&#39;,    nvl(length(content),0));&#10;&#10;&#10;if content is not null then&#10;  l_chunkStart := 1;&#10;  utl_http.set_header        (req, &#39;Transfer-Encoding&#39;, &#39;chunked&#39;);&#10;  utl_http.set_body_charset  (req, &#39;UTF-8&#39;);&#10;loop&#10;  l_chunkData := null;&#10;  l_chunkData := dbms_lob.substr(content, l_chunkLength, l_chunkStart );&#10;&#10;  utl_http.write_text(req, l_chunkData);&#10;&#10;&#10;  if (nvl(length(l_chunkData),0) &lt; 1)  or l_chunkdata is null then exit; end if;&#10;  l_chunkStart := l_chunkStart + l_chunkLength;&#10;end loop;&#10;else&#10;   utl_http.write_text(req, content);&#10;end if;&#10;&#10;  --    dbms_output.put_line(&#39;a: &#39;||url);&#10;  -- ------------------------------------------------------------&#10;  -- process the response from the HTTP call&#10;  res := utl_http.get_response(req);&#10;  -- ------------------------------------------------------------&#10;&#10;  begin&#10;    result := null;&#10;&#10;    loop  -- until end of responce then goto exceptions&#10;        utl_http.read_text(res, buffer);&#10;        result := result||buffer;&#10;    end loop;&#10;&#10;    utl_http.end_response(res);&#10;&#10;  EXCEPTION&#10;    when utl_http.end_of_body&#10;    then&#10;--&#10;-- What to do when youve got the whole message&#10;--&#10;&#10;    p_result := result;&#10;    utl_http.end_response(res);&#10;&#10;if ( g_inbound_message = 1 or p_debug = 1 or&#10;  JSON_exists(result, &#39;$.error&#39;))&#10;then&#10;     WRITE_LOG (&#10;      p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;      p_log_context =&gt; &#39;PROCESS_HTTP&#39;,&#10;      p_PROC_Instance =&gt; p_instance,&#10;      p_LOG_MESSAGE =&gt; &#39;InBound Message: &#39;||P_id,&#10;      p_log_CLOB =&gt; p_result);&#10;end if;&#10;--*/&#10;&#10;if   JSON_exists(result, &#39;$.error&#39;) then&#10;    p_error := p_result;&#10;    dbms_output.put_line(&#39;Error JSON: &#39;||p_result);&#10;end if;&#10;&#10;when OTHERS then&#10;&#10;    dbms_output.put_line(&#39;Error Others: &#39;||sqlerrm||utl_http.get_detailed_sqlerrm);&#10;    p_error := sqlerrm||&#39;: &#39;||utl_http.get_detailed_sqlerrm;&#10;   utl_http.end_response(res);&#10;&#10;/*&#10;Other Exceptions see:&#10;BAD_ARGUMENT                29261 The argument passed to the interface is bad. Any HTTP request or response interface when detailed_exception is enabled&#10;BAD_URL                     29262 The requested URL is badly formed BEGIN_REQUEST, when detailed_exception is enabled&#10;END_OF_BODY                 29266 The end of HTTP response body is reached READ_RAW, READ_TEXT, and READ_LINE, when detailed_exception is enabled&#10;HEADER_NOT_FOUND            29265 The header is not found GET_HEADER, GET_HEADER_BY_NAME, when detailed_exception is enabled&#10;HTTP_CLIENT_ERROR           29268 From GET_RESPONSE, the response status code indicates that a client error has occurred (status code in 4xx range). Or from begin_request, the HTTP proxy returns a status code in the 4xx range when making an HTTPS request through the proxy. GET_RESPONSE, BEGIN_REQUEST when detailed_exception is enabled&#10;HTTP_SERVER_ERROR           29269 From GET_RESPONSE, the response status code indicates that a client error has occurred (status code in 5xx range). Or from begin_request, the HTTP proxy returns a status code in the 5xx range when making an HTTPS request through the proxy. GET_RESPONSE, BEGIN_REQUEST when detailed_exception is enabled&#10;NETWORK_ACCESS_DENIED       24247 Access to the remote network host or credentials in an Oracle wallet is denie BEGIN_REQUEST and SET_AUTHENTICATION_FROM_WALLET when detailed_exception is enabled&#10;ILLEGAL_CALL                29267 The call to UTL_HTTP is illegal at the current state of the HTTP request SET_HEADER, SET_AUTHENTICATION, and SET_PERSISTENT_CONN_SUPPORT, when detailed_exception is enabled&#10;PARTIAL_MULTIBYTE_EXCEPTION 29275 No complete character is read and a partial multibyte character is found at the end of the response body READ_TEXT and READ_LINE, when detailed_exception is enabled&#10;PROTOCOL_ERROR              29263 An HTTP protocol error occurs when communicating with the Web server SET_HEADER, GET_RESPONSE, READ_RAW, READ_TEXT, and READ_LINE, when detailed_exception is enabled&#10;REQUEST_FAILED              29273 The request fails to executes Any HTTP request or response interface when detailed_exception is disabled&#10;TOO_MANY_REQUESTS           29270 Too many requests or responses are open BEGIN_REQUEST, when detailed_exception is enabled&#10;TRANSFER_TIMEOUT            29276 No data is read and a read timeout occurred READ_TEXT and READ_LINE, when detailed_exception is enabled&#10;UNKNOWN_SCHEME              29264 The scheme of the requested URL is unknown BEGIN_REQUEST and GET_RESPONSE, when detailed_exception is enabled&#10;&#10;*/&#10;end;&#10;&#10;end Process_http;&#10;&#10;FUNCTION PROCESS_HTTP_fun&#10;&#10; (p_action      In varchar2,&#10; p_content      in clob,&#10; p_id           in number := Null,&#10; p_Instance     in number := null,&#10; P_routing      in number := null,&#10; P_scn          in number := null,  -- used in _update&#10; p_cmd          in varchar2 := NULL,&#10; p_debug        in integer := 0&#10; ) return clob&#10; is&#10;       x_result     clob;&#10;       x_error      varchar2(4000) := null;&#10;       x_number     number := 0;&#10;&#10;begin&#10;&#10; process_http&#10;(p_action   =&gt; p_action ,&#10; p_content  =&gt; p_content,&#10; p_id       =&gt; p_id,&#10; p_Instance =&gt; p_Instance,&#10; P_routing  =&gt; P_routing,&#10; p_error    =&gt; x_error ,&#10; p_Stats    =&gt; x_number,&#10; p_result   =&gt; x_result,&#10; P_scn      =&gt; P_scn,  -- used in _update&#10; p_debug    =&gt; p_debug,&#10; P_CMD      =&gt; P_CMD&#10;);&#10;&#10;return x_result;&#10;&#10;end PROCESS_HTTP_fun;&#10;&#10;PROCEDURE post_to_clear_index IS&#10;&#10;&#10;        content  VARCHAR2(4000);&#10;        result   clob;&#10;        x_error  varchar2(4000) := null;&#10;        x_number number := 0;&#10;BEGIN&#10;&#10;    write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL,&#10;    p_log_context =&gt; &#39;POST_TO_CLEAR_INDEX&#39;,&#10;    p_proc_instance =&gt; 0,&#10;    p_log_message =&gt; &#39;Clear Index: &#39; || es_get_param(p_param_name =&gt;  &#39;INDEX&#39;));&#10;&#10;    Process_http&#10;        (p_action =&gt; &#39;DELETE&#39;,&#10;         p_content =&gt; null,&#10;         p_id =&gt; null,&#10;         p_Instance =&gt; null,&#10;         p_result =&gt; result,&#10;         p_error =&gt;  X_ERROR,&#10;         p_Stats =&gt; X_NUMBER&#10;         );&#10;&#10;&#10;    dbms_output.put_line(&#39;Response: &#39;|| result);&#10;&#10;END;&#10;&#10;FUNCTION es_quality (P_offender_id in number)&#10;return varchar2&#10;is&#10;es_quality_value varchar2(4000);&#10;es_quailty_PC integer;&#10;x_es_count integer;&#10;x_contact_count integer;&#10;&#10;begin&#10;&#10;SELECT&#10;count(c.contact_id),&#10;count(es.contact_id),&#10;        CASE&#10;            WHEN COUNT(c.contact_id) = 0 THEN&#10;                100&#10;            ELSE&#10;                COUNT(es.contact_id) / COUNT(c.contact_id) * 100&#10;        END&#10;     quality&#10;INTO x_es_count,x_contact_count,es_quailty_PC&#10;FROM&#10;    contact             c&#10;    LEFT OUTER JOIN contact_es_status   es ON ( es.contact_id = c.contact_id AND c.last_updated_datetime &lt;= es.last_updated_datetime )&#10;WHERE&#10;    c.offender_id = p_offender_id&#10;    AND c.soft_deleted = 0&#10;    ;&#10;&#10;--dbms_output.put_line(x_es_count);&#10;--dbms_output.put_line(x_contact_count);&#10;--dbms_output.put_line(es_quailty_PC);&#10;&#10;if es_quailty_PC = 100 then&#10; es_quality_value := null;&#10;else&#10;  es_quality_value := &#39;Warning: Index is not up to Date: &#39; || to_char(es_quailty_PC,&#39;999&#39;)||&#39;%&#39;;&#10;end if;&#10;return es_quality_value;&#10;&#10;&#10;end es_quality ;&#10;--&#10;-- -----------------------------------------------------------------&#10;--&#10;&#10;--&#10;-- PUT_TO_CREATE_INDEX&#10;--&#10;PROCEDURE put_to_create_index (p_debug in integer := 0) IS&#10;&#10;        result clob;&#10;        content                         CLOB;&#10;&#10;        x_error varchar2(4000) := null;&#10;        x_number number := 0;&#10;BEGIN&#10;&#10; content := g_schema;&#10;&#10;&#10; Process_http&#10;    (p_action =&gt; &#39;PUT&#39;,&#10;     p_content =&gt; content,&#10;     p_id =&gt; null,&#10;     p_Instance =&gt; null,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER,&#10;     p_debug =&gt; p_debug&#10;     );&#10;&#10;&#10;    dbms_output.put_line(&#39;Response: &#39;|| result);&#10;&#10;    write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL,&#10;    p_log_context =&gt; &#39;PUT_TO_CREATE_INDEX&#39;,&#10;    p_proc_instance =&gt; 0,&#10;    p_log_message =&gt; &#39;Create Index: - End &#39; || es_get_param(p_param_name =&gt;  &#39;INDEX&#39;),&#10;    p_log_clob =&gt; result);&#10;&#10;&#10;&#10;END put_to_create_index;&#10;&#10;&#10;PROCEDURE GET_CLUSTER_STATUS IS&#10;&#10;        result                          clob;&#10;        content                         CLOB;&#10;&#10;        x_error varchar2(4000);&#10;        x_number number := 0;&#10;BEGIN&#10;&#10; Process_http&#10;    (p_action =&gt; &#39;_cluster&#39;,&#10;     p_conten ze (&#10;    p_text IN VARCHAR2 := NULL,    p_debug in integer := 0&#10;&#10;) IS&#10;&#10;x_error varchar2(4000);&#10;x_number number := 0;&#10;content clob;&#10;result clob;&#10;&#10;cursor Jr is&#10;select &quot;token&quot; from json_table ( result,&#39;$.tokens[*]&#39;&#10;      COLUMNS (&quot;token&quot; VARCHAR )) ;&#10;&#10;&#10;BEGIN&#10;&#10;    content := &#39;&#10;{&#10;          &quot;analyzer&quot; : &quot;nps_analyzer&quot;,&#10;          &quot;field&quot;: &quot;NOTES&quot;,&#10;          &quot;text&quot; : &quot;&#39;&#10;               || p_text&#10;               || &#39;&quot;&#10;&#10;}&#10;&#39;;&#10;    es_search.write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL, p_log_context =&gt; &#39;PUT_TO_CREATE_INDEX&#39;, p_proc_instance =&gt; 0, p_log_message&#10;    =&gt; &#39;Analyse String&#39;, p_log_clob =&gt; content);&#10;&#10;Process_http&#10;    (p_action =&gt; &#39;_analyze&#39;,&#10;     p_content =&gt; content,&#10;     p_id =&gt; null,&#10;     p_Instance =&gt; null,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER&#10; );&#10;&#10;dbms_output.put_line(&#39;TOKENS For: &#39;||Content);&#10;&#10;for tk in jr&#10;loop&#10;&#10;    dbms_output.put_line(&#39;token: &#39;||tk.&quot;token&quot;);&#10;&#10;end loop;&#10;&#10;&#10;&#10;&#10;end PUT_ES_ANALYZE;&#10;&#10;function put_es_analyze_fun(&#10;    p_text IN VARCHAR2 := NULL,    p_debug in integer := 0&#10;) return clob IS&#10;&#10;x_error varchar2(4000);&#10;x_number number := 0;&#10;content clob;&#10;result clob;&#10;res_terms clob;&#10;&#10;&#10;&#10;&#10;BEGIN&#10;&#10;select p_text || &#39; =&gt; &#39;||listagg(&quot;token&quot;,&#39;;  &#39;) into res_terms from&#10;json_table (&#10;es_search.process_http_fun&#10;(&#10;p_action =&gt; &#39;POST&#39;,&#10;p_content =&gt;&#10;&#39;{&#10;         &quot;field&quot;   : &quot;NOTES&quot;,&#10;         &quot;text&quot;    : &quot;&#39;||p_text||&#39;&quot;&#10;}&#10;&#39;,&#10;p_cmd =&gt; &#39;/contact_v1/_analyze?pretty=true&#39;,&#10;p_debug =&gt; 1&#10;),&#10;&#39;$.tokens[*]&#39;&#10;      COLUMNS (&quot;token&quot; VARCHAR )) ;&#10;&#10;&#10;return res_terms;&#10;&#10;end put_es_analyze_fun;&#10;&#10;&#10; PROCEDURE put_es_analyze_CONTACT (&#10;    p_contact_id in number,&#10;    p_text IN VARCHAR2 := NULL,&#10;    p_debug in integer := 0&#10;    ) is&#10;    x_error varchar2(4000);&#10;x_number number := 0;&#10;content clob;&#10;result clob;&#10;jclob clob;&#10;&#10;cursor Jr is&#10;select &quot;token&quot; from json_table ( result,&#39;$.tokens[*]&#39;&#10;      COLUMNS (&quot;token&quot; VARCHAR )) ;&#10;&#10;&#10;BEGIN&#10;&#10;select notes into jclob from v_contact_es where contact_id = p_contact_id;&#10;&#10;    content := &#39;&#10;{&#10;&#10;          &quot;field&quot;: &quot;NOTES&quot;,&#10;          &quot;text&quot; : &quot;&#39;||translate (jclob,&#10;          chr(10)||chr(11)||chr(12)||chr(13),&#39; &#39;)||&#39;&quot;&#10;&#10;&#10;}&#10;&#39;;&#10;es_search.write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL, p_log_context =&gt; &#39;PUT_ANALYZE_CONTACT&#39;, p_proc_instance =&gt; 0, p_log_message&#10;    =&gt; &#39;Analyse String&#39;, p_log_clob =&gt; content);&#10;&#10;Process_http&#10;    (p_action =&gt; &#39;_analyze&#39;,&#10;     p_content =&gt; content,&#10;     p_id =&gt; null,&#10;     p_Instance =&gt; null,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER,&#10;     p_debug =&gt; P_DEBUG&#10; );&#10;&#10;dbms_output.put_line(&#39;TOKENS For: &#39;||Content);&#10;&#10;for tk in jr&#10;loop&#10;    if length(tk.&quot;token&quot;) in (2,3,4)&#10;    and tk.&quot;token&quot; not in (&#39;in&#39;,&#39;is&#39;,&#39;the&#39;,&#39;and&#39; )then&#10;        dbms_output.put_line(&#39;token: &#39;||tk.&quot;token&quot;);&#10;--        insert into z_ES_TERMS values (tk.&quot;token&quot;);&#10;    end if;&#10;end loop;&#10;commit;&#10;&#10;end put_es_analyze_CONTACT;&#10;&#10;--&#10;-- ------------------------------------------------------------------&#10;--&#10;FUNCTION GET_ES_COUNT&#10;(    p_Query IN VARCHAR2 := NULL,    p_debug in integer := 0&#10;&#10;)&#10;return varchar&#10;is&#10;&#10;&#10;    result                          clob;&#10;    content                         CLOB;&#10;&#10;    x_error varchar2(4000);&#10;    x_number number := 0;&#10;&#10;BEGIN&#10;&#10;  es_search.write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL, p_log_context =&gt; &#39;GET_ES_COUNT&#39;, p_proc_instance =&gt; 0, p_log_message&#10;    =&gt; &#39;Count Started&#39;, p_log_clob =&gt; null);&#10;&#10;&#10;  Process_http&#10;    (p_action =&gt; &#39;_count&#39;,&#10;     p_content =&gt; null,&#10;     p_id =&gt; null,&#10;     p_Instance =&gt; null,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER,&#10;     p_debug =&gt; P_DEBUG&#10;     );&#10;&#10;  es_search.write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL, p_log_context =&gt; &#39;GET_ES_COUNT&#39;, p_proc_instance =&gt; 0, p_log_message&#10;    =&gt; &#39;Count Ended&#39;, p_log_clob =&gt; result);&#10;&#10;  dbms_output.put_line(&#39;Count:&#39;||result);&#10;&#10;  x_number := json_value(result,&#39;$.count&#39; returning number);&#10;&#10; return x_number;&#10;&#10;end GET_ES_COUNT;&#10;&#10;&#10;&#10;&#10;PROCEDURE GET_ES_COUNT (&#10;    p_query IN VARCHAR2 := NULL,     p_debug in integer := 0&#10;&#10;) IS&#10;&#10;    result                          clob;&#10;    content                         CLOB;&#10;&#10;    x_error varchar2(4000);&#10;    x_number number := 0;&#10;&#10;BEGIN&#10;&#10;    es_search.write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL, p_log_context =&gt; &#39;GET_ES_COUNT&#39;, p_proc_instance =&gt; 0, p_log_message&#10;    =&gt; &#39;Count Started&#39;, p_log_clob =&gt; null);&#10;&#10;&#10;Process_http&#10;    (p_action =&gt; &#39;_count&#39;,&#10;     p_content =&gt; null,&#10;     p_id =&gt; null,&#10;     p_Instance =&gt; null,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER,&#10;     P_DEBUG =&gt; P_DEBUG&#10;     );&#10;&#10;    es_search.write_log(p_log_id =&gt; es_log_id_seq.NEXTVAL, p_log_context =&gt; &#39;GET_ES_COUNT&#39;, p_proc_instance =&gt; 0, p_log_message&#10;    =&gt; &#39;Count Ended&#39;, p_log_clob =&gt; result);&#10;&#10; dbms_output.put_line(&#39;Count:&#39;||result);&#10;&#10;&#10;end GET_ES_COUNT;&#10;&#10;--&#10;-- DELETE_ES_CONTACT&#10;--&#10;procedure delete_es_contact(p_contact_id in number,p_debug in integer :=0) is&#10;&#10;    result CLOB;&#10;    content CLOB;&#10;    contact_json CLOB;&#10;    contact_contact_id contact.contact_id%TYPE;&#10;    contact_offender_id contact.offender_id%TYPE;&#10;    contact_last_updated_datetime contact.last_updated_datetime%TYPE;&#10;    contact_row_version contact.row_version% type;&#10;    contact_scn number;&#10;    jres clob;&#10;&#10;    x_row number := 0;&#10;    x_http_sqlerrm varchar(4000) := &#39; &#39;;&#10;&#10;    x_error varchar2(4000);&#10;    x_number number := 0;&#10;    x_scn number := 0;&#10;&#10;begin&#10;&#10; WRITE_LOG (&#10;      p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;      p_log_context =&gt; &#39;DELETE_ES_CONTACT&#39;,&#10;      p_PROC_Instance =&gt; 0,&#10;      p_LOG_MESSAGE =&gt; &#39;Contact_id Requested: &#39; ||p_contact_id,&#10;      p_log_CLOB =&gt; null);&#10;&#10;&#10;select nvl(max(ora_rowscn),1) into x_scn from contact  where contact_id = p_contact_id;&#10;&#10;--update contact&#10;--  set last_updated_datetime = last_updated_datetime&#10;--  where contact_id = p_contact_id&#10;--;&#10;--commit;&#10;&#10;Process_http&#10;    (p_action =&gt; &#39;delete_doc&#39;,&#10;     p_content =&gt; null,&#10;     p_id =&gt; p_contact_id,&#10;     p_Instance =&gt; null,&#10;     p_scn =&gt; x_scn,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER,&#10;     p_debug =&gt; p_debug&#10;     );&#10;&#10;delete from CONTACT_ES_SINGLE_Q&#10;where contact_id = P_CONTACT_ID ;&#10;&#10;delete from contact_es_status&#10;where contact_id = P_CONTACT_ID ;&#10;&#10;&#10;WRITE_LOG (&#10;      p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;      p_log_context =&gt; &#39;DELETE_ES_CONTACT&#39;,&#10;      p_PROC_Instance =&gt; 0,&#10;      p_LOG_MESSAGE =&gt; &#39;Contact_id Requested: &#39; ||p_contact_id||&#39;Done&#39;,&#10;      p_log_CLOB =&gt; result);&#10;&#10;end delete_es_contact;&#10;--&#10;-- POST_TO_ES_CONTACT&#10;--&#10;procedure POST_TO_ES_CONTACT&#10;( p_contact_id in  number, p_debug integer := 0)&#10;is&#10;&#10;    result CLOB;&#10;    content CLOB;&#10;    contact_json CLOB;&#10;    contact_contact_id contact.contact_id%TYPE;&#10;    contact_offender_id contact.offender_id%TYPE;&#10;    contact_last_updated_datetime contact.last_updated_datetime%TYPE;&#10;    contact_row_version contact.row_version% type;&#10;    contact_scn number;&#10;    jres clob;&#10;    status_contact_id contact.contact_id%TYPE;&#10;&#10;    x_row number := 0;&#10;    x_http_sqlerrm varchar(4000) := &#39; &#39;;&#10;&#10;    x_error varchar2(4000);&#10;    x_number number := 0;&#10;begin&#10;   begin&#10;        begin&#10;           SELECT&#10;                 vc.jcontact,&#10;                 vc.contact_id,&#10;                 vc.offender_id,&#10;                 vc.last_updated_datetime,&#10;                 vc.row_version,&#10;                 es.contact_id,&#10;                 scn&#10;             INTO&#10;                 contact_json ,&#10;                 contact_contact_id,&#10;                 contact_offender_id,&#10;                 contact_last_updated_datetime,&#10;                 contact_row_version,&#10;                 status_contact_id,&#10;                 contact_scn&#10;&#10;             FROM&#10;                 v_contact_es vc&#10;                 left outer join contact_es_status es on es.contact_id = vc.contact_id&#10;             WHERE&#10;                     vc.contact_id = p_contact_id&#10;                 and vc.soft_deleted = 0&#10;                 AND ( nvl(es.last_updated_datetime, TO_DATE(&#39;18991231&#39;, &#39;yyyymmdd&#39;)) &lt; vc.last_updated_datetime&#10;                      OR nvl(es.row_version, -1) &lt; nvl(vc.row_version, 0) )&#10;;&#10;&#10;          exception&#10;             when no_data_found then&#10;                raise_application_error( -20000,&#39;Contact_ID not found: or Update not required &#39;||p_contact_id);&#10;&#10;             when OTHERS then&#10;                raise_application_error( -20000,&#39;Other Error: &#39;||p_contact_id);&#10;        end;&#10;&#10;&#10;&#10;     WRITE_LOG (&#10;                  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;                  p_log_context =&gt; &#39;POST_TO_ES_CONTACT&#39;,&#10;                  p_PROC_Instance =&gt; 0,&#10;                  p_LOG_MESSAGE =&gt; &#39;Contact_id Requested: &#39; ||CONTACT_contact_id||&#39;:&#39;||status_contact_id,&#10;                  p_log_CLOB =&gt; null);&#10;&#10;&#10;    content := contact_json;&#10;&#10;    Process_http&#10;        (p_action =&gt; &#39;_update&#39;,&#10;         p_content =&gt; content,&#10;         p_id =&gt; p_contact_id,&#10;         p_scn =&gt; contact_scn,&#10;         p_Instance =&gt; null,&#10;         p_result =&gt; result,&#10;         p_error =&gt;  X_ERROR,&#10;         p_Stats =&gt; X_NUMBER,&#10;         p_debug =&gt; p_debug&#10;         );&#10;&#10;if JSON_exists(result, &#39;$.error&#39;) then  -- This is an Error on A single Update&#10;        MERGE INTO contact_es_status es&#10;        USING (&#10;                  SELECT&#10;                      p_contact_id contact_contact_id,&#10;                      c.offender_id&#10;                  FROM&#10;                      CONTACT C&#10;                  WHERE P_CONTACT_ID = C.CONTACT_ID&#10;              ) z ON ( z.contact_contact_id = es.contact_id )&#10;        WHEN MATCHED THEN UPDATE&#10;            SET failed_jmessage = to_clob(result),&#10;                process_status = JSON_value(result, &#39;$.status&#39;),&#10;                status_update_datetime = SYSDATE&#10;--                LAST_UPDATED_DATETIME = TO_DATe(&#39;19000101&#39;,&#39;YYYYMMDD&#39;), row_version = -1&#10;        --SET row_version = row_version&#10;        WHEN NOT MATCHED THEN&#10;            INSERT (&#10;                offender_id,&#10;                contact_id,&#10;                process_status,&#10;                status_update_datetime,&#10;                failed_jmessage,&#10;                LAST_UPDATED_DATETIME,&#10;                row_version  )&#10;                VALUES&#10;                ( Z.OFFENDER_ID,&#10;                  z.contact_contact_id,&#10;                  JSON_value(result, &#39;$.status&#39;),&#10;                  sysdate,&#10;                  result,&#10;                  to_date(&#39;19000101&#39;,&#39;YYYYMMDD&#39;),&#10;                  0&#10;                  );&#10;&#10;       else -- Here we have a Single Contac Update&#10;&#10;&#10;&#10;        MERGE INTO contact_es_status es&#10;        USING (&#10;                  SELECT&#10;                      contact_id contact_contact_id,&#10;                      OFFENDER_ID,&#10;                      last_updated_datetime,&#10;                      row_version&#10;                  FROM&#10;                      CONTACT&#10;                  where contact_id = p_contact_id&#10;&#10;              ) z ON ( z.contact_contact_id = es.contact_id )&#10;        WHEN MATCHED THEN&#10;UPDATE&#10;SET  failed_message = &#39;Xerror&#39;,&#10;     failed_jmessage = result   , --z.error,&#10;     process_status = 200,&#10;     last_updated_datetime = Z.last_UPDATED_DATETIME,&#10;     ROW_VERSION = Z.ROW_VERSION&#10;--     where z.status in (200,201)&#10;WHEN NOT MATCHED THEN&#10;        INSERT (&#10;            offender_id,&#10;            contact_id,&#10;            process_status,&#10;            status_update_datetime,&#10;            failed_jmessage,&#10;            last_updated_datetime,&#10;            row_version )&#10;        VALUES&#10;            ( Z.offender_id,&#10;              z.contact_contact_id,&#10;              200,&#10;              sysdate,&#10;              null,&#10;              z.last_updated_datetime,&#10;              z.row_version );&#10;&#10;  --     dbms_output.put_line(&#39;NO Error&#39;);&#10;      end if;&#10;&#10;&#10;    if JSON_exists(result, &#39;$.error&#39;) then&#10;          WRITE_LOG (&#10;                  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;                  p_log_context =&gt; &#39;POST_TO_ES_CONTACT&#39;,&#10;                  p_PROC_Instance =&gt; 0,&#10;                  p_LOG_MESSAGE =&gt; &#39;Contact_id Requested: Delete &#39; ||p_contact_id,&#10;                  p_log_CLOB =&gt; null);&#10;&#10;      delete from CONTACT_ES_SINGLE_Q&#10;      where contact_id = P_CONTACT_ID ;&#10;&#10;      WRITE_LOG (&#10;                  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;                  p_log_context =&gt; &#39;POST_TO_ES_CONTACT&#39;,&#10;                  p_PROC_Instance =&gt; 0,&#10;                  p_LOG_MESSAGE =&gt; &#39;Contact_id Processed: Delete Done &#39; ||p_contact_id,&#10;                  p_log_CLOB =&gt; result&#10;                  );&#10;&#10;      end if;&#10; end;&#10;   --   if JSON_exists(res, &#39;$.error&#39;) then&#10;   --      dbms_output.put_line(&#39;Error&#39;);&#10;   --   end if;&#10;&#10;exception&#10;when others&#10;   then&#10;&#10;       x_http_sqlerrm := &#39;.&#39;;&#10;       if sqlcode = &#39;-29273&#39; then&#10;&#10;       select utl_http.get_detailed_sqlerrm  into x_http_sqlerrm from dual ;&#10;&#10;       end if;&#10;&#10;       WRITE_LOG (&#10;                  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;                  p_log_context =&gt; &#39;POST_TO_ES_CONTACT&#39;,&#10;                  p_PROC_Instance =&gt; 0,&#10;                  p_LOG_MESSAGE =&gt; sqlcode,&#10;                  p_log_CLOB =&gt; sqlerrm||&#39;, &#39;||x_http_sqlerrm );&#10;&#10;&#10;&#10;end POST_TO_ES_CONTACT;&#10;&#10;--&#10;-- ------------------------------------------------------------------&#10;--&#10;&#10;-- -------------------------&#10;-- Batch_TO_ES_CONTACT&#10;-- -------------------------&#10;procedure Batch_TO_ES_CONTACT&#10;( p_contact_list in  clob,&#10;  p_offender_id in number := null,  -- only used in log&#10;  p_instance in number :=0,&#10;  p_debug in integer := 0&#10;  )&#10;is&#10;    content CLOB;&#10;    result clob := &#39;{&quot;took&quot;:12,&quot;errors&quot;:false,&quot;items&quot;:[{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000003&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:62,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000006&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:63,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000007&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:64,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000008&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:65,&quot;_primary_term&quot;:2,&quot;status&quot;:201}},{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000012&quot;,&quot;_version&quot;:1,&quot;result&quot;:&quot;created&quot;,&quot;_shards&quot;:{&quot;total&quot;:2,&quot;successful&quot;:1,&quot;failed&quot;:0},&quot;_seq_no&quot;:66,&quot;_primary_term&quot;:2,&quot;status&quot;:201}}]}&#10;}&#39;;&#10;    contact_json CLOB;&#10;&#10;    contact_contact_id              contact.contact_id%TYPE;&#10;    contact_offender_id             contact.offender_id%TYPE;&#10;    contact_last_updated_datetime   contact.last_updated_datetime%TYPE;&#10;    contact_row_version             contact.row_version% type;&#10;&#10;    jres            clob;&#10;    x_error         varchar2(4000) := null;&#10;    X_NUMBER        NUMBER := 0;&#10;    sql_rows        number := 0 ;&#10;&#10;    CURSOR c_contacts IS&#10;    SELECT&#10;        c.contact_id,&#10;        c.offender_id,&#10;        c.last_updated_datetime,&#10;        c.row_version,&#10;        replace(c.jheader, &#39;contact_v1&#39;, es_get_param(p_param_name =&gt;  &#39;INDEX&#39;)) jheader,&#10;--        c.jheader,&#10;        c.jcontact&#10;    FROM&#10;        v_contact_es c&#10;        left OUTER JOIN contact_es_status   sta ON sta.contact_id = c.contact_id and sta.process_status in (&#39;201&#39;,&#39;200&#39;)&#10;    WHERE&#10;        c.soft_deleted = 0 and&#10;        c.contact_id IN (&#10;            SELECT&#10;                contact_id&#10;            FROM&#10;                dual,&#10;                JSON_TABLE ( p_contact_list, &#39;$.contact_ids[*]&#39;&#10;                        COLUMNS (&#10;                            contact_id NUMBER&#10;                        )&#10;                    )&#10;                   ) and&#10;                    nvl(sta.last_updated_datetime,to_date(&#39;00010101&#39;,&#39;yyyymmdd&#39;)) &lt; c.last_updated_datetime ;&#10;&#10;    CURSOR c_results IS&#10;    SELECT&#10;        &quot;_id&quot;,&#10;        &quot;status&quot;   status,&#10;        &quot;result&quot;   result&#10;    FROM&#10;        (&#10;            SELECT&#10;                result js&#10;            FROM&#10;                dual&#10;        ) jc,&#10;        JSON_TABLE ( jc.js, &#39;$.items.index[*]&#39;&#10;                COLUMNS (&#10;                    &quot;_id&quot; NUMBER,&#10;                    &quot;status&quot; NUMBER,&#10;                    &quot;result&quot; VARCHAR&#10;                )&#10;            );&#10;   loop_count integer :=0;&#10;begin&#10;&#10;  WRITE_LOG (&#10;  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;  p_log_context =&gt; &#39;Batch_TO_ES_CONTACT&#39;,&#10;  p_PROC_Instance =&gt; p_instance,&#10;  p_LOG_MESSAGE =&gt; &#39;Start of Batch_TO_ES_CONTACT: &#39;||p_offender_id,&#10;  p_log_CLOB =&gt; p_contact_list);&#10;&#10;  loop_count := 0;&#10;  for OC in c_contacts loop&#10;    loop_count := loop_count + 1;&#10;    content := content || CHR(13)||CHR(10) || OC.jheader || CHR(13)||CHR(10) || OC.jcontact;&#10; --   es_search.write_log_CLOB(&#39;Contact: &#39;||OC.CONTACT_ID||&#39;:&#39;||oc.contact_id);&#10;&#10;  end loop;&#10;&#10;  content := content||CHR(13)||CHR(10)||CHR(13)||CHR(10) ;&#10;&#10;&#10;if loop_count &gt; 0 then&#10;    Process_http&#10;    (p_action =&gt; &#39;_bulk&#39;,&#10;     p_content =&gt; content,&#10;     p_id =&gt; p_offender_id,&#10;     p_Instance =&gt; p_instance,&#10;     p_result =&gt; result,&#10;     p_error =&gt;  X_ERROR,&#10;     p_Stats =&gt; X_NUMBER,&#10;     p_debug =&gt; p_debug&#10; );&#10; end if;&#10;&#10;&#10;&#10;if g_merge = 1 then&#10;&#10;/* {&quot;took&quot;:51,&#10;    &quot;errors&quot;:true,&#10;    &quot;items&quot;:&#10;    [{&quot;index&quot;:{&quot;_index&quot;:&quot;contact_v1&quot;,&quot;_type&quot;:&quot;_doc&quot;,&quot;_id&quot;:&quot;2500000106&quot;,&#10;     &quot;status&quot;:409,&#10;     &quot;error&quot;:{&quot;type&quot;:&quot;version_conflict_engine_exception&quot;,&#10;              &quot;reason&quot;:&quot;[2500000106]: version conflict, current version [4950459] is higher or equal to the one provided [4950458]&quot;,&quot;index_uuid&quot;:&quot;71Y4ho7jQda5vvNaDRGNrQ&quot;,&quot;shard&quot;:&quot;14&quot;,&quot;index&quot;:&quot;contact_v1&quot;}}}]}&#10;*/&#10;MERGE INTO contact_es_status es&#10;USING (&#10;          SELECT&#10;              x_id    contact_contact_id,&#10;              x_status   status,&#10;              x_result   result,&#10;              x_error    error,&#10;              ess.contact_id,&#10;              ess.offender_id,&#10;              ess.row_version,&#10;              ess.last_updated_datetime&#10;              FROM&#10;                contact   ess&#10;                join JSON_TABLE ( result,&#39;$.items.index[*]&#39;&#10;                COLUMNS (&#10;                    x_id NUMBER path &#39;$._id&#39;,&#10;                    x_status NUMBER  path &#39;$.status&#39;,&#10;                    x_result VARCHAR path &#39;$.result&#39;,&#10;                    x_error VARCHAR path &#39;$.error.reason&#39;&#10;                )) jres  ON ess.contact_id = x_id)&#10;                 z  ON (es.contact_id = z.contact_contact_id)&#10;WHEN MATCHED THEN&#10;UPDATE&#10;SET  failed_message = z.result,&#10;     failed_jmessage = z.error,&#10;     process_status = z.status,&#10;     last_updated_datetime =&#10;         case when z.status in (&#39;200&#39;,&#39;201&#39;)&#10;         then   Z.last_UPDATED_DATETIME&#10;         ELSE   es.last_updated_datetime&#10;         end,&#10;    ROW_VERSION =&#10;         case when z.status in (&#39;200&#39;,&#39;201&#39;)&#10;         then Z.ROW_VERSION&#10;         else es.row_version&#10;         end ,&#10;     status_update_datetime = sysdate&#10;WHEN NOT MATCHED THEN&#10;INSERT (&#10;    offender_id,&#10;    contact_id,&#10;    process_status,&#10;    status_update_datetime,&#10;    failed_message,&#10;    failed_jmessage,&#10;    last_updated_datetime,&#10;    row_version )&#10;VALUES&#10;    ( z.offender_id,&#10;      z.contact_id,&#10;      z.status,&#10;      sysdate,&#10;      z.result || z.error,&#10;      null,&#10;      z.last_updated_datetime,&#10;      z.row_version )&#10;;&#10;&#10; sql_rows := sql%rowcount;&#10;&#10;&#10;&#10; WRITE_LOG (&#10;  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;  p_log_context =&gt; &#39;Batch_TO_ES_CONTACT&#39;,&#10;  p_PROC_Instance =&gt; p_instance,&#10;  p_LOG_MESSAGE =&gt; &#39;Rows Merged: &#39;||p_offender_id||&#39;:&#39;||to_char(sql_rows,&#39;99999&#39;),&#10;  p_log_CLOB =&gt; null);&#10;&#10;end if;&#10;if g_delete = 1 then&#10;&#10;&#10;DELETE FROM contact_es_single_q where contact_id&#10;IN&#10;   (SELECT&#10;   CONTACT_ID&#10;FROM&#10;      JSON_TABLE ( p_contact_list,&#10;      &#39;$.contact_ids[*]&#39;&#10;            COLUMNS (&#10;                CONTACT_ID NUMBER path &#39;$.contact_id&#39;&#10;            )&#10;        )&#10; )    ;&#10;&#10; sql_rows := sql%rowcount;&#10;&#10; WRITE_LOG (&#10;  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;  p_log_context =&gt; &#39;Batch_TO_ES_CONTACT&#39;,&#10;  p_PROC_Instance =&gt; p_instance,&#10;  p_LOG_MESSAGE =&gt; &#39;Q Rows Deleted: &#39;||to_char(sql_rows,&#39;99999&#39;),&#10;  p_log_CLOB =&gt; null);&#10;&#10;end if;&#10;&#10;&#10;&#10;&#10;end BATCH_TO_ES_CONTACT;&#10;&#10;&#10;PROCEDURE PROCESS_SINGLE_QUEUE (P_No number := 1,    p_debug in integer := 0&#10;) as&#10;&#10;&#10;cursor c_single_q is&#10;select * from CONTACT_ES_SINGLE_Q&#10;where rownum  &lt;= P_No&#10;for update;&#10;&#10;begin&#10;dbms_output.put_line(&#39;Start PROCESS_SINGLE_QUEUE:&#39;||&#39; &#39;|| P_No);&#10;&#10;for qr in c_single_q&#10;loop&#10;&#10;dbms_output.put_line(qr.contact_id);&#10;if  nvl(qr.action,&#39;X&#39;) = &#39;D&#39; then&#10;DELETE_ES_CONTACT(p_contact_id=&gt;qr.contact_id, p_debug =&gt; p_debug);&#10;else&#10;POST_TO_ES_CONTACT(p_contact_id=&gt;qr.contact_id,  p_debug =&gt; p_debug);&#10;end if;&#10;delete from CONTACT_ES_SINGLE_Q where current of c_single_q;&#10;&#10;&#10;end loop;&#10;&#10;commit;&#10;&#10;dbms_output.put_line(&#39;End PROCESS_SINGLE_QUEUE&#39;);&#10;end PROCESS_SINGLE_QUEUE;&#10;&#10;&#10;&#10;&#10;&#10;PROCEDURE ES_LOAD_SINGLE_ID_CRN (p_offender_id IN NUMBER,p_debug integer := 0)&#10;is&#10;&#10;cursor sq is&#10;with t as&#10;(select s.contact_id , c.soft_deleted, c.sensitive ,action from contact_es_single_q s&#10;       left outer join contact c on s.contact_id = c.contact_id&#10;       where s.offender_id = p_offender_id )&#10;select * from t  for update ;&#10;&#10;begin&#10;&#10;&#10;for sq_loop in sq&#10;    loop&#10;        if sq_loop.soft_deleted = 1  then&#10;          delete from contact_es_single_q where contact_id = sq_loop.contact_id;&#10;        else&#10;            if  nvl(sq_loop.action,&#39;X&#39;) = &#39;D&#39; then&#10;                DELETE_ES_CONTACT(p_contact_id=&gt;sq_loop.contact_id, p_debug =&gt; p_debug);&#10;            else&#10;                POST_TO_ES_CONTACT(p_contact_id=&gt;sq_loop.contact_id,  p_debug =&gt; p_debug);&#10;            end if;&#10;            delete from CONTACT_ES_SINGLE_Q where current of sq;        end if;&#10;&#10;    end loop;&#10;commit;&#10;end ES_LOAD_SINGLE_ID_CRN;&#10;&#10;--&#10;-- Main Processing Procedure from Q&#10;--&#10;PROCEDURE batch_to_list_es_contact (&#10;        p_no             IN    NUMBER := 5,&#10;        mod              IN    NUMBER := 1,&#10;        mod_stream       IN    NUMBER := 0,&#10;        processed_rows   OUT   NUMBER,&#10;        p_debug in integer := 0&#10;&#10;    ) AS&#10;        x_list            CLOB;&#10;        x_count           NUMBER;&#10;        x_process_count   NUMBER := 0;&#10;&#10;--&#10;--&#10;--&#10;    BEGIN&#10;        SELECT&#10;--rownum id,&#10;            JSON_OBJECT ( &#39;contact_ids&#39; VALUE (&#10;                SELECT&#10;                    JSON_ARRAYAGG(JSON_OBJECT(KEY &#39;contact_id&#39; VALUE q.contact_id) RETURNING CLOB)&#10;                FROM&#10;                    contact_es_single_q   q&#10;                    JOIN contact               c ON ( c.contact_id = q.contact_id&#10;                                        AND  -- Contact has already been indexed&#10;                                         ( q.last_updated_datetime &gt; c.last_updated_datetime&#10;                                              OR nvl(q.row_version, 1) &gt; nvl(c.row_version, - 1) ) )&#10;                WHERE&#10;                    mod(contact_es_single_q_id, mod) = mod_stream&#10;                    AND ROWNUM &lt;= p_no&#10;--    order by priority, next_process_datetime, contact_es_single_q_id&#10;            ) RETURNING CLOB ) jj&#10;        INTO x_list&#10;        FROM&#10;            dual;&#10;&#10;        SELECT&#10;            COUNT(1)&#10;        INTO x_count&#10;        FROM&#10;            (&#10;                SELECT&#10;                    x_list&#10;                FROM&#10;                    dual&#10;            ) jc,&#10;            JSON_TABLE ( x_list, &#39;$.contact_ids.contact_id[*]&#39;&#10;                    COLUMNS (&#10;                        &quot;_id&quot; NUMBER,&#10;                        &quot;status&quot; NUMBER,&#10;                        &quot;result&quot; VARCHAR&#10;                    )&#10;                );&#10;&#10;&#10;  WRITE_LOG (&#10;  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;  p_log_context =&gt; &#39;batch_to_list_es_contact&#39;,&#10;  p_PROC_Instance =&gt; 1,&#10;  p_LOG_MESSAGE =&gt; &#39;BATCH_TO_list_ES_CONTACT Requests:&#39; || x_count,&#10;  p_log_CLOB =&gt; null);&#10;&#10;  WRITE_LOG (&#10;  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;  p_log_context =&gt; &#39;batch_to_list_es_contact&#39;,&#10;  p_PROC_Instance =&gt; 1,&#10;  p_LOG_MESSAGE =&gt; &#39;BATCH_TO_list_ES_CONTACT Request List:&#39; ,&#10;  p_log_CLOB =&gt; x_list);&#10;&#10;&#10;        IF x_count &gt; 0 THEN&#10;           BEGIN&#10;              batch_to_es_contact(x_list, p_debug =&gt; p_debug);&#10;           EXCEPTION&#10;&#10;&#10;&#10;           WHEN OTHERS THEN&#10;            ES_SEARCH.WRITE_LOG (&#10;                  p_log_id =&gt; ES_LOG_ID_SEQ.nextval,&#10;                  p_log_context =&gt; &#39;batch_to_list_es_contact&#39;,&#10;                  p_PROC_Instance =&gt; 0||sqlerrm,&#10;                  p_LOG_MESSAGE =&gt; &#39;Failed:&#39;,&#10;                  p_log_CLOB =&gt; X_LIST);&#10;&#10;     --             NEED TO UPDATE FILE SO THOS THAT NOT BEEN DELETED.&#10;           END ;&#10;        END IF;&#10;    COMMIT;&#10;&#10;    processed_rows := x_count;&#10;END batch_to_list_es_contact;&#10;&#10;&#10;function es_get_param (&#10;   p_param_name in varchar,&#10;   p_param_force in number := NULL&#10;   )&#10;   return varchar is&#10;&#10;c_param_name  varchar2(1000);&#10;cursor l_param IS&#10;select * from ES_CONFIG_2 where es_config_param = c_param_name;&#10;&#10;ret_value varchar2(1000) ;&#10;&#10;begin&#10;&#10;ret_value := null;&#10;c_param_name := p_param_name;&#10;--g_pri_sec := es_get_param (&#39;PRI_SEC&#39;);&#10;--if g_pri_sec=&#39;SEC&#39; and&#10;--   c_param_name := p_param_name||&#39;_S&#39;;&#10;--end if;&#10;&#10;&#10;&#10;--g_pri_sec := es_get_param (&#39;PRI_SEC&#39;);&#10;&#10;case&#10;when p_param_name = &#39;PRI_SEC&#39;   then ret_value := g_pri_sec;&#10;when p_param_name = &#39;WALLET&#39;    then ret_value := g_wallet;&#10;when p_param_name = &#39;WALLET_PW&#39; then ret_value := g_wallet_pw;&#10;when p_param_name = &#39;HTTP&#39;      then ret_value := g_http;&#10;&#10;when p_param_name = &#39;HOST&#39;      then ret_value := g_host;&#10;when p_param_name = &#39;PORT&#39;      then ret_value := g_port;&#10;when p_param_name = &#39;USER&#39;      then ret_value := g_user;&#10;when p_param_name = &#39;PASSWORD&#39;  then ret_value := g_PASSWORD;&#10;when p_param_name = &#39;INDEX&#39;     then ret_value := g_es_index;&#10;when p_param_name = &#39;INDEX_CREATED&#39;      then ret_value := g_index_created;&#10;else&#10;   ret_value := null;&#10;end case ]&#39;  ;&#10;     else&#10;        x_filter := &#39; &#39;;&#10;     end if;&#10;&#10;    content :=&#10;&#39;&#10;{&#10; &quot;size&quot; : &#39;||p_max_rows||&#39; ,&#10; &quot;from&quot; : &#39;||p_from_row||&#39; ,&#10; &quot;query&quot;: {&#10;    &quot;bool&quot;: {&#10;      &quot;must&quot;: [&#10;        {&#10;          &quot;query_string&quot;: {&#10;            &quot;query&quot;: &quot;&#39;||p_search||&#39;&quot;,&#10;            &quot;analyze_wildcard&quot;: true,&#10;            &quot;time_zone&quot;: &quot;Europe/London&quot;&#10;          }&#10;        }&#10;&#10;      ] &#39;||x_filter||&#39; }}&#39;||&#10;      x_next_sort||&#10;      &#39;&#10;      ,&#10;&#10;&quot;aggs&quot; :{&#10;        &quot;Contact Type&quot; :&#10;            {&quot;terms&quot; : {&quot;field&quot; : &quot;CONTACT_TYPE.keyword&quot; }},&#10;        &quot;Events&quot; :&#10;            {&quot;terms&quot; : {&quot;field&quot; : &quot;EVENT.keyword&quot; }},&#10;        &quot;Team&quot; :&#10;            {&quot;terms&quot; : {&quot;field&quot; : &quot;TEAM.keyword&quot; }},&#10;        &quot;Officers&quot; :&#10;            {&quot;terms&quot; : {&quot;field&quot; : &quot;OFFICER.keyword&quot; }},&#10;        &quot;Outcome&quot; :&#10;            {&quot;terms&quot; : {&quot;field&quot; : &quot;OUTCOME.keyword&quot; }}&#10;        },&#10;&quot;highlight&quot; : { &quot;pre_tags&quot;: [&quot;&lt;em&gt;&quot;],&quot;post_tags&quot;: [&quot;&lt;/em&gt;&quot;], &quot;fields&quot; : { &quot;*&quot;:{} },   &quot;fragment_size&quot;: 2147483647},&#10;&quot;sort&quot; : [ { &quot;_score&quot; : &quot;desc&quot;  }&#10;         ]&#10;&#10;}&#10;&#39;;&#10;&#10;&#10;&#10;--insert into es_search_history values (ES_SEARCH_HISTORY_ID_SEQ.nextval,sysdate,p_search,content);&#10;dbms_output.put_line(content);&#10;Process_http&#10;(p_action =&gt; &#39;_search&#39;,&#10; p_content =&gt; content,&#10; p_id =&gt; null,&#10; p_Instance =&gt; null,&#10; p_result =&gt; result,&#10; p_error =&gt;
