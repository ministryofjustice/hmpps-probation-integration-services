                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">PACKAGE BODY PKG_TriggerSupport&#10;AS&#10;--&#10;--&#10;&#10;g_label VARCHAR2(100) := &#39;000000&#39;;&#10;&#10;G_DEBUG_FLAG BOOLEAN := FALSE;&#10;&#10;g_VPD_rebuild_flag           BOOLEAN := TRUE;&#10;g_VPD_rebuild_flag_INIT      BOOLEAN := FALSE;&#10;&#10;g_VPD_deferred_rebuild_flag  BOOLEAN := FALSE;&#10;&#10;g_CDC_flag        BOOLEAN := TRUE;&#10;g_CDC_flag_INIT   BOOLEAN := FALSE;&#10;&#10;g_off_area_counter        NUMBER := 0;&#10;&#10;g_tab_offenders_list      t_tab_ORGANISATIONS := t_tab_ORGANISATIONS();&#10;gc_tab_Offenders_max_size NUMBER := 5;&#10;&#10;--&#10;TYPE t_tab_vpd_tables IS TABLE OF VARCHAR2(30) INDEX BY BINARY_INTEGER;&#10;g_tab_vpd_tables t_tab_vpd_tables;&#10;&#10;TYPE t_tab_deferred_upd IS TABLE OF VARCHAR2(1) INDEX BY VARCHAR(100);&#10;g_tab_deferred_upd_VPD       t_tab_deferred_upd;&#10;g_tab_deferred_upd_CURRENT_D t_tab_deferred_upd;&#10;g_tab_deferred_upd_CURRENT_T t_tab_deferred_upd;&#10;g_tab_deferred_upd_CAS       t_tab_deferred_upd;&#10;&#10;TYPE t_tab_offenders IS TABLE OF VARCHAR2(1) INDEX BY VARCHAR(100);&#10;--&#10;g_tab_caseload_offender_list t_tab_offenders;&#10;g_tab_cohort_offender_list   t_tab_offenders;&#10;&#10;g_debug_cnt NUMBER := 0;&#10;&#10;-- CDC CTX state variable&#10;G_CDC_CTX NUMBER := GC_CDC_CTX_NONE;&#10;&#10;&#10;--&#10;TYPE t_tab_current_restriction_TYP1 IS TABLE OF t_rec_current_restriction_TYP INDEX BY VARCHAR2(100);&#10;g_tab_curent_restriction t_tab_current_restriction_TYP1;&#10;&#10;&#10;--&#10;g_component_code  CONSTANT VARCHAR2(3)  := &#39;TRG&#39;;&#10;g_package_name    CONSTANT VARCHAR2(30) := &#39;PKG_TRIGGER_SUPPORT&#39;;&#10;g_procedure_name  VARCHAR2(30)          := &#39;initial_value&#39;;&#10;&#10;--&#10;-- message type&#10;mt_information    CONSTANT NUMBER := 1;&#10;mt_warning        CONSTANT NUMBER := 2;&#10;mt_error          CONSTANT NUMBER := 3;&#10;mt_fatal_error    CONSTANT NUMBER := 4;&#10;--&#10;&#10;&#10;&#10;&#10;&#10;--&#10;--&#10;--&#10;PROCEDURE procDebug(p_msg VARCHAR2, p_print_flag VARCHAR2 DEFAULT &#39;N&#39;) IS&#10;BEGIN&#10;    IF PKG_Debug.funcgetDebugMode IN (&#39;1&#39;, &#39;2&#39;) THEN&#10;        g_debug_cnt := g_debug_cnt + 1;&#10;        PKG_Debug.procDebug(SUBSTR(&#39;PKG_TriggerSupport[&#39; || LPAD(g_debug_cnt, 10) || &#39;].&#39; || REPLACE(p_msg, &#39;@CNT&#39;, LPAD(g_debug_cnt, 10)), 1, 32000), p_print_flag=&gt;p_print_flag);&#10;    END IF;&#10;END procDebug;&#10;&#10;--&#10;-- PKG_COMMON wrappers&#10;--&#10;PROCEDURE message(p_msg VARCHAR2, p_trace_level NUMBER DEFAULT 0) IS&#10;BEGIN&#10;    PKG_Common.print_message(&#10;        p_msg         =&gt; p_msg,&#10;        p_trace_level =&gt; NVL(p_trace_level, PKG_Common.GC_TRACE_LEVEL),&#10;        p_label       =&gt; g_label );&#10;END message;&#10;--&#10;FUNCTION empty2null(p_str VARCHAR2) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Common.empty2null(p_str);&#10;END empty2null;&#10;--&#10;FUNCTION is_str_empty(p_str VARCHAR2, p_ignore_spaces_and_zeroes VARCHAR2 DEFAULT &#39;N&#39;) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Common.is_str_empty( p_str, p_ignore_spaces_and_zeroes );&#10;END is_str_empty;&#10;--&#10;FUNCTION nvlstr(p_str1 VARCHAR2, p_str2 VARCHAR2) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Common.NVLSTR(p_str1, p_str2);&#10;END nvlstr;&#10;--&#10;PROCEDURE raise_error(p_err_msg VARCHAR2, p_proc VARCHAR2, p_label VARCHAR2 DEFAULT NULL) IS&#10;BEGIN&#10;    PKG_Common.raise_error( p_err_msg, p_proc, p_label );&#10;END raise_error;&#10;--&#10;--***************************************************&#10;-- Helpers                                          *&#10;--***************************************************&#10;--&#10;PROCEDURE set_debug_flag(p_debug_flag VARCHAR2) IS&#10;BEGIN&#10;    G_DEBUG_FLAG := (UPPER(p_debug_flag) = &#39;Y&#39;);&#10;END set_debug_flag;&#10;--&#10;FUNCTION get_debug_flag RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN CASE WHEN G_DEBUG_FLAG THEN &#39;Y&#39; ELSE &#39;N&#39; END;&#10;END get_debug_flag;&#10;--&#10;-- Used to populate mtt_message_log with information type message&#10;PROCEDURE info(message_in VARCHAR2, p_trace_level INTEGER DEFAULT 15, p_proc VARCHAR2 DEFAULT NULL, p_label VARCHAR2 DEFAULT NULL) IS&#10;BEGIN&#10;    --&#10;    IF G_DEBUG_FLAG THEN&#10;        message(NVL(p_proc, g_procedure_name) || &#39;: &#39; || message_in, p_trace_level);&#10;    END IF;&#10;    --&#10;    IF SPGConfig.SPGInfoActive THEN&#10;        SPGConfig.insert_message_log(&#10;            message_type_id_in =&gt; mt_information,&#10;            component_code_in  =&gt; g_component_code,&#10;            package_name_in    =&gt; g_package_name,&#10;            procedure_name_in  =&gt; NVL(p_proc, g_procedure_name),&#10;            label_in           =&gt; NVL(p_label, g_label),&#10;            message_text_in    =&gt; message_in );&#10;    END IF;&#10;    --&#10;END info;&#10;--&#10;-- Will populate mtt_message_log with warning message - will populate mtt_error_log if result of exception&#10;PROCEDURE warn(message_in VARCHAR2, p_proc VARCHAR2 DEFAULT NULL, p_label VARCHAR2 DEFAULT NULL) IS&#10;BEGIN&#10;    --&#10;    IF G_DEBUG_FLAG THEN&#10;        message(&#39;WARNING in &#39; || NVL(p_proc, g_procedure_name) || &#39;: &#39; || message_in, 0);&#10;    END IF;&#10;    --&#10;    IF SPGConfig.SPGWarnActive THEN&#10;        SPGConfig.record_error(&#10;            message_type_id_in =&gt; mt_warning,&#10;            component_code_in  =&gt; g_component_code,&#10;            package_name_in    =&gt; g_package_name,&#10;            procedure_name_in  =&gt; NVL(p_proc, g_procedure_name),&#10;            label_in           =&gt; NVL(p_label, g_label),&#10;            message_text_in    =&gt; message_in );&#10;    END IF;&#10;END warn;&#10;--&#10;-- Will populate mtt_message_log with error message and populate mtt_error_log with exception - used for log and continue&#10;PROCEDURE error(message_in VARCHAR2, p_proc VARCHAR2 DEFAULT NULL, p_label VARCHAR2 DEFAULT NULL) IS&#10;BEGIN&#10;    --&#10;    IF G_DEBUG_FLAG THEN&#10;        message(&#39;ERROR in &#39; || NVL(p_proc, g_procedure_name) || &#39;: &#39; || message_in, 5);&#10;    END IF;&#10;    --&#10;    SPGConfig.record_error(&#10;        message_type_id_in =&gt; mt_error,&#10;        component_code_in  =&gt; g_component_code,&#10;        package_name_in    =&gt; g_package_name,&#10;        procedure_name_in  =&gt; NVL(p_proc, g_procedure_name),&#10;        label_in           =&gt; NVL(p_label, g_label),&#10;        message_text_in    =&gt; message_in);&#10;END error;&#10;--&#10;-- Will populate mtt_message_log, mtt_error_log with error message and raise exception - used for log and halt&#10;PROCEDURE fatal(message_in VARCHAR2, p_proc VARCHAR2 DEFAULT NULL, p_label VARCHAR2 DEFAULT NULL) IS&#10;BEGIN&#10;    --&#10;    IF G_DEBUG_FLAG THEN&#10;        message(&#39;FATAL ERROR in &#39; || NVL(p_proc, g_procedure_name) || &#39;: &#39; || message_in, 0);&#10;    END IF;&#10;    --&#10;    SPGConfig.record_error(&#10;        message_type_id_in =&gt; mt_fatal_error,&#10;        component_code_in  =&gt; g_component_code,&#10;        package_name_in    =&gt; g_package_name,&#10;        procedure_name_in  =&gt; NVL(p_proc, g_procedure_name),&#10;        label_in           =&gt; NVL(p_label, g_label),&#10;        message_text_in    =&gt; message_in,&#10;        raise_error_in     =&gt; TRUE );&#10;END fatal;&#10;--&#10;&#10;&#10;--============================================================================--&#10;-- VPD Optimisation Table support&#10;--============================================================================--&#10;&#10;-- Description: A procedure to rebuild the optimisation tables&#10;-- Input Paramaters : There are no input parameters required, Oracle will&#10;--                  : not allow the declarion of a procedure with no values&#10;-- Output Parameters : None&#10;-- Author : Gordon Stutchbury&#10;--&#10;-- ----------------------------------------------------------------------------------&#10;PROCEDURE do_rebuild_vpd(p_offender_id NUMBER)&#10;IS&#10;    --&#10;    CURSOR cs IS&#10;      WITH T AS (&#10;        -- 01. OFFENDER_MANAGER, OFFENDER_TRANSFER tables&#10;        SELECT &#39;OM_1&#39; AS vpd_level, om.offender_id, om.team_id AS team_id, om.provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, om.training_session_id&#10;        FROM&#10;          offender_manager OM,&#10;          team             T&#10;        WHERE OM.offender_id = p_offender_id&#10;          AND T.team_id = OM.team_id&#10;          -- Soft Deleted Flag check&#10;          AND OM.soft_deleted = 0&#10;        UNION&#10;        SELECT &#39;OM_2&#39; AS vpd_level, om.offender_id, om.team_id AS team_id, om.provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, T.external_provider_id AS external_provider, om.training_session_id&#10;        FROM&#10;          offender_manager OM,&#10;          provider_team    T&#10;        WHERE om.offender_id = p_offender_id&#10;          AND T.provider_team_id = OM.provider_team_id&#10;          -- Soft Deleted Flag check&#10;          AND OM.soft_deleted = 0&#10;        UNION&#10;        -- OFFENDER_TRANSFER&#10;        SELECT &#39;OMT_1&#39; AS vpd_level, offender_id, receiving_team_id  AS team_id, receiving_provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, ot.training_session_id&#10;        FROM&#10;          offender_transfer         OT,&#10;          team                      T,&#10;          r_standard_reference_list TS&#10;        WHERE OT.offender_id = p_offender_id&#10;          AND T.team_id = OT.receiving_team_id&#10;          AND TS.standard_reference_list_id = OT.transfer_status_id AND TS.code_value = &#39;PN&#39;&#10;          -- Soft Deleted Flag check&#10;          AND OT.soft_deleted = 0&#10;        UNION&#10;        SELECT &#39;OMT_2&#39; AS vpd_level, offender_id, receiving_team_id  AS team_id, receiving_provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, T.external_provider_id AS external_provider, ot.training_session_id&#10;        FROM&#10;          offender_transfer         OT,&#10;          provider_team             T,&#10;          r_standard_reference_list TS&#10;        WHERE OT.offender_id = p_offender_id&#10;          AND T.provider_team_id = OT.receiving_provider_team_id&#10;          AND TS.standard_reference_list_id = OT.transfer_status_id AND ts.code_value = &#39;PN&#39;&#10;          -- Soft Deleted Flag check&#10;          AND OT.soft_deleted = 0&#10;        UNION&#10;        -- 02. ORDER_MANAGER, EVENT and ORDER_TRANSFER tables&#10;        SELECT &#39;OS_1&#39; AS vpd_level, E.offender_id, om.allocation_team_id  AS team_id, om.provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, om.training_session_id&#10;        FROM&#10;          event         E,&#10;          order_manager OM,&#10;          team          T&#10;        WHERE E.offender_id = p_offender_id&#10;          AND E.active_flag = 1&#10;          AND OM.event_id = E.event_id&#10;          AND OM.active_flag = 1&#10;          AND T.team_id = OM.allocation_team_id&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND OM.soft_deleted = 0&#10;        UNION&#10;        SELECT &#39;OS_2&#39; AS vpd_level, E.offender_id, om.allocation_team_id  AS team_id, om.provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, T.EXTERNAL_PROVIDER_ID AS external_provider, om.training_session_id&#10;        FROM&#10;          event         E,&#10;          order_manager OM,&#10;          provider_team T&#10;        WHERE E.offender_id = p_offender_id&#10;          AND E.active_flag = 1&#10;          AND OM.event_id = E.event_id&#10;          AND T.provider_team_id = OM.provider_team_id&#10;          AND OM.active_flag = 1&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND OM.soft_deleted = 0&#10;        UNION&#10;        -- ORDER_TRANSFER&#10;        SELECT &#39;OST_1&#39; AS vpd_level, E.offender_id, receiving_team_id AS team_id, receiving_provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, ot.training_session_id&#10;        FROM&#10;          event                     E,&#10;          order_transfer            OT,&#10;          team                      T,&#10;          r_standard_reference_list TS&#10;        WHERE E.offender_id = p_offender_id&#10;          AND OT.event_id = E.event_id&#10;          AND T.team_id = OT.receiving_team_id&#10;          AND TS.standard_reference_list_id = OT.transfer_status_id AND TS.code_value = &#39;PN&#39;&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND OT.soft_deleted = 0&#10;        UNION&#10;        SELECT &#39;OST_2&#39; AS vpd_level, E.offender_id, receiving_team_id  AS team_id, receiving_provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, T.EXTERNAL_PROVIDER_ID AS external_provider, ot.training_session_id&#10;        FROM&#10;          event                     E,&#10;          order_transfer            OT,&#10;          provider_team             T,&#10;          r_standard_reference_list TS&#10;        WHERE E.offender_id = p_offender_id&#10;          AND OT.event_id = E.event_id&#10;          AND T.provider_team_id = OT.receiving_provider_team_id&#10;          AND TS.standard_reference_list_id = OT.transfer_status_id AND TS.code_value = &#39;PN&#39;&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND OT.soft_deleted = 0&#10;        UNION&#10;        -- 03. LIC_CONDITION_MANAGER, LIC_CONDITION and LIC_CONDITION_TRANSFER tables&#10;        SELECT &#39;LC_1&#39; AS vpd_level, E.offender_id, lcm.team_id  AS team_id, lcm.provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, lcm.training_session_id&#10;        FROM&#10;          event                 E,&#10;          disposal              D,&#10;          lic_condition         LC,&#10;          lic_condition_manager LCM,&#10;          team                  T&#10;        WHERE E.offender_id = p_offender_id&#10;          AND D.event_id = E.event_id&#10;          AND LC.disposal_id = D.disposal_id&#10;          AND LC.termination_date IS NULL&#10;          AND LCM.lic_condition_id = LC.lic_condition_id&#10;          AND LCM.active_flag = 1&#10;          AND T.team_id = LCM.team_id&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND D.soft_deleted = 0&#10;          AND LC.soft_deleted = 0&#10;          AND LCM.soft_deleted = 0&#10;        UNION&#10;        SELECT &#39;LC_2&#39; AS vpd_level, E.offender_id, lcm.team_id  AS team_id, lcm.provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, T.EXTERNAL_PROVIDER_ID AS external_provider, lcm.training_session_id&#10;        FROM&#10;          event                 E,&#10;          disposal              D,&#10;          lic_condition         LC,&#10;          lic_condition_manager LCM,&#10;          provider_team         T&#10;        WHERE E.offender_id = p_offender_id&#10;          AND D.event_id = E.event_id&#10;          AND LC.disposal_id = D.disposal_id&#10;          AND LC.termination_date IS NULL&#10;          AND LCM.lic_condition_id = LC.lic_condition_id&#10;          AND LCM.active_flag = 1&#10;          AND T.provider_team_id = LCM.provider_team_id&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND D.soft_deleted = 0&#10;          AND LC.soft_deleted = 0&#10;          AND LCM.soft_deleted = 0&#10;        UNION&#10;        -- LIC_CONDITION_TRANSFER&#10;        SELECT &#39;LCT_1&#39; AS vpd_level, E.offender_id, receiving_team_id  AS team_id, receiving_provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, lct.training_session_id&#10;        FROM&#10;          event                     E,&#10;          disposal                  D,&#10;          lic_condition             LC,&#10;          lic_condition_transfer    LCT,&#10;          team                      T,&#10;          r_standard_reference_list TS&#10;        WHERE E.offender_id = p_offender_id&#10;          AND D.event_id = E.event_id&#10;          AND LC.disposal_id = D.disposal_id&#10;          AND LCT.lic_condition_id = LC.lic_condition_id&#10;          AND T.team_id = LCT.receiving_team_id&#10;          AND TS.standard_reference_list_id = LCT.transfer_status_id AND ts.code_value = &#39;PN&#39;&#10;          -- Soft Deleted Flag check&#10;          AND E.soft_deleted = 0&#10;          AND D.soft_deleted = 0&#10;          AND LC.soft_deleted = 0&#10;          AND LCT.soft_deleted = 0&#10;        UNION&#10;        SELECT &#39;LCT_2&#39; AS vpd_level, E.offender_id, receiving_team_id  AS team_id, receiving_provider_team_id AS provider_team_id , T.probation_area_id AS probation_area_id, T.external_provider_id AS external_provider, lct.training_session_id&#10;        FROM&#10;          event                     E,&#10;          disposal                  D,&#10;          lic_condition             LC,&#10;          lic_condition_transfer    LCT,&#10;          provider_team             T,&#10;          r_standard_reference_list TS&#10;        WHERE E.offender_id = p_offender_id&#10;          AND D.event_id = E.event_id&#10;          AND LC.disposal_id = D.disposal_id&#10;          AND LCT.lic_condition_id = LC.lic_condition_id&#10;          AND T.provider_team_id = LCT.receiving_provider_team_id&#10;          AND TS.standard_reference_list_id  = LCT.transfer_status_id AND ts.code_value m_id, NULL AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, nm.training_session_id&#10;        FROM&#10;          nsi N,&#10;          nsi_manager NM,&#10;          team T&#10;        WHERE N.offender_id = p_offender_id&#10;          AND N.active_flag = 1&#10;          AND NM.nsi_id = N.nsi_id&#10;          AND NM.active_flag = 1&#10;          AND T.team_id = NM.team_id&#10;          -- Soft Deleted Flag check&#10;          AND N.soft_deleted = 0&#10;          AND NM.soft_deleted = 0&#10;        UNION&#10;        -- NSI_TRANSFER&#10;        SELECT &#39;NSIT_1&#39; AS vpd_level, n.offender_id, target_team_id  AS team_id, NULL AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, nt.training_session_id&#10;        FROM&#10;          nsi N,&#10;          nsi_transfer NT,&#10;          team T,&#10;          r_standard_reference_list TS&#10;        WHERE N.offender_id = p_offender_id&#10;          AND NT.nsi_id = N.nsi_id&#10;          AND T.team_id = NT.target_team_id&#10;          AND TS.standard_reference_list_id = NT.transfer_status_id AND TS.code_value = &#39;PN&#39;&#10;          -- Soft Deleted Flag check&#10;          AND N.soft_deleted = 0&#10;          AND NT.soft_deleted = 0&#10;        --TS2 start&#10;        UNION&#10;        --- 07. PSS_RQMNT, PSS_RQMNT_MANAGER and PSS_RQMNT_TRANSFER&#10;        SELECT &#39;PRQ_1&#39; AS vpd_level, pr.offender_id, prm.team_id AS team_id, NULL AS provider_team_id, t.probation_area_id AS probation_area_id, NULL AS external_provider, null&#10;        FROM&#10;          pss_rqmnt PR,&#10;          pss_rqmnt_manager PRM,&#10;          team T&#10;        WHERE PR.offender_id = p_offender_id&#10;          AND PR.termination_date IS NULL&#10;          AND PRM.pss_rqmnt_id = PR.pss_rqmnt_id&#10;          AND PRM.active_flag = 1&#10;          AND T.team_id = PRM.team_id&#10;          -- Soft Deleted Flag check&#10;          AND PR.soft_deleted = 0&#10; ed_premises_id IS NULL&#10;          -- Soft Deleted Flag check&#10;          AND APR.soft_deleted = 0&#10;        --&#10;        UNION&#10;        -- 09. PRISON_OFFENDER_MANAGER, (YF TODO: PRISON_OFFENDER_TRANSFER)&#10;        SELECT &#39;PRM_1&#39; AS vpd_level, offender_id, POM.allocation_team_id  AS team_id, NULL AS provider_team_id , T.probation_area_id AS probation_area_id, NULL AS external_provider, NULL AS training_session_id&#10;        FROM&#10;          prison_offender_manager POM,&#10;          team T&#10;        WHERE POM.offender_id = p_offender_id&#10;          AND POM.active_flag = 1&#10;          AND T.team_id = POM.allocation_team_id&#10;          -- Soft Deleted Flag check&#10;          AND POM.soft_deleted = 0&#10;      )&#10;      --&#10;      SELECT DISTINCT&#10;        --T.vpd_level,&#10;        T.offender_id,&#10;        T.team_id,&#10;        T.provider_team_id,&#10;        T.probation_area_id,&#10;        --PA.code AS area_code,&#10;        T.external_provider,&#10;        T.training_session_id&#10;      FROM T --INNER JOIN probation_area PA ON PA.probation_area_id = T.probation_area_id&#10;      ;&#10;    --&#10;    TYPE l_rec_TYP IS RECORD(&#10;      offender_id         NUMBER,&#10;      team_id             NUMBER,&#10;      provider_team_id    NUMBER,&#10;      probation_area_id   NUMBER,&#10;      external_provider   NUMBER,&#10;      training_session_id NUMBER );&#10;    TYPE l_tab_TYP IS TABLE OF l_rec_TYP;&#10;    --&#10;    l_tab l_tab_TYP;&#10;    --&#10;BEGIN&#10;    IF NVLSTR(SYS_CONTEXT(&#39;vpd_ctx&#39;, &#39;REBUILD_REQUIRED&#39;), &#39;N&#39;) &lt;&gt; &#39;Y&#39; THEN&#10;        procDebug(&#39;procRebuildOptTables.DO_REBUILD_VPD: REBUILD_REQUIRED is set to N&#39;);&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    DELETE FROM organisation_offender WHERE offender_ID = p_offender_ID;&#10;    --&#10;    IF SQL%ROWCOUNT &gt; 0 THEN&#10;        procDebug(&#39;PKG_TriggerSupport.DO_REBUILD_VPD(&#39; || p_offender_id || &#39; ;                --&#10;                p_delim=&gt;CHR(10) ),&#10;            --&#10;            &#39;100100&#39; );&#10;    END IF;&#10;    --&#10;    IF NVL(p_offenderID, -1) &gt; 0 THEN&#10;        do_rebuild_vpd(p_offenderID);&#10;    END IF;&#10;    --&#10;    l_offender_id_CHAR := TO_CHAR(p_offenderID);&#10;    --&#10;    IF NVL(p_offenderID, -1) &gt; 0 THEN&#10;        do_rebuild_caseload(l_offender_ID_CHAR);&#10;        IF g_tab_caseload_offender_list.EXISTS(l_offender_id_CHAR) /*AND SYS_CONTEXT(&#39;vpd_ctx&#39;, &#39;CASELOAD_REBUILD_REQUIRED&#39;) = &#39;Y&#39;*/ THEN&#10;            g_tab_caseload_offender_list.DELETE(l_offender_id_CHAR);&#10;        END IF;&#10;    END IF;&#10;    l_cnt := g_tab_caseload_offender_list.COUNT;&#10;    IF l_cnt &gt; 0 THEN&#10;        procDebug(&#39;INFO - procRebuildOptTables(&#39; || l_offender_id_CHAR || &#39;): &#39; ||&#10;            &#39;g_tab_caseload_offender_list.COUNT=&#39; || TO_CHAR(l_cnt) || &#39;. &#39; ||&#10;            &#39;Calling procRebuildCaseloadTable_OFF to process the remaining list of offenders&#39;);&#10;        procRebuildCaseloadTable_OFF;&#10;    END IF;&#10;    --&#10;    IF NVL(p_offenderID, -1) &gt; 0 THEN&#10;        do_rebuild_cohort_diary(p_offenderID);&#10;        IF g_tab_cohort_offender_list.EXISTS(l_offender_id_CHAR) THEN&#10;            g_tab_cohort_offender_list.DELETE(l_offender_id_CHAR);&#10;        END IF;&#10;    END IF;&#10;    l_cnt := g_tab_cohort_offender_list.COUNT;&#10;    IF l_cnt &gt; 0 THEN&#10;        procDebug(&#39;INFO - procRebuildOptTables(&#39; || l_offender_id_CHAR || &#39;): &#39; ||&#10;            &#39;g_tab_cohort_offender_list.COUNT=&#39; || TO_CHAR(l_cnt) || &#39;. &#39; ||&#10;            &#39;Calling procRebuildCohortTable_OFF to process the remaining list of offenders&#39;);&#10;        procRebuildCohortTable_OFF;&#10;    END IF;&#10;    --&#10;    IF NVL(p_process_alfresco_flag, &#39;Y&#39;) = &#39;Y&#39; THEN&#10;        IF PKG_Debug.funcgetDebugMode &lt;&gt; &#39;0&#39; THEN&#10;            procDebug(SUBSTR(&#39;PKG_TRIGGER_SUPPORT.procRebuildOptTables&#39; ||&#10;                &#39;(off_id=&#39; || l_offender_id_CHAR || &#39;): performing the ALFRESCOSUPPORT.processQueue&#39; || CHR(10) ||&#10;                &#39;(plsql_call_stack=&#39; || DBMS_UTILITY.format_call_stack || &#39;)&#39;,&#10;                1, 30000) );&#10;        END IF;&#10;        --&#10;        ALFRESCOSUPPORT.processQueue;&#10;        --&#10;--    ELSIF NVL(p_process_alfresco_flag, &#39;Y&#39;) = &#39;N&#39; THEN&#10;--        IF PKG_Debug.funcgetDebugMode &lt;&gt; &#39;0&#39; THEN&#10;--            procDebug(SUBSTR(&#39;PKG_TRIGGER_SUPPORT.procRebuildOptTables&#39; ||&#10;--                &#39;(off_id=&#39; || l_offender_id_CHAR || &#39;): performing the ALFRESCOSUPPORT.removeOffendersFromQueue&#39; || CHR(10) ||&#10;--                &#39;(plsql_call_stack=&#39; || DBMS_UTILITY.format_call_stack || &#39;)&#39;,&#10;--                1, 30000) );&#10;--        END IF;&#10;--        --&#10;--        ALFRESCOSUPPORT.removeOffendersFromQueue(&#10;--            offenderid_TAB_in =&gt; CASE&#10;--                                     WHEN p_offenderID &gt; 0 THEN&#10;--                                         T_TAB_ORGANISATIONS( l_offender_id_CHAR )&#10;--                                     ELSE&#10;--                                         ALFRESCOSUPPORT.getOffendersQueue&#10;--                                 END&#10;--        );&#10;--        --&#10;    END IF;&#10;    --&#10;END procRebuildOptTables;&#10;--&#10;PROCEDURE procChangeCapture_ClearContext IS&#10;BEGIN&#10;    G_CDC_CTX := GC_CDC_CTX_NONE;&#10;END procChangeCapture_ClearContext;&#10;--&#10;PROCEDURE update_offender_id(&#10;    p_parent_table    VARCHAR2,&#10;    p_table           VARCHAR2,&#10;    p_offender_id     NUMBER,&#10;    p_parent_row_id   ROWID,&#10;    p_row_id          ROWID,&#10;    p_recursive_level INTEGER )&#10;IS&#10;    --&#10;    CURSOR cs IS&#10;      SELECT /*+ RESULT_CACHE */&#39;Y&#39;&#10;      FROM user_tab_columns&#10;      WHERE table_name = p_table&#10;        AND column_name = &#39;OFFENDER_ID&#39;;&#10;    --&#10;    CURSOR cs1 IS&#10;      SELECT /*+ RESULT_CACHE */ &#39;Y&#39;&#10;      FROM user_tab_columns&#10;      WHERE table_name = p_table&#10;        AND column_name = PKG_DynSQL.get_tab_pk_fld_lst(p_parent_table)&#10;        AND nullable = &#39;N&#39;;&#10;    --&#10;    l_offender_id_TOP         NUMBER;&#10;    l_offender_id_OLD         NUMBER;&#10;    l_offender_id_exists_flag VARCHAR2(1);&#10;    l_fk_mandatory_flag       VARCHAR2(1);&#10;    --&#10;    l_SQL VARCHAR2(1024);&#10;    --&#10;    l_debug_flag BOOLEAN := PKG_Debug.funcGetDebugActive;&#10;    --&#10;BEGIN&#10;    --&#10;    IF p_table IN (&#10;          &#39;OFFENDER&#39;,&#10;          &#39;MOST_RECENTLY_VIEWED_OFFENDERS&#39;,&#10;          &#39;ORGANISATION_OFFENDER&#39;,&#10;          &#39;CASELOAD&#39;,&#10;          &#39;COHORT_DIARY&#39;,&#10;          &#39;SPG_VERSION_ENTRY&#39;,&#10;          &#39;OFFENDER_CRC_EXPORT&#39;,&#10;          &#39;SPG_NOTIFICATION&#39; )&#10;    THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    IF p_parent_table = &#39;CONTACT&#39; AND&#10;       p_table IN (&#10;         &#39;DEREGISTRATION&#39;,&#10;         &#39;ENFORCEMENT&#39;,&#10;         --&#39;IAPS_CONTACT&#39;,&#10;         &#39;OASYS_ASSESSMENT&#39;,&#10;         &#39;REGISTRATION&#39;,&#10;         &#39;REGISTRATION_REVIEW&#39;,&#10;         &#39;SUBJECT_ACCESS_REPORT_CONTACT&#39;,&#10;         &#39;UPW_APPOINTMENT&#39;,&#10;         &#39;&#39; )&#10;    THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;--    OPEN cs;&#10;--    FETCH cs INTO l_offender_id_exists_flag;&#10;--    IF cs%NOTFOUND THEN&#10;--        l_offender_id_exists_flag := &#39;N&#39;;&#10;--    END IF;&#10;--    CLOSE cs;&#10;--    --&#10;--    IF l_offender_id_exists_flag = &#39;N&#39; THEN&#10;--        RETURN;&#10;--    END IF;&#10;    --&#10;--    OPEN cs1;&#10;--    FETCH cs1 INTO l_fk_mandatory_flag;&#10;--    IF cs1%NOTFOUND THEN&#10;--        l_fk_mandatory_flag := &#39;N&#39;;&#10;--    END IF;&#10;--    --&#10;--    IF l_fk_mandatory_flag = &#39;N&#39; THEN&#10;--        RETURN;&#10;--    END IF;&#10;    --&#10;    EXECUTE IMMEDIATE&#10;      &#39;SELECT offender_id FROM &#39; || p_table || &#39; WHERE rowid = :p_rowid&#39;&#10;    INTO l_offender_id_OLD&#10;    USING p_row_id;&#10;    --&#10;    IF l_offender_id_OLD = p_offender_id THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    IF p_table = &#39;DOCUMENT&#39; AND p_parent_table = &#39;OFFENDER&#39; THEN&#10;        l_SQL :=&#10;           &#39;UPDATE document SET&#10;              offender_id = :p_offender_id,&#10;              primary_key_id = CASE WHEN table_name = &#39;&#39;OFFENDER&#39;&#39; THEN :p_offender_id ELSE primary_key_id END,&#10;            WHERE rowid = :p_rowid&#10;              AND NVL(offender_id, -1) &lt;&gt; :p_offender_id&#39;;&#10;        EXECUTE IMMEDIATE l_SQL&#10;        USING p_offender_id, p_offender_id, p_row_id, p_offender_id;&#10;    ELSE&#10;        l_SQL :=&#10;           &#39;UPDATE &#39; || p_table || &#39; SET&#10;              offender_id = :p_offender_id&#10;            WHERE rowid = :p_rowid&#10;              AND NVL(offender_id, -1) &lt;&gt; :p_offender_id&#39;;&#10;        EXECUTE IMMEDIATE l_SQL&#10;        USING p_offender_id, p_row_id, p_offender_id;&#10;    END IF;&#10;    --&#10;    IF l_debug_flag THEN&#10;        IF SQL%ROWCOUNT &gt; 0 THEN&#10;            procDebug(&#10;                &#39;PKG_TriggerSupport.update_offender_id &#39;  ||&#10;                &#39;[parent_table=&#39;    || p_parent_table    || &#39;]&#39;   ||&#10;                &#39;[table=&#39;           || p_table           || &#39;]&#39;   ||&#10;                &#39;[offender_id=&#39;     || p_offender_id     || &#39;]&#39;   ||&#10;                &#39;[offender_id_OLD=&#39; || l_offender_id_OLD || &#39;]&#39;   ||&#10;                &#39;[parent_ROWID=&#39;    || p_parent_row_id   || &#39;]&#39;   ||&#10;                &#39;[ROWID=&#39;           || p_row_id          || &#39;]: &#39; ||&#10;                &#39;OFFENDER_ID value has been synchronised&#39; );&#10;        END IF;&#10;    END IF;&#10;    --&#10;END update_offender_id;&#10;--&#10;PROCEDURE procCascadeUpdateOffenderID(&#10;    p_offender_id       NUMBER,&#10;    p_table_name        VARCHAR2,&#10;    p_row_id            ROWID,&#10;    p_exclude_nodes_lst VARCHAR2 DEFAULT NULL )&#10;IS&#10;BEGIN&#10;    --&#10;    PKG_DynSQL.offender_records_iterator(&#10;        p_offender_id =&gt; p_offender_id,&#10;        p_tab_name    =&gt; p_table_name,&#10;        p_row_id      =&gt; p_row_id,&#10;        --&#10;        p_check_offender_id_flag =&gt; &#39;Y&#39;,&#10;        --&#10;        p_dyn_SQL     =&gt;&#10;           &#39;DECLARE&#10;                --&#10;                l_parent_table    VARCHAR2(30) := :p_parent_table;&#10;                l_table           VARCHAR2(30) := :p_table;&#10;                l_offender_id     NUMBER       := :p_offender_id;&#10;                l_parent_row_id   ROWID        := :p_parent_row_id;&#10;                l_row_id          ROWID        := :p_row_id;&#10;                l_recursive_level INTEGER      := :p_recursive_level;&#10;                --&#10;            BEGIN&#10;                PKG_TriggerSupport.update_offender_id(&#10;                    p_parent_table    =&gt; l_parent_table,&#10;                    p_table           =&gt; l_table,&#10;                    p_offender_id     =&gt; l_offender_id,&#10;                    p_parent_row_id   =&gt; l_parent_row_id,&#10;                    p_row_id          =&gt; l_row_id,&#10;                    p_recursive_level =&gt; l_recursive_level );&#10;            END;&#39;,&#10;        --&#10;        p_skip_subtrees =&gt;&#10;            PKG_LstUtl.concat(&#10;                p_exclude_nodes_lst,&#10;                --&#10;                &#39;OFFENDER_MANAGER/CONTACT_ALERT, &#39;                                                            ||&#10;                --&#10;                &#39;CONTACT/DEREGISTRATION, CONTACT/ENFORCEMENTxxx, CONTACT/OASYS_ASSESSMENT, &#39;                     ||&#10;                &#39;CONTACT/REGISTRATION, CONTACT/REGISTRATION_REVIEW, CONTACT/SUBJECT_ACCESS_REPORT_CONTACT, &#39;  ||&#10;                &#39;CONTACT/UPW_APPOINTMENT, &#39;                                                                   ||&#10;                --&#10;                &#39;CONTACT_ALERT/*, &#39;                                                                           ||&#10;                --&#10;                &#39;OFFENDER_TRANSFER/*, NSI_TRANSFER/*, RQMNT_TRANSFER/*, LIC_CONDITION_TRANSFER/*, &#39;           ||&#10;                &#39;PSS_RQMNT_TRANSFER/*, NSI_TRANSFER/*, &#39;                                                      ||&#10;                &#39;COURT_REPORT_TRANSFER/*, INSTITUTIONAL_REPORT_TRANSFER/*, &#39;                                  ||&#10;                --&#10;                &#39;*/ORGANISATION_OFFENDER, */CASELOAD, */COHORT_DIARY, &#39;                                       ||&#10;                &#39;*/SPG_NOTIFICATION, */SPG_VERSION_ENTRY, */OFFENDER_CRC_EXPORT, &#39;                            ||&#10;                &#39;*/MOST_RECENTLY_VIEWED_OFFENDERS, &#39;                                                          ||&#10;                &#39;*/MERGE_HISTORY, */MERGE_DUPLICATES, */MERGE_OFFENDER_VALUES&#39;,&#10;                --&#10;                p_delim =&gt; &#39;, &#39; )&#10;    );&#10;    --&#10;END procCascadeUpdateOffenderID;&#10;--&#10;PROCEDURE procRebuildOptTables_ALL(&#10;    p_force_flag              VARCHAR2 DEFAULT &#39;N&#39;,&#10;    p_offender_id_LST         CLOB,&#10;    p_update_offender_id_flag VARCHAR2 DEFAULT &#39;Y&#39;,&#10;    p_process_alfresco_flag   VARCHAR2 DEFAULT &#39;Y&#39;,&#10;    p_exclude_nodes_lst       VARCHAR2 DEFAULT NULL )&#10;IS&#10;    --&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procRebuildOptTables_ALL&#39;;&#10;    --&#10;    l_offender_id NUMBER;&#10;    --&#10;    l_tab T_TAB_ORGANISATIONS := T_TAB_ORGANISATIONS();&#10;    --&#10;    l_offender_id_LST CLOB;&#10;    --&#10;    l_row_id ROWID;&#10;    --&#10;BEGIN&#10;    --&#10;    l_offender_id_LST := REPLACE(REPLACE(REPLACE(REPLACE(REPLACE(p_offender_id_LST, CHR(10), &#39;&#39;), CHR(13), &#39;&#39;), CHR(9), &#39; &#39;), &#39; &#39;, &#39;&#39;), &#39;;&#39;, &#39;,&#39;);&#10;    --&#10;    l_TAB := PKG_LstUtl.get_list_2_array(p_clob=&gt;l_offender_id_LST, p_delim=&gt;&#39;,&#39;, p_distinct_values_flag=&gt;&#39;Y&#39;);&#10;    --&#10;    IF NVL(p_update_offender_id_flag, &#39;Y&#39;) = &#39;Y&#39; THEN&#10;        -- DST-1773: Remove offenders from ALF queue (same offenders will be added one-by-one again within the LOOP)&#10;        ALFRESCOSUPPORT.removeOffendersFromQueue( offenderid_TAB_in=&gt;l_TAB );&#10;    END IF;&#10;    --&#10;    FOR l_i IN 1 .. NVL(l_TAB.COUNT, 0) LOOP&#10;        --&#10;        IF NVL(p_update_offender_id_flag, &#39;Y&#39;) = &#39;Y&#39; THEN&#10;            --&#10;            SELECT rowid INTO l_row_id&#10;            FROM offender&#10;            WHERE offender_id = l_TAB(l_i);&#10;            --&#10;            procDebug(&#39;PKG_Trigger_Support.procRebuildOptTables_ALL: Invoking the PKG_DynSQL.offender_records_iterator(offender_id=&#39; || l_TAB(l_i) || &#39;)&#39;);&#10;            --&#10;            procCascadeUpdateOffenderID(&#10;                p_offender_id       =&gt; l_TAB(l_i),&#10;                p_table_name        =&gt; &#39;OFFENDER&#39;,&#10;                p_row_id            =&gt; l_row_id,&#10;                p_exclude_nodes_lst =&gt; p_exclude_nodes_lst );&#10;            --&#10;            --ALFRESCOSUPPORT.addOffender2Queue(l_TAB(l_i));&#10;            --&#10;        END IF;&#10;        --&#10;        IF NVL(p_force_flag, &#39;N&#39;)              = &#39;Y&#39; OR&#10;           NVL(p_update_offender_id_flag, &#39;Y&#39;) = &#39;Y&#39;&#10;        THEN&#10;            PKG_VPD_CTX.set_table_value( &#39;REBUILD_REQUIRED&#39;         ,&#39;Y&#39; );&#10;            PKG_VPD_CTX.set_table_value( &#39;CASELOAD_REBUILD_REQUIRED&#39;,&#39;Y&#39; );&#10;            PKG_VPD_CTX.set_table_value( &#39;COHORT_REBUILD_REQUIRED&#39;  ,&#39;Y&#39; );&#10;        END IF;&#10;        --&#10;        IF NVL(p_update_offender_id_flag, &#39;Y&#39;) = &#39;Y&#39; THEN&#10;            procRebuildOptTables( p_offenderID=&gt;l_tab(l_i), p_process_alfresco_flag=&gt;&#39;N&#39; );&#10;        ELSE&#10;            procRebuildOptTables( p_offenderID=&gt;l_tab(l_i), p_process_alfresco_flag=&gt;NVL(p_process_alfresco_flag, &#39;Y&#39;) );&#10;        END IF;&#10;        --&#10;        --COMMIT;&#10;    END LOOP;&#10;    --&#10;    IF NVL(p_update_offender_id_flag, &#39;Y&#39;) = &#39;Y&#39; THEN&#10;        ALFRESCOSUPPORT.addOffenders2Queue( offenderid_TAB_in=&gt;l_TAB );&#10;        IF NVL(p_process_alfresco_flag, &#39;Y&#39;) = &#39;Y&#39; THEN&#10;            ALFRESCOSUPPORT.processQueue;&#10;        END IF;&#10;    END IF;&#10;    --&#10;END procRebuildOptTables_ALL;&#10;--&#10;PROCEDURE procValidate_VPD_Labels&#10;IS&#10;    l_scn NUMBER := PKG_VpdSupport.get_current_scn_number;&#10;    --&#10;    CURSOR cs IS&#10;      SELECT offender_id&#10;      FROM offender&#10;      WHERE NVL( CAST(ORGANISATIONS AS t_tab_ORGANISATIONS), t_tab_ORGANISATIONS() ) &lt;&gt;&#10;            PKG_VpdSupport.funcGetOffProbAreas(offender_id, l_scn)&#10;      ORDER BY 1;&#10;    --&#10;    l_offender_id NUMBER;&#10;    --&#10;    TYPE l_tab_TYP IS TABLE OF NUMBER;&#10;    l_tab l_tab_TYP;&#10;    --&#10;BEGIN&#10;    --&#10;    PKG_VPD_CTX.set_client_identifier(userID =&gt; 1);&#10;    --&#10;    OPEN cs;&#10;    FETCH cs BULK COLLECT INTO l_tab;&#10;    CLOSE cs;&#10;    --&#10;    FOR l_i IN 1 .. NVL(l_tab.COUNT, 0) LOOP&#10;        --&#10;        PKG_VPD_CTX.set_table_value(&#39;REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;        PKG_TriggerSupport.procRebuildOptTables(p_offenderID =&gt; l_tab(l_i));&#10;        COMMIT;&#10;    END LOOP;&#10;    --&#10;END procValidate_VPD_Labels;&#10;--&#10;--&#10;PROCEDURE do_cr_user(p_user_id NUMBER, p_forename VARCHAR2, p_surname VARCHAR2, p_distinguished_name VARCHAR2)&#10;IS&#10;    l_user_id NUMBER;&#10;BEGIN&#10;    SELECT user_id INTO l_user_id&#10;    FROM user_&#10;    WHERE user_id = p_user_id;&#10;    --&#10;    UPDATE user_ SET&#10;      forename = p_forename,&#10;      surname = p_surname,&#10;      distinguished_name = p_distinguished_name&#10;    WHERE user_id = l_user_id;&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;        IF NVL(p_user_id, -1) &lt;= 0 THEN&#10;            l_user_id := USER_ID_SEQ.nextval;&#10;        ELSE&#10;            l_user_id := p_user_id;&#10;        END IF;&#10;    INSERT INTO user_ (&#10;      user_id, surname, forename, distinguished_name, private, organisation_id, row_version) VALUES (&#10;      l_user_id, p_surname, p_forename, PKG_Common.nvl2(p_distinguished_name, p_forename || p_surname), 0, 0, 0);&#10;END do_cr_user;&#10;--&#10;PROCEDURE do_grant_areas(p_user_id NUMBER, p_area_code VARCHAR2) IS&#10;BEGIN&#10;    DELETE FROM probation_area_user&#10;    WHERE user_id = p_user_id;&#10;    INSERT INTO probation_area_user(user_id, probation_area_id, row_version, created_by_user_id, last_updated_user_id, created_datetime, last_updated_datetime)&#10;      SELECT p_user_id, probation_area_id, 0, 3, 3, SYSDATE, SYSDATE&#10;      FROM probation_area&#10;      WHERE ( UPPER(TRIM(p_area_code)) = &#39;ALL&#39; OR code = PKG_Common.nvl2(p_area_code, code) );&#10;END do_grant_areas;&#10;--&#10;PROCEDURE procAddSuperUser(p_user_id NUMBER, p_forename VARCHAR2 DEFAULT NULL, p_surname VARCHAR2 DEFAULT NULL, p_distinguished_name VARCHAR2 DEFAULT NULL, p_area_code VARCHAR2 DEFAULT NULL)&#10;IS&#10;BEGIN&#10;    do_cr_user(p_user_id, p_forename, p_surname, p_distinguished_name);&#10;    do_grant_areas(p_user_id, p_area_code);&#10;END procAddSuperUser;&#10;--&#10;FUNCTION funcOrganisationOffenderExists(&#10;    p_offender_ID          NUMBER,&#10;    p_probation_area_id    NUMBER,&#10;    p_external_provider_id NUMBER DEFAULT NULL,&#10;    p_training_session_id  NUMBER DEFAULT NULL)&#10;RETURN BOOLEAN IS&#10;    l_dummy VARCHAR2(1);&#10;BEGIN&#10;    SELECT &#39;Y&#39; INTO l_dummy&#10;    FROM organisation_offender&#10;    WHERE offender_id = p_offender_ID&#10;      AND probation_area_id = p_probation_area_id&#10;      AND NVL(external_provider_id, 0) = NVL(p_external_provider_id, 0)&#10;      AND NVL(training_session_id, 0) = NVL(training_session_id, 0)&#10;      AND ROWNUM = 1;&#10;    --&#10;    RETURN TRUE;&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    RETURN FALSE;&#10;END funcOrganisationOffenderExists;&#10;&#10;PROCEDURE procInsertOffenderRecord(p_offender_ID NUMBER, p_probation_area_id NUMBER, p_training_session_id NUMBER DEFAULT NULL) IS&#10;BEGIN&#10;    IF funcOrganisationOffenderExists(&#10;          p_offender_ID          =&gt; p_offender_ID,&#10;          p_probation_area_id    =&gt; p_probation_area_id,&#10;          p_external_provider_id =&gt; NULL,&#10;          p_training_session_id  =&gt; p_training_session_id )&#10;    THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    INSERT INTO organisation_offender(&#10;      offender_id, probation_area_id, partition_area_id, training_session_id&#10;    ) VALUES (&#10;      p_offender_ID, p_probation_area_id, 0, p_training_session_id);&#10;    --&#10;    -- Instead of checking for duplicate rows, we silently throw away duplicates&#10;EXCEPTION WHEN DUP_VAL_ON_INDEX THEN&#10;    NULL;&#10;END procInsertOffenderRecord;&#10;&#10;PROCEDURE procInsertProviderRecord(p_offender_ID NUMBER, p_probation_area_id NUMBER, p_external_provider_id NUMBER, p_training_session_id NUMBER DEFAULT NULL)&#10;AS&#10;BEGIN&#10;    IF funcOrganisationOffenderExists(&#10;          p_offender_ID          =&gt; p_offender_ID,&#10;          p_probation_area_id    =&gt; p_probation_area_id,&#10;          p_external_provider_id =&gt; NULL,&#10;          p_training_session_id  =&gt; p_training_session_id )&#10;    THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    INSERT INTO organisation_offender(&#10;      offender_id, probation_area_id, external_provider_id, partition_area_id, training_session_id&#10;    ) VALUES (&#10;      p_offender_ID, p_probation_area_id, p_external_provider_id, 0, p_training_session_id);&#10;    --&#10;    -- Instead of checking for duplicate rows, we silently throw away duplicates&#10;EXCEPTION WHEN DUP_VAL_ON_INDEX THEN&#10;    NULL;&#10;END procInsertProviderRecord;&#10;--&#10;FUNCTION funcPDTSession(&#10;    p_sid          IN OUT NUMBER,&#10;    p_job_name     IN OUT VARCHAR2,&#10;    p_owner_name   IN OUT VARCHAR2,&#10;    p_session_type IN OUT VARCHAR2 )&#10;RETURN BOOLEAN&#10;IS&#10;    l_ret           BOOLEAN := FALSE;&#10;BEGIN&#10;    SELECT s.sid, d.job_name, d.owner_name, d.session_type&#10;    INTO p_sid, p_job_name, p_owner_name, p_session_type&#10;    FROM dba_datapump_sessions d, v$session s&#10;    WHERE s.sid = SYS_CONTEXT(&#39;USERENV&#39;, &#39;SID&#39;)&#10;    AND user = SYS_CONTEXT(&#39;USERENV&#39;, &#39;CURRENT_SCHEMA&#39;)&#10;    AND d.saddr = s.saddr;&#10;    --&#10;    IF p_job_name LIKE &#39;PDT_TIER_%&#39; THEN&#10;        l_ret := TRUE;&#10;    END IF;&#10;    --&#10;    RETURN l_ret;&#10;    --&#10;EXCEPTION&#10;    WHEN NO_DATA_FOUND THEN&#10;        RETURN FALSE;&#10;    WHEN OTHERS THEN&#10;        RAISE;&#10;END funcPDTSession;&#10;--&#10;FUNCTION funcPDTActive RETURN BOOLEAN&#10;IS&#10;    l_ret BOOLEAN := FALSE;&#10;BEGIN&#10;    BEGIN&#10;        IF GLOBAL_CACHE_MGR.pdt_get_status = &#39;ACTIVE&#39; THEN&#10;            l_ret := TRUE;&#10;        END IF;&#10;    EXCEPTION WHEN OTHERS THEN&#10;        NULL;&#10;    END;&#10;    --&#10;    RETURN l_ret;&#10;END funcPDTActive;&#10;--&#10;PROCEDURE do_pdt_debug_message(p_msg VARCHAR2) IS&#10;BEGIN&#10;    NULL;&#10;--    BEGIN&#10;--        EXECUTE IMMEDIATE &#39;BEGIN C08001_pdt_support.debugMessage(p_msg=&gt;:p_msg); END;&#39; USING p_msg;&#10;--    EXCEPTION WHEN OTHERS THEN&#10;--        NULL;&#10;--    END;&#10;    --&#10;END do_pdt_debug_message;&#10;--&#10;PROCEDURE procOffender_PERF (p_offender_id NUMBER, p_institution_id NUMBER, p_establishment VARCHAR)&#10;IS&#10;    l_job_name      DBA_DATAPUMP_SESSIONS.job_name%TYPE;&#10;    l_owner_name    DBA_DATAPUMP_SESSIONS.owner_name%TYPE;&#10;    l_session_type  DBA_DATAPUMP_SESSIONS.session_type%TYPE;&#10;    l_sid           NUMBER;&#10;    l_sql           VARCHAR2(1024);&#10;    --&#10;BEGIN&#10;    IF funcPDTActive AND funcPDTSession(l_sid, l_job_name, l_owner_name, l_session_type) THEN&#10;        do_pdt_debug_message(&#39;procOffender_PERF: PDT Import Session Detected (SID=&#39; || l_sid || &#39;, job_name=&#39; || l_job_name || &#39;, owner_name=&#39; || l_owner_name || &#39;, session_type=&#39; || l_session_type || &#39;) - not updating&#39;);&#10;    ELSE&#10;        do_pdt_debug_message(&#39;procOffender_PERF: No PDT Import Sessions Detected - updating OFFENDER&#39;);&#10;        l_sql := &#39;UPDATE offender SET institution_id = :institution_id, establishment = :establishment&#10;                  WHERE offender_id = :offender_id&#39;;&#10;        EXECUTE IMMEDIATE l_sql&#10;        USING p_institution_id, p_establishment, p_offender_id;&#10;    END IF;&#10;END procOffender_PERF;&#10;--&#10;PROCEDURE procSetVPDRebuildFlag&#10;IS&#10;    l_job_name      DBA_DATAPUMP_SESSIONS.job_name%TYPE;&#10;    l_owner_name    DBA_DATAPUMP_SESSIONS.owner_name%TYPE;&#10;    l_session_type  DBA_DATAPUMP_SESSIONS.session_type%TYPE;&#10;    l_sid           NUMBER;&#10;    --&#10;BEGIN&#10;    IF funcPDTSession(l_sid, l_job_name, l_owner_name, l_session_type) THEN&#10;        do_pdt_debug_message(&#39;procSetVPDRebuildFlag: PDT Import Session detected (sid=&#39; || l_sid || &#39;, job_name=&#39; || l_job_name || &#39;, owner_name=&#39; || l_owner_name || &#39;, session_type=&#39; || l_session_type || &#39;) - setting g_VPD_rebuild_flag to FALSE&#39;);&#10;        g_VPD_rebuild_flag := FALSE;&#10;    ELSE&#10;        do_pdt_debug_message(&#39;procSetVPDRebuildFlag: Non - PDT Import Session detected (sid=&#39; || l_sid || &#39;, job_name=&#39; || l_job_name || &#39;, owner_name=&#39; || l_owner_name || &#39;, session_type=&#39; || l_session_type || &#39;) - setting g_VPD_rebuild_flag to TRUE&#39;);&#10;        g_VPD_rebuild_flag := TRUE;&#10;    END IF;&#10;    --&#10;EXCEPTION&#10;    WHEN OTHERS THEN&#10;        do_pdt_debug_message(&#39;ERROR in procSetVPDRebuildFlag: &#39; || SQLERRM);&#10;        RAISE;&#10;END procSetVPDRebuildFlag;&#10;--&#10;PROCEDURE set_VPD_deferred_flag(p_flag BOOLEAN) IS&#10;BEGIN&#10;    g_VPD_deferred_rebuild_flag := NVL(p_flag, FALSE);&#10;END set_VPD_deferred_flag;&#10;--&#10;FUNCTION get_VPD_deferred_flag RETURN BOOLEAN IS&#10;BEGIN&#10;    RETURN NVL(g_VPD_deferred_rebuild_flag, FALSE);&#10;END get_VPD_deferred_flag;&#10;&#10;--&#10;-- YF 14/02/2014: added an overload procedure&#10;--&#10;PROCEDURE procSetVPDRebuildFlag(p_vpd_rebuild_flag BOOLEAN) IS&#10;BEGIN&#10;    g_VPD_rebuild_flag      := p_vpd_rebuild_flag;&#10;    g_VPD_rebuild_flag_INIT := TRUE;&#10;END procSetVPDRebuildFlag;&#10;&#10;PROCEDURE procInsertOrgOffenderRecord(&#10;    p_offender_id          NUMBER,&#10;    p_probation_area_id    NUMBER DEFAULT NULL,&#10;    p_external_provider_id NUMBER DEFAULT NULL,&#10;    p_team_id              NUMBER DEFAULT NULL,&#10;    p_provider_team_id     NUMBER DEFAULT NULL,&#10;    p_training_session_id  NUMBER DEFAULT NULL)&#10;IS&#10;    l_probation_area_id_1  NUMBER;&#10;    l_probation_area_id_2  NUMBER;&#10;    l_external_provider_id NUMBER;&#10;BEGIN&#10;    /*PKG_Debug.*/procDebug(&#39;procInsertOrgOffenderRecord: &#39; || CHR(10) ||&#10;                            &#39;p_offender_id =&gt; &#39; || p_offender_id || CHR(10) ||&#10;                            &#39;p_probation_area_id =&gt; &#39; || p_probation_area_id || CHR(10) ||&#10;                            &#39;p_external_provider_id =&gt; &#39; || p_external_provider_id || CHR(10) ||&#10;                            &#39;p_team_id =&gt; &#39; || p_team_id || CHR(10) ||&#10;                            &#39;p_provider_team_id =&gt; &#39; || p_provider_team_id || CHR(10) ||&#10;                            &#39;p_training_session_id =&gt; &#39; || p_training_session_id || CHR(10)&#10;                            || &#39;&#39;);&#10;    --&#10;    IF NOT g_VPD_rebuild_flag_INIT THEN&#10;        procSetVPDRebuildFlag;&#10;        g_VPD_rebuild_flag_INIT := TRUE;&#10;    END IF;&#10;    --&#10;    IF NOT g_VPD_rebuild_flag THEN&#10;        /*PKG_Debug.*/procDebug(&#39;procInsertOrgOffenderRecord WARNING: g_VPD_rebuild_flag=FALSE&#39;);&#10;        --RETURN;&#10;    END IF;&#10;    --&#10;    IF p_team_id IS NOT NULL OR p_probation_area_id IS NOT NULL THEN&#10;        -- Staff Team&#10;        IF p_probation_area_id IS NULL THEN&#10;            l_probation_area_id_1 := funcGetTeamProbAreaID(p_team_id);&#10;        ELSE&#10;            l_probation_area_id_1 := p_probation_area_id;&#10;        END IF;&#10;        --&#10;        PKG_Lookups.do_flush_TAB_cache(TRUE);&#10;        --&#10;        /*PKG_Debug.*/procDebug(&#39;procInsertOrgOffenderRecord: CALL&#39; || CHR(10) ||&#10;                                &#39;p_offender_id =&gt; &#39; || p_offender_id || CHR(10) ||&#10;                                &#39;p_probation_area_id =&gt; &#39; || l_probation_area_id_1 || CHR(10) ||&#10;                                &#39;p_training_session_id =&gt; &#39; || p_training_session_id || CHR(10)&#10;                                || &#39;&#39;);&#10;        --&#10;        procInsertOffenderRecord(&#10;            p_offender_ID         =&gt; p_offender_id,&#10;            p_probation_area_id   =&gt; l_probation_area_id_1,&#10;            p_training_session_id =&gt; p_training_session_id);&#10;        --&#10;    END IF;&#10;    --&#10;    IF p_provider_team_id IS NOT NULL OR p_external_provider_id IS NOT NULL THEN&#10;        -- Provider  team&#10;        IF p_probation_area_id IS NULL THEN&#10;            l_probation_area_id_2 := funcGetProvTeamProbAreaID(p_provider_team_id);&#10;        ELSE&#10;            l_probation_area_id_2 := p_probation_area_id;&#10;        END IF;&#10;        --&#10;        IF p_external_provider_id IS NULL THEN&#10;            l_external_provider_id := funcGetProvTeamExtProviderID(p_provider_team_id);&#10;        ELSE&#10;            l_external_provider_id := p_external_provider_id;&#10;        END IF;&#10;        --&#10;        PKG_Lookups.do_flush_TAB_cache(TRUE);&#10;        --&#10;        procInsertProviderRecord(&#10;            p_offender_ID         =&gt; p_offender_id,&#10;            p_external_provider_id=&gt; l_external_provider_id,&#10;            p_probation_area_id   =&gt; l_probation_area_id_2,&#10;            p_training_session_id =&gt; p_training_session_id);&#10;        --&#10;        IF l_probation_area_id_2 &lt;&gt; NVL(l_probation_area_id_1, -99) THEN&#10;            procInsertOffenderRecord(&#10;                p_offender_ID         =&gt; p_offender_id,&#10;                p_probation_area_id   =&gt; l_probation_area_id_2,&#10;                p_training_session_id =&gt; p_training_session_id);&#10;        END IF;&#10;        --&#10;    END IF;&#10;    --&#10;    IF NOT get_VPD_deferred_flag THEN&#10;        ALFRESCOSUPPORT.addOffender2Queue(offenderid_in =&gt; p_offender_id);&#10;    END IF;&#10;    --&#10;END procInsertOrgOffenderRecord;&#10;&#10;FUNCTION funcIsOffenderExists(p_offender_id NUMBER) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Lookups.funcgetTabRecord(&#10;               p_table      =&gt; &#39;OFFENDER&#39;,&#10;               p_ref_col    =&gt; &#39;offender_id&#39;,&#10;               p_ref_val    =&gt; TO_CHAR(p_offender_id),&#10;               p_data_fld   =&gt; &#39;&#39;&#39;Y&#39;&#39;&#39;,&#10;               p_default_val=&gt; &#39;N&#39;);&#10;END funcIsOffenderExists;&#10;&#10;FUNCTION get_tab_offenders_list RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_LstUtl.get_array_2_list(g_tab_offenders_list);&#10;END get_tab_offenders_list;&#10;--&#10;FUNCTION get_tab_offenders_list_1 RETURN t_tab_ORGANISATIONS IS&#10;BEGIN&#10;    RETURN g_tab_offenders_list;&#10;END get_tab_offenders_list_1;&#10;--&#10;FUNCTION get_tab_offenders_list_cnt RETURN NUMBER IS&#10;BEGIN&#10;    RETURN g_tab_offenders_list.COUNT;&#10;END get_tab_offenders_list_cnt;&#10;&#10;PROCEDURE reset_tab_offenders_list IS&#10;BEGIN&#10;    g_tab_offenders_list.DELETE;&#10;END reset_tab_offenders_list;&#10;&#10;PROCEDURE procRebuildOffProbAreas(p_offenders_list VARCHAR2 DEFAULT NULL, p_validate_flag VARCHAR2 DEFAULT &#39;N&#39;)&#10;IS&#10;    --&#10;    l_offenders_arr  t_tab_ORGANISATIONS := t_tab_ORGANISATIONS();&#10;    l_offenders_list VARCHAR2(30000);&#10;    --l_scn            NUMBER;&#10;    --&#10;    l_off_prob_areas_NEW t_tab_ORGANISATIONS := t_tab_ORGANISATIONS();&#10;    l_off_prob_areas_OLD t_tab_ORGANISATIONS := t_tab_ORGANISATIONS();&#10;    --&#10;BEGIN&#10;    --&#10;    IF empty2null(TRIM(p_offenders_list)) IS NOT NULL THEN&#10;        l_offenders_list := p_offenders_list;&#10;        l_offenders_arr  := PKG_LstUtl.get_list_2_array(l_offenders_list);&#10;    ELSE&#10;        l_offenders_list := PKG_LstUtl.get_array_2_list(g_tab_offenders_list);&#10;        l_offenders_arr  := g_tab_offenders_list;&#10;    END IF;&#10;    --&#10;    IF empty2null(TRIM(l_offenders_list)) IS NULL THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    --&#10;    procDebug(SUBSTR(&#39;procRebuildOffProbAreas[&#39; || l_offenders_list || &#39;]&#39;, 1, 30000));&#10;    --&#10;    --l_scn := PKG_VpdSupport.get_current_scn_number;&#10;    --&#10;    FOR l_i IN 1 .. l_offenders_arr.COUNT LOOP&#10;        --l_off_prob_areas_NEW := PKG_VpdSupport.funcGetOffProbAreas(l_offenders_arr(l_i), l_scn)&#10;        BEGIN&#10;--            SELECT&#10;--              CAST(ORGANISATIONS AS t_tab_ORGANISATIONS),&#10;--              PKG_VpdSupport.funcGetOffProbAreas_NOCACHE(l_offenders_arr(l_i))&#10;--            INTO&#10;--              l_off_prob_areas_OLD,&#10;--              l_off_prob_areas_NEW&#10;--            FROM offender&#10;--            WHERE offender_id = l_offenders_arr(l_i);&#10;            --&#10;            l_off_prob_areas_NEW := PKG_VpdSupport.funcGetOffProbAreas_NOCACHE(l_offenders_arr(l_i));&#10;            --&#10;            g_VPD_validation_mode := ( NVLSTR(p_validate_flag, &#39;N&#39;) = &#39;Y&#39; );&#10;            --&#10;            IF PKG_Debug.funcgetDebugMode &lt;&gt; &#39;0&#39; THEN&#10;                procDebug(SUBSTR(&#39;procRebuildOffProbAreas[&#39; || l_offenders_arr(l_i) || &#39;]&#39; ||&#10;                    --&#39;[l_i=&#39; || l_i || &#39;]&#39; ||&#10;                    --&#39;[scn=&#39; || l_scn || &#39;]&#39; ||&#10;                    &#39;[g_VPD_validation_mode=&#39; || NVLSTR(p_validate_flag, &#39;N&#39;) || &#39;]&#39; ||&#10;                    --&#39;[orgs_OLD=&#39; || PKG_LstUtl.get_array_2_list(l_off_prob_areas_OLD, p_iterator_function=&gt;&#39;PKG_Lookups.funcgetTabRecord_CACHED(p_table=&gt;&#39;&#39;PROBATION_AREA&#39;&#39;, p_ref_col=&gt;&#39;&#39;probation_area_id&#39;&#39;, p_ref_val=&gt;:p_probation_area_id, p_data_fld=&gt;&#39;&#39;CODE&#39;&#39;)&#39;) || &#39;]&#39; ||&#10;                    &#39;[orgs_NEW=&#39; || PKG_LstUtl.get_array_2_list(l_off_prob_areas_NEW, p_iterator_function=&gt;&#39;PKG_Lookups.funcgetTabRecord_CACHED(p_table=&gt;&#39;&#39;PROBATION_AREA&#39;&#39;, p_ref_col=&gt;&#39;&#39;probation_area_id&#39;&#39;, p_ref_val=&gt;:p_probation_area_id, p_data_fld=&gt;&#39;&#39;CODE&#39;&#39;)&#39;) || &#39;]&#39;,&#10;                    1, 30000) );&#10;            END IF;&#10;            --&#10;            -- YF DST-1728: Top level OFFENDER.organisations may already be set to a correct value, while other tables still need VPD update&#10;--            IF g_VPD_validation_mode OR&#10;--               NVL(l_off_prob_areas_OLD, t_tab_ORGANISATIONS()) &lt;&gt; NVL(l_off_prob_areas_NEW, t_tab_ORGANISATIONS())&#10;--            THEN&#10;                IF PKG_Debug.funcgetDebugMode &lt;&gt; &#39;0&#39; THEN&#10;                    procDebug(&#39;procRebuildOffProbAreas: ORGS field has been changed - calling PKG_TriggerSupport.procUpdateProbationAreas_ALL(&#39; || l_offenders_arr(l_i) || &#39;)&#39;);&#10;                END IF;&#10;                -- YF: Cascade update of the ORGANISATIONS field for all Offender based tables that are VPD registered&#10;                procUpdateProbationAreas_ALL(&#10;                    p_offender_id   =&gt; l_offenders_arr(l_i),&#10;                    p_ORGANISATIONS =&gt; l_off_prob_areas_NEW );&#10;            --ELSE&#10;            --    procDebug(&#39;procRebuildOffProbAreas_JOB: OFFENDER [&#39; || l_offenders_arr(l_i) || &#39;]&#39; ||&#10;            --        &#39; already has up to date ORGANISATIONS [&#39; || PKG_LstUtl.get_array_2_list(l_off_prob_areas_OLD) || &#39;]=[&#39; || PKG_LstUtl.get_array_2_list(l_off_prob_areas_NEW) || &#39;]&#39;);&#10;--            END IF;&#10;            --&#10;            g_VPD_validation_mode := FALSE;&#10;            --&#10;        EXCEPTION WHEN NO_DATA_FOUND THEN&#10;            --&#10;            g_VPD_validation_mode := FALSE;&#10;            --&#10;            procDebug(&#39;procRebuildOffProbAreas_JOB WARNING: OFFENDER [&#39; || l_offenders_arr(l_i) || &#39;] has not been found&#39;);&#10;            raise_application_error(-20001, &#39;procRebuildOffProbAreas_JOB WARNING: OFFENDER [&#39; || l_offenders_arr(l_i) || &#39;] has not been found&#39;);&#10;        WHEN OTHERS THEN&#10;            --&#10;            g_VPD_validation_mode := FALSE;&#10;            RAISE;&#10;            --&#10;        END;&#10;    END LOOP;&#10;    --&#10;EXCEPTION WHEN OTHERS THEN&#10;    procDebug(&#39;procRebuildOffProbAreas ERROR: &#39; || SQLERRM);&#10;    RAISE;&#10;END procRebuildOffProbAreas;&#10;&#10;PROCEDURE procFindAPFromGroup(&#10;    p_offender_ID                 NUMBER,&#10;    p_approvedPremisesReferral_ID NUMBER,&#10;    p_referralGroup_ID            NUMBER)&#10;AS&#10;    CURSOR cs IS&#10;      SELECT DISTINCT rap.probation_area_id, rap.training_session_id&#10;      FROM r_approved_premises rap, r_ap_referral_group raprg&#10;      WHERE RAPRG.standard_reference_list_id = p_referralGroup_ID&#10;        AND RAP.approved_premises_id = RAPRG.approved_premises_id;&#10;    --&#10;    l_prob_area_id NUMBER;&#10;    l_training_session_id NUMBER;&#10;    --&#10;BEGIN&#10;    OPEN cs;&#10;    LOOP&#10;        FETCH cs INTO l_prob_area_id, l_training_session_id;&#10;        EXIT WHEN cs%NOTFOUND;&#10;        --&#10;        procInsertOffenderRecord(&#10;          p_offender_id         =&gt; p_offender_ID,&#10;          p_probation_area_id   =&gt; l_prob_area_id,&#10;          p_training_session_id =&gt; l_training_session_id);&#10;    END LOOP;&#10;    CLOSE cs;&#10;    --&#10;END procFindAPFromGroup;&#10;--&#10;&#10;&#10;--============================================================================--&#10;-- CASELOAD Rebuild suport subroutines&#10;--============================================================================--&#10;&#10;-- -----------------------------------------------------------------------------&#10;--&#10;-- Description: A procedure to rebuild the Officer Caseload optimisation table&#10;--&#10;-- -----------------------------------------------------------------------------&#10;PROCEDURE procRebuildCaseloadTable(p_offender_ID NUMBER)&#10;IS&#10;BEGIN&#10;    do_rebuild_caseload(p_offender_id);&#10;END procRebuildCaseloadTable;&#10;&#10;PROCEDURE procFetchCaseloadRecords(p_offender_id IN NUMBER, p_tab OUT t_tab_ORGANISATIONS) IS&#10;BEGIN&#10;    SELECT CASELOAD_ID BULK COLLECT INTO p_tab&#10;    FROM caseload&#10;    WHERE offender_id = p_offender_id;&#10;END procFetchCaseloadRecords;&#10;&#10;PROCEDURE procCaseloadAddOffender(p_offender_id NUMBER)&#10;IS&#10;    l_offender_id  VARCHAR2(100);&#10;BEGIN&#10;    l_offender_id := TO_CHAR(p_offender_id);&#10;    IF NOT g_tab_caseload_offender_list.EXISTS(l_offender_id) THEN&#10;        procDebug(&#39;procCaseloadAddOffender: Add new caseload offender ID=&#39; || l_offender_id);&#10;        g_tab_caseload_offender_list(l_offender_id) := &#39;Y&#39;;&#10;    END IF;&#10;    PKG_VPD_CTX.set_table_value(&#39;CASELOAD_REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;END procCaseloadAddOffender;&#10;&#10;FUNCTION funcGetRebuildCaseload_OFF_lst RETURN VARCHAR2&#10;IS&#10;    l_offender_id NUMBER;&#10;    l_ret         VARCHAR2(4000);&#10;BEGIN&#10;    l_offender_id := g_tab_caseload_offender_list.FIRST;&#10;    LOOP&#10;        EXIT WHEN l_offender_id IS NULL;&#10;        --&#10;        l_ret := SUBSTR(l_ret || CASE WHEN empty2null(l_ret) IS NOT NULL THEN &#39;, &#39; END || l_offender_id, 1, 4000);&#10;        --&#10;        l_offender_id := g_tab_caseload_offender_list.NEXT(l_offender_id);&#10;    END LOOP;&#10;    RETURN l_ret;&#10;END funcGetRebuildCaseload_OFF_lst;&#10;--&#10;FUNCTION get_offender_id_max_val RETURN NUMBER RESULT_CACHE&#10;IS&#10;    l_res NUMBER;&#10;BEGIN&#10;    SELECT MAX_VALUE INTO l_res&#10;    FROM user_sequences WHERE sequence_name = &#39;OFFENDER_ID_SEQ&#39;;&#10;    RETURN l_res;&#10;END get_offender_id_max_val;&#10;--&#10;FUNCTION getOffTAB(p_tab_type VARCHAR2) RETURN t_tab_ORGANISATIONS&#10;IS&#10;    l_offender_id VARCHAR2(100);&#10;    l_TAB_OFF     t_tab_OFFENDERS;&#10;    l_TAB         t_tab_ORGANISATIONS := t_tab_ORGANISATIONS();&#10;BEGIN&#10;    --&#10;    IF    p_tab_type = &#39;CASELOAD&#39; THEN&#10;        l_TAB_OFF := g_tab_caseload_offender_list;&#10;    ELSIF p_tab_type = &#39;COHORT&#39; THEN&#10;        l_TAB_OFF := g_tab_cohort_offender_list;&#10;    ELSE&#10;        raise_application_error(-20001, &#39;ERROR in PKG_TriggerSupport.getOffTAB: invalid value for the P_TAB_TYPE argument&#39;);&#10;    END IF;&#10;    --&#10;    l_offender_id := l_TAB_OFF.FIRST;&#10;    LOOP&#10;        EXIT WHEN l_offender_id IS NULL;&#10;        --&#10;        SELECT l_TAB MULTISET UNION DISTINCT t_tab_ORGANISATIONS(l_offender_id)&#10;        INTO l_TAB&#10;        FROM dual;&#10;        --&#10;        l_offender_id := l_TAB_OFF.NEXT(l_offender_id);&#10;        --&#10;    END LOOP;&#10;    --&#10;    RETURN l_TAB;&#10;    --&#10;END getOffTAB;&#10;--&#10;PROCEDURE procRebuildCaseloadTable_OFF&#10;IS&#10;    l_offender_id VARCHAR2(100);&#10;    l_TAB         t_tab_ORGANISATIONS;&#10;BEGIN&#10;    --&#10;    l_TAB := getOffTAB(&#39;CASELOAD&#39;);&#10;    --&#10;    FOR l_idx IN 1..l_TAB.COUNT LOOP&#10;        l_offender_id := l_TAB(l_idx);&#10;        --&#10;        PKG_VPD_CTX.set_table_value(&#39;CASELOAD_REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;        procDebug(&#39;procRebuildCaseloadTable_OFF: Rebuilding CASELOAD for offender_id=&#39; || l_offender_id);&#10;        --&#10;        procRebuildCaseloadTable(p_offender_ID =&gt; TO_NUMBER(l_offender_id));&#10;        --&#10;    END LOOP;&#10;    --&#10;    g_tab_caseload_offender_list.DELETE;&#10;    --&#10;END procRebuildCaseloadTable_OFF;&#10;--&#10;PROCEDURE procRebuildCaseloadTable_ALL(p_offender_ID_from NUMBER DEFAULT NULL, p_offender_ID_to NUMBER DEFAULT NULL)&#10;IS&#10;--&#10;    l_offender_id      NUMBER;&#10;    l_offender_id_from NUMBER;&#10;    l_offender_id_to   NUMBER;&#10;    --&#10;    CURSOR cs IS&#10;      SELECT T.offender_id&#10;      FROM (SELECT offender_id&#10;            FROM offender&#10;            WHERE current_disposal = 1&#10;            MINUS&#10;            SELECT offender_id&#10;            FROM caseload) T&#10;      WHERE T.offender_id BETWEEN l_offender_id_from AND l_offender_id_to;&#10;    --&#10;BEGIN&#10;    --&#10;    l_offender_id_from := NVL(p_offender_ID_from, 0);&#10;    l_offender_id_to   := NVL(p_offender_ID_to, get_offender_id_max_val);&#10;    --&#10;    OPEN cs;&#10;    LOOP&#10;        FETCH cs INTO l_offender_id;&#10;        EXIT WHEN cs%NOTFOUND;&#10;        --&#10;        PKG_VPD_CTX.set_table_value(&#39;CASELOAD_REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;        procRebuildCaseloadTable(p_offender_ID =&gt; l_offender_id);&#10;        --COMMIT;&#10;    END LOOP;&#10;    CLOSE cs;&#10;END procRebuildCaseloadTable_ALL;&#10;--&#10;--&#10;--============================================================================--&#10;-- COHORT_DIARY Rebuild suport subroutines&#10;--============================================================================--&#10;PROCEDURE procCohortAddOffender(p_offender_id NUMBER)&#10;IS&#10;    l_offender_id  VARCHAR2(100);&#10;BEGIN&#10;    l_offender_id := TO_CHAR(p_offender_id);&#10;    IF NOT g_tab_cohort_offender_list.EXISTS(l_offender_id) THEN&#10;        procDebug(&#39;procCohortAddOffender: Add new COHORT_DIARY offender ID=&#39; || l_offender_id);&#10;        g_tab_cohort_offender_list(l_offender_id) := &#39;Y&#39;;&#10;        --&#10;    END IF;&#10;    PKG_VPD_CTX.set_table_value(&#39;COHORT_REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;END procCohortAddOffender;&#10;--&#10;PROCEDURE procRebuildCohortTable(p_offender_id NUMBER)&#10;IS&#10;BEGIN&#10;    do_rebuild_cohort_diary(p_offender_id);&#10;END procRebuildCohortTable;&#10;--&#10;PROCEDURE procRebuildCohortTable_OFF&#10;IS&#10;    l_offender_id VARCHAR2(100);&#10;    l_TAB         t_tab_ORGANISATIONS;&#10;BEGIN&#10;    --&#10;    l_TAB := getOffTAB(&#39;COHORT&#39;);&#10;    --&#10;    FOR l_idx IN 1..l_TAB.COUNT LOOP&#10;        l_offender_id := l_TAB(l_idx);&#10;        --&#10;        PKG_VPD_CTX.set_table_value(&#39;COHORT_REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;        procDebug(&#39;procRebuildCohortTable_OFF: Rebuilding COHORT_DIARY for offender_id=&#39; || l_offender_id);&#10;        --&#10;        procRebuildCohortTable(p_offender_ID =&gt; TO_NUMBER(l_offender_id));&#10;        --&#10;    END LOOP;&#10;    --&#10;    g_tab_cohort_offender_list.DELETE;&#10;    --&#10;END procRebuildCohortTable_OFF;&#10;--&#10;FUNCTION funcGetRebuildCohort_OFF_lst RETURN VARCHAR2&#10;IS&#10;    l_offender_id NUMBER;&#10;    l_ret         VARCHAR2(4000);&#10;BEGIN&#10;    l_offender_id := g_tab_cohort_offender_list.FIRST;&#10;    LOOP&#10;        EXIT WHEN l_offender_id IS NULL;&#10;        --&#10;        l_ret := SUBSTR(l_ret || CASE WHEN l_ret IS NOT NULL THEN &#39;, &#39; END || l_offender_id, 1, 4000);&#10;        --&#10;        l_offender_id := g_tab_cohort_offender_list.NEXT(l_offender_id);&#10;    END LOOP;&#10;    RETURN l_ret;&#10;END funcGetRebuildCohort_OFF_lst;&#10;--&#10;PROCEDURE procRebuildCohortTable_ALL(p_offender_ID_from NUMBER DEFAULT NULL, p_offender_ID_to NUMBER DEFAULT NULL)&#10;IS&#10;    --&#10;    l_offender_id      NUMBER;&#10;    l_offender_id_from NUMBER;&#10;    l_offender_id_to   NUMBER;&#10;    --&#10;    TYPE l_cur_TYP IS REF CURSOR;&#10;    l_cur l_cur_TYP;&#10;    --&#10;    l_SQL VARCHAR2(10000);&#10;    --&#10;BEGIN&#10;    --&#10;    l_offender_id_from := NVL(p_offender_ID_from, 0);&#10;    l_offender_id_to   := NVL(p_offender_ID_to, get_offender_id_max_val);&#10;    --&#10;    l_SQL :=&#10;    --&#10;&#39;WITH T AS (&#10;  SELECT offender_id&#10;  FROM offender&#10;  WHERE 1=1&#10;  MINUS&#10;  SELECT offender_id&#10;  FROM cohort_diary )&#10;SELECT offender_id&#10;FROM T&#10;WHERE T.offender_id BETWEEN :p_offender_id_from AND :p_offender_id_to&#10;  AND EXISTS(&#10;  --&#10;    &#39; || REPLACE(PKG_Caseload.get_cohort_diary_SQL(p_offender_id_only_flag=&gt;&#39;Y&#39;), &#39;:p_offender_id&#39;, &#39;T.offender_id&#39;) || &#39;&#10;  --&#10;  )&#39;;&#10;    --&#10;    IF G_DEBUG_FLAG THEN&#10;        info(&#39;SQL: &#39; || l_SQL, p_proc=&gt;&#39;procRebuildCohortTable_ALL&#39;, p_trace_level=&gt;1);&#10;    END IF;&#10;    --&#10;    OPEN l_cur FOR l_SQL USING l_offender_id_from, l_offender_id_to;&#10;    LOOP&#10;        FETCH l_cur INTO l_offender_id;&#10;        EXIT WHEN l_cur%NOTFOUND;&#10;        --&#10;        PKG_VPD_CTX.set_table_value(&#39;COHORT_REBUILD_REQUIRED&#39;,&#39;Y&#39;);&#10;        procRebuildCohortTable(p_offender_ID =&gt; l_offender_id);&#10;        --COMMIT;&#10;    END LOOP;&#10;    CLOSE l_cur;&#10;    --&#10;END procRebuildCohortTable_ALL;&#10;--&#10;PROCEDURE procRebuildRejTransfersDiary(p_offender_id NUMBER)&#10;IS&#10;BEGIN&#10;    do_rebuild_rej_transfers_diary(p_offender_id);&#10;END procRebuildRejTransfersDiary;&#10;&#10;--&#10;--&#10;--&#10;--============================================================================--&#10;--    TRUST_PROVIDER_FLAG / TRUST_PROVIDER_TEAM_ID / STAFF_EMPLOYEE_ID /&#10;--    PROBATION_AREA_ID maintenance subroutines&#10;--============================================================================--&#10;&#10;FUNCTION funcGetTeamProbAreaID(p_team_id NUMBER)&#10;RETURN NUMBER&#10;IS&#10;BEGIN&#10;    RETURN&#10;        PKG_Lookups.funcgetTabRecord_CACHED(&#10;            p_table       =&gt; &#39;team&#39;,&#10;            p_ref_col     =&gt; &#39;team_id&#39;,&#10;            p_ref_val     =&gt; TO_CHAR(p_team_id),&#10;            p_data_fld    =&gt; &#39;probation_area_id&#39;,&#10;            p_default_val =&gt; &#39;-1&#39; );&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    raise_application_error(-20001, &#39;FATAL ERROR in PKG_TriggerSupport.funcGetTeamProbAreaID: NO_DATA_FOUND for TEAM_ID=&#39; || p_team_id);&#10;END funcGetTeamProbAreaID;&#10;&#10;FUNCTION funcGetProvTeamProbAreaID(p_provider_team_id NUMBER)&#10;RETURN NUMBER&#10;IS&#10;BEGIN&#10;    RETURN&#10;        PKG_Lookups.funcgetTabRecord_CACHED(&#10;            p_table       =&gt; &#39;provider_team&#39;,&#10;            p_ref_col     =&gt; &#39;provider_team_id&#39;,&#10;            p_ref_val     =&gt; TO_CHAR(p_provider_team_id),&#10;            p_data_fld    =&gt; &#39;probation_area_id&#39;,&#10;            p_default_val =&gt; &#39;-1&#39; );&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    raise_application_error(-20001, &#39;FATAL ERROR in PKG_TriggerSupport.funcGetProvTeamProbAreaID: NO_DATA_FOUND for PROVIDER_TEAM_ID=&#39; || p_provider_team_id);&#10;END funcGetProvTeamProbAreaID;&#10;&#10;FUNCTION funcGetProvTeamExtProviderID(p_provider_team_id NUMBER)&#10;RETURN NUMBER&#10;IS&#10;BEGIN&#10;    RETURN&#10;        PKG_Lookups.funcgetTabRecord_CACHED(&#10;            p_table       =&gt; &#39;provider_team&#39;,&#10;            p_ref_col     =&gt; &#39;provider_team_id&#39;,&#10;            p_ref_val     =&gt; TO_CHAR(p_provider_team_id),&#10;            p_data_fld    =&gt; &#39;external_provider_id&#39;,&#10;            p_default_val =&gt; &#39;-1&#39; );&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    raise_application_error(-20001, &#39;FATAL ERROR in PKG_TriggerSupport.funcGetProvTeamExtProviderID: NO_DATA_FOUND for PROVIDER_TEAM_ID=&#39; || p_provider_team_id);&#10;END funcGetProvTeamExtProviderID;&#10;&#10;PROCEDURE procSetTrustStaffTeamArea(&#10;    p_staff_id               IN     NUMBER,&#10;    p_provider_employee_id   IN     NUMBER,&#10;    p_team_id                IN     NUMBER,&#10;    p_provider_team_id       IN     NUMBER,&#10;    p_TRUST_PROVIDER_FLAG    IN OUT NUMBER,&#10;    p_TRUST_PROVIDER_TEAM_ID IN OUT NUMBER,&#10;    p_STAFF_EMPLOYEE_ID      IN OUT NUMBER,&#10;    p_PROBATION_AREA_ID      IN OUT NUMBER)&#10;IS&#10;    l_provider_staff_id      NUMBER;&#10;    l_provider_staff_team_id NUMBER;&#10;    l_probation_area_if      NUMBER;&#10;BEGIN&#10;    IF p_provider_employee_id IS NULL THEN&#10;        --EMPLOYEE&#10;        p_TRUST_PROVIDER_FLAG    := 0;&#10;        p_STAFF_EMPLOYEE_ID      := p_staff_id;&#10;        p_TRUST_PROVIDER_TEAM_ID := p_team_id;&#10;        p_PROBATION_AREA_ID      := funcGetTeamProbAreaID(p_team_id);&#10;    ELSE&#10;        --PROVIDER&#10;        p_TRUST_PROVIDER_FLAG    := 1;&#10;        p_STAFF_EMPLOYEE_ID      := p_provider_employee_id;&#10;        p_TRUST_PROVIDER_TEAM_ID := p_provider_team_id;&#10;        p_PROBATION_AREA_ID      := funcGetProvTeamProbAreaID(p_provider_team_id);&#10;    END IF;&#10;END procSetTrustStaffTeamArea;&#10;&#10;--============================================================================--&#10;--    OFFENDER.current_disposal maintenance subroutines&#10;--============================================================================--&#10;FUNCTION funcGetOffenderCurrentDisposal(p_offender_id NUMBER) RETURN NUMBER&#10;IS&#10;    l_current_disposal NUMBER;&#10;BEGIN&#10;    SELECT NVL(LEAST(COUNT(E.event_id), 1), 0)&#10;    INTO l_current_disposal&#10;    FROM event E, disposal D&#10;    WHERE E.offender_id = p_offender_id&#10;      AND E.soft_deleted = 0&#10;      AND D.event_id = E.event_id&#10;      AND (D.termination_date IS NULL OR D.termination_date &gt; SYSDATE);&#10;    --&#10;    RETURN l_current_disposal;&#10;END funcGetOffenderCurrentDisposal;&#10;&#10;FUNCTION funcGetCurrDispDeferredUpdCNT RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(g_tab_deferred_upd_CURRENT_D.COUNT, 0);&#10;END funcGetCurrDispDeferredUpdCNT;&#10;&#10;PROCEDURE procAddCurrDispDeferred(p_offender_id NUMBER, p_trigger_name VARCHAR2 DEFAULT NULL)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procAddCurrDispDeferred&#39;;&#10;    --&#10;    l_key VARCHAR2(100);&#10;BEGIN&#10;    l_key := TO_CHAR(p_offender_id);&#10;    IF NOT g_tab_deferred_upd_CURRENT_D.EXISTS(l_key) THEN&#10;        procDebug(l_proc || &#39;[&#39; || p_trigger_name || &#39;]: add new offender_id=&#39; || p_offender_id);&#10;        g_tab_deferred_upd_CURRENT_D(l_key) := &#39;Y&#39;;&#10;    END IF;&#10;END procAddCurrDispDeferred;&#10;&#10;PROCEDURE procUpdateOffCurrDisp_DEFERRED(p_trigger_name VARCHAR2 DEFAULT NULL)&#10;IS&#10;    --&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procUpdateOffCurrDisp_DEFERRED&#39;;&#10;    --&#10;    l_key         VARCHAR2(100);&#10;    l_offender_id NUMBER;&#10;    --&#10;    ex_mutating_table EXCEPTION;&#10;    PRAGMA EXCEPTION_INIT (ex_mutating_table, -4091);&#10;    --&#10;    l_tab_deferred_upd_CURRENT_D t_tab_deferred_upd;&#10;    --&#10;BEGIN&#10;    IF g_tab_deferred_upd_CURRENT_D.COUNT &gt; 0 THEN&#10;        l_key := g_tab_deferred_upd_CURRENT_D.FIRST;&#10;        LOOP&#10;            EXIT WHEN empty2null(l_key) IS NULL;&#10;            --&#10;            procDebug(l_proc || &#39;: processing the [&#39; || l_key || &#39;] queue element&#39;);&#10;            --&#10;            BEGIN&#10;                l_offender_id := TO_NUMBER(l_key);&#10;            EXCEPTION WHEN OTHERS THEN&#10;                l_offender_id := -1;&#10;            END;&#10;            --&#10;            IF l_offender_id &lt;= 0  THEN&#10;                raise_application_error(-20001, &#39;ERROR in &#39; || l_proc || &#39; [&#39; || l_key || &#39;]: invalid deferred queue element detected&#39;);&#10;            END IF;&#10;            --&#10;            BEGIN&#10;                procSetOffenderCurrDisposal(p_offender_id=&gt;l_offender_id, p_trigger_name =&gt; p_trigger_name);&#10;            EXCEPTION WHEN ex_mutating_table THEN&#10;                procDebug(l_proc || &#39;: failed to process the [&#39; || l_key || &#39;] queue element {&#39; || SQLERRM || &#39;): keeping in the queue&#39;);&#10;                IF NOT l_tab_deferred_upd_CURRENT_D.EXISTS(l_key) THEN&#10;                    l_tab_deferred_upd_CURRENT_D(l_key) := &#39;Y&#39;;&#10;                END IF;&#10;            END;&#10;            --&#10;            l_key := g_tab_deferred_upd_CURRENT_D.NEXT(l_key);&#10;        END LOOP;&#10;        --&#10;        g_tab_deferred_upd_CURRENT_D.DELETE;&#10;        --&#10;        IF l_tab_deferred_upd_CURRENT_D.COUNT &gt; 0 THEN&#10;            g_tab_deferred_upd_CURRENT_D := l_tab_deferred_upd_CURRENT_D;&#10;        END IF;&#10;        --&#10;    END IF;&#10;END procUpdateOffCurrDisp_DEFERRED;&#10;&#10;PROCEDURE procSetOffenderCurrDisposal(p_offender_id NUMBER, p_trigger_name VARCHAR2 DEFAULT NULL)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procSetOffenderCurrDisposal&#39;;&#10;    --&#10;    l_current_disposal NUMBER;&#10;    --&#10;    ex_mutating_table EXCEPTION;&#10;    PRAGMA EXCEPTION_INIT (ex_mutating_table, -4091);&#10;    l_err_msg VARCHAR2(4000);&#10;    --&#10;    l_key VARCHAR2(100);&#10;    --&#10;BEGIN&#10;    l_current_disposal := funcGetOffenderCurrentDisposal(p_offender_id);&#10;    --&#10;    UPDATE offender SET&#10;      current_disposal = l_current_disposal,&#10;      last_updated_datetime = SYSDATE,&#10;      last_updated_user_id = PKG_LOOKUPS.GetUserID(SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;))&#10;    WHERE offender_id = p_offender_id&#10;      AND NVL(current_disposal, 0) &lt;&gt; l_current_disposal;&#10;    --&#10;    IF SQL%ROWCOUNT &lt;&gt; 0 THEN&#10;        procDebug(l_proc || &#39;(offender_id=&#39; || p_offender_id || &#39;)(trg=&#39; || p_trigger_name || &#39;): set OFFENDER.current_disposal to &#39; || l_current_disposal);&#10;    END IF;&#10;    --&#10;EXCEPTION&#10;    WHEN ex_mutating_table THEN&#10;        procDebug(l_proc || &#39;(offender_id=&#39; || p_offender_id || &#39;)(trg=&#39; || p_trigger_name || &#39;): Adding to the deferred CURRENT_DISPOSAL Updates Queue&#39;);&#10;        procAddCurrDispDeferred(p_offender_id);&#10;    WHEN OTHERS THEN&#10;        l_err_msg := &#39;ERROR in &#39; || l_proc || &#39;[&#39; || p_offender_id || &#39;]:&#39; || CHR(10) || SQLERRM;&#10;        procDebug(l_err_msg);&#10;        raise_application_error(-20001, l_err_msg);&#10;END procSetOffenderCurrDisposal;&#10;--&#10;--&#10;--============================================================================--&#10;--    OFFENDER.current_tier maintenance subroutines&#10;--============================================================================--&#10;--&#10;FUNCTIO
