  --osp_score,&#10;          --    osp_score_i,&#10;          --    osp_score_c,&#10;              osp_level_i_id,&#10;              osp_level_c_id,&#10;              --&#10;              decision_provider_id,&#10;              decision_team_id,&#10;              decision_staff_id,&#10;              --&#10;              row_version,&#10;              --&#10;              created_by_user_id,&#10;              created_datetime,&#10;              last_updated_user_id,&#10;              last_updated_datetime )&#10;            SELECT&#10;              l_case_allocation_id             AS case_allocation_id,&#10;              l_rec.offender_id                AS offender_id,&#10;              l_rec.event_id                   AS event_id,&#10;              --&#10;              l_allocation_decision_id         AS allocation_decision_id,&#10;              NULL                             AS allocation_decision_date,&#10;              --&#10;              p_rsr_assessor_date,&#10;              --&#10;              p_rsr_score,&#10;              l_rsr_level_id,&#10;              --&#10;              --p_osp_score,&#10;          --    p_osp_score_i,&#10;          --    p_osp_score_c,&#10;              l_osp_level_i_id,&#10;              l_osp_level_c_id,&#10;              --&#10;              NULL                             AS decision_provider_id,&#10;              NULL                             AS decision_team_id,&#10;              NULL                             AS decision_staff_id,&#10;              --&#10;              0                                AS row_version,&#10;              --&#10;              LC_USER_ID                       AS created_by_user_id,&#10;              LC_DATE_TIME                     AS created_datetime,&#10;              LC_USER_ID                       AS last_updated_user_id,&#10;              LC_DATE_TIME                     AS last_updated_datetime&#10;            FROM dual;&#10;            --&#10;            do_upd_dyn_rsr_score;&#10;            --&#10;        END do_ins_CAS_non_assessed;&#10;        --&#10;        PROCEDURE do_upd_existing_CAS IS&#10;        BEGIN&#10;            --&#10;            UPDATE case_allocation SET&#10;              rsr_assessor_date = p_rsr_assessor_date,&#10;              --&#10;              rsr_score = p_rsr_score,&#10;              rsr_level_id = l_rsr_level_id,&#10;              --&#10;              --osp_score = p_osp_score,&#10;          --    osp_score_i = p_osp_score_i,&#10;          --    osp_score_c = p_osp_score_c,&#10;              osp_level_i_id = l_osp_level_i_id,&#10;              osp_level_c_id = l_osp_level_c_id,&#10;              --&#10;              row_version = row_version + 1,&#10;              --&#10;              last_updated_user_id  = LC_USER_ID,&#10;              last_updated_datetime = LC_DATE_TIME&#10;              --&#10;            WHERE case_allocation_id = l_rec.case_allocation_id;&#10;            --&#10;            do_upd_dyn_rsr_score;&#10;            --&#10;        END do_upd_existing_CAS;&#10;        --&#10;    BEGIN&#10;        --&#10;        IF l_rec.presentenced_flag = &#39;Y&#39; AND l_rec.case_allocation_id IS NULL THEN&#10;            l_allocation_decision_id := PKG_Lookups.funcgetStdRefListID(&#39;ALLOCATION DECISION&#39;, &#39;N&#39; /*Not Assessed*/);&#10;            do_ins_CAS_non_assessed;&#10;        ELSIF l_rec.presentenced_flag = &#39;Y&#39; AND l_rec.case_allocation_id IS NOT NULL THEN&#10;            do_upd_existing_CAS;&#10;        ELSIF l_rec.case_allocation_id IS NOT NULL THEN&#10;            do_upd_existing_CAS;&#10;            IF NOT (l_rec.terminated_flag = &#39;Y&#39;) OR l_rec.sentenced_flag = &#39;Y&#39; THEN&#10;                PKG_TriggerSupport.procAddCASDeferred(l_rec.offender_id, l_rec.event_id);&#10;                PKG_TriggerSupport.procUpdateCAS_DEFERRED(&#39;procUpdateCAS&#39;);&#10;            END IF;&#10;        ELSIF l_rec.sentenced_flag = &#39;Y&#39; THEN&#10;            PKG_TriggerSupport.procCalculateCAS(&#10;                p_offender_id       =&gt; l_rec.offender_id,&#10;                p_event_id          =&gt; l_rec.event_id,&#10;                p_api_flag          =&gt; &#39;Y&#39;,&#10;                p_rsr_score         =&gt; p_rsr_score,&#10;                p_rsr_level_id      =&gt; PKG_Lookups.funcgetStdRefListID(&#39;RSR LEVEL&#39;, p_rsr_level_code),&#10;                p_osp_level_i_id    =&gt; PKG_Lookups.funcgetStdRefListID(&#39;OSP Level I&#39;, p_osp_level_i_code),&#10;                p_osp_level_c_id    =&gt; PKG_Lookups.funcgetStdRefListID(&#39;OSP LEVEL&#39;, p_osp_level_c_code));&#10;            -- A new CAS and decision is made and rsr/osp scores and levels have been added to the CAS.&#10;            -- The call to procCalculate now handles these type of parameters. Therefore perform a do_upd_existing_CAS&#10;            do_init; -- Run again to pick new CAS&#10;            do_upd_existing_CAS;&#10;        END IF;&#10;        --&#10;    END do_process_CAS_record;&#10;    --&#10;BEGIN&#10;    --&#10;    do_init;&#10;    do_perform_checks;&#10;    do_process_CAS_record;&#10;    --&#10;END procUpdateCAS;&#10;--&#10;--&#10;--============================================================================--&#10;--    VPD &lt;table_name&gt;.ORGANISATIONS field maintenance subroutines&#10;--============================================================================--&#10;--&#10;PROCEDURE procAddOffenderToRebuildList(p_offender_id NUMBER, p_new_probation_area_id NUMBER DEFAULT NULL, p_new_external_provider_id NUMBER DEFAULT NULL)&#10;IS&#10;BEGIN&#10;    -- Synchronous rebuild of the ORGANISATIONS fields&#10;    --IF NOT get_VPD_deferred_flag THEN&#10;        SELECT g_tab_offenders_list MULTISET UNION DISTINCT t_tab_ORGANISATIONS(TO_CHAR(p_offender_id))&#10;        INTO g_tab_offenders_list&#10;        FROM dual;&#10;    --END IF;&#10;    --&#10;END procAddOffenderToRebuildList;&#10;--&#10;PROCEDURE procUpdateProbationAreas(&#10;    p_offender_id         NUMBER,&#10;    p_table_name          VARCHAR2,&#10;    p_update_mode         NUMBER,&#10;    p_ORGANISATIONS_NEW t_tab_ORGANISATIONS,&#10;    p_ORGANISATIONS_OLD t_tab_ORGANISATIONS DEFAULT NULL)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(50) := &#39;PKG_TriggerSupport.procUpdateProbationAreas&#39;;&#10;    --&#10;    l_SQL     VARCHAR2(1024);&#10;    l_rows    NUMBER;&#10;    l_err_msg VARCHAR2(4000);&#10;    --&#10;    l_key             VARCHAR2(100);&#10;    ex_mutating_table EXCEPTION;&#10;    PRAGMA EXCEPTION_INIT (ex_mutating_table, -4091);&#10;    --&#10;BEGIN&#10;    --&#10;    g_VPD_rebuilding_flag := TRUE;&#10;    --&#10;    l_SQL := &#39;UPDATE &#39; || p_table_name || &#39; SET&#39; || CHR(10);&#10;    IF p_update_mode = gc_APPEND THEN&#10;        l_SQL := l_SQL || &#39;  -- Add new areas e.g. {1,2,3} (APPEND) {4,5} = {1,2,3,4,5}&#10;            ORGANISATIONS =&#10;              CAST( CAST(NVL(ORGANISATIONS, t_arr_ORGANISATIONS()) AS t_tab_ORGANISATIONS)&#10;                      MULTISET UNION DISTINCT NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS())&#10;                AS t_arr_ORGANISATIONS)&#39;;&#10;    ELSIF p_update_mode = gc_ASSIGN THEN&#10;        l_SQL := l_SQL || &#39;  -- Replace the whole list with the new values {1,2,3,4,5} (ASSIGN) {8,9} = {8,9}&#10;            ORGANISATIONS = CAST( NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS()) AS t_arr_ORGANISATIONS)&#39;;&#10;    ELSIF p_update_mode = gc_REMOVE THEN&#10;        l_SQL := l_SQL || &#39;  -- Remove exiting area e.g. {1,2,3,4,5} (REMOVE) {3,4} = {1,2,5}&#10;            ORGANISATIONS =&#10;              CAST( CAST(NVL(ORGANISATIONS, t_arr_ORGANISATIONS()) AS t_tab_ORGANISATIONS)&#10;                      MULTISET EXCEPT DISTINCT NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS())&#10;                AS t_arr_ORGANISATIONS)&#39;;&#10;    ELSIF p_update_mode = gc_UPDATE THEN&#10;        l_SQL := l_SQL || &#39;  -- Update exiting area with the new value e.g. {1,2,3,4,5} (UPDATE) (FROM P_ORGANISATIONS_OLD={3,4} TO P_ORGANISATIONS_NEW = {7,8,9} = {1,2,7,8,9,5}&#10;            ORGANISATIONS =&#10;              CAST( CAST(NVL(ORGANISATIONS, t_arr_ORGANISATIONS()) AS t_tab_ORGANISATIONS)&#10;                      MULTISET EXCEPT DISTINCT NVL(:p_ORGANISATIONS_OLD, t_tab_ORGANISATIONS())&#10;                      MULTISET UNION  DISTINCT NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS())&#10;                AS t_arr_ORGANISATIONS)&#39;;&#10;    ELSE&#10;        raise_application_error(-20001, &#39;ERROR in &#39; || l_proc || &#39;: unexpected value for the P_UPDATE_MODE argument [&#39; || p_update_mode || &#39;]&#39;);&#10;    END IF;&#10;    --&#10;    l_SQL := l_SQL || CHR(10) || &#39;WHERE offender_id = :p_offender&#39;;&#10;    --&#10;    IF p_update_mode = gc_ASSIGN THEN&#10;        l_SQL := l_SQL || CHR(10) ||&#10;                 &#39;  AND CAST(NVL(ORGANISATIONS, t_arr_ORGANISATIONS()) AS t_tab_ORGANISATIONS) &lt;&gt; NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS())&#39;;&#10;        EXECUTE IMMEDIATE l_SQL USING p_ORGANISATIONS_NEW, p_offender_id, p_ORGANISATIONS_NEW;&#10;    ELSIF p_update_mode = gc_APPEND THEN&#10;        l_SQL := l_SQL || CHR(10) ||&#10;            &#39;  AND ( CAST(NVL(ORGANISATIONS, t_arr_ORGANISATIONS()) AS t_tab_ORGANISATIONS)&#10;                     MULTISET UNION DISTINCT NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS())&#10;                   ) &lt;&gt; NVL(:p_ORGANISATIONS_NEW, t_tab_ORGANISATIONS())&#39;;&#10;        EXECUTE IMMEDIATE l_SQL USING p_ORGANISATIONS_NEW, p_offender_id, p_ORGANISATIONS_NEW, p_ORGANISATIONS_NEW;&#10;    ELSIF p_update_mode = gc_UPDATE THEN&#10;        EXECUTE IMMEDIATE l_SQL USING p_ORGANISATIONS_OLD, p_ORGANISATIONS_NEW, p_offender_id;&#10;    ELSE&#10;        EXECUTE IMMEDIATE l_SQL USING p_ORGANISATIONS_NEW, p_offender_id;&#10;    END IF;&#10;    --&#10;    l_rows := SQL%ROWCOUNT;&#10;    IF l_rows &gt; 0 THEN&#10;        procDebug(&#39;procUpdateProbationAreas(&#39; || p_offender_id || &#39;, &#39; || p_table_name || &#39;): &#39; || l_rows || &#39; rows updated&#39;);&#10;        IF g_VPD_validation_mode THEN&#10;            /*PKG_Debug.*/procDebug(&#10;                p_print_flag =&gt; &#39;Y&#39;,&#10;                p_msg =&gt; &#39;procUpdateProbationAreas: &#39; ||&#10;                         &#39;VPD_REBUILD [&#39; || p_offender_id      || &#39;]&#39; ||&#10;                                     &#39;[&#39; || p_table_name       || &#39;]&#39; ||&#10;                                     &#39;[&#39; || p_update_mode      || &#39;]&#39; ||&#10;                                     &#39;[&#39; || PKG_LstUtl.get_array_2_list(p_ORGANISATIONS_NEW, p_iterator_function=&gt;&#39;PKG_Lookups.funcgetTabRecord_CACHED(p_table=&gt;&#39;&#39;PROBATION_AREA&#39;&#39;, p_ref_col=&gt;&#39;&#39;probation_area_id&#39;&#39;, p_ref_val=&gt;:p_probation_area_id, p_data_fld=&gt;&#39;&#39;CODE&#39;&#39;)&#39;) || &#39;]&#39; ||&#10;                                     &#39;[&#39; || PKG_LstUtl.get_array_2_list(p_ORGANISATIONS_OLD, p_iterator_function=&gt;&#39;PKG_Lookups.funcgetTabRecord_CACHED(p_table=&gt;&#39;&#39;PROBATION_AREA&#39;&#39;, p_ref_col=&gt;&#39;&#39;probation_area_id&#39;&#39;, p_ref_val=&gt;:p_probation_area_id, p_data_fld=&gt;&#39;&#39;CODE&#39;&#39;)&#39;) || &#39;]&#39; ||&#10;                                     &#39;[&#39; || l_rows || &#39; rows updated&#39;             || &#39;]&#39; );&#10;        END IF;&#10;    END IF;&#10;    --&#10;    g_VPD_rebuilding_flag := FALSE;&#10;    --&#10;    --PKG_Lookups.do_flush_TAB_cache;&#10;    --&#10;EXCEPTION&#10;    WHEN ex_mutating_table THEN&#10;        --&#10;        g_VPD_rebuilding_flag := FALSE;&#10;        --&#10;        l_key := p_table_name || &#39;:&#39; || p_offender_id;&#10;        procDebug(&#39;procUpdateProbationAreas(&#39; || l_key || &#39;): Adding to the deferred ORGANISATIONS Updates Queue&#39;);&#10;        IF NOT g_tab_deferred_upd_VPD.EXISTS(l_key) THEN&#10;            g_tab_deferred_upd_VPD(l_key) := &#39;Y&#39;;&#10;        END IF;&#10;        --&#10;    WHEN OTHERS THEN&#10;        --&#10;        g_VPD_rebuilding_flag := FALSE;&#10;        --&#10;        l_err_msg := SUBSTR(&#10;                        &#39;ERROR in &#39; || l_proc || &#39;: &#39; || SQLERRM || CHR(10) ||&#10;                        &#39;[&#39; || p_offender_id      || &#39;]&#39; ||&#10;                        &#39;[&#39; || p_table_name       || &#39;]&#39; ||&#10;                        &#39;[&#39; || p_update_mode      || &#39;]&#39; ||&#10;                        &#39;[&#39; || PKG_LstUtl.get_array_2_list(p_ORGANISATIONS_NEW, p_iterator_function=&gt;&#39;PKG_Lookups.funcgetTabRecord_CACHED(p_table=&gt;&#39;&#39;PROBATION_AREA&#39;&#39;, p_ref_col=&gt;&#39;&#39;probation_area_id&#39;&#39;, p_ref_val=&gt;:p_probation_area_id, p_data_fld=&gt;&#39;&#39;CODE&#39;&#39;)&#39;) || &#39;]&#39; ||&#10;                        &#39;[&#39; || PKG_LstUtl.get_array_2_list(p_ORGANISATIONS_OLD, p_iterator_function=&gt;&#39;PKG_Lookups.funcgetTabRecord_CACHED(p_table=&gt;&#39;&#39;PROBATION_AREA&#39;&#39;, p_ref_col=&gt;&#39;&#39;probation_area_id&#39;&#39;, p_ref_val=&gt;:p_probation_area_id, p_data_fld=&gt;&#39;&#39;CODE&#39;&#39;)&#39;) || &#39;]&#39; || CHR(10) ||&#10;                        l_SQL,&#10;                        1, 4000 );&#10;        raise_application_error(-20001, l_err_msg);&#10;        --&#10;END procUpdateProbationAreas;&#10;--&#10;PROCEDURE procUpdateProbationAreas(p_offender_id NUMBER, p_table_name VARCHAR2) IS&#10;BEGIN&#10;    procUpdateProbationAreas(&#10;        p_offender_id       =&gt; p_offender_id,&#10;        p_table_name        =&gt; p_table_name,&#10;        p_update_mode       =&gt; gc_ASSIGN,&#10;        p_ORGANISATIONS_NEW =&gt; PKG_VpdSupport.funcGetOffProbAreas_NOCACHE(p_offender_id) );&#10;END procUpdateProbationAreas;&#10;--&#10;FUNCTION get_off_area_counter RETURN NUMBER IS&#10;BEGIN&#10;    RETURN g_off_area_counter;&#10;END get_off_area_counter;&#10;--&#10;PROCEDURE inc_off_area_counter IS&#10;BEGIN&#10;    g_off_area_counter := g_off_area_counter + 1;&#10;END inc_off_area_counter;&#10;--&#10;PROCEDURE procUpdateProbationAreas IS&#10;BEGIN&#10;    IF g_tab_offenders_list.COUNT &gt; 0 THEN&#10;        procDebug(&#39;procUpdateProbationAreas: processing the TAB_OFFENDERS_LIST queue elements&#39;);&#10;        procRebuildOffProbAreas;&#10;        g_off_area_counter := 0;&#10;        g_tab_offenders_list.DELETE;&#10;    END IF;&#10;END procUpdateProbationAreas;&#10;--&#10;FUNCTION funcGetVpdDeferredUpdatesCNT RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(g_tab_deferred_upd_VPD.COUNT, 0);&#10;END;&#10;&#10;PROCEDURE procUpdateProbAreas_DEFERRED&#10;IS&#10;    l_key         VARCHAR2(100);&#10;    l_pos         NUMBER;&#10;    l_table_name  VARCHAR2(30);&#10;    l_offender_id NUMBER;&#10;BEGIN&#10;    IF funcGetVpdDeferredUpdatesCNT &gt; 0 THEN&#10;        l_key := g_tab_deferred_upd_VPD.FIRST;&#10;        LOOP&#10;            EXIT WHEN empty2null(l_key) IS NULL;&#10;            --&#10;            procDebug(&#39;procUpdateProbAreas_DEFERRED: processing the [&#39; || l_key || &#39;] deferred queue element&#39;);&#10;            --&#10;            l_pos := NVL(INSTR(l_key, &#39;:&#39;), 0);&#10;            IF l_pos = 0 THEN&#10;                raise_application_error(-20001, &#39;ERROR in procUpdateProbationAreas_DEFERRED[&#39; || l_key || &#39;]: invalid deferred queue element detected&#39;);&#10;            END IF;&#10;            l_table_name  := TRIM(SUBSTR(empty2null(TRIM(l_key)), 1, l_pos - 1));&#10;            l_offender_id := NVL(TO_NUMBER(empty2null(TRIM(SUBSTR(l_key, l_pos + 1)))), 0);&#10;            --&#10;            IF l_offender_id = 0 OR empty2null(l_table_name) IS NULL THEN&#10;                raise_application_error(-20001, &#39;ERROR in procUpdateProbationAreas_DEFERRED[&#39; || l_key || &#39;][&#39; || l_pos || &#39;]: invalid deferred queue element detected&#39;);&#10;            END IF;&#10;            --&#10;            procUpdateProbationAreas(p_offender_id=&gt;l_offender_id, p_table_name=&gt;l_table_name);&#10;            --&#10;            l_key := g_tab_deferred_upd_VPD.NEXT(l_key);&#10;        END LOOP;&#10;        --&#10;        g_tab_deferred_upd_VPD.DELETE;&#10;    END IF;&#10;END procUpdateProbAreas_DEFERRED;&#10;--&#10;PROCEDURE procUpdateProbationAreas_ALL(p_offender_id NUMBER, p_ORGANISATIONS t_tab_ORGANISATIONS, p_update_mode NUMBER DEFAULT gc_ASSIGN)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(55) := &#39;PKG_TriggerSupport.procUpdateProbationAreas_ALL&#39;;&#10;    --&#10;    l_i BINARY_INTEGER;&#10;BEGIN&#10;    l_i := g_tab_vpd_tables.FIRST;&#10;    --FOR l_i IN g_tab_vpd_tables.FIRST .. g_tab_vpd_tables.LAST LOOP&#10;    LOOP&#10;        EXIT WHEN l_i IS NULL;&#10;        --&#10;        procUpdateProbationAreas(&#10;            p_offender_id       =&gt; p_offender_id,&#10;            p_table_name        =&gt; g_tab_vpd_tables(l_i),&#10;            p_update_mode       =&gt; NVL(p_update_mode, gc_ASSIGN),&#10;            p_ORGANISATIONS_NEW =&gt; p_ORGANISATIONS);&#10;        --&#10;        l_i := g_tab_vpd_tables.NEXT(l_i);&#10;        --&#10;    END LOOP;&#10;END procUpdateProbationAreas_ALL;&#10;--&#10;PROCEDURE procUpdateProbationAreas_ALL(p_offender_id NUMBER)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(55) := &#39;PKG_TriggerSupport.procUpdateProbationAreas_ALL&#39;;&#10;    --&#10;    l_i      BINARY_INTEGER;&#10;    --&#10;BEGIN&#10;    --&#10;    l_i := g_tab_vpd_tables.FIRST;&#10;    --FOR l_i IN g_tab_vpd_tables.FIRST .. g_tab_vpd_tables.LAST LOOP&#10;    LOOP&#10;        EXIT WHEN l_i IS NULL;&#10;        procUpdateProbationAreas(p_offender_id=&gt;p_offender_id, p_table_name=&gt;g_tab_vpd_tables(l_i));&#10;        --&#10;        l_i := g_tab_vpd_tables.NEXT(l_i);&#10;        --&#10;    END LOOP;&#10;END procUpdateProbationAreas_ALL;&#10;--&#10;PROCEDURE procInitVpdTablesInfo IS&#10;BEGIN&#10;    g_tab_vpd_tables.DELETE;&#10;    --&#10;    SELECT DISTINCT table_name&#10;    BULK COLLECT INTO g_tab_vpd_tables&#10;    FROM user_tab_columns TC&#10;    WHERE column_name = &#39;OFFENDER_ID&#39;&#10;      AND table_name NOT IN (&#39;CONTACT&#39;)&#10;      AND EXISTS(&#10;          SELECT 1 FROM user_policies&#10;          WHERE policy_name IN (&#39;FUNCOFFENDERPOLICY&#39;, &#39;FUNCCONTACTPOLICY&#39;)&#10;            AND object_name = TC.table_name)&#10;      AND EXISTS(&#10;          SELECT 1&#10;          FROM user_tab_columns&#10;          WHERE table_name = TC.table_name&#10;            AND column_name = UPPER(&#39;ORGANISATIONS&#39;) )&#10;    ORDER BY 1;&#10;END procInitVpdTablesInfo;&#10;--&#10;--&#10;--&#10;--============================================================================--&#10;--    MIS Support subroutines&#10;--============================================================================--&#10;--&#10;&#10;-- CDC SET / CLEAR CONTEXT subroutines&#10;FUNCTION procChangeCapture_GetContext RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(G_CDC_CTX, GC_CDC_CTX_NONE);&#10;END procChangeCapture_GetContext;&#10;&#10;PROCEDURE procChangeCapture_SetContext(p_cdc_ctx NUMBER) IS&#10;BEGIN&#10;    IF NVL(p_cdc_ctx, -99) NOT IN (GC_CDC_CTX_NONE, GC_CDC_CTX_RESEED) THEN&#10;        procDebug(&#39;procChangeCapture_SetContext ERROR: invalid p_cdc_ctx value [&#39; || p_cdc_ctx || &#39;]&#39;);&#10;        raise_application_error(-20001, &#39;procChangeCapture_SetContext ERROR: invalid p_cdc_ctx value [&#39; || p_cdc_ctx || &#39;]&#39;);&#10;    END IF;&#10;    --&#10;    G_CDC_CTX := NVL(p_cdc_ctx, GC_CDC_CTX_NONE);&#10;    --&#10;END procChangeCapture_SetContext;&#10;--&#10;PROCEDURE procSetCDCFlag(p_cdc_flag BOOLEAN) IS&#10;BEGIN&#10;    g_CDC_flag      := NVL(p_cdc_flag, TRUE);&#10;    g_CDC_flag_INIT := TRUE;&#10;END procSetCDCFlag;&#10;&#10;PROCEDURE procChangeCapture_InsRecord(&#10;    p_src_table_name VARCHAR2,&#10;    p_src_key_value  VARCHAR2,&#10;    p_src_ROWID      ROWID,&#10;    p_action         VARCHAR2,&#10;    p_row_version    PLS_INTEGER)&#10;IS&#10;BEGIN&#10;    --&#10;    IF NVL(g_CDC_flag, TRUE) = FALSE THEN&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    EXECUTE IMMEDIATE&#10;       &#39;INSERT INTO CHANGE_CAPTURE (&#10;          change_capture_id,&#10;          source_table,&#10;          source_table_key,&#10;          source_table_rowid,&#10;          action,&#10;          processed_flag,&#10;          row_version)&#10;        VALUES (&#10;          CHANGE_CAPTURE_SEQ.nextval,&#10;          :p_source_table,&#10;          :p_source_table_key,&#10;          :p_source_table_rowid,&#10;          :p_action,&#10;          :p_processed_flag,&#10;          :p_row_version)&#39;&#10;      USING&#10;          p_src_table_name,&#10;          NVLSTR(p_src_key_value, &#39;-1&#39;),&#10;          p_src_ROWID,&#10;          -- Switch U-&gt;I when CDC context is set to GC_CDC_CTX_RESEED mode&#10;          CASE&#10;              WHEN p_action = &#39;U&#39; AND procChangeCapture_GetContext = GC_CDC_CTX_RESEED&#10;              THEN &#39;I&#39;&#10;              ELSE p_action&#10;          END,&#10;          -- Set PROCESSED_FLAG to R when CDC context is set to GC_CDC_CTX_RESEED mode&#10;          CASE&#10;              WHEN procChangeCapture_GetContext = GC_CDC_CTX_RESEED&#10;              THEN &#39;R&#39;&#10;              ELSE &#39;N&#39;&#10;          END,&#10;          --&#10;          NVL(p_row_version, 0);&#10;      --&#10;END procChangeCapture_InsRecord;&#10;--&#10;--&#10;--============================================================================--&#10;--    AP Referral Delta support routines&#10;--============================================================================--&#10;--&#10;FUNCTION get_current_restriction(p_offender_id NUMBER) RETURN NUMBER&#10;IS&#10;    --&#10;    l_rec t_rec_current_restriction_TYP;&#10;    --&#10;BEGIN&#10;    IF g_tab_curent_restriction.EXISTS(p_offender_id) THEN&#10;        l_rec := g_tab_curent_restriction(p_offender_id);&#10;    ELSE&#10;        l_rec.offender_id := p_offender_id;&#10;        l_rec.current_restriction := -1;&#10;    END IF;&#10;    --&#10;    RETURN l_rec.current_restriction;&#10;END get_current_restriction;&#10;--&#10;FUNCTION get_current_restriction_TAB(p_offender_id NUMBER DEFAULT NULL) RETURN t_tab_current_restriction_TYP PIPELINED&#10;IS&#10;    --&#10;    l_offender_id NUMBER;&#10;    l_rec         t_rec_current_restriction_TYP;&#10;    --&#10;BEGIN&#10;    --&#10;    IF p_offender_id IS NOT NULL THEN&#10;        IF g_tab_curent_restriction.EXISTS(p_offender_id) THEN&#10;            --&#10;            l_rec := g_tab_curent_restriction(l_offender_id);&#10;            PIPE ROW (l_rec);&#10;            --&#10;        END IF;&#10;    ELSE&#10;        l_offender_id := g_tab_curent_restriction.FIRST;&#10;        LOOP&#10;            EXIT WHEN l_offender_id IS NULL;&#10;            --&#10;            l_rec := g_tab_curent_restriction(l_offender_id);&#10;            PIPE ROW (l_rec);&#10;            --&#10;            l_offender_id := g_tab_curent_restriction.NEXT(l_offender_id);&#10;        END LOOP;&#10;        --&#10;    END IF;&#10;    --&#10;END get_current_restriction_TAB;&#10;--&#10;PROCEDURE set_current_restriction(p_offender_id NUMBER, p_current_restriction NUMBER)&#10;IS&#10;    --&#10;    l_rec t_rec_current_restriction_TYP;&#10;    --&#10;BEGIN&#10;    l_rec.offender_id := p_offender_id;&#10;    l_rec.current_restriction := p_current_restriction;&#10;    g_tab_curent_restriction(p_offender_id) := l_rec;&#10;END set_current_restriction;&#10;--&#10;PROCEDURE clear_current_restriction(p_offender_id NUMBER DEFAULT NULL) IS&#10;BEGIN&#10;    IF p_offender_id IS NOT NULL THEN&#10;        IF g_tab_curent_restriction.EXISTS(p_offender_id) THEN&#10;            g_tab_curent_restriction.DELETE(p_offender_id);&#10;        END IF;&#10;    ELSE&#10;        g_tab_curent_restriction.DELETE;&#10;    END IF;&#10;END clear_current_restriction;&#10;--&#10;PROCEDURE do_process_ap_ref_delta&#10;IS&#10;    --&#10;    l_offender_id NUMBER;&#10;    l_rec t_rec_current_restriction_TYP;&#10;    --&#10;    PROCEDURE do_check_ap_referrals&#10;    IS&#10;        --&#10;        CURSOR cs IS&#10;          SELECT&#10;            approved_premises_referral_id,&#10;            referral_decision_id&#10;          FROM approved_premises_referral&#10;          WHERE offender_id = l_offender_id&#10;            AND soft_deleted = 0;&#10;        --&#10;        l_ap_premises_referral_id INTEGER;&#10;        l_referral_decision_id INTEGER;&#10;        --&#10;        l_current_restriction NUMBER;&#10;        l_prev_restriction    NUMBER;&#10;        --&#10;    BEGIN&#10;        --&#10;        OPEN cs;&#10;        LOOP&#10;            FETCH cs&#10;            INTO&#10;              l_ap_premises_referral_id,&#10;              l_referral_decision_id;&#10;            EXIT WHEN cs%NOTFOUND;&#10;            --&#10;            SELECT&#10;              CASE WHEN COUNT(1) &gt; 0&#10;                  THEN 1&#10;                  ELSE 0&#10;              END AS current_restriction&#10;            INTO l_current_restriction&#10;            FROM restriction&#10;            WHERE offender_id = l_offender_id&#10;              AND restriction_end_date IS NULL;&#10;            --&#10;            l_prev_restriction := get_current_restriction(l_offender_id);&#10;            IF l_prev_restriction = -1 OR&#10;               l_prev_restriction &lt;&gt; l_current_restriction&#10;            THEN&#10;                --&#10;                IF l_referral_decision_id != PKG_Lookups.funcgetStdRefListID(&#39;REFERRAL DECISION&#39;,&#39;DR&#39;) AND&#10;                   l_referral_decision_id != PKG_Lookups.funcgetStdRefListID(&#39;REFERRAL DECISION&#39;,&#39;RJ&#39;)&#10;                THEN&#10;                    PKG_TriggerSupport.procDebug(&#10;                        &#39;T_AP_DELTA_RESTRICTION_AS.do_process_ap_ref_delta ap_premises_referral_id = &#39; || l_ap_premises_referral_id || &#39; &#39; ||&#10;                        &#39;record inserted into AP_REFERRAL_DELTA&#39; );&#10;                    INSERT INTO ap_referral_delta(&#10;                      ap_referral_delta_id,&#10;                      approved_premises_referral_id,&#10;                      created_datetime,&#10;                      processed_datetime )&#10;                    SELECT&#10;                      AP_REFERRAL_DELTA_ID_SEQ.nextval,&#10;                      l_ap_premises_referral_id,&#10;                      SYSDATE,&#10;                      NULL&#10;                    FROM DUAL&#10;                    WHERE 1=1&#10;                      AND NOT EXISTS (&#10;                          SELECT 1&#10;                          FROM ap_referral_delta&#10;                          WHERE processed_datetime IS NULL&#10;                            AND approved_premises_referral_id = l_ap_premises_referral_id );&#10;                ELSE&#10;                    PKG_TriggerSupport.procDebug(&#10;                        &#39;T_AP_DELTA_RESTRICTION_AS.do_process_ap_ref_delta ap_premises_referral_id = &#39; || l_ap_premises_referral_id || &#39;: &#39; ||&#10;                        &#39;record did not pass the l_prev_restriction &lt;&gt; l_current_restriction check &#39; ||&#10;                        &#39;(&#39; || l_prev_restriction || &#39;, &#39; || l_current_restriction || &#39;)&#39;);&#10;                END IF;&#10;                --&#10;            ELSE&#10;                PKG_TriggerSupport.procDebug(&#10;                    &#39;T_AP_DELTA_RESTRICTION_AS.do_process_ap_ref_delta ap_premises_referral_id = &#39; || l_ap_premises_referral_id || &#39;: &#39; ||&#10;                    &#39;record did not pass the REFERRAL_DECISION NOT IN (DR,RJ) check &#39; ||&#10;                    &#39;(&#39; || l_referral_decision_id || &#39;)&#39;);&#10;            END IF; -- l_prev_restriction &lt;&gt; l_current_restriction&#10;            --&#10;        END LOOP;&#10;        CLOSE cs;&#10;        --&#10;    END do_check_ap_referrals;&#10;    --&#10;BEGIN&#10;    --&#10;    l_offender_id := g_tab_curent_restriction.FIRST;&#10;    LOOP&#10;        EXIT WHEN l_offender_id IS NULL;&#10;        --&#10;        PKG_TriggerSupport.procDebug( &#39;T_AP_DELTA_RESTRICTION_AS.do_process_ap_ref_delta offender_id = &#39; || l_offender_id || &#39; START&#39; );&#10;        do_check_ap_referrals;&#10;        --&#10;        l_offender_id := g_tab_curent_restriction.NEXT(l_offender_id);&#10;    END LOOP;&#10;    clear_current_restriction;&#10;    --&#10;END do_process_ap_ref_delta;&#10;--&#10;&#10;--&#10;-- OD (OFFENDER_DELTA) Support subroutines&#10;--&#10;PROCEDURE OD_create_scheduler_job(p_instance_number INTEGER DEFAULT NULL, p_DROP_ONLY_FLAG VARCHAR2 DEFAULT &#39;N&#39;)&#10;IS&#10;    --&#10;    l_job_name          CONSTANT VARCHAR2(30) := &#39;OFF_DELTA_JOB&#39;;&#10;    l_program_name      CONSTANT VARCHAR2(30) := &#39;OFF_DELTA_PROGRAM&#39;;&#10;    l_schedule_name     CONSTANT VARCHAR2(30) := &#39;OFF_DELTA_SCHEDULE&#39;;&#10;    l_schedule_interval CONSTANT INTEGER      := GREATEST( PKG_Lookups.funcgetNDParameterValue(GC_OFF_DELTA_PURGE_INTERVAL, 24), 1); -- min 1hr&#10;    --&#10;    --PRAGMA AUTONOMOUS_TRANSACTION;&#10;    --&#10;    --&#10;BEGIN&#10;    --&#10;--    OFF_DELTA_stop_workers;&#10;--    DBMS_LOCK.sleep(10);&#10;--    --&#10;    BEGIN&#10;        DBMS_SCHEDULER.drop_job(job_name =&gt; l_job_name, force =&gt; FALSE);&#10;    EXCEPTION WHEN OTHERS THEN&#10;        warn(&#39;Error dropping job [&#39; || l_job_name|| &#39;] &#39; || SQLERRM || &#39;[&#39; || SQLCODE || &#39;]&#39;);&#10;    END;&#10;    --&#10;    BEGIN&#10;        DBMS_SCHEDULER.drop_program(program_name =&gt; l_program_name, force =&gt; FALSE);&#10;    EXCEPTION WHEN OTHERS THEN&#10;        warn(&#39;Error dropping program [&#39;||l_program_name||&#39;] &#39;|| SQLERRM || &#39;[&#39; || SQLCODE || &#39;]&#39;);&#10;    END;&#10;    --&#10;    BEGIN&#10;        DBMS_SCHEDULER.drop_schedule(schedule_name =&gt; l_schedule_name, force =&gt; FALSE);&#10;    EXCEPTION WHEN OTHERS THEN&#10;        warn(&#39;Error dropping schedule [&#39; || l_schedule_name|| &#39;] &#39; || SQLERRM || &#39;[&#39; || SQLCODE || &#39;]&#39;);&#10;    END;&#10;    --&#10;    IF p_DROP_ONLY_FLAG = &#39;Y&#39; THEN&#10;--        OFF_DELTA_clear_stop_flags;&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    DBMS_SCHEDULER.CREATE_SCHEDULE(&#10;        schedule_name   =&gt; l_schedule_name,&#10;        start_date      =&gt; SYSDATE,&#10;        repeat_interval =&gt; &#39;FREQ=HOURLY;INTERVAL=&#39; || l_schedule_interval,&#10;        end_date        =&gt; NULL,&#10;        comments        =&gt; &#39;Offender Delta Data Purge Schedule&#39; );&#10;    --&#10;    IF 1=1 /*SPGConfig.PRFMultiThreadActive*/ THEN&#10;        --&#10;        DBMS_SCHEDULER.create_program(&#10;            program_name        =&gt; l_program_name,&#10;            program_action      =&gt; &#39;PKG_TriggerSupport.od_purge_old_data&#39;,&#10;            program_type        =&gt; &#39;stored_procedure&#39;,&#10;            number_of_arguments =&gt; 0,&#10;            enabled             =&gt; FALSE );&#10;        --&#10;--        DBMS_SCHEDULER.define_program_argument(&#10;--            program_name      =&gt; l_program_name,&#10;--            argument_name     =&gt; &#39;maxthreads_in&#39;,&#10;--            argument_position =&gt; 1,&#10;--            argument_type     =&gt; &#39;NUMBER&#39; );&#10;        --&#10;        DBMS_SCHEDULER.enable(name =&gt; l_program_name);&#10;        --&#10;--  job_name                IN VARCHAR2,&#10;--  program_name            IN VARCHAR2,&#10;--  schedule_name           IN VARCHAR2,&#10;--  job_class               IN VARCHAR2              DEFAULT &#39;DEFAULT_JOB_CLASS&#39;,&#10;--  enabled                 IN BOOLEAN                  DEFAULT FALSE,&#10;--  auto_drop               IN BOOLEAN                  DEFAULT TRUE,&#10;--  comments                 IN VARCHAR2                 DEFAULT NULL,&#10;--  job_style               IN VARCHAR2                 DEFAULT &#39;REGULAR&#39;,&#10;--  credential_name         IN VARCHAR2                 DEFAULT NULL,&#10;--  destination_name        IN VARCHAR2                 DEFAULT NULL);&#10;&#10;        DBMS_SCHEDULER.create_job(&#10;            job_name      =&gt; l_job_name,&#10;            program_name  =&gt; l_program_name,&#10;            schedule_name =&gt; l_schedule_name,&#10;            --job_type      =&gt; &#39;PLSQL_BLOCK&#39;,&#10;            --start_date    =&gt; SYSDATE,&#10;            enabled       =&gt; FALSE,&#10;            auto_drop     =&gt; TRUE,&#10;            comments      =&gt; &#39;Offender Delta Data Purge Job&#39; );&#10;        --&#10;        IF p_instance_number IS NOT NULL THEN&#10;            -- Set job attribute to single instance number&#10;            DBMS_SCHEDULER.set_attribute(&#10;                name      =&gt; l_job_name,&#10;                attribute =&gt; &#39;instance_id&#39;,&#10;                value     =&gt; p_instance_number );&#10;        END IF;&#10;        --&#10;        DBMS_SCHEDULER.set_attribute(&#10;            name      =&gt; l_job_name,&#10;            attribute =&gt; &#39;parallel_instances&#39;,&#10;            value     =&gt; FALSE );&#10;        --&#10;    END IF;&#10;    --&#10;    /* YF: PG version only&#10;    UPDATE PGAGENT.pga_jobstep SET&#10;      jstonerror = &#39;s&#39;&#10;    WHERE jstjobid = ( SELECT jobid FROM PGAGENT.pga_job WHERE jobname = l_job_name );&#10;    */&#10;    --&#10;    COMMIT;&#10;    --&#10;    DBMS_SCHEDULER.enable(l_job_name);&#10;    --&#10;--        OFF_DELTA_clear_stop_flags;&#10;    --&#10;END OD_create_scheduler_job;&#10;--&#10;PROCEDURE OD_config(&#10;    p_DATA_PURGE_INTERVAL   INTEGER DEFAULT NULL,&#10;    p_DATA_RETENTION        INTEGER DEFAULT NULL,&#10;    p_DATA_PURGE_BATCH_SIZE INTEGER DEFAULT NULL )&#10;IS&#10;    --&#10;    PRAGMA AUTONOMOUS_TRANSACTION;&#10;    --&#10;    PROCEDURE do_set_nd_param(p_param VARCHAR2, p_value NUMBER) IS&#10;    BEGIN&#10;        IF p_value &gt;= 0 THEN&#10;            MERGE INTO ND_PARAMETER t0&#10;            USING (&#10;                    SELECT UPPER(TRIM(p_param)) AS nd_parameter, p_value AS nd_value FROM dual&#10;                  ) t1&#10;            ON (t0.nd_parameter = t1.nd_parameter)&#10;            WHEN MATCHED     THEN UPDATE SET t0.nd_value = t1.nd_value&#10;            WHEN NOT MATCHED THEN INSERT (nd_parameter_id            , nd_parameter   , nd_value) VALUES&#10;                                         (nd_parameter_id_SEQ.nextval, t1.nd_parameter, t1.nd_value);&#10;        END IF;&#10;    END do_set_nd_param;&#10;    --&#10;    PROCEDURE do_set_nd_param(p_param VARCHAR2, p_value_str VARCHAR2) IS&#10;    BEGIN&#10;        IF p_value_str IS NOT NULL THEN&#10;            MERGE INTO ND_PARAMETER t0&#10;            USING (&#10;                    SELECT UPPER(TRIM(p_param)) AS nd_parameter, p_value_str AS nd_value_string FROM dual&#10;                  ) t1&#10;            ON (t0.nd_parameter = t1.nd_parameter)&#10;            WHEN MATCHED     THEN UPDATE SET t0.nd_value_string = t1.nd_value_string&#10;            WHEN NOT MATCHED THEN INSERT (nd_parameter_id            , nd_parameter   , nd_value_string) VALUES&#10;                                         (nd_parameter_id_SEQ.nextval, t1.nd_parameter, t1.nd_value_string);&#10;        END IF;&#10;    END do_set_nd_param;&#10;    --&#10;BEGIN&#10;    --&#10;    do_set_nd_param( GC_OFF_DELTA_PURGE_INTERVAL  , p_DATA_PURGE_INTERVAL   );&#10;    do_set_nd_param( GC_OFF_DELTA_RETENTION       , p_DATA_RETENTION        );&#10;    do_set_nd_param( GC_OFF_DELTA_PURGE_BATCH_SIZE, p_DATA_PURGE_BATCH_SIZE );&#10;    --&#10;    COMMIT;&#10;    --&#10;END OD_config;&#10;--&#10;FUNCTION get_od_data_retention RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(PKG_Lookups.funcgetNDParameterValue(GC_OFF_DELTA_RETENTION, 24*30), 24*30);&#10;END get_od_data_retention;&#10;--&#10;FUNCTION get_od_data_purge_batch_size RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(PKG_Lookups.funcgetNDParameterValue(GC_OFF_DELTA_PURGE_BATCH_SIZE, 100000), 1);&#10;END get_od_data_purge_batch_size;&#10;--&#10;PROCEDURE od_purge_old_data(&#10;  p_retention      NUMBER DEFAULT NULL,&#10;  p_max_batch_size INTEGER DEFAULT NULL )&#10;IS&#10;    --&#10;    l_procedure_name VARCHAR2(30) := g_procedure_name;&#10;    --&#10;    l_lock_name   VARCHAR2(30) := &#39;OFF_DELTA_WORKER_LOCK&#39;;&#10;    l_lock_handle VARCHAR2(128);&#10;    l_dummy       PLS_INTEGER;&#10;    --&#10;    PROCEDURE do_allocate_soft_lock IS&#10;    BEGIN&#10;        DBMS_LOCK.allocate_unique(l_lock_name, l_lock_handle);&#10;        l_dummy := DBMS_LOCK.request(l_lock_handle, DBMS_LOCK.x_mode, DBMS_LOCK.maxwait, FALSE);&#10;    END do_allocate_soft_lock;&#10;    --&#10;    PROCEDURE do_release_soft_lock IS&#10;    BEGIN&#10;        l_dummy := DBMS_LOCK.release(l_lock_handle);&#10;    END do_release_soft_lock;&#10;    --&#10;    PROCEDURE do_purge_old_data&#10;    IS&#10;        --&#10;        l_procedure_name1 VARCHAR2(30) := g_procedure_name;&#10;        --&#10;        l_data_retention NUMBER := NVL( p_retention     , get_od_data_retention        );   -- default 30 days; max 30 days&#10;        l_max_batch_size NUMBER := GREATEST(NVL( p_max_batch_size, get_od_data_purge_batch_size ), 1);   -- default 100,000 records;&#10;        --&#10;        l_rows     INTEGER := 0;&#10;        l_rows_tot INTEGER := 0;&#10;        --&#10;        FUNCTION get_retention_char(p_val NUMBER, p_unit VARCHAR2) RETURN VARCHAR2&#10;        IS&#10;            l_str VARCHAR2(100);&#10;        BEGIN&#10;            l_str := TO_CHAR(p_val);&#10;            RETURN&#10;                CASE WHEN NOT ( l_str = &#39;0&#39; OR SUBSTR(l_str, 1, 1) = &#39;.&#39; )&#10;                    THEN l_str || p_unit&#10;                END;&#10;        END get_retention_char;&#10;        --&#10;    BEGIN&#10;        --&#10;        g_procedure_name := &#39;do_purge_old_data&#39;;&#10;        --&#10;        info(&#39;start: data retention = &#39; ||&#10;            PKG_LstUtl.concat(&#10;                get_retention_char(ROUND(l_data_retention*24*60*60, 2), &#39;sec&#39;),&#10;                get_retention_char(ROUND(l_data_retention*24*60   , 2), &#39;min&#39;),&#10;                get_retention_char(ROUND(l_data_retention*24      , 2), &#39;hr&#39;),&#10;                get_retention_char(ROUND(l_data_retention         , 2), &#39;d&#39;),&#10;                p_delim =&gt; &#39; / &#39; )&#10;        );&#10;        --&#10;        LOOP&#10;            --&#10;            DELETE FROM offender_delta&#10;            WHERE created_datetime &lt; SYSDATE - l_data_retention/24&#10;              AND status NOT IN (&#39;CREATED&#39;)&#10;              AND ROWNUM &lt;= 1000 /*l_max_batch_size*/;&#10;            l_rows := NVL(SQL%ROWCOUNT, 0);&#10;            COMMIT;&#10;            --&#10;            l_rows_tot := l_rows_tot + l_rows;&#10;            --&#10;            EXIT WHEN l_rows &lt;= 0 OR l_rows_tot &gt;= l_max_batch_size;&#10;            --&#10;        END LOOP;&#10;        --&#10;        info(l_rows_tot || &#39; rows deleted from OFFENDER_DELTA table&#39;);&#10;        --&#10;        g_procedure_name := l_procedure_name1;&#10;        --&#10;    END do_purge_old_data;&#10;    --&#10;BEGIN&#10;    --&#10;    g_procedure_name := &#39;od_purge_old_data&#39;;&#10;    --&#10;    do_allocate_soft_lock;&#10;    --&#10;    IF SPGConfig.SPGInfoActive THEN&#10;        PKG_Debug.procrecordDbStats_START;&#10;    END IF;&#10;    --&#10;    do_purge_old_data;&#10;    --&#10;    IF SPGConfig.SPGInfoActive THEN&#10;        info(&#39;OFF_DELTA Worker has completed (&#39; || PKG_Debug.funcgetDbStats || &#39;)&#39;);&#10;    END IF;&#10;    --&#10;    do_release_soft_lock;&#10;    --&#10;    g_procedure_name := l_procedure_name;&#10;    --&#10;EXCEPTION WHEN OTHERS THEN&#10;    --&#10;    warn(&#10;        &#39;ERROR [p_retention=&#39; || p_retention || &#39;]: &#39; ||&#10;        SUBSTRB(SQLERRM || CHR(10) || DBMS_UTILITY.format_error_backtrace, 1, 4000) );&#10;    --&#10;    do_release_soft_lock;&#10;    --&#10;    g_procedure_name := l_procedure_name;&#10;    --&#10;END od_purge_old_data;&#10;--&#10;PROCEDURE od_add_record(&#10;    p_offender_id      NUMBER,&#10;    p_source_table     VARCHAR2,&#10;    p_source_record_id NUMBER,&#10;    p_action           VARCHAR2 )&#10;IS&#10;BEGIN&#10;    --&#10;    INSERT INTO offender_delta(&#10;      /*01*/ offender_delta_id,&#10;      /*02*/ offender_id,&#10;      /*03*/ source_table,&#10;      /*04*/ source_record_id,&#10;      /*05*/ date_changed,&#10;      /*06*/ action,&#10;      /*07*/ status,&#10;      /*08*/ created_datetime,&#10;      /*09*/ last_updated_datetime&#10;    ) VALUES (&#10;      /*01*/ offender_delta_id_SEQ.nextval,&#10;      /*02*/ p_offender_id,&#10;      /*03*/ p_source_table,&#10;      /*04*/ p_source_record_id,&#10;      /*05*/ SYSDATE,&#10;      /*06*/ p_action,&#10;      /*07*/ &#39;CREATED&#39;,&#10;      /*08*/ SYSDATE,&#10;      /*09*/ SYSDATE );&#10;    --&#10;END od_add_record;&#10;&#10;--&#10;--&#10;--&#10;PROCEDURE do_init_vars IS&#10;BEGIN&#10;    G_PDM_VERSION := PKG_Global.get_PDM_VERSION;&#10;END do_init_vars;&#10;--&#10;--&#10;--&#10;--&#10;--============================================================================--&#10;--    PKG Initialisation block&#10;--============================================================================--&#10;--&#10;--&#10;BEGIN&#10;    PKG_Global.do_init;&#10;    do_init_vars;&#10;    --&#10;    procInitVpdTablesInfo;&#10;    --&#10;--&#10;--&#10;END pkg_TriggerSupport;</textarea>
