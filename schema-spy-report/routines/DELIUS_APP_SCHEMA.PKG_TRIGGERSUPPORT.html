N funcGetCurrTierDeferredUpdCNT RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(g_tab_deferred_upd_CURRENT_T.COUNT, 0);&#10;END funcGetCurrTierDeferredUpdCNT;&#10;&#10;PROCEDURE procAddCurrTierDeferred(p_offender_id NUMBER, p_trigger_name VARCHAR2 DEFAULT NULL)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procAddCurrTierDeferred&#39;;&#10;    --&#10;    l_key VARCHAR2(100);&#10;BEGIN&#10;    --&#10;    IF p_offender_id IS NULL THEN&#10;        raise_application_error(-20001, &#39;FATAL ERROR in PKG_TriggerSupport.procAddCurrTierDeferred: P_OFFENDER_ID parameter cannot be NULL&#39;);&#10;    END IF;&#10;    --&#10;    l_key := TO_CHAR(p_offender_id);&#10;    IF NOT g_tab_deferred_upd_CURRENT_T.EXISTS(l_key) THEN&#10;        procDebug(l_proc || &#39;[&#39; || p_trigger_name || &#39;]: add new offender_id=&#39; || p_offender_id);&#10;        g_tab_deferred_upd_CURRENT_T(l_key) := &#39;Y&#39;;&#10;    END IF;&#10;    --&#10;END procAddCurrTierDeferred;&#10;&#10;PROCEDURE procUpdateOffCurrTier_DEFERRED(p_trigger_name VARCHAR2 DEFAULT NULL)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procUpdateOffCurrTier_DEFERRED&#39;;&#10;    --&#10;    l_key         VARCHAR2(100);&#10;    l_offender_id NUMBER;&#10;BEGIN&#10;    IF g_tab_deferred_upd_CURRENT_T.COUNT &gt; 0 THEN&#10;        l_key := g_tab_deferred_upd_CURRENT_T.FIRST;&#10;        LOOP&#10;            EXIT WHEN empty2null(l_key) IS NULL;&#10;            --&#10;            procDebug(l_proc || &#39;: processing the [&#39; || l_key || &#39;] queue element&#39;);&#10;            --&#10;            BEGIN&#10;                l_offender_id := TO_NUMBER(l_key);&#10;            EXCEPTION WHEN OTHERS THEN&#10;                l_offender_id := -1;&#10;            END;&#10;            --&#10;            IF l_offender_id &lt;= 0  THEN&#10;                raise_application_error(-20001, &#39;ERROR in &#39; || l_proc || &#39; [&#39; || l_key || &#39;]: invalid deferred queue element detected&#39;);&#10;            END IF;&#10;            --&#10;            UPDATE offender O SET&#10;              O.current_tier = PKG_Lookups.funcgetTabRecord(&#10;                                   p_table      =&gt; &#39;MANAGEMENT_TIER&#39;,&#10;                                   p_ref_col    =&gt; &#39;offender_id&#39;,&#10;                                   p_ref_val    =&gt; l_offender_id,&#10;                                   p_data_fld   =&gt; &#39;tier_id&#39;,&#10;                                   p_where      =&gt; &#39;soft_deleted = 0&#39;,&#10;                                   p_order_by   =&gt; &#39;date_changed DESC, tier_id DESC&#39;)&#10;--                                ( SELECT MT.tier_id&#10;--                                 FROM management_tier MT&#10;--                                 WHERE MT.offender_id = O.offender_id&#10;--                                   AND MT.date_changed = ( SELECT MAX(date_changed)&#10;--                                                           FROM management_tier MT2&#10;--                                                           WHERE MT2.offender_id = MT.offender_id )&#10;--                                   AND ROWNUM &lt;= 1 )&#10;            WHERE offender_id = l_offender_id;&#10;            --&#10;            l_key := g_tab_deferred_upd_CURRENT_T.NEXT(l_key);&#10;        END LOOP;&#10;        --&#10;        g_tab_deferred_upd_CURRENT_T.DELETE;&#10;        --&#10;    END IF;&#10;END procUpdateOffCurrTier_DEFERRED;&#10;&#10;--============================================================================--&#10;--    CAS Deferred Triggers&#10;--============================================================================--&#10;--&#10;FUNCTION funcGetCASDeferredUpdCNT RETURN NUMBER IS&#10;BEGIN&#10;    RETURN NVL(g_tab_deferred_upd_CAS.COUNT, 0);&#10;END funcGetCASDeferredUpdCNT;&#10;--&#10;FUNCTION get_CAS_deferred_TAB(p_offender_id NUMBER DEFAULT NULL) RETURN t_tab_CAS_deferred_TYP PIPELINED&#10;IS&#10;    --&#10;    l_key VARCHAR2(255);&#10;    l_rec t_rec_CAS_deferred_TYP;&#10;    --&#10;    PROCEDURE do_parse_key(p_key VARCHAR2) IS&#10;    BEGIN&#10;        BEGIN&#10;            l_rec.offender_id := TO_NUMBER(PKG_LstUtl.list_num_elem(p_key, &#39;|&#39;, 1));&#10;        EXCEPTION WHEN OTHERS THEN&#10;            l_rec.offender_id := -1;&#10;        END;&#10;        BEGIN&#10;            l_rec.event_id := TO_NUMBER(PKG_LstUtl.list_num_elem(p_key, &#39;|&#39;, 2));&#10;        EXCEPTION WHEN OTHERS THEN&#10;            l_rec.event_id := -1;&#10;        END;&#10;        BEGIN&#10;            l_rec.transfer_id := TO_NUMBER(PKG_LstUtl.list_num_elem(p_key, &#39;|&#39;, 3));&#10;        EXCEPTION WHEN OTHERS THEN&#10;            l_rec.transfer_id := -1;&#10;        END;&#10;        BEGIN&#10;            l_rec.transfer_type := PKG_LstUtl.list_num_elem(p_key, &#39;|&#39;, 4);&#10;        EXCEPTION WHEN OTHERS THEN&#10;            l_rec.transfer_type := NULL;&#10;        END;&#10;        --&#10;    END do_parse_key;&#10;    --&#10;BEGIN&#10;    --&#10;    l_key := g_tab_deferred_upd_CAS.FIRST;&#10;    LOOP&#10;        EXIT WHEN empty2null(l_key) IS NULL;&#10;        --&#10;        do_parse_key(l_key);&#10;        --&#10;        PIPE ROW (l_rec);&#10;        --&#10;        l_key := g_tab_deferred_upd_CAS.NEXT(l_key);&#10;        --&#10;    END LOOP;&#10;    --&#10;END get_CAS_deferred_TAB;&#10;--&#10;PROCEDURE procAddCASDeferred(&#10;    p_offender_id   NUMBER,&#10;    p_event_id      NUMBER DEFAULT NULL,&#10;    p_transfer_id   NUMBER DEFAULT NULL,&#10;    p_transfer_type VARCHAR2 DEFAULT NULL,&#10;    p_trigger_name  VARCHAR2 DEFAULT NULL )&#10;IS&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procAddCASDeferred&#39;;&#10;    --&#10;    l_key VARCHAR2(100);&#10;    --&#10;BEGIN&#10;    --&#10;    IF p_offender_id IS NULL THEN&#10;        raise_application_error(-20001, &#39;FATAL ERROR in PKG_TriggerSupport.&#39; || l_proc || &#39;: P_OFFENDER_ID parameter cannot be NULL&#39;);&#10;    END IF;&#10;    --&#10;    IF p_transfer_id &gt; 0 THEN&#10;        l_key :=&#10;            TO_CHAR(p_offender_id) || &#39;|&#39; ||&#10;            TO_CHAR(p_event_id)    || &#39;|&#39; ||&#10;            TO_CHAR(p_transfer_id) || &#39;|&#39; ||&#10;            p_transfer_type;&#10;    ELSE&#10;        l_key := PKG_LstUtl.concat(TO_CHAR(p_offender_id), TO_CHAR(p_event_id), p_delim=&gt;&#39;|&#39;);&#10;    END IF;&#10;    --&#10;    IF NOT g_tab_deferred_upd_CAS.EXISTS(l_key) THEN&#10;        procDebug(l_proc || &#39;[&#39; || p_trigger_name || &#39;]: add new offender_id=&#39; || p_offender_id);&#10;        g_tab_deferred_upd_CAS(l_key) := &#39;Y&#39;;&#10;    END IF;&#10;    --&#10;END procAddCASDeferred;&#10;--&#10;PROCEDURE procUpdateCAS_DEFERRED(p_trigger_name VARCHAR2 DEFAULT NULL)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procUpdateCAS_DEFERRED&#39;;&#10;    --&#10;    l_OM_deferred_flag BOOLEAN := FALSE;&#10;    --&#10;    l_debug_flag BOOLEAN;&#10;    --&#10;    CURSOR csCAS IS&#10;      SELECT *&#10;      FROM TABLE( PKG_TriggerSupport.get_CAS_deferred_TAB );&#10;    --&#10;    l_tab_cas t_tab_CAS_deferred_TYP;&#10;    l_rec_cas t_rec_CAS_deferred_TYP;&#10;    --&#10;    l_rec t_rec_CAS_deferred_TYP;&#10;    l_tab t_tab_CAS_deferred_TYP := t_tab_CAS_deferred_TYP();&#10;    --&#10;    PROCEDURE do_init IS&#10;    BEGIN&#10;        --&#10;        l_debug_flag := (PKG_Lookups.funcgetNDParameterValue(&#39;CAS_DEBUG_FLAG&#39;, &#39;0&#39;) = &#39;1&#39;);&#10;        --&#10;    END do_init;&#10;    --&#10;    PROCEDURE do_debug(p_msg VARCHAR2, p_label VARCHAR2 DEFAULT NULL) IS&#10;    BEGIN&#10;        IF l_debug_flag THEN&#10;            warn( p_msg, l_proc, p_label );&#10;        END IF;&#10;        procDebug(l_proc || &#39;: &#39; || p_msg);&#10;    END do_debug;&#10;    --&#10;    PROCEDURE do_check_OM&#10;    IS&#10;        --&#10;        CURSOR csOT IS&#10;          SELECT PKG_Lookups.funcgetTeamProvider(0, receiving_team_id) AS probation_area_id&#10;          FROM offender_transfer&#10;          WHERE offender_transfer_id = l_rec_cas.transfer_id;&#10;        --&#10;        l_OT_probation_area_id NUMBER;&#10;        --&#10;        CURSOR csOM IS&#10;          SELECT probation_area_id&#10;          FROM offender_manager&#10;          WHERE offender_id = l_rec_cas.offender_id&#10;            AND active_flag = 1;&#10;        --&#10;        l_OM_probation_area_id NUMBER;&#10;        --&#10;    BEGIN&#10;        --&#10;        IF l_rec_cas.transfer_id IS NOT NULL THEN&#10;            OPEN csOT;&#10;            FETCH csOT INTO l_OT_probation_area_id;&#10;            IF csOT%NOTFOUND THEN&#10;                l_OT_probation_area_id := -1;&#10;            END IF;&#10;            CLOSE csOT;&#10;        ELSE&#10;            l_OT_probation_area_id := -1;&#10;        END IF;&#10;        --&#10;        OPEN csOM;&#10;        FETCH csOM INTO l_OM_probation_area_id;&#10;        IF csOM%NOTFOUND THEN&#10;            l_OM_probation_area_id := -1;&#10;        END IF;&#10;        CLOSE csOM;&#10;        --&#10;        IF l_OT_probation_area_id &gt; 0 AND l_OM_probation_area_id &lt;&gt; l_OT_probation_area_id THEN&#10;            --&#10;            do_debug( &#39;INFO: OM_probation_area_id &lt;&gt; OT_probation_area_id condition&#39; );&#10;            --&#10;            l_OM_deferred_flag := TRUE;&#10;            --&#10;        ELSIF l_OM_probation_area_id = -1 AND p_trigger_name IN (&#39;T_CAS_OFFENDER_MANAGER_AS&#39;, &#39;T_CAS_OFFENDER_AS&#39;) THEN&#10;            --&#10;            do_debug( &#39;INFO: Active OM not found&#39; );&#10;            --&#10;            l_OM_deferred_flag := TRUE;&#10;            --&#10;        END IF;&#10;        --&#10;    END do_check_OM;&#10;    --&#10;    PROCEDURE do_add_deferred IS&#10;    BEGIN&#10;        l_rec.offender_id   := l_rec_cas.offender_id;&#10;        l_rec.event_id      := l_rec_cas.event_id;&#10;        l_rec.transfer_id   := NULL;&#10;        l_rec.transfer_type := NULL;&#10;        --&#10;        l_tab.EXTEND;&#10;        l_tab(l_tab.COUNT) := l_rec;&#10;    END do_add_deferred;&#10;    --&#10;BEGIN&#10;    --&#10;    IF g_VPD_rebuilding_flag THEN&#10;        -- Postpone CAS recalculation until VPD rebuild is completed&#10;        RETURN;&#10;        --&#10;    END IF;&#10;    --&#10;    do_init;&#10;    --&#10;    OPEN csCAS;&#10;    FETCH csCAS BULK COLLECT INTO l_tab_cas;&#10;    CLOSE csCAS;&#10;    --&#10;    do_debug(&#39;start processing the [qty=&#39; || l_tab_cas.COUNT || &#39;][trg=&#39; || p_trigger_name || &#39;] CAS queue&#39; );&#10;    --&#10;    FOR l_i IN 1..l_tab_cas.COUNT LOOP&#10;        --&#10;        l_rec_cas := l_tab_cas(l_i);&#10;        --&#10;        do_debug(&#39;processing the &#39; ||&#10;            &#39;[offender_id=&#39;   || l_rec_cas.offender_id   || &#39;]&#39; ||&#10;            &#39;[event_id=&#39;      || l_rec_cas.event_id      || &#39;]&#39; ||&#10;            &#39;[transfer_id=&#39;   || l_rec_cas.transfer_id   || &#39;]&#39; ||&#10;            &#39;[transfer_type=&#39; || l_rec_cas.transfer_type || &#39;]&#39; ||&#10;            &#39; queue element&#39; );&#10;        --&#10;        IF l_rec_cas.offender_id &lt;= 0 OR l_rec_cas.event_id &lt;= 0  THEN&#10;            raise_application_error(-20001,&#10;                &#39;ERROR in &#39; || l_proc || &#39; &#39; ||&#10;                &#39;[offender_id=&#39;   || l_rec_cas.offender_id   || &#39;]&#39; ||&#10;                &#39;[event_id=&#39;      || l_rec_cas.event_id      || &#39;]&#39; ||&#10;                &#39;[transfer_id=&#39;   || l_rec_cas.transfer_id   || &#39;]&#39; ||&#10;                &#39;[transfer_type=&#39; || l_rec_cas.transfer_type || &#39;]&#39; ||&#10;                &#39;: invalid deferred queue element detected&#39; );&#10;        END IF;&#10;        --&#10;        l_OM_deferred_flag := FALSE;&#10;        --&#10;        IF ( l_rec_cas.transfer_id &gt; 0 AND l_rec_cas.transfer_type = &#39;OT&#39; ) OR&#10;           ( p_trigger_name IN (&#39;T_CAS_OFFENDER_MANAGER_AS&#39;, &#39;T_CAS_OFFENDER_AS&#39;) )&#10;        THEN&#10;            -- Check if a correct Active OM hasn&#39;t been added by ND app yet&#10;            do_check_OM;&#10;            --&#10;            IF l_OM_deferred_flag THEN&#10;                -- DST-12499: re-enqueue the CAS waiting list element&#10;                do_debug(&#10;                    &#39;re-enroll the [&#39; ||&#10;                    PKG_LstUtl.concat(TO_CHAR(l_rec_cas.offender_id), TO_CHAR(l_rec_cas.event_id), p_delim=&gt;&#39;|&#39;) ||&#10;                    &#39;] queue element&#39; );&#10;                --&#10;                do_add_deferred;&#10;                --&#10;            END IF;&#10;            --&#10;        END IF;&#10;        --&#10;        IF NOT l_OM_deferred_flag THEN&#10;            PKG_TriggerSupport.procCalculateCAS(p_offender_id=&gt;l_rec_cas.offender_id, p_event_id=&gt;l_rec_cas.event_id);&#10;        END IF;&#10;        --&#10;    END LOOP;&#10;    --&#10;    g_tab_deferred_upd_CAS.DELETE;&#10;    --&#10;    FOR l_i IN 1..l_tab.COUNT LOOP&#10;        --&#10;        l_rec := l_tab(l_i);&#10;        --&#10;        PKG_TriggerSupport.procAddCASDeferred(l_rec.offender_id, l_rec.event_id);&#10;        --&#10;    END LOOP;&#10;    --&#10;--EXCEPTION WHEN OTHERS THEN&#10;--    --&#10;--    IF l_key IS NOT NULL THEN&#10;--        IF g_tab_deferred_upd_CAS.EXISTS(l_key) THEN&#10;--            g_tab_deferred_upd_CAS.DELETE(l_key);&#10;--        END IF;&#10;--    END IF;&#10;--    --&#10;--    RAISE;&#10;END procUpdateCAS_DEFERRED;&#10;&#10;--&#10;--&#10;--&#10;FUNCTION get_active_flag(p_end_date DATE, p_soft_deleted NUMBER DEFAULT 0) RETURN SMALLINT IS&#10;BEGIN&#10;    IF p_end_date IS NULL /* KF - Removed as causes constraint/design issues. AND NVL(p_soft_deleted, 0) = 0 */ THEN&#10;        RETURN 1;&#10;    ELSE&#10;        RETURN 0;&#10;    END IF;&#10;END get_active_flag;&#10;&#10;FUNCTION get_active_flag_for_manager(p_end_date DATE) RETURN SMALLINT IS&#10;BEGIN&#10;    IF p_end_date IS NULL THEN&#10;        RETURN 1;&#10;    ELSE&#10;        RETURN 0;&#10;    END IF;&#10;END get_active_flag_for_manager;&#10;&#10;--============================================================================--&#10;--    CLOB Prefixing subroutines&#10;--============================================================================--&#10;FUNCTION funcGetPrefixedClobDelta(&#10;    p_clob_old        CLOB,&#10;    p_clob_new        CLOB,&#10;    p_check_value     VARCHAR2 DEFAULT NULL,&#10;    p_check_null_flag VARCHAR2 DEFAULT NULL )&#10;RETURN CLOB IS&#10;    --&#10;    l_sysdate DATE := SYSDATE;&#10;    --&#10;    l_distinguished_name USER_.distinguished_name%TYPE;&#10;    --&#10;    l_pos             INTEGER;&#10;    l_prepend_flag    VARCHAR2(1);&#10;    l_clob_delta      CLOB;&#10;    l_clob_prev       CLOB;&#10;    --&#10;    l_add_prefix_flag BOOLEAN;&#10;    l_prefix          CLOB;&#10;    l_postfix         CLOB;&#10;    l_ret             CLOB;&#10;    --&#10;    CURSOR cs IS&#10;      SELECT&#10;        user_id,&#10;        forename,&#10;        forename2,&#10;        surname,&#10;        distinguished_name,&#10;        PKG_Common.nvl2( PKG_LstUtl.concat(forename, forename2, surname, p_delim=&gt;&#39; &#39;), distinguished_name ) AS user_details&#10;      FROM user_&#10;      WHERE UPPER(distinguished_name) = UPPER(l_distinguished_name);&#10;    --&#10;    l_rec cs%ROWTYPE;&#10;    --&#10;    PROCEDURE do_debug(p_msg CLOB) IS&#10;    BEGIN&#10;        procDebug(&#39;funcGetPrefixedClobDelta: &#39; || p_msg);&#10;    END do_debug;&#10;    --&#10;    FUNCTION empty2null_1(p_str CLOB) RETURN CLOB IS&#10;    BEGIN&#10;        RETURN&#10;            TRIM(REPLACE(&#10;                PKG_Common.empty2null(&#10;                    p_clob                 =&gt; p_str,&#10;                    p_remove_line_ret_flag =&gt; &#39;Y&#39;,&#10;                    p_replace_CR_with      =&gt; PKG_Global.GC_SPG_CR,&#10;                    p_printable_only_flag  =&gt; &#39;Y&#39;,&#10;                    p_clean_notes_flag     =&gt; &#39;Y&#39; ),&#10;              PKG_Global.GC_SPG_CR, CHR(10) ));&#10;    END empty2null_1;&#10;    --&#10;BEGIN&#10;    --&#10;    l_add_prefix_flag := TRUE;&#10;    --&#10;    IF p_check_null_flag IN (&#39;IS NULL&#39;, &#39;IS NOT NULL&#39;) THEN&#10;        --&#10;        IF p_check_null_flag = &#39;IS NULL&#39; THEN&#10;            l_add_prefix_flag := ( p_check_value IS NULL );&#10;        ELSIF p_check_null_flag = &#39;IS NOT NULL&#39; THEN&#10;            l_add_prefix_flag := ( p_check_value IS NOT NULL );&#10;        END IF;&#10;        --&#10;    END IF;&#10;    --&#10;    IF l_add_prefix_flag THEN&#10;        --&#10;        l_distinguished_name := NVL(SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;), &#39;DELIUS_SYSTEM_USER&#39;);&#10;        --&#10;        OPEN cs;&#10;        FETCH cs INTO l_rec;&#10;        CLOSE cs;&#10;        --&#10;        do_debug(&#39;Current User: &#39; || l_rec.user_details);&#10;        --&#10;        IF l_rec.user_id &gt; 0 THEN&#10;            --&#10;            IF empty2null_1(p_clob_new) IS NOT NULL THEN&#10;                --&#10;                IF empty2null_1(p_clob_old) IS NULL THEN&#10;                    --&#10;                    l_prepend_flag := &#39;N&#39;;&#10;                    l_clob_prev    := NULL;&#10;                    l_clob_delta   := p_clob_new;&#10;                    --&#10;                ELSE&#10;                    --&#10;                    l_pos := INSTR(p_clob_new, SUBSTR(p_clob_old, 1, 30000));&#10;                    --&#10;                    IF l_pos = 1 THEN&#10;                        l_prepend_flag := &#39;N&#39;;&#10;                    ELSIF l_pos &gt; 1 THEN&#10;                        l_prepend_flag := &#39;Y&#39;;&#10;                    ELSE&#10;                        l_prepend_flag := NULL;&#10;                    END IF;&#10;                    --&#10;                    IF l_prepend_flag = &#39;Y&#39; THEN&#10;                        l_clob_prev  := SUBSTR(p_clob_new, l_pos /*, LENGTH(p_clob_old)*/);&#10;                        l_clob_delta := SUBSTR(p_clob_new, 1, LENGTH(p_clob_new)-LENGTH(p_clob_old));&#10;                    ELSIF l_prepend_flag = &#39;N&#39; THEN&#10;                        l_clob_prev  := SUBSTR(p_clob_new, 1, LENGTH(p_clob_old));&#10;                        l_clob_delta := SUBSTR(p_clob_new, LENGTH(p_clob_old)+1);&#10;                    END IF;&#10;                    --&#10;                    l_clob_delta := empty2null_1(l_clob_delta);&#10;                    --&#10;                    --l_clob_prev  := SUBSTR(p_clob_new, 1, LENGTH(p_clob_old));&#10;                    --l_clob_delta := empty2null_1( SUBSTR(p_clob_new, LENGTH(p_clob_old)+1) );&#10;                    --&#10;                END IF;&#10;                --&#10;--                do_debug(&#10;--                    &#39;CLOB Prepend Flag: &#39; || l_prepend_flag || CHR(10) ||&#10;--                    &#39;CLOB Delta: &#39;        || l_clob_delta );&#10;                --&#10;                IF l_clob_delta   IS NULL OR&#10;                   l_prepend_flag IS NULL OR&#10;                   NOT ( l_clob_prev = p_clob_old OR p_clob_old IS NULL )&#10;                THEN&#10;                    l_ret := p_clob_new;&#10;                ELSE&#10;                    --&#10;                    l_prefix :=&#10;                        PKG_LstUtl.concat_CLOB(&#10;                            &#39;Comment added by&#39;,&#10;                            l_rec.user_details,&#10;                            &#39;on&#39;,&#10;                            TO_CHAR(l_sysdate, &#39;DD/MM/YYYY&#39;),&#10;                            &#39;at&#39;,&#10;                            TO_CHAR(l_sysdate, &#39;HH24:MI&#39;),&#10;                            --&#10;                            p_delim=&gt;&#39; &#39; );&#10;                    --&#10;                    l_postfix := CASE WHEN empty2null_1(p_clob_old) IS NOT NULL THEN &#39;---------------------------------------------------------&#39; END;&#10;                    --&#10;                    IF l_prepend_flag = &#39;Y&#39; THEN&#10;                        l_ret :=&#10;                            PKG_LstUtl.concat_CLOB(&#10;                                --&#10;                                l_prefix,&#10;                                l_clob_delta,&#10;                                --&#10;                                l_postfix,&#10;                                p_clob_old,&#10;                                --&#10;                                p_delim=&gt;CHR(10) );&#10;                    ELSE&#10;                        l_ret :=&#10;                            PKG_LstUtl.concat_CLOB(&#10;                                --&#10;                                p_clob_old,&#10;                                l_postfix,&#10;                                --&#10;                                l_prefix,&#10;                                l_clob_delta,&#10;                                --&#10;                                p_delim=&gt;CHR(10) );&#10;                    END IF;&#10;                    --&#10;                END IF;&#10;                --&#10;            END IF; --empty2null_1(p_clob_new) IS NOT NULL THEN&#10;            --&#10;        ELSE&#10;            --&#10;            l_ret := p_clob_new;&#10;            fatal(&#39;Error occured while trying to set ND User Context for [&#39; || l_distinguished_name || &#39;]&#39;, &#39;PKG_TriggerSupport.funcGetPrefixedClobDelta&#39;);&#10;            --&#10;        END IF; --IF l_rec.user_id &gt; 1 THEN&#10;        --&#10;    ELSE&#10;        --&#10;        l_ret := p_clob_new;&#10;        --&#10;    END IF; --IF l_add_prefix_flag THEN&#10;    --&#10;    RETURN l_ret;&#10;    --&#10;END funcGetPrefixedClobDelta;&#10;--&#10;--&#10;--============================================================================--&#10;--    CAS Calculation subroutines&#10;--============================================================================--&#10;FUNCTION get_CAS_sentenced_flag(p_disposal_type_id NUMBER) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN&#10;        PKG_Lookups.funcgetTabRecord_CACHED(&#10;                  p_table    =&gt; &#39;r_disposal_type&#39;,&#10;                  p_ref_col  =&gt; &#39;disposal_type_id&#39;,&#10;                  p_ref_val  =&gt; p_disposal_type_id,&#10;                  p_data_fld =&gt; &#39;CASE WHEN sentence_type IN ( &#39;&#39;SC&#39;&#39;, &#39;&#39;SP&#39;&#39; ) THEN &#39;&#39;Y&#39;&#39; ELSE &#39;&#39;N&#39;&#39; END&#39; );&#10;END get_CAS_sentenced_flag;&#10;--&#10;FUNCTION get_CAS_custodial_order_flag(p_disposal_type_id NUMBER) RETURN VARCHAR2&#10;IS&#10;BEGIN&#10;    RETURN&#10;        PKG_Lookups.funcgetTabRecord_CACHED(&#10;                  p_table    =&gt; &#39;r_disposal_type&#39;,&#10;                  p_ref_col  =&gt; &#39;disposal_type_id&#39;,&#10;                  p_ref_val  =&gt; p_disposal_type_id,&#10;                  p_data_fld =&gt; &#39;CASE WHEN sentence_type = &#39;&#39;SC&#39;&#39; THEN &#39;&#39;Y&#39;&#39; ELSE &#39;&#39;N&#39;&#39; END&#39; );&#10;END get_CAS_custodial_order_flag;&#10;--&#10;PROCEDURE procCalculateCAS(&#10;    p_offender_id           NUMBER,&#10;    p_event_id              NUMBER DEFAULT NULL,&#10;    p_nd_user_flag          VARCHAR2 DEFAULT &#39;N&#39;,&#10;    p_automated_flag        VARCHAR2 DEFAULT &#39;N&#39;,&#10;    p_create_CAS_staff_team VARCHAR2 DEFAULT NULL,&#10;    p_api_flag              VARCHAR2 DEFAULT &#39;N&#39;,&#10;    p_rsr_score             NUMBER   DEFAULT NULL,&#10;    p_rsr_level_id          NUMBER   DEFAULT NULL,&#10;    p_osp_level_i_id        NUMBER   DEFAULT NULL,&#10;    p_osp_level_c_id        NUMBER   DEFAULT NULL )&#10;IS&#10;    --&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procCalculateCAS&#39;;&#10;    --&#10;    l_distinguished_name USER_.distinguished_name%TYPE;&#10;    --&#10;    LC_DATE_TIME DATE := SYSDATE;&#10;    LC_USER_ID   NUMBER;&#10;    --&#10;    l_rows NUMBER := 0;&#10;    --&#10;    l_crn OFFENDER.crn%TYPE;&#10;    --&#10;    l_active_OM_details VARCHAR2(255);&#10;    --&#10;    CURSOR cs IS&#10;      WITH CAS AS (&#10;        SELECT&#10;          O.crn,&#10;          O.offender_id,&#10;          E.event_id,&#10;          E.event_number,&#10;          E.active_flag,&#10;          D.disposal_id,&#10;          OM.offender_manager_id,&#10;          --&#10;          -- 01 The Person has a Tier of A or B&#10;          CASE WHEN&#10;              PKG_Lookups.funcgetTabRecord(&#10;                  p_table    =&gt; &#39;management_tier MT INNER JOIN r_standard_reference_list R ON R.standard_reference_list_id = MT.tier_id&#39;,&#10;                  p_ref_col  =&gt; &#39;MT.offender_id&#39;,&#10;                  p_ref_val  =&gt; E.offender_id,&#10;                  p_data_fld =&gt; &#39;R.code_value&#39;,&#10;                  p_where    =&gt; &#39;MT.soft_deleted = 0&#39;,&#10;                  p_order_by =&gt; &#39;MT.date_changed DESC&#39; )&#10;              IN ( &#39;A&#39;, &#39;UA0&#39;, &#39;UA1&#39;, &#39;UA2&#39;, &#39;UA3&#39;,&#10;                   &#39;B1&#39;, &#39;B2&#39;, &#39;UB0&#39;, &#39;UB1&#39;, &#39;UB2&#39;, &#39;UB3&#39; )&#10;              THEN &#39;Y&#39;&#10;              ELSE &#39;N&#39;&#10;          END AS tier_A_or_B,&#10;          --&#10;          -- 02 A sentence of a type for an offence flagged as a schedule 15 sexual offence is recorded on this event&#10;          ( SELECT COUNT(1)&#10;            FROM&#10;              main_offence MO&#10;                INNER JOIN r_offence R ON R.offence_id = MO.offence_id&#10;            WHERE MO.event_id = E.event_id&#10;              AND MO.soft_deleted = 0&#10;              AND R.schedule15_sexual_offence = &#39;Y&#39;&#10;          ) AS qty_schedule15_sexual_offence,&#10;          --&#10;          -- 03 Added in SR27: A sentence of a type for an offence flagged as a Modern Day Slavery Act (2015) is recorded on this event (R_OFFENCE.modern_day_slavery}&#10;          ( SELECT COUNT(1)&#10;            FROM&#10;              main_offence MO&#10;                INNER JOIN r_offence R ON R.offence_id = MO.offence_id&#10;            WHERE MO.event_id = E.event_id&#10;              AND MO.soft_deleted = 0&#10;              AND R.modern_day_slavery = &#39;Y&#39;&#10;          ) AS qty_modern_day_slavery_offence,&#10;          --&#10;          -- 04 A custodial sentence of 12 months or more for an offence a type flagged as a schedule 15 violent offence is recorded on this event&#10;          ( SELECT COUNT(1)&#10;            FROM&#10;              main_offence MO&#10;                INNER JOIN r_offence R ON R.offence_id = MO.offence_id&#10;            WHERE MO.event_id = E.event_id&#10;              AND MO.soft_deleted = 0&#10;              AND R.schedule15_violent_offence = &#39;Y&#39;&#10;              AND D.length &gt;= 12&#10;          ) AS qty_schedule15_violent_offence,&#10;          --&#10;          -- 05 Added in SR27: A custodial sentence of 12 months or more for an offence a type flagged as a Child Abduction act (1984) is recorded on this event {R_OFFENCE.child_abduction}&#10;          ( SELECT COUNT(1)&#10;            FROM&#10;              main_offence MO&#10;                INNER JOIN r_offence R ON R.offence_id = MO.offence_id&#10;            WHERE MO.event_id = E.event_id&#10;              AND MO.soft_deleted = 0&#10;              AND R.child_abduction = &#39;Y&#39;&#10;              AND D.length &gt;= 12&#10;          ) AS qty_child_abduction_offence,&#10;          --&#10;          -- 06 Changed in SR27: Sentence for an offence with the Misuse of Drugs Act (1971) with Child Concerns flag set {R_OFFENCE.drug_misuse} AND&#10;          --  an active registration with the ���Child Concerns��� Flag set {R_REGISTER_TYPE.child_concerns}&#10;          ( SELECT COUNT(1)&#10;            FROM&#10;              main_offence MO&#10;                INNER JOIN r_offence R1 ON R1.offence_id = MO.offence_id&#10;                INNER JOIN registration R ON R.offender_id = MO.offender_id&#10;                  INNER JOIN r_register_type RT ON RT.register_type_id = R.register_type_id&#10;            WHERE MO.event_id = E.event_id&#10;              AND MO.soft_deleted = 0&#10;              --AND R1.code IN ( &#39;09230&#39;, &#39;09231&#39;, &#39;09232&#39;, &#39;09233&#39;, &#39;09234&#39;, &#39;09235&#39;, &#39;09239&#39; )&#10;              AND R1.drug_misuse = &#39;Y&#39;&#10;              --&#10;              AND R.soft_deleted = 0&#10;              AND R.deregistered = 0&#10;              --AND RT.code IN ( &#39;RCCO&#39;, &#39;RCPR&#39;, &#39;RCHD&#39; )&#10;              AND RT.child_concerns = &#39;Y&#39;&#10;          ) AS qty_drugs_chld_concerns_reg,&#10;          --&#10;          -- 07 Changed in SR27: An active registration with the Notifications Flag set {R_REGISTER_TYPE.notifications}&#10;          ( SELECT COUNT(1)&#10;            FROM&#10;              registration R&#10;                INNER JOIN r_register_type RT ON RT.register_type_id = R.register_type_id&#10;            WHERE R.offender_id = E.offender_id&#10;              AND R.soft_deleted = 0&#10;              AND R.deregistered = 0&#10;              --AND RT.code IN ( &#39;ALT3&#39;, &#39;ALT10&#39;, &#39;ARSO&#39;, &#39;RTAO&#39; )&#10;              AND RT.notifications = &#39;Y&#39;&#10;          ) AS qty_notifications_reg,&#10;          --&#10;          -- 08 The person is a foreign national&#10;          R2.code_value       AS nationality_code,&#10;          R2.code_description AS nationality_desc,&#10;          CASE WHEN NVL(R2.code_value, &#39;BRIT&#39;) NOT IN (&#39;BRIT&#39;) THEN &#39;Y&#39; END AS foreign_national,&#10;          --&#10;          -- 09 The Community Manager (COM) is in the Wales Provider (N03)&#10;          OM.probation_area_id,&#10;          CASE WHEN ( PA.code = &#39;N03&#39; ) THEN &#39;Y&#39; END AS welsh_provider,&#10;          PA.code                                    AS probation_area_code,&#10;          --&#10;          PKG_Lookups.funcgetTabRecord_CACHED(&#10;              p_table     =&gt; &#39;team&#39;,&#10;              p_ref_col   =&gt; &#39;code&#39;,&#10;              p_ref_val   =&gt; PA.code || &#39;AAT&#39;,&#10;              p_data_fld  =&gt; &#39;team_id&#39;,&#10;              p_where     =&gt; &#39;probation_area_id = :p_area_id&#39;,&#10;              p_bind_var1 =&gt; PA.probation_area_id&#10;          ) AS CAS_team_id,&#10;          --&#10;          PKG_Lookups.funcgetTabRecord_CACHED(&#10;              p_table     =&gt; &#39;staff&#39;,&#10;              p_ref_col   =&gt; &#39;officer_code&#39;,&#10;              p_ref_val   =&gt; PA.code || &#39;AATH&#39;,&#10;              p_data_fld  =&gt; &#39;staff_id&#39;,&#10;              p_where     =&gt; &#39;probation_area_id = :p_area_id&#39;,&#10;              p_bind_var1 =&gt; PA.probation_area_id&#10;          ) AS CAS_staff_id,&#10;          --&#10;          PKG_TriggerSupport.get_CAS_sentenced_flag(D.disposal_type_id)       AS sentenced_flag,&#10;          PKG_TriggerSupport.get_CAS_custodial_order_flag(D.disposal_type_id) AS custodial_order_flag,&#10;          --&#10;          CAS.case_allocation_id     AS case_allocation_id_OLD,&#10;          CAS.allocation_decision_id AS allocation_decision_id_OLD,&#10;          --&#10;          R1.code_value              AS allocation_decision_code_OLD,&#10;          PKG_Lookups.funcgetTabRecord(&#10;              p_table     =&gt; &#39;contact C INNER JOIN r_contact_type CT ON CT.contact_type_id = C.contact_type_id&#39;,&#10;              p_ref_col   =&gt; &#39;C.event_id&#39;,&#10;              p_ref_val   =&gt; E.event_id,&#10;              p_where     =&gt; &#39;C.soft_deleted = 0 AND CT.code = :p_contact_type_code&#39;,&#10;              p_bind_var1 =&gt; &#39;ICAD&#39;,&#10;              p_data_fld =&gt; &#39;COUNT(1)&#39;&#10;          ) AS qty_icad_contact,&#10;          --&#10;          CAS.rsr_score,&#10;          CAS.osp_score,&#10;          PKG_Lookups.funcgetStdRefListCodeDesc(CAS.rsr_level_id  ) AS rsr_level,&#10;          PKG_Lookups.funcgetStdRefListCodeDesc(CAS.osp_level_i_id) AS osp_level_i,&#10;          PKG_Lookups.funcgetStdRefListCodeDesc(CAS.osp_level_c_id) AS osp_level_c,&#10;          --&#10;          CAS.allocation_decision_notes,&#10;          CAS.allocation_decision_date&#10;          --&#10;        FROM&#10;          event E&#10;            INNER JOIN disposal D ON D.event_id = E.event_id&#10;              --INNER JOIN r_disposal_type DT ON DT.disposal_type_id = D.disposal_type_id&#10;            LEFT OUTER JOIN case_allocation CAS ON CAS.event_id = E.event_id AND&#10;                                                   CAS.case_allocation_id = (SELECT MAX(case_allocation_id) FROM case_allocation WHERE event_id = CAS.event_id)&#10;              LEFT OUTER JOIN r_standard_reference_list R1 ON R1.standard_reference_list_id = CAS.allocation_decision_id&#10;            INNER JOIN offender_manager OM ON OM.offender_id = E.offender_id AND OM.active_flag = 1&#10;              INNER JOIN probation_area PA ON PA.probation_area_id = OM.probation_area_id&#10;            INNER JOIN offender O ON O.offender_id = E.offender_id&#10;              LEFT OUTER JOIN r_standard_reference_list R2 ON R2.standard_reference_list_id = O.nationality_id&#10;        WHERE 1=1&#10;          AND E.offender_id = p_offender_id&#10;          AND E.soft_deleted = 0&#10;          AND D.soft_deleted = 0&#10;          AND O.soft_deleted = 0&#10;          AND OM.soft_deleted = 0&#10;          --AND E.active_flag = 1&#10;          AND D.termination_date IS NULL&#10;          --&#10;      ),&#10;      CAS1 AS (&#10;        SELECT&#10;          CAS.*,&#10;          --&#10;          CASE WHEN&#10;              sentenced_flag = &#39;Y&#39; AND (&#10;                -- The Person has a Tier of A or B&#10;                tier_A_or_B = &#39;Y&#39; OR&#10;                -- A sentence for a schedule 15 sexual offence is recorded on this event&#10;                qty_schedule15_sexual_offence &gt; 0 OR&#10;                -- A sentence of a type for an offence flagged as a Modern Day Slavery Act (2015) is recorded on this event (R_OFFENCE.modern_day_slavery}&#10;                qty_modern_day_slavery_offence &gt; 0 OR&#10;                -- A custodial sentence of 12 months or more for a schedule 15 violent offence is recorded on this event&#10;                (custodial_order_flag = &#39;Y&#39; AND qty_schedule15_violent_offence &gt; 0) OR&#10;                -- A custodial sentence of 12 months or more for an offence a type flagged as a Child Abduction act (1984) is recorded on this event {R_OFFENCE.child_abduction}&#10;                (custodial_order_flag = &#39;Y&#39; AND qty_child_abduction_offence &gt; 0) OR&#10;                -- DST-12616: Active Registration of&#10;                qty_drugs_chld_concerns_reg &gt; 0 OR&#10;                qty_notifications_reg       &gt; 0 OR&#10;                --&#10;                /*DST-14400: remove FNOs and Wales from the CAS calculation&#10;                foreign_national = &#39;Y&#39; OR&#10;                --&#10;                -- The Offender Manager (COM) is in the Wales Provider (N03)&#10;                welsh_provider = &#39;Y&#39;*/&#10;                1&lt;&gt;1 )&#10;          THEN&#10;              &#39;R&#39; --Retained/ Enhanced Resourcing&#10;          ELSE&#10;              &#39;A&#39; --Allocated/Normal Resourcing&#10;          END AS allocation_decision_code_NEW&#10;          --&#10;        FROM CAS )&#10;    --&#10;    SELECT&#10;      CAS1.*,&#10;      PKG_Lookups.funcgetStdRefListID(&#39;ALLOCATION DECISION&#39;, allocation_decision_code_NEW) AS allocation_decision_id_NEW,&#10;      CASE&#10;          WHEN CAS1.allocation_decision_date &lt;=&#10;               TO_DATE( PKG_Lookups.funcgetTabRecord_CACHED(p_table =&gt; &#39;ND_PARAMETER&#39;,&#10;                p_data_fld    =&gt; &#39;TRIM(nd_value_string)&#39;,&#10;                p_ref_col     =&gt; &#39;nd_parameter&#39;,&#10;                p_ref_val     =&gt; &#39;CAS_AUTOMATED_CALCULATION&#39;),&#10;            &#39;DD-MON-YYYY HH24:MI:SS&#39; )&#10;          THEN &#39;Y&#39;&#10;          ELSE &#39;N&#39;&#10;      END AS cas_manual_flag_OLD&#10;      --&#10;    FROM CAS1&#10;    WHERE 1=1&#10;      AND event_id = NVL(p_event_id, event_id)&#10;    ORDER BY&#10;      crn,&#10;      event_number,&#10;      case_allocation_id_OLD DESC;&#10;    --&#10;    l_rec cs%ROWTYPE;&#10;    --&#10;    l_debug_flag BOOLEAN;&#10;    --&#10;    PROCEDURE do_init&#10;    IS&#10;        --&#10;        PROCEDURE do_set_user&#10;        IS&#10;            --&#10;            lc_CAS_user_name CONSTANT VARCHAR2(30) := &#39;HandoverCalculationUser&#39;;&#10;            --&#10;        BEGIN&#10;            --&#10;            IF NVL(p_nd_user_flag, &#39;N&#39;) = &#39;Y&#39; THEN&#10;                l_distinguished_name := NVL(SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;), lc_CAS_user_name);&#10;            ELSE&#10;                l_distinguished_name := lc_CAS_user_name;&#10;            END IF;&#10;            --&#10;            LC_USER_ID := PKG_Lookups.GetUserID(l_distinguished_name);&#10;            --&#10;            IF LC_USER_ID IS NULL THEN&#10;                l_distinguished_name := &#39;DELIUS_SYSTEM_USER&#39;;&#10;                LC_USER_ID := PKG_Lookups.GetUserID(l_distinguished_name);&#10;            END IF;&#10;            --&#10;        END do_set_user;&#10;        --&#10;    BEGIN&#10;        --&#10;        do_set_user;&#10;        --&#10;        l_debug_flag := (PKG_Lookups.funcgetNDParameterValue(&#39;CAS_DEBUG_FLAG&#39;, &#39;0&#39;) = &#39;1&#39;);&#10;        --&#10;        IF l_debug_flag THEN&#10;            --&#10;            l_crn :=&#10;                PKG_Lookups.funcgetTabRecord(&#10;                    p_table     =&gt; &#39;offender&#39;,&#10;                    p_ref_col   =&gt; &#39;offender_id&#39;,&#10;                    p_ref_val   =&gt; p_offender_id,&#10;                    p_data_fld  =&gt; &#39;crn&#39; );&#10;            --&#10;            l_active_OM_details :=&#10;                PKG_Lookups.funcgetTabRecord(&#10;                    p_table     =&gt; &#39;offender_manager OM INNER JOIN probation_area PA ON PA.probation_area_id=OM.probation_area_id&#39;,&#10;                    p_ref_col   =&gt; &#39;OM.offender_id&#39;,&#10;                    p_ref_val   =&gt; p_offender_id,&#10;                    p_data_fld  =&gt; &#39;OM.offender_manager_id || &#39;&#39; &#39;&#39; || PA.code&#39;,&#10;                    p_where     =&gt; &#39;OM.end_date IS NULL&#39; );&#10;            --&#10;        END IF;&#10;        --&#10;    END do_init;&#10;    --&#10;    PROCEDURE do_debug(p_msg VARCHAR2, p_label VARCHAR2) IS&#10;    BEGIN&#10;        IF l_debug_flag THEN&#10;            warn( p_msg, l_proc, p_label );&#10;        END IF;&#10;    END do_debug;&#10;    --&#10;    PROCEDURE do_cr_CAS_staff_team&#10;    IS&#10;        --&#10;        l_ins_st_flag BOOLEAN := FALSE;&#10;        --&#10;    BEGIN&#10;        --&#10;        l_ins_st_flag := FALSE;&#10;        --&#10;        IF l_rec.CAS_team_id IS NULL THEN&#10;            --&#10;            l_ins_st_flag := TRUE;&#10;            l_rec.CAS_team_id := team_id_SEQ.nextval;&#10;            --&#10;            INSERT INTO team(&#10;              team_id,&#10;              code,&#10;              description,&#10;              district_id,&#10;              local_delivery_unit_id,&#10;              unpaid_work_team,&#10;              row_version,&#10;              start_date,&#10;              end_date,&#10;              created_datetime,&#10;              created_by_user_id,&#10;              last_updated_datetime,&#10;              last_updated_user_id,&#10;              probation_area_id,&#10;              private&#10;            ) VALUES (&#10;              l_rec.CAS_team_id,&#10;              l_rec.probation_area_code || &#39;AAT&#39;,&#10;              &#39;Automated Allocation Team&#39;,&#10;              PKG_LOOKUPS.getdistrictid(l_rec.probation_area_code || &#39;NPSA&#39;),&#10;              PKG_LOOKUPS.getlduid(lducode_in =&gt; l_rec.probation_area_code || &#39;NPS1&#39;, probationareaid_in =&gt; l_rec.probation_area_id),&#10;              &#39;N&#39;,&#10;              1,&#10;              TRUNC(SYSDATE),&#10;              TRUNC(SYSDATE),&#10;              SYSDATE,&#10;              4,&#10;              SYSDATE,&#10;              4,&#10;              l_rec.probation_area_id,&#10;              0 );&#10;        END IF;&#10;        --&#10;        IF l_rec.CAS_staff_id IS NULL THEN&#10;            --&#10;            l_ins_st_flag := TRUE;&#10;            l_rec.CAS_staff_id := staff_id_SEQ.nextval;&#10;            --&#10;            INSERT INTO staff(&#10;              staff_id,&#10;              start_date,&#10;              surname,&#10;              end_date,&#10;              forename,&#10;              forename2,&#10;              row_version,&#10;              officer_code,&#10;              created_by_user_id,&#10;              last_updated_user_id,&#10;              created_datetime,&#10;              last_updated_datetime,&#10;              private,&#10;              probation_area_id&#10;            ) VALUES (&#10;              l_rec.CAS_staff_id,&#10;              SYSDATE,&#10;              &#39;Service&#39;,&#10;              NULL,&#10;              &#39;Tiering&#39;,&#10;              &#39;&#39;,&#10;              1,&#10;              l_rec.probation_area_code || &#39;AATH&#39;,&#10;              4,&#10;              4,&#10;              SYSDATE,&#10;              SYSDATE,&#10;              0,&#10;              l_rec.probation_area_id );&#10;            --&#10;        END IF;&#10;        --&#10;        IF l_ins_st_flag THEN&#10;            INSERT INTO staff_team(&#10;              staff_id,&#10;              team_id,&#10;              row_version,&#10;              created_by_user_id,&#10;              created_datetime,&#10;              last_updated_user_id,last_updated_datetime&#10;            ) VALUES (&#10;              l_rec.CAS_staff_id,&#10;              l_rec.CAS_team_id,&#10;              1,&#10;              4,&#10;              SYSDATE,&#10;              4,&#10;              SYSDATE );&#10;        END IF;&#10;        --&#10;    END do_cr_CAS_staff_team;&#10;    --&#10;    PROCEDURE do_create_cas_contact(p_i_u_flag VARCHAR2)&#10;    IS&#10;        --&#10;        l_contact_id NUMBER := contact_id_SEQ.nextval;&#10;        --&#10;    BEGIN&#10;        --&#10;        -- DST-13385: Handle edge cases when integration OASys API has been invoked for new ICAD&#10;        -- to show rsr/osp values in the contact notes&#10;        --&#10;        IF p_api_flag = &#39;Y&#39; AND p_i_u_flag = &#39;I&#39; AND l_rec.case_allocation_id_OLD IS NULL&#10;        THEN&#10;            --&#10;            l_rec.rsr_score     := p_rsr_score;&#10;            l_rec.rsr_level     := PKG_Lookups.funcgetStdRefListCodeDesc(p_rsr_level_id);&#10;            l_rec.osp_level_i   := PKG_Lookups.funcgetStdRefListCodeDesc(p_osp_level_i_id);&#10;            l_rec.osp_level_c   := PKG_Lookups.funcgetStdRefListCodeDesc(p_osp_level_c_id);&#10;            --&#10;        END IF;&#10;        --&#10;        INSERT INTO contact(&#10;          contact_id,&#10;          offender_id,&#10;          event_id,&#10;          --&#10;          contact_date,&#10;          --&#10;          contact_type_id,&#10;          --&#10;          notes,&#10;          --&#10;          team_id,&#10;          staff_id,&#10;          --&#10;          visor_contact,&#10;          visor_exported,&#10;          --&#10;          soft_deleted,&#10;          partition_area_id,&#10;          row_version,&#10;          --&#10;          created_by_user_id,&#10;          created_datetime,&#10;          last_updated_user_id,&#10;          last_updated_datetime )&#10;        SELECT&#10;          l_contact_id                     AS contact_id,&#10;          p_offender_id                    AS offender_id,&#10;          l_rec.event_id                   AS event_id,&#10;          --&#10;          TRUNC(LC_DATE_TIME)              AS contact_date,&#10;          --&#10;          PKG_Lookups.funcgetTabRecord_CACHED(&#10;              p_table =&gt; &#39;r_contact_type&#39;,&#10;              p_ref_col  =&gt; &#39;code&#39;,&#10;              p_ref_val  =&gt; p_i_u_flag || &#39;CAD&#39;,&#10;              p_data_fld =&gt; &#39;contact_type_id&#39;&#10;          ) AS contact_type_id,&#10;          --&#10;          PKG_LstUtl.concat(&#10;              PKG_LstUtl.add_prefix(&#39;A new tier of A or B is recorded: &#39;,&#10;                  CASE WHEN l_rec.tier_A_or_B = &#39;Y&#39; THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Sentence for a schedule 15 sexual offence is recorded: &#39;,&#10;                  CASE WHEN l_rec.qty_schedule15_sexual_offence &gt; 0 THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Sentence of a type for an offence flagged as a Modern Day Slavery Act (2015) is recorded: &#39;,&#10;                  CASE WHEN l_rec.qty_modern_day_slavery_offence &gt; 0 THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Custodial sentence of 12 months or more for a schedule 15 violent offence is recorded: &#39;,&#10;                  CASE WHEN (l_rec.custodial_order_flag = &#39;Y&#39; AND l_rec.qty_schedule15_violent_offence &gt; 0) THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Custodial sentence of 12 months or more for an offence a type flagged as a Child Abduction act (1984) is recorded: &#39;,&#10;                  CASE WHEN (l_rec.custodial_order_flag = &#39;Y&#39; AND l_rec.qty_child_abduction_offence &gt; 0) THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Drug Offences and Child Concerns: &#39;,&#10;                  CASE WHEN l_rec.qty_drugs_chld_concerns_reg &gt; 0 THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Subject to Notification requirements: &#39;,&#10;                  CASE WHEN l_rec.qty_notifications_reg &gt; 0 THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              /*DST-14400: not required anymore&#10;              PKG_LstUtl.add_prefix(&#39;The person is a foreign national: &#39;,&#10;                  CASE WHEN l_rec.foreign_national = &#39;Y&#39; THEN &#39;Yes&#39; ELSE &#39;No&#39; END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Community Manager (COM) is in the Wales Region: &#39;,&#10;                  CASE WHEN l_rec.welsh_provider = &#39;Y&#39; THEN &#39;Yes&#39; ELSE &#39;No&#39; END),*/&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Case Allocation Decision: &#39;,&#10;                  CASE&#10;                      WHEN l_rec.allocation_decision_code_NEW = &#39;R&#39; THEN &#39;Retained (enhanced resourcing)&#39;&#10;                      WHEN l_rec.allocation_decision_code_NEW = &#39;A&#39; THEN &#39;Allocated (normal resourcing)&#39;&#10;                  END),&#10;              --&#10;              PKG_LstUtl.add_prefix(&#39;Case Allocation Date: &#39;, TO_CHAR(TRUNC(LC_DATE_TIME), &#39;DD/MM/YYYY&#39;)),&#10;              --&#10;              &#39;RSR Percentage Score: &#39; || PKG_Common.number_2_char(l_rec.rsr_score), -- RSR_SCORE Displays a Percentage Score (previously known as RSR Score) as per the CAS Screen&#10;              &#39;OSP Score: &#39;            || PKG_Common.number_2_char(l_rec.osp_score), -- OSP_SCORE Displays the OSP Score as per the CAS Screen&#10;              &#39;RSR Level: &#39;            || l_rec.rsr_level  , -- RSR_LEVEL_ID   Displays the Level as per the CAS Screen&#10;              &#39;OSP Level (i): &#39;        || l_rec.osp_level_i, -- OSP_LEVEL_I_ID Displays the OSP Level  as per the CAS Screen - Note Jira is formatting this automatically - should be &quot;( i )&quot; - but without the spaces.&#10;              &#39;OSP Level (c): &#39;        || l_rec.osp_level_c, -- OSP_LEVEL_C_ID Displays the OSP Level (c) as per the CAS Screen&#10;              --&#10;              CASE WHEN p_i_u_flag = &#39;U&#39; THEN&#10;                  PKG_LstUtl.add_prefix(&#39;Notes: &#39;, l_rec.allocation_decision_notes)&#10;              END,&#10;              --&#10;              p_delim =&gt; CHR(10)&#10;          )                                AS notes,&#10;          --&#10;          l_rec.CAS_team_id                AS CAS_team_id,&#10;          l_rec.CAS_staff_id               AS CAS_staff_id,&#10;          --&#10;          &#39;N&#39;                              AS visor_contact,&#10;          &#39;N&#39;                              AS visor_exported,&#10;          --&#10;          0                                AS soft_deleted,&#10;          0                                AS partition_area_id,&#10;          0                                AS row_version,&#10;          --&#10;          LC_USER_ID                       AS created_by_user_id,&#10;          LC_DATE_TIME                     AS created_datetime,&#10;          LC_USER_ID                       AS last_updated_user_id,&#10;          LC_DATE_TIME                     AS last_updated_datetime&#10;        FROM dual;&#10;        --&#10;    END do_create_cas_contact;&#10;    --&#10;    PROCEDURE do_ins_cas&#10;    IS&#10;        --&#10;        l_case_allocation_id NUMBER := case_allocation_id_SEQ.nextval;&#10;        --&#10;    BEGIN&#10;        --&#10;        INSERT INTO case_allocation(&#10;          case_allocation_id,&#10;          offender_id,&#10;          event_id,&#10;          --&#10;          allocation_decision_id,&#10;          allocation_decision_date,&#10;          --&#10;          decision_provider_id,&#10;          decision_team_id,&#10;          decision_staff_id,&#10;          --&#10;          row_version,&#10;          --&#10;          created_by_user_id,&#10;          created_datetime,&#10;          last_updated_user_id,&#10;          last_updated_datetime )&#10;        SELECT&#10;          l_case_allocation_id             AS case_allocation_id,&#10;          p_offender_id                    AS offender_id,&#10;          l_rec.event_id                   AS event_id,&#10;          --&#10;          l_rec.allocation_decision_id_NEW AS allocation_decision_id,&#10;          LC_DATE_TIME                     AS allocation_decision_date,&#10;          --&#10;          NULL                             AS decision_provider_id,&#10;          NULL                             AS decision_team_id,&#10;          NULL                             AS decision_staff_id,&#10;          --&#10;          0                                AS row_version,&#10;          --&#10;          LC_USER_ID                       AS created_by_user_id,&#10;          LC_DATE_TIME                     AS created_datetime,&#10;          LC_USER_ID                       AS last_updated_user_id,&#10;          LC_DATE_TIME                     AS last_updated_datetime&#10;        FROM dual;&#10;        --&#10;        do_create_cas_contact(&#39;I&#39;);&#10;        --&#10;    END do_ins_cas;&#10;    --&#10;    PROCEDURE do_upd_cas IS&#10;    BEGIN&#10;        --&#10;        UPDATE case_allocation SET&#10;          --&#10;          allocation_decision_id   = l_rec.allocation_decision_id_NEW,&#10;          allocation_decision_date = LC_DATE_TIME,&#10;          --&#10;          --decision_provider_id,&#10;          --decision_team_id,&#10;          --decision_staff_id,&#10;          --&#10;          row_version = row_version + 1,&#10;          --&#10;          last_updated_user_id  = LC_USER_ID,&#10;          last_updated_datetime = LC_DATE_TIME&#10;          --&#10;        WHERE case_allocation_id = l_rec.case_allocation_id_OLD;&#10;        --&#10;        -- DST-12552: When a CAS is sentenced and the CAS has a Decision of &quot;Not Yet Assessed&quot; and ICAD contact has not already been created&#10;        --            then it will need to be created rather than a UCAD contact.&#10;        IF l_rec.qty_icad_contact = 0 THEN&#10;            do_create_cas_contact(&#39;I&#39;);&#10;        ELSE --l_rec.allocation_decision_code_OLD = &#39;N&#39;&#10;            do_create_cas_contact(&#39;U&#39;);&#10;        END IF;&#10;        --&#10;    END do_upd_cas;&#10;    --&#10;BEGIN&#10;    --&#10;    do_init;&#10;    --&#10;    IF l_debug_flag THEN&#10;        do_debug(&#10;            &#39;Start the CAS process &#39; ||&#10;            &#39;[usr=&#39;         || SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;) || &#39;]&#39; ||&#10;            &#39;[CAS_usr=&#39;     || l_distinguished_name                        || &#39;]&#39; ||&#10;            &#39;[crn=&#39;         || l_crn               || &#39;]&#39; ||&#10;            &#39;[offender_id=&#39; || p_offender_id       || &#39;]&#39; ||&#10;            &#39;[event_id=&#39;    || p_event_id          || &#39;]&#39; ||&#10;            &#39;[nd_usr=&#39;      || p_nd_user_flag      || &#39;]&#39; ||&#10;            &#39;[curr_OM=&#39;     || l_active_OM_details || &#39;]&#39;,&#10;            --&#10;            &#39;001&#39; );&#10;    END IF;&#10;    --&#10;    OPEN cs;&#10;    LOOP&#10;        FETCH cs INTO l_rec;&#10;        EXIT WHEN cs%NOTFOUND;&#10;        --&#10;        l_rows := l_rows + 1;&#10;        --&#10;        IF p_create_CAS_staff_team = &#39;Y&#39; THEN&#10;            do_cr_CAS_staff_team;&#10;        END IF;&#10;        --&#10;        IF l_rec.CAS_team_id IS NULL OR l_rec.CAS_staff_id IS NULL THEN&#10;            --&#10;            IF g_tab_deferred_upd_CAS.EXISTS(TO_CHAR(l_rec.offender_id)) THEN&#10;                g_tab_deferred_upd_CAS.DELETE(TO_CHAR(l_rec.offender_id));&#10;            END IF;&#10;            --&#10;            fatal(&#10;                &#39;Failed to identify CAS Team/Staff for the &#39; ||&#10;                &#39;[crn=&#39;                        || l_rec.CRN                             || &#39;]&#39; ||&#10;                &#39;[event_number=&#39;               || l_rec.event_number                    || &#39;]&#39; ||&#10;                &#39;[area_code=&#39;                  || l_rec.probation_area_code             || &#39;]&#39; ||&#10;                &#39;[tier_A_or_B=&#39;                || l_rec.tier_A_or_B                     || &#39;]&#39; ||&#10;                --&#10;                &#39;[schedule15_sexual_offence=&#39;  || l_rec.qty_schedule15_sexual_offence   || &#39;]&#39; ||&#10;                &#39;[modern_day_slavery_offence=&#39; || l_rec.qty_modern_day_slavery_offence  || &#39;]&#39; ||&#10;                &#39;[schedule15_violent_offence=&#39; || l_rec.qty_schedule15_violent_offence  || &#39;]&#39; ||&#10;                &#39;[child_abduction_offence=&#39;    || l_rec.qty_child_abduction_offence     || &#39;]&#39; ||&#10;                --&#10;                &#39;[drugs_chld_concerns_reg=&#39;    || l_rec.qty_drugs_chld_concerns_reg     || &#39;]&#39; ||&#10;                &#39;[notifications_reg=&#39;          || l_rec.qty_notifications_reg           || &#39;]&#39; ||&#10;                --&#10;                &#39;[nationality_code=&#39;           || l_rec.nationality_code                || &#39;]&#39; ||&#10;                --&#10;                &#39;[CAS_team_id=&#39;                || l_rec.CAS_team_id                     || &#39;]&#39; ||&#10;                --&#10;                &#39;[CAS_staff_id=&#39;               || l_rec.CAS_staff_id                    || &#39;]&#39; ||&#10;                --&#10;                &#39;[case_alloc_id_OLD=&#39;          || l_rec.case_allocation_id_OLD          || &#39;]&#39; ||&#10;                &#39;[alloc_decision_id_OLD=&#39;      || l_rec.allocation_decision_id_OLD      || &#39;]&#39; ||&#10;                --&#10;                &#39;[alloc_decision_id_NEW=&#39;      || l_rec.allocation_decision_id_NEW      || &#39;]&#39;,&#10;                --&#10;                &#39;procCalculateCAS&#39; );&#10;            --&#10;            RETURN;&#10;        END IF;&#10;        --&#10;        IF l_debug_flag THEN&#10;            do_debug(&#10;                PKG_LstUtl.concat(&#10;                    &#39;CAS process &#39; ||&#10;                    &#39;[usr=&#39;                        || SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;) || &#39;]&#39; ||&#10;                    --&#39;[CAS_usr=&#39;                    || l_distinguished_name                  || &#39;]&#39;,&#10;                    &#39;[crn=&#39;                        || l_rec.CRN                             || &#39;]&#39;,&#10;                    &#39;[event_number=&#39;               || l_rec.event_number                    || &#39;]&#39;,&#10;                    &#39;[area_code=&#39;                  || l_rec.probation_area_code             || &#39;]&#39;,&#10;                    &#39;[tier_A_or_B=&#39;                || l_rec.tier_A_or_B                     || &#39;]&#39;,&#10;                    --&#10;                    &#39;[schedule15_sexual_offence=&#39;  || l_rec.qty_schedule15_sexual_offence   || &#39;]&#39;,&#10;                    &#39;[modern_day_slavery_offence=&#39; || l_rec.qty_modern_day_slavery_offence  || &#39;]&#39;,&#10;                    &#39;[schedule15_violent_offence=&#39; || l_rec.qty_schedule15_violent_offence  || &#39;]&#39;,&#10;                    &#39;[child_abduction_offence=&#39;    || l_rec.qty_child_abduction_offence     || &#39;]&#39;,&#10;                    --&#10;                    &#39;[drugs_chld_concerns_reg=&#39;    || l_rec.qty_drugs_chld_concerns_reg     || &#39;]&#39;,&#10;                    &#39;[notifications_reg=&#39;          || l_rec.qty_notifications_reg           || &#39;]&#39;,&#10;                    --&#10;                    &#39;[sentenced_flag=&#39;             || l_rec.sentenced_flag                  || &#39;]&#39;,&#10;                    &#39;[custodial_order_flag=&#39;       || l_rec.custodial_order_flag            || &#39;]&#39;,&#10;                    --&#10;                    &#39;[nationality_code=&#39;           || l_rec.nationality_code                || &#39;]&#39;,&#10;                    --&#10;                    &#39;[CAS_team_id=&#39;                || l_rec.CAS_team_id                     || &#39;]&#39;,&#10;                    &#39;[CAS_staff_id=&#39;               || l_rec.CAS_staff_id                    || &#39;]&#39;,&#10;                    --&#10;                    &#39;[case_alloc_id_OLD=&#39;          || l_rec.case_allocation_id_OLD          || &#39;]&#39;,&#10;                    &#39;[alloc_decision_id_OLD=&#39;      || l_rec.allocation_decision_id_OLD      || &#39;]&#39;,&#10;                    --&#10;                    &#39;[alloc_decision_id_NEW=&#39;      || l_rec.allocation_decision_id_NEW      || &#39;]&#39;,&#10;                    --&#10;                    p_delim=&gt;CHR(10) ),&#10;                --&#10;                &#39;002&#39; );&#10;        END IF;&#10;        --&#10;        IF l_rec.case_allocation_id_OLD IS NULL THEN&#10;            -- If there is no CAS against the Event, and a Re-calculation has been triggered, then a new CAS should be created against the Event.&#10;            -- When a CAS is created by the Automation System, then it should be populated as per Story DST-11720, and a new Contact should be created as per Story DST-11717.&#10;            do_ins_cas;&#10;            --&#10;        ELSE&#10;            IF l_rec.allocation_decision_id_NEW &lt;&gt; l_rec.allocation_decision_id_OLD THEN&#10;                -- If there is a CAS against the Event, and a Re-calculation has been triggered, and the CAS Decision has changed, then the CAS should be updated.&#10;                --- When a CAS is updated by the Automation System, then it should be populated as per Story DST-11720, and a new Contact should be created as per Story DST-11719.&#10;                do_upd_cas;&#10;            ELSIF l_rec.allocation_decision_id_NEW = l_rec.allocation_decision_id_OLD AND&#10;                  l_rec.cas_manual_flag_OLD = &#39;Y&#39; AND&#10;                  p_automated_flag = &#39;Y&#39;&#10;            THEN&#10;                -- DST-13433 / DST-13434: Update CAS Allocation Decision Date (only from a specific GUI screen within ND -&#10;                --                        it sets P_AUTOMATED_FLAG to Y&#10;                do_upd_cas;&#10;            ELSE&#10;                -- If there is a CAS against the Event, and a Re-calculation has been triggered, and the CAS Decision has not changed, then the CAS should not updated.&#10;                NULL;&#10;            END IF;&#10;        END IF;&#10;        --&#10;    END LOOP;&#10;    CLOSE cs;&#10;    --&#10;    IF l_debug_flag THEN&#10;        do_debug(&#10;            &#39;Completed the CAS process &#39; ||&#10;            &#39;[usr=&#39;         || SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;) || &#39;]&#39; ||&#10;            &#39;[CAS_usr=&#39;     || l_distinguished_name                        || &#39;]&#39; ||&#10;            &#39;[crn=&#39;         || l_crn          || &#39;]&#39; ||&#10;            &#39;[offender_id=&#39; || p_offender_id  || &#39;]&#39; ||&#10;            &#39;[event_id=&#39;    || p_event_id     || &#39;]&#39; ||&#10;            &#39;[nd_usr=&#39;      || p_nd_user_flag || &#39;]&#39; ||&#10;            &#39;[tot_rows=&#39;    || l_rows         || &#39;]&#39;,&#10;            --&#10;            &#39;010&#39; );&#10;    END IF;&#10;    --&#10;END procCalculateCAS;&#10;--&#10;PROCEDURE procUpdateCAS(&#10;    p_crn               VARCHAR2,&#10;    p_event_number      NUMBER,&#10;    --&#10;    p_rsr_assessor_date DATE,&#10;    --&#10;    p_rsr_score         NUMBER,&#10;    p_rsr_level_code    VARCHAR2, /*RSR LEVEL*/&#10;    --&#10;    p_osp_score_i       NUMBER,&#10;    p_osp_score_c       NUMBER,&#10;    p_osp_level_i_code  VARCHAR2, /*OSP Level I*/&#10;    p_osp_level_c_code  VARCHAR2  /*OSP Level C*/ )&#10;IS&#10;    --&#10;    l_proc CONSTANT VARCHAR2(30) := &#39;procUpdateCAS&#39;;&#10;    --&#10;    l_distinguished_name USER_.distinguished_name%TYPE;&#10;    --&#10;    LC_DATE_TIME DATE := SYSDATE;&#10;    LC_USER_ID   NUMBER;&#10;    --&#10;    l_allocation_decision_id NUMBER;&#10;    --&#10;    l_rsr_level_id    NUMBER; /*RSR LEVEL*/&#10;    l_osp_level_i_id  NUMBER; /*OSP Level I*/&#10;    l_osp_level_c_id  NUMBER; /*OSP Level C*/&#10;    --&#10;    l_event_number    NUMBER;&#10;    --&#10;    CURSOR cs IS&#10;      SELECT&#10;        O.crn,&#10;        O.offender_id,&#10;        --&#10;        O.dynamic_rsr_score,&#10;        O.iom_nominal,&#10;        O.safeguarding_issue,&#10;        O.vulnerability_issue,&#10;        --&#10;        E.event_id,&#10;        E.event_number,&#10;        E.active_flag,&#10;        E.soft_deleted,&#10;        --&#10;        D.disposal_id,&#10;        D.termination_date,&#10;        --&#10;        OM.offender_manager_id,&#10;        OM.staff_employee_id,&#10;        OM.probation_area_id,&#10;        OM.trust_provider_team_id,&#10;        --&#10;        CASE WHEN D.disposal_id IS NULL AND E.event_id IS NOT NULL THEN &#39;Y&#39; END             AS presentenced_flag,&#10;        CASE WHEN D.disposal_id IS NOT NULL AND D.termination_date IS NOT NULL THEN &#39;Y&#39; END AS terminated_flag,&#10;        --&#10;        PKG_TriggerSupport.get_CAS_sentenced_flag(D.disposal_type_id)       AS sentenced_flag,&#10;        PKG_TriggerSupport.get_CAS_custodial_order_flag(D.disposal_type_id) AS custodial_order_flag,&#10;        --&#10;        CAS.case_allocation_id,&#10;        --&#10;        CAS.allocation_decision_id,&#10;        CAS.allocation_decision_date,&#10;        --&#10;        CAS.allocation_override_reason_id,&#10;        CAS.allocation_override,&#10;        --&#10;        CAS.rsr_score,&#10;        CAS.rsr_level_id,&#10;        CAS.rsr_assessor_provider_id,&#10;        CAS.rsr_assessor_team_id,&#10;        CAS.rsr_assessor_staff_id,&#10;        CAS.rsr_assessor_date,&#10;        --&#10;        CAS.osp_score,&#10;        CAS.osp_level_id,&#10;        CAS.osp_level_i_id,&#10;        CAS.osp_level_c_id,&#10;        --&#10;        CAS.target_provider_id,&#10;        --&#10;        CAS.decision_provider_id,&#10;        CAS.decision_team_id,&#10;        CAS.decision_staff_id,&#10;        --&#10;        CAS.created_datetime,&#10;        CAS.last_updated_datetime,&#10;        --&#10;        PKG_Lookups.funcgetTabRecord(&#10;          p_table      =&gt; &#39;event E1&#39;,&#10;          p_data_fld   =&gt; &#39;COUNT(1)&#39;,&#10;          p_ref_col    =&gt; &#39;E1.offender_id&#39;,&#10;          p_ref_val    =&gt; E.offender_id,&#10;          p_where      =&gt; &#39;E1.soft_deleted = 0 AND E1.active_flag = 1 AND E1.event_number = :p_event_number&#39;,&#10;          p_bind_var1  =&gt; E.event_number&#10;        ) AS event_number_qty&#10;        --&#10;      FROM&#10;        offender O&#10;          LEFT OUTER JOIN event E ON E.offender_id = O.offender_id AND E.event_number = l_event_number&#10;            LEFT OUTER JOIN disposal D ON D.event_id = E.event_id AND D.soft_deleted = 0&#10;              LEFT OUTER JOIN case_allocation CAS ON CAS.event_id = E.event_id AND&#10;                                                     CAS.case_allocation_id = (SELECT MAX(case_allocation_id) FROM case_allocation WHERE event_id = CAS.event_id)&#10;                LEFT OUTER JOIN r_standard_reference_list R1 ON R1.standard_reference_list_id = CAS.allocation_decision_id&#10;          INNER JOIN offender_manager OM ON OM.offender_id = O.offender_id AND OM.active_flag = 1&#10;            INNER JOIN probation_area PA ON PA.probation_area_id = OM.probation_area_id&#10;      WHERE 1=1&#10;        AND O.crn = p_crn&#10;        AND O.soft_deleted = 0&#10;        AND OM.soft_deleted = 0;&#10;    --&#10;    l_rec cs%ROWTYPE;&#10;    --&#10;    l_debug_flag BOOLEAN;&#10;    --&#10;    PROCEDURE do_init&#10;    IS&#10;        --&#10;        PROCEDURE do_set_user&#10;        IS&#10;            --&#10;            lc_CAS_user_name CONSTANT VARCHAR2(30) := &#39;HandoverCalculationUser&#39;;&#10;            --&#10;        BEGIN&#10;            --&#10;--            IF NVL(p_nd_user_flag, &#39;N&#39;) = &#39;Y&#39; THEN&#10;--                l_distinguished_name := NVL(SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;), lc_CAS_user_name);&#10;--            ELSE&#10;                l_distinguished_name := lc_CAS_user_name;&#10;--            END IF;&#10;            --&#10;            LC_USER_ID := PKG_Lookups.GetUserID(l_distinguished_name);&#10;            --&#10;            IF LC_USER_ID IS NULL THEN&#10;                l_distinguished_name := &#39;DELIUS_SYSTEM_USER&#39;;&#10;                LC_USER_ID := PKG_Lookups.GetUserID(l_distinguished_name);&#10;            END IF;&#10;            --&#10;        END do_set_user;&#10;        --&#10;        PROCEDURE do_set_loopkups IS&#10;        BEGIN&#10;            --&#10;            l_rsr_level_id   := PKG_Lookups.funcgetStdRefListID(&#39;RSR LEVEL&#39;  , p_rsr_level_code  );&#10;            l_osp_level_i_id := PKG_Lookups.funcgetStdRefListID(&#39;OSP Level I&#39;, p_osp_level_i_code);&#10;            l_osp_level_c_id := PKG_Lookups.funcgetStdRefListID(&#39;OSP LEVEL&#39;  , p_osp_level_c_code);&#10;            --&#10;        END do_set_loopkups;&#10;        --&#10;        PROCEDURE do_identify_active_event IS&#10;        BEGIN&#10;            --&#10;            IF p_event_number IS NULL THEN&#10;                l_event_number :=&#10;                    PKG_Lookups.funcgetTabRecord(&#10;                        p_table    =&gt; &#39;event E INNER JOIN offender O ON O.offender_id = E.offender_id&#39;,&#10;                        p_data_fld =&gt; &#39;event_number&#39;,&#10;                        p_ref_col  =&gt; &#39;O.crn&#39;,&#10;                        p_ref_val  =&gt; p_crn,&#10;                        p_where    =&gt; &#39;E.soft_deleted = 0 AND E.active_flag = 1&#39;,&#10;                        p_order_by =&gt; &#39;E.created_datetime DESC, E.event_id DESC&#39; );&#10;                --&#10;                --raise_application_error(-20001, &#39;CRN=&#39; || p_crn || &#39;; L_EVENT_NUMBER=&#39; || l_event_number);&#10;                --&#10;            ELSE&#10;                l_event_number := p_event_number;&#10;            END IF;&#10;            --&#10;        END do_identify_active_event;&#10;        --&#10;    BEGIN&#10;        --&#10;        do_set_user;&#10;        do_set_loopkups;&#10;        do_identify_active_event;&#10;        --&#10;        l_debug_flag := (PKG_Lookups.funcgetNDParameterValue(&#39;CAS_DEBUG_FLAG&#39;, &#39;0&#39;) = &#39;1&#39;);&#10;        --&#10;        OPEN cs;&#10;        FETCH cs INTO l_rec;&#10;        CLOSE cs;&#10;        --&#10;    END do_init;&#10;    --&#10;    PROCEDURE do_debug(p_msg VARCHAR2, p_label VARCHAR2 DEFAULT NULL) IS&#10;    BEGIN&#10;        IF l_debug_flag THEN&#10;            warn( p_msg, l_proc, p_label );&#10;        END IF;&#10;    END do_debug;&#10;    --&#10;    PROCEDURE do_error(p_msg VARCHAR2, p_label VARCHAR2 DEFAULT NULL) IS&#10;    BEGIN&#10;        fatal(&#10;            &#39;ERROR &#39;      ||&#10;            &#39;[crn=&#39;       || p_crn || &#39;]&#39; ||&#10;            &#39;[event_num=&#39; || p_event_number || &#39;]: &#39; ||&#10;            p_msg,&#10;            l_proc,&#10;            p_label );&#10;    END do_error;&#10;    --&#10;    PROCEDURE do_perform_checks IS&#10;    BEGIN&#10;        --&#10;        IF l_rec.offender_id IS NULL THEN&#10;            do_error(&#39;CRN/Offender does not exist&#39;);&#10;        ELSIF p_event_number IS NULL AND l_event_number IS NULL THEN&#10;            do_error(&#39;Event Number = Null and no active events for the case&#39;);&#10;        ELSIF l_rec.event_id IS NULL THEN&#10;            do_error(&#39;The event number does not exist against the specified Offender&#39;);&#10;        ELSIF l_rec.soft_deleted = 1 THEN&#10;            do_error(&#39;The Event is Soft Deleted&#39;);&#10;        ELSIF l_rec.rsr_assessor_date &gt; p_rsr_assessor_date OR ( l_rec.rsr_assessor_date IS NOT NULL AND p_rsr_assessor_date IS NULL ) THEN&#10;            do_error(&#39;The existing CAS Assessment Date [&#39; || PKG_Common.date_2_char(l_rec.rsr_assessor_date) || &#39;] is greater than a specified P_ASSESSMENT_DATE value [&#39; || PKG_Common.date_2_char(p_rsr_assessor_date) || &#39;]&#39;);&#10;        ELSIF NOT (l_rec.presentenced_flag = &#39;Y&#39;) AND l_rec.case_allocation_id IS NULL THEN&#10;            do_error(&#39;Failed to locate the CAS record against the specified Event&#39;);&#10;        ELSIF p_rsr_assessor_date &gt; SYSDATE THEN&#10;            do_error(&#39;Specified p_rsr_assessor_date value [&#39; || PKG_Common.date_2_char(p_rsr_assessor_date) || &#39;] cannot be in the future&#39;);&#10;        ELSIF l_rec.event_number_qty &gt; 1 THEN&#10;            do_error(&#39;Duplicate event numbers found against the specified Offender&#39;);&#10;        ELSIF p_rsr_level_code IS NOT NULL AND l_rsr_level_id IS NULL THEN&#10;            do_error(&#39;RSR Band not known&#39;);&#10;        ELSIF  p_osp_level_i_code IS NOT NULL AND l_osp_level_i_id IS NULL THEN&#10;            do_error(&#39;OSP Indecent Band not known&#39;);&#10;        ELSIF  p_osp_level_c_code IS NOT NULL AND l_osp_level_c_id IS NULL THEN&#10;            do_error(&#39;OSP Contact Band not known&#39;);&#10;        END IF;&#10;        --&#10;    END do_perform_checks;&#10;    --&#10;    PROCEDURE do_process_CAS_record&#10;    IS&#10;        --&#10;        PROCEDURE do_submit_mt_change IS&#10;        BEGIN&#10;            --&#10;            IF PKG_Lookups.funcgetNDParameterValue(&#39;DISABLE_TIER_CALCULATION_NOTIFICATION&#39;, &#39;0&#39;) &lt;&gt; &#39;0&#39; THEN&#10;                RETURN;&#10;            END IF;&#10;            --&#10;            INSERT INTO management_tier_event(&#10;              management_tier_event_id,&#10;              offender_id,&#10;              tier_id,&#10;              tier_change_reason_id,&#10;              contact_type_id,&#10;              iom_nominal,&#10;              safeguarding_issue,&#10;              vulnerability_issue,&#10;              row_version,&#10;              created_by_user_id,&#10;              created_datetime,&#10;              last_updated_user_id,&#10;              last_updated_datetime )&#10;            SELECT&#10;              management_tier_event_id_SEQ.nextval                           AS management_tier_event_id,&#10;              l_rec.offender_id,&#10;              --&#10;              PKG_Lookups.funcgetStdRefListID(&#39;TIER&#39;, &#39;NA&#39;)                  AS tier_id,&#10;              PKG_Lookups.funcgetStdRefListID(&#39;TIER CHANGE REASON&#39;, &#39;RSR&#39;)   AS tier_change_reason_id,&#10;              PKG_Lookups.funcGetTabRecord_CACHED(&#10;                  p_table    =&gt; &#39;R_CONTACT_TYPE&#39;,&#10;                  p_data_fld =&gt; &#39;CONTACT_TYPE_ID&#39;,&#10;                  p_ref_col  =&gt; &#39;code&#39;,&#10;                  p_ref_val  =&gt; &#39;ETCH08&#39; )                                   AS contact_type_id,&#10;              --&#10;              NVL(l_rec.iom_nominal,&#39;N&#39;),&#10;              NVL(l_rec.safeguarding_issue,&#39;N&#39;),&#10;              NVL(l_rec.vulnerability_issue,&#39;N&#39;),&#10;              --&#10;              1            AS row_version,&#10;              LC_USER_ID   AS created_by_user_id,&#10;              LC_DATE_TIME AS created_datetime,&#10;              LC_USER_ID   AS last_updated_user_id,&#10;              LC_DATE_TIME AS last_updated_datetime&#10;            FROM dual;&#10;            --&#10;        END do_submit_mt_change;&#10;        --&#10;        PROCEDURE do_upd_dyn_rsr_score&#10;        IS&#10;            --&#10;            l_rsr_score_changed_flag BOOLEAN;&#10;            --&#10;            PROCEDURE do_create_rsr_contact IS&#10;            BEGIN&#10;                --&#10;                INSERT INTO contact(&#10;                  contact_id,&#10;                  offender_id,&#10;                  event_id,&#10;                  --&#10;                  contact_date,&#10;                  --&#10;                  contact_type_id,&#10;                  --&#10;                  notes,&#10;                  --&#10;                  team_id,&#10;                  staff_id,&#10;                  probation_area_id,&#10;                  --&#10;                  visor_contact,&#10;                  visor_exported,&#10;                  --&#10;                  soft_deleted,&#10;                  partition_area_id,&#10;                  row_version,&#10;                  --&#10;                  --&#10;                  created_by_user_id,&#10;                  created_datetime,&#10;                  last_updated_user_id,&#10;                  last_updated_datetime )&#10;                SELECT&#10;                  contact_id_SEQ.nextval           AS contact_id,&#10;                  l_rec.offender_id                AS offender_id,&#10;                  NULL /*l_rec.event_id*/          AS event_id,&#10;                  --&#10;                  TRUNC(LC_DATE_TIME)              AS contact_date,&#10;                  --&#10;                  PKG_Lookups.funcgetTabRecord_CACHED(&#10;                      p_table =&gt; &#39;r_contact_type&#39;,&#10;                      p_ref_col  =&gt; &#39;code&#39;,&#10;                      p_ref_val  =&gt; &#39;DRSR&#39;,&#10;                      p_data_fld =&gt; &#39;contact_type_id&#39;&#10;                  )                                AS contact_type_id,&#10;                  --&#10;                  &#39;RSR Score: &#39; || PKG_Common.number_2_char(p_rsr_score) AS notes,&#10;                  --&#10;                  l_rec.trust_provider_team_id     AS team_id,&#10;                  l_rec.staff_employee_id          AS staff_id,&#10;                  l_rec.probation_area_id          AS probation_area_id,&#10;                  --&#10;                  &#39;N&#39;                              AS visor_contact,&#10;                  &#39;N&#39;                              AS visor_exported,&#10;                  --&#10;                  0                                AS soft_deleted,&#10;                  0                                AS partition_area_id,&#10;                  0                                AS row_version,&#10;                  --&#10;                  LC_USER_ID                       AS created_by_user_id,&#10;                  LC_DATE_TIME                     AS created_datetime,&#10;                  LC_USER_ID                       AS last_updated_user_id,&#10;                  LC_DATE_TIME                     AS last_updated_datetime&#10;                FROM dual;&#10;                --&#10;            END do_create_rsr_contact;&#10;            --&#10;        BEGIN&#10;            --&#10;            IF p_rsr_score IS NOT NULL THEN&#10;                --&#10;                UPDATE offender SET&#10;                  dynamic_rsr_score = p_rsr_score,&#10;                  --&#10;                  row_version = row_version + 1,&#10;                  --&#10;                  last_updated_user_id  = LC_USER_ID,&#10;                  last_updated_datetime = LC_DATE_TIME&#10;                WHERE offender_id = l_rec.offender_id&#10;                  AND NVL(dynamic_rsr_score, -1) &lt;&gt; NVL(p_rsr_score, -2);&#10;                --&#10;                l_rsr_score_changed_flag := (SQL%ROWCOUNT &gt; 0);&#10;                --&#10;                INSERT INTO dynamic_rsr_history(&#10;                  dynamic_rsr_history_id,&#10;                  offender_id,&#10;                  dynamic_rsr_score,&#10;                  reason_for_change_id,&#10;                  date_recorded,&#10;                  created_by_user_id,&#10;                  created_datetime,&#10;                  last_updated_user_id,&#10;                  last_updated_datetime&#10;                ) VALUES (&#10;                  dynamic_rsr_history_id_SEQ.nextval,&#10;                  l_rec.offender_id,&#10;                  p_rsr_score,&#10;                  PKG_Lookups.funcgetStdRefListID(&#39;RSR SCORE CHANGE&#39;, &#39;F&#39;), --/*From OASYS Assessment Message*/ reason_for_change_id&#10;                  p_rsr_assessor_date,&#10;                  LC_USER_ID,&#10;                  LC_DATE_TIME,&#10;                  LC_USER_ID,&#10;                  LC_DATE_TIME );&#10;                --&#10;                do_create_rsr_contact;&#10;                --&#10;                IF l_rsr_score_changed_flag THEN&#10;                    do_submit_mt_change;&#10;                END IF;&#10;                --&#10;            END IF;&#10;            --&#10;        END do_upd_dyn_rsr_score;&#10;        --&#10;        PROCEDURE do_ins_CAS_non_assessed IS&#10;            --&#10;            l_case_allocation_id NUMBER := case_allocation_id_SEQ.nextval;&#10;            --&#10;        BEGIN&#10;            --&#10;            INSERT INTO case_allocation(&#10;              case_allocation_id,&#10;              offender_id,&#10;              event_id,&#10;              --&#10;              allocation_decision_id,&#10;              allocation_decision_date,&#10;              --&#10;              rsr_assessor_date,&#10;              --&#10;              rsr_score,&#10;              rsr_level_id,&#10;              --&#10;
