                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">PACKAGE BODY pkg_materialized_views&#10;AS&#10;&#10;PROCEDURE create_mviews&#10;AS&#10;&#10;  l_mview_name             user_mviews.mview_name%TYPE;&#10;  l_number_of_mviews       INTEGER:=0;&#10;&#10;BEGIN&#10;&#10;  FOR r IN (SELECT a.table_name,&#10;                   b.pct_free&#10;            FROM user_tab_cols a&#10;            INNER JOIN user_tables b&#10;            ON a.table_name = b.table_name&#10;            WHERE a.column_name = &#39;ORGANISATIONS&#39;&#10;            AND a.data_type = &#39;T_ARR_ORGANISATIONS&#39;&#10;            AND b.table_name NOT LIKE &#39;%$%&#39;&#10;            AND b.table_name NOT LIKE &#39;Z%\_%&#39; ESCAPE &#39;\&#39;&#10;            AND b.table_name NOT LIKE &#39;DOCUMENT_STAGE%&#39;&#10;            AND b.table_name NOT IN (&#39;ASP_DISPOSAL_BACKUP&#39;))&#10;  LOOP&#10;&#10;    l_mview_name := r.table_name||&#39;_MV&#39;;&#10;&#10;    FOR s IN (SELECT &#39;SELECT &#39;||LISTAGG(column_name,&#39;,&#39;) WITHIN GROUP (ORDER BY internal_column_id)||&#10;                     &#39; FROM &#39;||a.table_name AS &quot;SELECT_COLS&quot;&#10;                FROM user_tab_cols a&#10;                WHERE table_name = r.table_name&#10;                AND column_name &lt;&gt; &#39;ORGANISATIONS&#39;&#10;                AND hidden_column != &#39;YES&#39;&#10;                AND NOT EXISTS (SELECT mview_name&#10;                                FROM user_mviews b&#10;                                WHERE b.mview_name = l_mview_name)&#10;                GROUP BY table_name&#10;                ORDER BY a.table_name)&#10;    LOOP&#10;&#10;      IF s.select_cols IS NOT NULL&#10;      THEN&#10;        l_number_of_mviews := l_number_of_mviews + 1;&#10;&#10;        EXECUTE IMMEDIATE &#39;CREATE MATERIALIZED VIEW &#39;||l_mview_name||&#10;                          &#39; PCTFREE &#39;||r.pct_free||&#39; TABLESPACE &#39;||gc_mview_tablespace||&#10;                          &#39; BUILD IMMEDIATE&#39;||&#10;                          &#39; REFRESH FORCE&#39;||&#10;                          &#39; ON DEMAND AS &#39;||&#10;                          s.select_cols;&#10;        DBMS_OUTPUT.put_line(&#39;Created materialized view: &#39;||l_mview_name);&#10;        DBMS_STATS.gather_table_stats( ownname =&gt; user, tabname =&gt; l_mview_name);&#10;        DBMS_OUTPUT.put_line(&#39;Statistics gathered on materialized view: &#39;||l_mview_name);&#10;      END IF;&#10;&#10;    END LOOP;&#10;&#10;  END LOOP;&#10;&#10;  DBMS_OUTPUT.put_line(&#39;Number of materialized views created: &#39;||l_number_of_mviews);&#10;END create_mviews;&#10;&#10;PROCEDURE create_mview_logs&#10;AS&#10;&#10;  l_number_of_mview_logs       INTEGER:=0;&#10;&#10;BEGIN&#10;&#10;  FOR l IN (SELECT table_name&#10;              FROM user_tab_cols b&#10;              WHERE b.column_name = &#39;ORGANISATIONS&#39;&#10;              AND b.data_type = &#39;T_ARR_ORGANISATIONS&#39;&#10;              AND b.table_name NOT LIKE &#39;%$%&#39;&#10;              AND b.table_name NOT LIKE &#39;Z%\_%&#39; ESCAPE &#39;\&#39;&#10;              AND b.table_name NOT LIKE &#39;DOCUMENT_STAGE%&#39;&#10;              AND b.table_name NOT IN (&#39;ASP_DISPOSAL_BACKUP&#39;)&#10;              AND NOT EXISTS (SELECT NULL&#10;                              FROM user_mview_logs a&#10;                              WHERE a.master = b.table_name))&#10;&#10;  LOOP&#10;&#10;    l_number_of_mview_logs := l_number_of_mview_logs + 1;&#10;    EXECUTE IMMEDIATE &#39;CREATE MATERIALIZED VIEW LOG ON &#39;||l.table_name||&#10;                      &#39; TABLESPACE &#39;||gc_mview_tablespace||&#10;                      &#39; WITH PRIMARY KEY&#39;;&#10;&#10;&#10;  END LOOP;&#10;  DBMS_OUTPUT.put_line(&#39;Number of materialized view logs created: &#39;||l_number_of_mview_logs);&#10;&#10;END create_mview_logs;&#10;&#10;PROCEDURE add_mview_supplemental_logging&#10;AS&#10;  l_number_of_mviews       INTEGER:=0;&#10;  l_number_of_tables       INTEGER:=0;&#10;BEGIN&#10;&#10;  FOR d IN (SELECT table_name&#10;              FROM user_tab_cols a&#10;              WHERE a.column_name = &#39;ORGANISATIONS&#39;&#10;              AND a.data_type = &#39;T_ARR_ORGANISATIONS&#39;&#10;              AND a.table_name NOT LIKE &#39;%$%&#39;&#10;              AND a.table_name NOT LIKE &#39;Z%\_%&#39; ESCAPE &#39;\&#39;&#10;              AND a.table_name NOT LIKE &#39;DOCUMENT_STAGE%&#39;&#10;              AND a.table_name NOT IN (&#39;ASP_DISPOSAL_BACKUP&#39;)&#10;              AND EXISTS (SELECT NULL&#10;                          FROM user_log_groups b&#10;                          WHERE a.table_name = b.table_name))&#10;  LOOP&#10;    l_number_of_tables := l_number_of_tables + 1;&#10;    EXECUTE IMMEDIATE &#39;ALTER TABLE &#39;||d.table_name||&#39; DROP SUPPLEMENTAL LOG DATA (PRIMARY KEY) COLUMNS&#39;;&#10;  END LOOP;&#10;  DBMS_OUTPUT.put_line(&#39;Number of table supplemental logging dropped: &#39;||l_number_of_tables);&#10;&#10;  FOR t IN ( SELECT mview_name&#10;             FROM user_mviews a&#10;             WHERE NOT EXISTS (SELECT NULL&#10;                               FROM user_log_groups b&#10;                               WHERE b.table_name = a.mview_name))&#10;  LOOP&#10;    l_number_of_mviews := l_number_of_mviews + 1;&#10;    EXECUTE IMMEDIATE &#39;ALTER TABLE &#39;||t.mview_name||&#39; ADD SUPPLEMENTAL LOG DATA (PRIMARY KEY) COLUMNS&#39;;&#10;  END LOOP;&#10;  DBMS_OUTPUT.put_line(&#39;Number of mview supplemental groups added: &#39;||l_number_of_mviews);&#10;&#10;END add_mview_supplemental_logging;&#10;&#10;PROCEDURE create_refresh_group&#10;AS&#10;&#10;  l_mview_list           VARCHAR2(4000);&#10;  l_refresh_group_exists INTEGER;&#10;&#10;BEGIN&#10;&#10;  SELECT LISTAGG(mview_name,&#39;,&#39;) WITHIN GROUP (ORDER BY mview_name)&#10;  INTO l_mview_list&#10;  FROM user_mviews a&#10;  WHERE EXISTS (SELECT NULL&#10;                FROM user_tab_columns b&#10;                WHERE b.column_name = &#39;ORGANISATIONS&#39;&#10;                AND b.data_type = &#39;T_ARR_ORGANISATIONS&#39;&#10;                AND b.table_name||&#39;_MV&#39; = a.mview_name)&#10;  AND NOT EXISTS (SELECT NULL&#10;                  FROM user_refresh_children c&#10;                  WHERE a.mview_name = c.name&#10;                  AND c.rname = &#39;DAP_REFRESH&#39;);&#10;&#10;  SELECT COUNT(*)&#10;  INTO l_refresh_group_exists&#10;  FROM user_refresh&#10;  WHERE rname = &#39;DAP_REFRESH&#39;;&#10;&#10;  IF l_refresh_group_exists = 0&#10;  THEN&#10;&#10;    DBMS_REFRESH.make(&#10;      name                 =&gt; &#39;DAP_REFRESH&#39;,&#10;      list                 =&gt; &#39;&#39;,&#10;      next_date            =&gt; SYSDATE,&#10;      interval             =&gt; &#39;SYSDATE + 5/(60*24)&#39;,&#10;      implicit_destroy     =&gt; FALSE,&#10;      lax                  =&gt; FALSE,&#10;      job                  =&gt; 0,&#10;      rollback_seg         =&gt; NULL,&#10;      push_deferred_rpc    =&gt; TRUE,&#10;      refresh_after_errors =&gt; TRUE,&#10;      purge_option         =&gt; NULL,&#10;      parallelism          =&gt; NULL,&#10;      heap_size            =&gt; NULL);&#10;&#10;    COMMIT;&#10;    DBMS_OUTPUT.put_line(&#39;Refresh group created.&#39;);&#10;&#10;  ELSE&#10;    DBMS_OUTPUT.put_line(&#39;Refresh group already created.&#39;);&#10;  END IF;&#10;&#10;  IF l_mview_list IS NOT NULL&#10;  THEN&#10;&#10;    DBMS_REFRESH.add(&#10;      name =&gt; &#39;DAP_REFRESH&#39;,&#10;      list =&gt; l_mview_list,&#10;      lax  =&gt; TRUE);&#10;    COMMIT;&#10;&#10;    DBMS_OUTPUT.put_line(&#39;Materialized views added to refresh group.&#39;);&#10;&#10;  ELSE&#10;   DBMS_OUTPUT.put_line(&#39;No materialized views required to add to refresh group.&#39;);&#10;  END IF;&#10;&#10;&#10;END create_refresh_group;&#10;&#10;&#10;PROCEDURE create_materialized_views&#10;AS&#10;&#10;BEGIN&#10;&#10;  create_mview_logs;&#10;  create_mviews;&#10;  add_mview_supplemental_logging;&#10;  create_refresh_group;&#10;&#10;END create_materialized_views;&#10;&#10;END pkg_materialized_views;</textarea>
