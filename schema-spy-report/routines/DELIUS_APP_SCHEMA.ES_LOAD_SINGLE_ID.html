                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">procedure ES_LOAD_SINGLE_ID is&#10;--==============================================================================&#10;--&#10;-- Description  : Package to load Contacts from Single Q into ES&#10;--                On Document at a time. this will run continuously, until the end of the file.&#10;--                After that it will run until (x) minutes from start time  see f_time.&#10;--&#10;-- Author       : Roy Pilmoor&#10;-- Date         : 30 June 2021&#10;--&#10;--  Change History:&#10;--&#10;--  Version PDM    Date        Who             Description&#10;--  ------- ----   ----------- --------------- ---------------------------------------&#10;--  1.01          30 June 2021  Roy Pilmoor     Initial Version&#10;--  1.02          03/08/2021    Roy Pilmoor     Load into GIT&#10;&#10;&#10;-- -----------------------------------------------------------------------------&#10;-- ES Package.&#10;-- -----------------------------------------------------------------------------&#10;f_time date;&#10;&#10;cursor sq is&#10;with t as&#10;(select s.contact_id , c.soft_deleted, c.sensitive, s.action from contact_es_single_q s&#10;       left outer join contact c on s.contact_id = c.contact_id  )&#10;select * from t;&#10;&#10;begin&#10;&#10;f_time := sysdate + ((1/60/60/24) * 10); -- run for ten seconds (in idle)&#10;&#10;loop&#10;for sq_loop in sq&#10;    loop&#10;        if sq_loop.soft_deleted = 0  or sq_loop.action = &#39;D&#39; then&#10;        ES_SEARCH.DELETE_ES_CONTACT(p_contact_id=&gt;sq_loop.contact_id);&#10;&#10;        else&#10;        ES_SEARCH.POST_TO_ES_CONTACT(p_contact_id=&gt;sq_loop.contact_id);&#10;        end if;&#10;        commit;&#10;&#10;    end loop;&#10;&#10;if sysdate &gt; f_time then&#10;  exit ;&#10;end if;&#10;&#10;     dbms_lock.sleep(5);&#10;&#10;end loop;&#10;&#10;ES_SEARCH.GET_ES_COUNT();&#10;&#10;&#10;end ES_LOAD_SINGLE_ID;</textarea>
