                        <div class="box-body">
                            <textarea id="sql-script-codemirror" name="sql-script-codemirror" rows="" style="display: none;">PACKAGE BODY pkg_dpa_deletion&#10;AS&#10;--&#10;--&#10;&#10;g_label             VARCHAR2(30) := &#39;00000&#39;;&#10;g_debug_print_FLAG  VARCHAR2(1)  := &#39;N&#39;;&#10;&#10;-- message type&#10;mt_information    CONSTANT NUMBER := 1;&#10;mt_warning        CONSTANT NUMBER := 2;&#10;mt_error          CONSTANT NUMBER := 3;&#10;mt_fatal_error    CONSTANT NUMBER := 4;&#10;&#10;g_component_code  CONSTANT VARCHAR2(3)  := &#39;DPA&#39;;&#10;g_package_name    CONSTANT VARCHAR2(30) := &#39;PKG_DPA_DELETION&#39;;&#10;&#10;--&#10;g_procedure_name  VARCHAR2(30)  := &#39;initial_value&#39;;&#10;g_pdm             NUMBER;&#10;&#10;&#10;TYPE g_tab_hier_rec_TYP IS RECORD(&#10;  table_name          VARCHAR2(30),&#10;  constraint_name     VARCHAR2(30),&#10;  r_constraint_name   VARCHAR2(30),&#10;  constraint_type     VARCHAR2(3),&#10;  parent_table        VARCHAR2(30),&#10;  --&#10;  FK_fld              VARCHAR2(4000),&#10;  PK_fld              VARCHAR2(4000)&#10;);&#10;TYPE g_tab_hier_tab_TYP IS TABLE OF g_tab_hier_rec_TYP;&#10;--&#10;TYPE g_tab_info_TYP IS TABLE OF g_tab_hier_tab_TYP INDEX BY VARCHAR2(30);&#10;g_tab_info g_tab_info_TYP;&#10;&#10;--&#10;-- GDPR Global Variables&#10;--&#10;g_GDPR_init_flag BOOLEAN := FALSE;&#10;&#10;g_GDPR_text_rule_TAB ttab_GDPR_text_rule;&#10;g_GDPR_text_rule_expr_1     VARCHAR2(1024);&#10;g_GDPR_text_rule_expr_2     VARCHAR2(1024);&#10;g_GDPR_text_rule_expr_3     VARCHAR2(1024);&#10;g_GDPR_text_rule_expr_adhoc VARCHAR2(1024);&#10;&#10;g_GDPR_tab_info_tab ttab_GDPR_tab_info;&#10;&#10;g_GDPR_search_text_TAB ttab_GDPR_search_text;&#10;&#10;&#10;&#10;&#10;&#10;--&#10;--&#10;--&#10;PROCEDURE set_debug_print_flag(p_flag VARCHAR2) IS&#10;BEGIN&#10;    g_debug_print_FLAG := UPPER(NVL((CASE WHEN UPPER(p_flag) NOT IN (&#39;Y&#39;, &#39;N&#39;) THEN &#39;N&#39; ELSE p_flag END), &#39;N&#39;));&#10;END set_debug_print_flag;&#10;&#10;FUNCTION get_debug_print_flag RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN NVL(g_debug_print_FLAG, &#39;N&#39;);&#10;END get_debug_print_flag;&#10;&#10;FUNCTION funcgetDebugMode RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Debug.funcgetDebugMode;&#10;END funcgetDebugMode;&#10;&#10;PROCEDURE procDebug(p_msg VARCHAR2, p_debug_print_flag VARCHAR2 DEFAULT &#39;N&#39;) IS&#10;BEGIN&#10;    --&#10;    PKG_Debug.procDebug(SUBSTR(&#39;PKG_DPA_DELETION.&#39; || p_msg, 1, 30000));&#10;    --&#10;    IF g_debug_print_FLAG = &#39;Y&#39; AND p_debug_print_flag = &#39;Y&#39; THEN&#10;        DECLARE&#10;            l_prefix VARCHAR2(1024);&#10;            --&#10;        BEGIN&#10;            l_prefix :=&#10;                TO_CHAR(SYSDATE)                            || &#39; [&#39; ||&#10;                SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;) || &#39;][&#39; ||&#10;                SYS_CONTEXT(&#39;USERENV&#39;, &#39;SID&#39;)               || &#39;][&#39; ||&#10;                PKG_VpdSupport.get_current_scn_number       || &#39;]&#39;;&#10;            --&#10;            DBMS_OUTPUT.put_line(l_prefix || &#39;: &#39; || SUBSTR(p_msg, 1, 32000));&#10;            --&#10;        END;&#10;    END IF;&#10;    --&#10;END procDebug;&#10;--&#10;--&#10;--&#10;--***************************************************&#10;-- PKG_COMMON wrappers                              *&#10;--***************************************************&#10;FUNCTION is_str_empty(p_str VARCHAR2, p_ignore_spaces_and_zeroes VARCHAR2 DEFAULT &#39;N&#39;) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Common.is_str_empty( p_str, p_ignore_spaces_and_zeroes );&#10;END is_str_empty;&#10;--&#10;FUNCTION empty2null(p_str VARCHAR2) RETURN VARCHAR2 IS&#10;BEGIN&#10;    RETURN PKG_Common.empty2null(p_str);&#10;END empty2null;&#10;&#10;FUNCTION nvlstr(p_str1 VARCHAR2, p_str2 VARCHAR2) RETURN VARCHAR2 IS&#10;BEGIN&#10;   RETURN PKG_Common.NVLSTR(p_str1 =&gt; p_str1, p_str2 =&gt; p_str2);&#10;END nvlstr;&#10;--&#10;--&#10;PROCEDURE raise_error(&#10;    error_code_in    IN PLS_INTEGER DEFAULT NULL,&#10;    error_message_in IN VARCHAR2 DEFAULT NULL)&#10;IS&#10;    l_error_code    PLS_INTEGER := NVL(error_code_in, SQLCODE);&#10;    l_error_message VARCHAR2(4000) := SUBSTR(NVLSTR(error_message_in, SQLERRM), 1, 4000);&#10;BEGIN&#10;    g_procedure_name := &#39;raise_error&#39;;&#10;    IF l_error_code BETWEEN -20999 AND -20000 THEN&#10;        RAISE_APPLICATION_ERROR (l_error_code, l_error_message);&#10;    ELSIF l_error_code &gt; 0 AND l_error_code NOT IN (1,100) THEN&#10;        RAISE_APPLICATION_ERROR (-20000, l_error_code||&#39; - &#39;||l_error_message);&#10;    ELSIF l_error_code IN (100, -1403) THEN&#10;        RAISE_APPLICATION_ERROR (-20000, l_error_code||&#39; - &#39;||l_error_message);&#10;    ELSIF l_error_code &lt;&gt; 0 THEN&#10;        RAISE_APPLICATION_ERROR(-20000, &#39;INTERNAL ERROR: An unexpected error in PL/SQL&#39;);&#10;    END IF;&#10;END raise_error;&#10;--&#10;--&#10;--***************************************************&#10;-- Helpers                                          *&#10;--***************************************************&#10;--&#10;-- Used to populate mtt_message_log with information type message&#10;PROCEDURE info (message_in VARCHAR2)&#10;IS&#10;BEGIN&#10;    IF SPGConfig.SPGInfoActive THEN&#10;        SPGConfig.insert_message_log(&#10;            message_type_id_in  =&gt; mt_information,&#10;            component_code_in   =&gt; g_component_code,&#10;            package_name_in     =&gt; g_package_name,&#10;            procedure_name_in   =&gt; g_procedure_name,&#10;            label_in            =&gt; g_label,&#10;            message_text_in     =&gt; message_in );&#10;    END IF;&#10;END info;&#10;--&#10;-- Will populate mtt_message_log with warning message - will populate mtt_error_log if result of exception&#10;PROCEDURE warn(message_in VARCHAR2) IS&#10;BEGIN&#10;    IF SPGConfig.SPGWarnActive THEN&#10;        SPGConfig.record_error(&#10;            message_type_id_in    =&gt; mt_warning,&#10;            component_code_in     =&gt; g_component_code,&#10;            package_name_in       =&gt; g_package_name,&#10;            procedure_name_in     =&gt; g_procedure_name,&#10;            label_in              =&gt; g_label,&#10;            message_text_in       =&gt; message_in );&#10;    END IF;&#10;END warn;&#10;--&#10;-- Will populate mtt_message_log with error message and populate mtt_error_log with exception - used for log and continue&#10;PROCEDURE error (message_in VARCHAR2)&#10;IS&#10;BEGIN&#10;    SPGConfig.record_error(&#10;        message_type_id_in    =&gt; mt_error,&#10;        component_code_in     =&gt; g_component_code,&#10;        package_name_in       =&gt; g_package_name,&#10;        procedure_name_in     =&gt; g_procedure_name,&#10;        label_in              =&gt; g_label,&#10;        message_text_in       =&gt; message_in);&#10;END error;&#10;--&#10;-- Will populate mtt_message_log, mtt_error_log with error message and raise exception - used for log and halt&#10;PROCEDURE fatal (message_in VARCHAR2)&#10;IS&#10;BEGIN&#10;    SPGConfig.record_error(&#10;        message_type_id_in    =&gt; mt_fatal_error,&#10;        component_code_in     =&gt; g_component_code,&#10;        package_name_in       =&gt; g_package_name,&#10;        procedure_name_in     =&gt; g_procedure_name,&#10;        label_in              =&gt; g_label,&#10;        message_text_in       =&gt; message_in,&#10;        raise_error_in        =&gt; TRUE );&#10;END fatal;&#10;--&#10;--&#10;PROCEDURE do_set_vpd_ctx(p_user_name IN VARCHAR2, x_user_id IN OUT NUMBeR)&#10;IS&#10;    --&#10;    l_user_name USER_.distinguished_name%TYPE;&#10;    --&#10;BEGIN&#10;    IF TRIM(p_user_name) IS NULL THEN&#10;        l_user_name := SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;);&#10;    ELSE&#10;        l_user_name := UPPER(TRIM(p_user_name));&#10;    END IF;&#10;    x_user_id := PKG_Lookups.GetUserID(l_user_name);&#10;    --&#10;    IF x_user_id IS NOT NULL OR TRIM(SYS_CONTEXT(&#39;USERENV&#39;, &#39;CLIENT_IDENTIFIER&#39;)) IS NULL THEN&#10;        PKG_VPD_CTX.set_client_identifier(userID =&gt; x_user_id);&#10;    END IF;&#10;    --&#10;END do_set_vpd_ctx;&#10;--&#10;--&#10;PROCEDURE P_DEL_current_record(&#10;    p_parent_table    VARCHAR2,&#10;    p_table           VARCHAR2,&#10;    p_offender_id     NUMBER,&#10;    p_parent_row_id   ROWID,&#10;    p_row_id          ROWID,&#10;    p_recursive_level INTEGER )&#10;IS&#10;    --&#10;    l_rows       INTEGER := 0;&#10;    l_debug_flag BOOLEAN := PKG_Debug.funcGetDebugActive;&#10;    --&#10;    --l_event_id   NUMBER;&#10;    l_table VARCHAR2(100) := UPPER(p_table);&#10;    --&#10;BEGIN&#10;    --&#10;    IF l_table = &#39;OFFENDER&#39; THEN&#10;        DELETE FROM SPG_VERSION_ENTRY WHERE offender_id = p_offender_id;&#10;--    ELSIF l_table = &#39;CONTACT&#39; THEN&#10;--        DELETE FROM contact_es_single_q WHERE contact_id IN ( SELECT contact_id FROM contact WHERE rowid = p_row_id );&#10;--        DELETE FROM contact_es_status   WHERE contact_id IN ( SELECT contact_id FROM contact WHERE rowid = p_row_id );&#10;--        DELETE FROM contact_es_status_2 WHERE contact_id IN ( SELECT contact_id FROM contact WHERE rowid = p_row_id );&#10;    END IF;&#10;    --&#10;    EXECUTE IMMEDIATE &#39;DELETE FROM &#39; || p_table || &#39; WHERE ROWID = :p_row_id&#39; USING p_row_id;&#10;    l_rows := SQL%ROWCOUNT;&#10;    --&#10;    IF l_debug_flag THEN&#10;        procDebug(&#10;            &#39;PKG_DPA_DELETION.P_DEL_current_record &#39;  ||&#10;            &#39;[parent_table=&#39;    || p_parent_table    || &#39;]&#39;   ||&#10;            &#39;[table=&#39;           || p_table           || &#39;]&#39;   ||&#10;            &#39;[offender_id=&#39;     || p_offender_id     || &#39;]&#39;   ||&#10;            &#39;[parent_ROWID=&#39;    || p_parent_row_id   || &#39;]&#39;   ||&#10;            &#39;[ROWID=&#39;           || p_row_id          || &#39;]: &#39; ||&#10;            l_rows || CASE WHEN l_rows = 1 THEN &#39; record has been&#39; ELSE &#39; records have been&#39; END || &#39; deleted&#39;,&#10;            --&#10;            p_debug_print_flag =&gt; (CASE WHEN l_rows = 0 THEN g_debug_print_flag ELSE &#39;N&#39; END) );&#10;    END IF;&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    procDebug(&#10;        &#39;PKG_DPA_DELETION.P_DEL_current_record &#39;  ||&#10;        &#39;[parent_table=&#39;    || p_parent_table    || &#39;]&#39;   ||&#10;        &#39;[table=&#39;           || p_table           || &#39;]&#39;   ||&#10;        &#39;[offender_id=&#39;     || p_offender_id     || &#39;]&#39;   ||&#10;        &#39;[parent_ROWID=&#39;    || p_parent_row_id   || &#39;]&#39;   ||&#10;        &#39;[ROWID=&#39;           || p_row_id          || &#39;]: &#39; ||&#10;        &#39;WARNING: NO_DATA_FOUND&#39;,&#10;        --&#10;        p_debug_print_flag =&gt; (CASE WHEN l_rows = 0 THEN g_debug_print_flag ELSE &#39;N&#39; END) );&#10;END P_DEL_current_record;&#10;--&#10;PROCEDURE P_DEL_REC(&#10;    p_tab_name        VARCHAR2,&#10;    p_row_id          ROWID,&#10;    p_debug_message   VARCHAR2 DEFAULT NULL,&#10;    p_recursive_level INTEGER DEFAULT 1,&#10;    p_dest_schema     VARCHAR2 DEFAULT GC_DEST_SCHEMA,&#10;    p_check_sql       VARCHAR2 DEFAULT NULL )&#10;IS&#10;    --&#10;    l_offender_id NUMBER;&#10;    l_debug_flag  BOOLEAN := PKG_Debug.funcGetDebugActive;&#10;    --&#10;BEGIN&#10;    --&#10;    IF p_dest_schema &lt;&gt; GC_DEST_SCHEMA THEN&#10;        raise_application_error(-20001, &#39;ERROR in PKG_DPA_DELETION.p_del_rec: P_DEST_SCHEMA parameter must be always set to &#39; || GC_DEST_SCHEMA);&#10;    END IF;&#10;    --p_debug_message   VARCHAR2 DEFAULT NULL,&#10;    --p_recursive_level INTEGER DEFAULT 1,&#10;&#10;    --&#10;    IF p_tab_name = &#39;OFFENDER&#39; THEN&#10;        SELECT offender_id INTO l_offender_id&#10;        FROM offender&#10;        WHERE ROWID = p_row_id;&#10;    ELSE&#10;        l_offender_id := -1;&#10;    END IF;&#10;    --&#10;    IF l_debug_flag THEN&#10;        procDebug(&#39;PKG_DPA_DELETION.P_DEL_REC: Invoking the PKG_hier_support.offender_records_iterator([tab=&#39; || p_tab_name || &#39;][offender_id=&#39; || l_offender_id || &#39;][row_id=&#39; || p_row_id || &#39;])&#39;);&#10;    END IF;&#10;    --&#10;    PKG_hier_support.offender_records_iterator(&#10;        p_offender_id         =&gt; l_offender_id,&#10;        p_tab_name            =&gt; p_tab_name,&#10;        p_row_id              =&gt; p_row_id,&#10;        p_recursive_level     =&gt; p_recursive_level,&#10;        --&#10;        p_when_to_execute     =&gt; &#39;POST&#39;,&#10;        p_ignore_where_clause =&gt; &#39;Y&#39;,&#10;        --&#10;        p_dyn_SQL             =&gt;&#10;           &#39;DECLARE&#10;                --&#10;                l_parent_table    VARCHAR2(30) := :p_parent_table;&#10;                l_table           VARCHAR2(30) := :p_table;&#10;                l_offender_id     NUMBER       := :p_offender_id;&#10;                l_parent_row_id   ROWID        := :p_parent_row_id;&#10;                l_row_id          ROWID        := :p_row_id;&#10;                l_recursive_level INTEGER      := :p_recursive_level;&#10;                --&#10;            BEGIN&#10;               &#39; || CASE WHEN p_check_sql IS NOT NULL THEN p_check_sql || &#39;(l_parent_table, l_table, l_offender_id, l_parent_row_id, l_row_id, l_recursive_level);&#39; ELSE &#39;--&#39; END || &#39;&#10;                PKG_DPA_DELETION.P_DEL_current_record(&#10;                    p_parent_table    =&gt; l_parent_table,&#10;                    p_table           =&gt; l_table,&#10;                    p_offender_id     =&gt; l_offender_id,&#10;                    p_parent_row_id   =&gt; l_parent_row_id,&#10;                    p_row_id          =&gt; l_row_id,&#10;                    p_recursive_level =&gt; l_recursive_level );&#10;            END;&#39; );&#10;    --&#10;END P_DEL_REC;&#10;--&#10;--&#10;--&#10;PROCEDURE procGetDPAReportOffenders(&#10;    p_dpa_report_id IN   DPA_REPORT.dpa_report_id%TYPE,&#10;    p_outcursor     OUT  SYS_REFCURSOR )&#10;IS&#10;    l_dpa_period NUMBER := 10;&#10;BEGIN&#10;    IF p_dpa_report_id IS NULL OR p_dpa_report_id = 0 THEN -- quit&#10;        RETURN;&#10;    END IF;&#10;    --&#10;    l_dpa_period := PKG_LOOKUPS.funcgetNDParameterValue(p_par_name =&gt; &#39;DPA_PERIOD&#39;, p_default_value =&gt; NULL);&#10;    --&#10;    OPEN p_outcursor FOR&#10;      SELECT&#10;        O.offender_id,&#10;        DRO.dpa_report_id,&#10;        O.crn,&#10;        O.surname,&#10;        O.first_name,&#10;        O.second_name,&#10;        O.third_name,&#10;        O.DATE_OF_BIRTH_DATE,&#10;        PKG_DPA_DELETION.funcFindRegistrations(O.offender_id)             AS Registrations,&#10;        PKG_DPA_DELETION.funcTerminationDate(O.offender_id)               AS Termination_Date,&#10;        PKG_DPA_DELETION.funcLastContactDate(O.offender_id)               AS Last_Contact,&#10;        PKG_DPA_DELETION.funcLateContactDate(O.offender_id, l_dpa_period) AS LateContact,&#10;        O.current_exclusion,&#10;        O.current_restriction&#10;      FROM&#10;        offender            O,&#10;        dpa_report_offender DRO&#10;      WHERE p_dpa_report_id = DRO.dpa_report_id&#10;        AND DRO.offender_id = O.offender_id&#10;      ORDER BY O.first_name;&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    NULL;&#10;END procGetDPAReportOffenders;&#10;&#10;PROCEDURE procFindDPAReportOffenders(&#10;    p_trust         IN   NUMBER,&#10;    p_borough       IN   NUMBER,&#10;    p_district      IN   NUMBER,&#10;    p_team          IN   NUMBER,&#10;    p_provider_team IN   NUMBER,&#10;    p_limit         IN   NUMBER,&#10;    p_outcursor     OUT  SYS_REFCURSOR )&#10;IS&#10;    --&#10;    l_dpa_period NUMBER := 10;&#10;    --&#10;BEGIN&#10;    --&#10;    l_dpa_period := PKG_LOOKUPS.funcgetNDParameterValue(p_par_name =&gt; &#39;DPA_PERIOD&#39;, p_default_value =&gt; NULL);&#10;    --&#10;    OPEN p_outcursor FOR&#10;      SELECT distinct&#10;        O.offender_id,&#10;        O.crn,&#10;        O.surname,&#10;        O.first_name,&#10;        O.second_name,&#10;        O.third_name,&#10;        O.DATE_OF_BIRTH_DATE,&#10;        PKG_DPA_DELETION.funcFindRegistrations(O.offender_id)             AS Registrations,&#10;        PKG_DPA_DELETION.funcTerminationDate(O.offender_id)               AS Termination_Date,&#10;        PKG_DPA_DELETION.funcLastContactDate(O.offender_id)               AS Last_Contact,&#10;        PKG_DPA_DELETION.funcLateContactDate(O.offender_id, l_dpa_period) AS LateContact,&#10;        O.current_exclusion,&#10;        O.current_restriction&#10;      FROM&#10;        offender O&#10;          INNER JOIN offender_manager OM ON OM.offender_id = O.offender_id AND OM.active_flag = 1&#10;            INNER JOIN all_team T ON T.trust_provider_flag = OM.trust_provider_flag AND T.trust_provider_team_id = OM.trust_provider_team_id&#10;              LEFT OUTER JOIN team T1 ON T1.team_id = T.trust_provider_team_id AND T.trust_provider_flag = 0&#10;                LEFT OUTER JOIN district D1 ON D1.district_id = T1.district_id&#10;                  LEFT OUTER JOIN borough B1 ON B1.borough_id = D1.borough_id&#10;              LEFT OUTER JOIN provider_team PT1 ON PT1.provider_team_id = T.trust_provider_team_id AND T.trust_provider_flag = 1&#10;      WHERE 1=1&#10;        AND O.soft_deleted = 0&#10;        AND T.probation_area_id = p_trust&#10;        --&#10;        AND NVL(D1.district_id, -1) = NVL(p_district, NVL(D1.district_id, -1))&#10;        AND NVL(B1.borough_id , -1) = NVL(p_borough , NVL(B1.borough_id , -1))&#10;        AND NVL(T1.team_id    , -1) = NVL(p_team    , NVL(T1.team_id    , -1))&#10;        --&#10;        AND NVL(PT1.provider_team_id, -1) = NVL(p_provider_team, NVL(PT1.provider_team_id, -1))&#10;        --&#10;        AND (&#10;              ( O.CREATED_DATETIME &lt; add_months(SYSDATE, 12 * -1) and&#10;                NOT EXISTS ( select 1 from contact where offender_id = O.offender_id )&#10;              ) OR&#10;              ( O.created_datetime &lt; add_months(SYSDATE, (l_dpa_period * 12) * -1) and&#10;                NOT EXISTS (&#10;                  select 1&#10;                  from&#10;                    contact C1&#10;                      INNER JOIN r_contact_type CT1 ON CT1.contact_type_id = C1.contact_type_id&#10;                  where C1.offender_id = O.offender_id&#10;                    and CT1.DPA_EXCLUDE = &#39;N&#39;&#10;                    and C1.contact_date &gt;= add_months(SYSDATE, (l_dpa_period * 12) * -1) )&#10;              )&#10;            )&#10;        AND NOT EXISTS (&#10;            select 1&#10;            from&#10;              registration R&#10;                INNER JOIN r_register_type RT ON RT.register_type_id = R.register_type_id&#10;            where R.offender_id = O.offender_id&#10;              and RT.DPA_EXCLUDE = &#39;Y&#39;&#10;              and NOT EXISTS ( select 1 from deregistration where registration_id = R.registration_id )&#10;            )&#10;        AND (p_limit IS NULL or rownum &lt;= p_limit)&#10;      ORDER BY O.first_name;&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    NULL;&#10;END procFindDPAReportOffenders;&#10;--&#10;FUNCTION funcFindRegistrations(p_offenderid IN NUMBER) RETURN VARCHAR2&#10;IS&#10;    --&#10;    l_registration_list VARCHAR2(100) := &#39;&#39;;&#10;    l_current_reg VARCHAR2(30) := &#39;&#39;;&#10;    l_counter NUMBER := 0;&#10;    --&#10;    CURSOR l_cur_reg IS&#10;      SELECT DISTINCT (RT.code)&#10;      FROM&#10;        registration R&#10;          INNER JOIN r_register_type RT ON RT.register_type_id = R.register_type_id&#10;      WHERE R.offender_id = p_offenderid&#10;        AND NOT EXISTS ( select 1 from deregistration where registration_id = R.registration_id );&#10;    --&#10;BEGIN&#10;    --&#10;    OPEN l_cur_reg;&#10;    LOOP&#10;        FETCH l_cur_reg into l_current_reg;&#10;        EXIT WHEN l_cur_reg%NOTFOUND;&#10;        --&#10;        IF (l_counter &gt; 0) THEN&#10;            l_registration_list := SUBSTR(l_registration_list || &#39;, &#39;, 1, 100);&#10;        END IF;&#10;        l_registration_list := SUBSTR(l_registration_list || l_current_reg, 1, 100);&#10;        l_counter := l_counter + 1;&#10;    END LOOP;&#10;    CLOSE l_cur_reg;&#10;    --&#10;    RETURN l_registration_list;&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    RETURN NULL;&#10;END funcFindRegistrations;&#10;--&#10;FUNCTION funcTerminationDate(p_offenderid IN NUMBER) RETURN DATE&#10;IS&#10;    l_termination_date DATE;&#10;BEGIN&#10;    SELECT MAX(D.termination_date) INTO l_termination_date&#10;    FROM&#10;      event E&#10;        INNER JOIN disposal D ON D.event_id = E.event_id&#10;    WHERE E.offender_id = p_offenderid;&#10;    --&#10;    RETURN l_termination_date;&#10;END funcTerminationDate;&#10;--&#10;FUNCTION funcLastContactDate(p_offenderid IN NUMBER) RETURN DATE&#10;IS&#10;    l_contact_date DATE;&#10;BEGIN&#10;    SELECT MAX(contact_date) INTO l_contact_date&#10;    FROM contact&#10;    WHERE offender_id = p_offenderid&#10;      AND contact_date &lt;= SYSDATE;&#10;    --&#10;    RETURN l_contact_date;&#10;END funcLastContactDate;&#10;--&#10;FUNCTION funcLateContactDate(p_offenderid IN NUMBER, dpa_period IN NUMBER) RETURN CHAR&#10;IS&#10;    l_late_contact_flag VARCHAR2(1);&#10;BEGIN&#10;    SELECT CASE WHEN COUNT(1) &gt; 0 THEN &#39;Y&#39; ELSE &#39;N&#39; END&#10;    INTO l_late_contact_flag&#10;    FROM&#10;      contact C&#10;        INNER JOIN r_contact_type CT ON CT.contact_type_id = C.contact_type_id&#10;    WHERE C.offender_id = p_offenderid&#10;      AND CT.DPA_EXCLUDE = &#39;Y&#39;&#10;      AND C.contact_date &gt;= add_months(SYSDATE, (dpa_period * 12) * -1);&#10;    --&#10;    RETURN l_late_contact_flag;&#10;END funcLateContactDate;&#10;--&#10;PROCEDURE procDeleteDPAReportOffenders(&#10;    p_dpa_report_id IN  DPA_REPORT.dpa_report_id%TYPE,&#10;    p_outcursor     OUT SYS_REFCURSOR)&#10;IS&#10;    l_proc CONSTANT VARCHAR2(50) := &#39;procDeleteDPAReportOffenders&#39;;&#10;    --&#10;    l_dpa_period  NUMBER := 10;&#10;    l_offender_ID NUMBER := NULL;&#10;    l_row_id      ROWID;&#10;    --&#10;    CURSOR l_cur_reg IS&#10;      SELECT&#10;        O.ROWID AS row_id,&#10;        O.offender_id&#10;      FROM&#10;        dpa_report_offender DRO&#10;          INNER JOIN offender O ON O.offender_id = DRO.offender_id&#10;      WHERE DRO.dpa_report_id = p_dpa_report_id&#10;        AND (&#10;              ( O.CREATED_DATETIME &lt; add_months(SYSDATE, 12 * -1) AND&#10;                NOT EXISTS ( SELECT 1 FROM contact WHERE offender_id = O.offender_id )&#10;              ) OR&#10;            ( O.created_datetime &lt; add_months(SYSDATE, (l_dpa_period * 12) * -1) AND&#10;              NOT EXISTS (&#10;                SELECT 1&#10;                FROM&#10;                  contact C&#10;                    INNER JOIN r_contact_type CT ON CT.contact_type_id = C.contact_type_id&#10;                WHERE 1=1&#10;                  AND C.offender_id = O.offender_id&#10;                  AND CT.DPA_EXCLUDE = &#39;N&#39;&#10;                  AND C.contact_date &gt;= add_months(SYSDATE, (l_dpa_period * 12) * -1) )&#10;            )&#10;          )&#10;        AND NOT EXISTS (&#10;            SELECT 1&#10;            FROM&#10;              registration R&#10;                INNER JOIN r_register_type RT ON RT.register_type_id = R.register_type_id&#10;            WHERE R.offender_id = O.offender_id&#10;              AND RT.DPA_EXCLUDE = &#39;Y&#39;&#10;              AND NOT EXISTS ( SELECT 1 FROM deregistration WHERE registration_id = R.registration_id ) );&#10;    --&#10;    l_cnt INTEGER := 0;&#10;    --&#10;    PROCEDURE do_check_VPD IS&#10;        l_dummy VARCHAR2(1);&#10;    BEGIN&#10;        SELECT &#39;Y&#39; INTO l_dummy&#10;        FROM offender&#10;        WHERE offender_id = l_offender_id&#10;          AND ORGANISATIONS IS NULL;&#10;        --&#10;        PKG_DPA_DELETION.procDebug(&#39;[&#39; || LPAD(l_cnt, 10) || &#39;]&#39; || l_proc || &#39;[&#39; || l_offender_id || &#39;]: update OFFENDER.ORGANISATIONS field&#39;);&#10;        PKG_TriggerSupport.procUpdateProbationAreas(p_offender_id=&gt;l_offender_id, p_table_name=&gt;&#39;OFFENDER&#39;);&#10;    EXCEPTION WHEN NO_DATA_FOUND THEN&#10;        NULL;&#10;    END do_check_VPD;&#10;    --&#10;    PROCEDURE do_delete_records(p_row_id ROWID) IS&#10;    BEGIN&#10;        p_del_rec(&#10;            p_tab_name =&gt; &#39;OFFENDER&#39;,&#10;            p_row_id   =&gt; p_row_id );&#10;    END do_delete_records;&#10;    --&#10;BEGIN&#10;    --&#10;    l_dpa_period := PKG_LOOKUPS.funcgetNDParameterValue(p_par_name =&gt; &#39;DPA_PERIOD&#39;, p_default_value =&gt; NULL);&#10;    --&#10;    l_cnt := l_cnt + 1;&#10;    procDebug(&#39;[&#39; || LPAD(l_cnt, 10) || &#39;]&#39; || &#39;procDeleteDPAReportOffenders(p_dpa_report_id=&gt;&#39; || p_dpa_report_id || &#39;)&#39;);&#10;    --&#10;    OPEN l_cur_reg;&#10;    LOOP&#10;        FETCH l_cur_reg INTO l_row_id, l_offender_ID;&#10;        EXIT WHEN l_cur_reg%NOTFOUND;&#10;        --&#10;        l_cnt := l_cnt + 1;&#10;        procDebug(&#39;[&#39; || LPAD(l_cnt, 10) || &#39;]&#39; || &#39;procDeleteDPAReportOffenders(p_dpa_report_id=&gt;&#39; || p_dpa_report_id || &#39;): processing OFFENDER_ID=&#39; || l_offender_ID);&#10;        --&#10;        do_check_VPD;&#10;        --&#10;        -- Delete from each table&#10;        do_delete_records(p_row_id=&gt;l_row_ID);&#10;        --&#10;    END LOOP;&#10;    CLOSE l_cur_reg;&#10;    --&#10;    OPEN p_outcursor FOR select &#39;Success&#39; from dual;&#10;    --&#10;EXCEPTION WHEN NO_DATA_FOUND THEN&#10;    NULL;&#10;END procDeleteDPAReportOffenders;&#10;&#10;--&#10;-- GDPR Subroutines&#10;--&#10;PROCEDURE do_add_GDPR_adhoc_rule(p_code VARCHAR2, p_expr VARCHAR2, p_notes VARCHAR2)&#10;IS&#10;    l_rec trec_GDPR_text_rule;&#10;BEGIN&#10;    --&#10;    l_rec.rule_no          := p_code;&#10;    l_rec.rule_expr        := p_expr;&#10;    l_rec.rule_description := p_notes;&#10;    l_rec.test_flag        := &#39;Y&#39;;&#10;    --&#10;    g_GDPR_text_rule_TAB.EXTEND;&#10;    g_GDPR_text_rule_TAB(g_GDPR_text_rule_TAB.COUNT) := l_rec;&#10;    --&#10;    IF g_GDPR_text_rule_expr_adhoc IS NULL THEN&#10;        g_GDPR_text_rule_expr_adhoc := &#39;(&#39; || p_expr || &#39;)&#39;;&#10;    ELSE&#10;        g_GDPR_text_rule_expr_adhoc := g_GDPR_text_rule_expr_adhoc || &#39;|(&#39; || p_expr || &#39;)&#39;;&#10;    END IF;&#10;    --&#10;END do_add_GDPR_adhoc_rule;&#10;--&#10;PROCEDURE do_init_GDPR(p_force_flag VARCHAR2 DEFAULT &#39;N&#39;)&#10;IS&#10;    --&#10;    PROCEDURE do_init_GDPR_eval_text&#10;    IS&#10;        --&#10;        PROCEDURE do_add_rule(p_expr_concat IN OUT VARCHAR2, p_code VARCHAR2, p_expr VARCHAR2, p_notes VARCHAR2)&#10;        IS&#10;            l_rec trec_GDPR_text_rule;&#10;        BEGIN&#10;            l_rec.rule_no          := p_code;&#10;            l_rec.rule_expr        := p_expr;&#10;            l_rec.rule_description := p_notes;&#10;            --&#10;            g_GDPR_text_rule_TAB.EXTEND;&#10;            g_GDPR_text_rule_TAB(g_GDPR_text_rule_TAB.COUNT) := l_rec;&#10;            --&#10;            IF p_expr_concat IS NULL THEN&#10;                p_expr_concat := &#39;(&#39; || p_expr || &#39;)&#39;;&#10;            ELSE&#10;                p_expr_concat := p_expr_concat || &#39;|(&#39; || p_expr || &#39;)&#39;;&#10;            END IF;&#10;            --&#10;        END do_add_rule;&#10;        --&#10;    BEGIN&#10;        --&#10;        g_GDPR_text_rule_TAB := ttab_GDPR_text_rule();&#10;        g_GDPR_text_rule_expr_1     := NULL;&#10;        g_GDPR_text_rule_expr_2     := NULL;&#10;        g_GDPR_text_rule_expr_3     := NULL;&#10;        g_GDPR_text_rule_expr_adhoc := NULL;&#10;        --&#10;        --Hopefully we could run searches such as:  (&quot;sexual abuse&quot; OR &quot;sex abuse&quot;) AND (child OR children OR youth OR young OR juvenile)&#10;        --&#10;        do_add_rule(g_GDPR_text_rule_expr_1, &#39;01&#39;, &#39;(child|children|young|yung|juvenile|youth|youths) +(sex|sexual) +([a,o]buse|exploitation|exploiting)&#39;, &#39;1a, 1b: &quot;child sexual abuse&quot; OR &quot;child sex abuse&quot; OR &quot;child sexual exploitation&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_1, &#39;02&#39;, &#39;(paedophile|paedophilia)|((sex|sexual) +(offender|ofender))&#39;, &#39;2b, 2b: paedophiles OR paedophilia OR &quot;sex* offenders&quot;&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_1, &#39;03&#39;, &#39;((children&#39;&#39;s|childrens|children) +(homes|home))|((looked|looking) +(after|for) +(children|child|kids))|(adoption|adopted)|(foster +care)&#39;, &#39;3a, 3b, 3c, 3d: &quot;children&#39;&#39;s homes&quot; OR &quot;looked after children&quot; OR adoption OR &quot;foster care&quot;&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_1, &#39;04&#39;, &#39;school|nurser|college|colege&#39;, &#39;4a, 4b, 4c: School* OR nurser* OR college* (looking especially for residential or boarding schools)&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_2, &#39;05&#39;, &#39;(borstal)|((youth|youths|young|yung) +(custody|custodi))|((youth|youths|young|yung) +(offender|ofender) +(institution))|(YOI|Y\.O\.I\.)|((youth|youths|youth|young|yung) +detention +(centre|center))&#39;, &#39;5a, 5b, 5c, 5d, 5e: borstals OR &quot;youth custody&quot; OR &quot;young offender institutions&quot; OR YOI OR &quot;youth detention centre*&quot;&quot;&#39;);&#10;&#10;        do_add_rule(g_GDPR_text_rule_expr_2, &#39;06&#39;, &#39;((uniformed|uniform) +organi[zs]ation)|(voluntary +organi[zs]ation)|(faith +(communities|community))|(religion)&#39;, &#39;6a, 6b, 6c, 6d: &quot;uniformed organisations&quot; OR &quot;voluntary organisations&quot; OR &quot;faith communities&quot; OR religion*&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_2, &#39;07&#39;, &#39;internet|((online|on-line|on +line) +safety)&#39;, &#39;7a, 7b: internet OR &quot;online safety&quot;&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_2, &#39;08&#39;, &#39;safeguarding|((child|children) +protection)|((child|children) +safety)&#39;, &#39;8a, 8b, 8c: safeguarding OR &quot;child protection&quot; OR &quot;child safety&quot;&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_2, &#39;09&#39;, &#39;public +appointment&#39;, &#39;9a: &quot;public appointments&quot;&quot;&#39;);&#10;        --&#10;        do_add_rule(g_GDPR_text_rule_expr_3, &#39;10&#39;, &#39;blood +(donat|contaminat|infect)&#39;, &#39;10a, 10b, 10c: Blood AND (donat* OR contaminat* OR infect*)&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_3, &#39;11&#39;, &#39;blood +product&#39;, &#39;11: &quot;blood products&quot;&quot;&#39;);&#10;        do_add_rule(g_GDPR_text_rule_expr_3, &#39;12&#39;, &#39;(hepatit[iu]s|hephatit[iu]s)|(HIV|H\.I\.V)&#39;, &#39;11a, 11b: Hepatitis OR HIV&quot;&#39;);&#10;        --&#10;    END do_init_GDPR_eval_text;&#10;    --&#10;    PROCEDURE do_init_GDPR_search_text&#10;    IS&#10;        --&#10;        l_rec trec_GDPR_tab_info;&#10;        l_TAB ttab_GDPR_tab_info1;&#10;        --&#10;    BEGIN&#10;        --&#10;        g_GDPR_tab_info_tab.DELETE;&#10;        --&#10;        --WITH T AS ( SELECT table_name FROM TABLE( PKG_DynSQL.get_tab_list ) WHERE table_type = &#39;O&#39; )&#10;        WITH T AS ( SELECT /*+RESULT_CACHE */ &#39;OFFENDER&#39; AS table_name FROM dual UNION SELECT DISTINCT table_name FROM offender_hierarchy )&#10;        SELECT /*+RESULT_CACHE*/&#10;          table_name,&#10;          PKG_Lookups.funcgetTabRecord_CACHED(&#10;              p_table       =&gt; &#39;all_tab_columns&#39;,&#10;              p_data_fld    =&gt; &#39;column_name&#39;,&#10;              p_ref_col     =&gt; &#39;table_name&#39;,&#10;              p_ref_val     =&gt; T.table_name,&#10;              p_where       =&gt; &#39;owner = :p_owner AND data_type IN (&#39;&#39;CLOB&#39;&#39;, &#39;&#39;VARCHAR2&#39;&#39;) AND ( data_type = &#39;&#39;CLOB&#39;&#39; OR data_length &gt; 512 )&#39;,&#10;              p_bind_var1   =&gt; GC_DEST_SCHEMA,&#10;              p_all_records =&gt; &#39;Y&#39;,&#10;              p_delim       =&gt; &#39;,&#39;&#10;          ) AS clob_fld_lst&#10;        BULK COLLECT INTO l_TAB&#10;        FROM T&#10;        WHERE 1=1&#10;          AND EXISTS(&#10;              SELECT 1&#10;              FROM all_tab_columns&#10;              WHERE owner = GC_DEST_SCHEMA&#10;                AND table_name = T.table_name&#10;                AND data_type IN (&#39;CLOB&#39;, &#39;VARCHAR2&#39;)&#10;                AND ( data_type = &#39;CLOB&#39; OR data_length &gt; 512 ) );&#10;        --&#10;        FOR l_idx IN 1..l_TAB.COUNT LOOP&#10;            l_rec := l_TAB(l_idx);&#10;            g_GDPR_tab_info_tab(l_rec.table_name) := l_rec;&#10;        END LOOP;&#10;        --&#10;    END do_init_GDPR_search_text;&#10;    --&#10;BEGIN&#10;    --&#10;    IF p_force_flag = &#39;Y&#39; OR (NOT NVL(g_GDPR_init_flag, FALSE)) THEN&#10;        do_init_GDPR_eval_text;&#10;        do_init_GDPR_search_text;&#10;        --&#10;        g_GDPR_init_flag := TRUE;&#10;    END IF;&#10;    --&#10;END do_init_GDPR;&#10;--&#10;FUNCTION procGetOffenderGDPRTextFldTAB RETURN ttab_GDPR_tab_info1 PIPELINED&#10;IS&#10;    --&#10;    l_key VARCHAR2(30);&#10;    l_rec trec_GDPR_tab_info;&#10;    --&#10;BEGIN&#10;    --&#10;    l_key := g_GDPR_tab_info_tab.FIRST;&#10;    LOOP&#10;        EXIT WHEN l_key IS NULL;&#10;        --&#10;        l_rec := g_GDPR_tab_info_tab(l_key);&#10;        PIPE ROW (l_rec);&#10;        --&#10;        l_key := g_GDPR_tab_info_tab.NEXT(l_key);&#10;    END LOOP;&#10;    --&#10;END procGetOffenderGDPRTextFldTAB;&#10;--&#10;FUNCTION procGetGDPRTextRulesTAB RETURN ttab_GDPR_text_rule PIPELINED&#10;IS& 39; ||&#10;            &#39;(p_trust_provider_flag=&#39;    || p_trust_provider_flag    || &#39;)&#39; ||&#10;            &#39;(p_trust_provider_team_id=&#39; || p_trust_provider_team_id || &#39;)&#39; ||&#10;            &#39;(p_staff_employee_id=&#39;      || p_staff_employee_id      || &#39;)&#39; ||&#10;            --&#10;            &#39;(p_offender_id=&#39;            || p_offender_id            || &#39;)&#39; ||&#10;            --&#10;            &#39;(p_register_type_lst=&#39;      || p_register_type_lst      || &#39;)&#39; ||&#10;            &#39;(p_offence_type_lst=&#39;       || p_offence_type_lst       || &#39;)&#39; ||&#10;            --&#10;            &#39;(p_page_size=&#39;              || p_page_size              || &#39;)&#39; ||&#10;            &#39;(p_page_num=&#39;               || p_page_num               || &#39;)&#39; ||&#10;            &#39;(p_max_rows=&#39;               || p_max_rows               || &#39;)&#39; );&#10;        RETURN/* ttabCohortDiary()*/;&#10;    END IF;&#10;    --&#10;    IF p_page_size &gt; 0 THEN&#10;        l_page_size := p_page_size;&#10;    ELSE&#10;        l_page_size := NVL(p_max_rows, 10000);&#10;    END IF;&#10;    IF p_page_num &gt; 0 THEN&#10;        l_page_number := p_page_num;&#10;    ELSE&#10;        l_page_number := 1;&#10;    END IF;&#10;    --&#10;    g_label := &#39;00300&#39;;&#10;    do_set_vpd_ctx(NULL, l_user_id);&#10;    IF l_user_id IS NULL THEN&#10;        g_label := &#39;00310&#39;;&#10;        do_set_vpd_ctx(&#39;GDPR_USER&#39;, l_user_id);&#10;    END IF;&#10;    --&#10;    PKG_Debug.procrecordDbStats_START;&#10;    --&#10;    --&#10;    -- Dynamic SQl based on CASELOAD de-normalised table&#10;    --&#10;    l_SQL :=&#10;    --&#10;&#39;WITH T AS (&#10;  SELECT DISTINCT&#10;    /*00*/ O.offender_ID,&#10;    /*01*/ O.CRN,&#10;    /*02*/ O.surname,&#10;    /*03*/ O.first_name,&#10;    /*04*/ O.second_name,&#10;    /*05*/ O.third_name,&#10;    /*06*/ O.DATE_OF_BIRTH_DATE,&#10;    /*07*/ NULL AS Registrations,&#10;    /*08*/ NULL AS Termination_Date,&#10;    /*09*/ NULL AS Last_Contact,&#10;    /*10*/ NULL Late_Contact,&#10;    /*11*/ O.current_exclusion,&#10;    /*12*/ O.current_restriction,&#10;    /*13*/ OM.probation_area_id AS OM_PROVIDER_ID&#10;    --&#10;  FROM&#10;    offender O&#10;      INNER JOIN offender_manager OM ON OM.offender_id = O.offender_id AND OM.active_flag = 1&#10;        INNER JOIN all_team T ON T.trust_provider_flag = OM.trust_provider_flag AND T.trust_provider_team_id = OM.trust_provider_team_id&#10;          LEFT OUTER JOIN team T1 ON T1.team_id = T.trust_provider_team_id AND T.trust_provider_flag = 0&#10;            LEFT OUTER JOIN district D1 ON D1.district_id = T1.district_id&#10;              LEFT OUTER JOIN borough B1 ON B1.borough_id = D1.borough_id&#10;          LEFT OUTER JOIN provider_team PT1 ON PT1.provider_team_id = T.trust_provider_team_id AND T.trust_provider_flag = 1&#10;  WHERE 1=1&#10;    AND O.soft_deleted = 0&#10;    AND &#39; || CASE WHEN p_offender_id            IS NOT NULL THEN &#39;O.offender_id = :p_offender_id&#39;              ELSE &#39;:p_offender_id IS NULL&#39;            END || &#39;&#10;    AND &#39; || CASE WHEN NVL(p_probation_area_id, -1) &gt; 0     THEN &#39;OM.probation_area_id = :p_probation_area_id&#39; ELSE &#39;NVL(:p_probation_area_id, -1) &lt; 0&#39; END || &#39;&#10;    AND &#39; || CASE WHEN p_district_id            IS NOT NULL THEN &#39;D1.district_id = :p_district_id&#39;             ELSE &#39;:p_district_id IS NULL&#39;            END || &#39;&#10;    AND &#39; || CASE WHEN p_borough_id             IS NOT NULL THEN &#39;B1.borough_id = :p_borough_id&#39;               ELSE &#39;:p_borough_id IS NULL&#39;             END || &#39;&#10;    --&#10;    AND &#39; || CASE WHEN p_trust_provider_team_id IS NOT NULL THEN &#39;OM.trust_provider_team_id = :p_trust_provider_team_id AND OM.trust_provider_flag = NVL(:p_trust_provider_flag, 0)&#39; ELSE &#39;:p_trust_provider_team_id IS NULL AND NVL(:p_trust_provider_flag, 0) IS NOT NULL&#39; END || &#39;&#10;    AND &#39; || CASE WHEN p_staff_employee_id      IS NOT NULL THEN &#39;OM.staff_employee_id = :p_staff_employee_id AND OM.trust_provider_flag = NVL(:p_trust_provider_flag, 0)&#39;           ELSE &#39;:p_staff_employee_id IS NULL AND NVL(:p_trust_provider_flag, 0) IS NOT NULL&#39;      END || &#39;&#10;    --&#10;    AND &#39; || CASE WHEN p_register_type_lst IS NULL THEN &#39;:p_register_type_lst IS NULL&#39; ELSE &#39;&#10;        NOT EXISTS(&#10;            SELECT 1&#10;            FROM&#10;              registration R&#10;                INNER JOIN r_register_type RT ON RT.register_type_id = R.register_type_id&#10;            WHERE R.offender_id = O.offender_id&#10;              AND NOT EXISTS ( SELECT 1 FROM deregistration WHERE registration_id = R.registration_id )&#10;              --AND RT.DPA_EXCLUDE = &#39;&#39;Y&#39;&#39;&#10;              AND R.register_type_id IN (&#10;                  SELECT UPPER(TRIM(column_value)) AS register_type_id&#10;                  FROM TABLE( PKG_LstUtl.get_list_2_array(:p_register_type_lst) ) )&#10;        )&#39; END || &#39;&#10;    --&#10;    AND &#39; || CASE WHEN p_offence_type_lst IS NULL THEN &#39;:p_offence_type_lst IS NULL&#39; ELSE&#10;        &#39;NOT EXISTS(&#10;            SELECT 1&#10;            FROM&#10;              event E&#10;                INNER JOIN main_offence MO ON MO.event_id = E.event_id&#10;                  INNER JOIN r_offence MOT ON MOT.offence_id = MO.offence_id&#10;            WHERE E.offender_id = O.offender_id&#10;              AND E.soft_deleted = 0&#10;              AND MO.soft_deleted = 0&#10;              AND MO.offence_id IN (&#10;                  SELECT UPPER(TRIM(column_value)) AS offence_type_id&#10;                  FROM TABLE( PKG_LstUtl.get_list_2_array(:p_offence_type_lst) ) )&#10;        )&#39; END || &#39;&#10;    --&#10;    AND &#39; || CASE WHEN p_offence_type_lst IS NULL THEN &#39;:p_offence_type_lst IS NULL&#39; ELSE&#10;        &#39;NOT EXISTS(&#10;            SELECT 1&#10;            FROM&#10;              event E&#10;                INNER JOIN additional_offence AO ON AO.event_id = E.event_id&#10;                  INNER JOIN r_offence MOT ON MOT.offence_id = AO.offence_id&#10;            WHERE E.offender_id = O.offender_id&#10;              AND E.soft_deleted = 0&#10;              AND AO.soft_deleted = 0&#10;              AND AO.offence_id IN (&#10;                  SELECT UPPER(TRIM(column_value)) AS offence_type_id&#10;                  FROM TABLE( PKG_LstUtl.get_list_2_array(:p_offence_type_lst) ) )&#10;        )&#39; END || &#39;&#10;    AND NOT EXISTS ( SELECT 1 FROM gdpr_offender_duplicate    WHERE offender_id = O.offender_id )&#10;    AND NOT EXISTS ( SELECT 1 FROM gdpr_offender_retained     WHERE offender_id = O.offender_id )&#10;    AND NOT EXISTS ( SELECT 1 FROM gdpr_off_eligible_deletion WHERE offender_id = O.offender_id )&#10;    AND NOT EXISTS ( SELECT 1 FROM gdpr_offender_free_text    WHERE offender_id = O.offender_id )&#10;    --&#10;    -- ALL sentenced events must be ended over 6 years ago and all presentence court appearances must be over 6 years ago&#10;    AND NOT EXISTS(&#10;        SELECT 1&#10;        FROM&#10;          caseload CL&#10;            INNER JOIN court_report CR ON CR.court_report_id = CL.court_report_id&#10;              INNER JOIN court_appearance CA ON CA.court_appearance_id = CR.court_appearance_id&#10;        WHERE CL.offender_id = O.offender_id&#10;          AND CR.soft_deleted = 0&#10;          AND CA.soft_deleted = 0&#10;          AND CL.court_report_id IS NOT NULL&#10;          AND CL.disposal_id IS NULL&#10;          AND CA.appearance_date &gt;= ADD_MONTHS(TRUNC(SYSDATE), (6 * 12) * -1) )&#10;    AND NOT EXISTS(&#10;        SELECT 1&#10;        FROM&#10;          event E&#10;            INNER JOIN disposal D ON D.event_id = E.event_id&#10;    WHERE E.offender_id = O.offender_id&#10;      AND E.soft_deleted = 0&#10;      AND D uot;&#10;--/*01*/ &quot;CRN&quot;&#10;--/*02*/ &quot;SURNAME&quot;&#10;--/*03*/ &quot;FIRST_NAME&quot;&#10;--/*04*/ &quot;SECOND_NAME&quot;&#10;--/*05*/ &quot;THIRD_NAME&quot;&#10;--/*06*/ &quot;DATE_OF_BIRTH_DATE&quot;&#10;--/*07*/ &quot;REGISTRATIONS&quot;&#10;--/*08*/ &quot;TERMINATION_DATE&quot;&#10;--/*09*/ &quot;LAST_CONTACT&quot;&#10;--/*10*/ &quot;LATE_CONTACT&quot;&#10;--/*11*/ &quot;CURRENT_EXCLUSION&quot;&#10;--/*12*/ &quot;CURRENT_RESTRICTION&quot;&#10;--/*13*/ &quot;ROW_NUMBER&quot;&#10;--/*14*/ &quot;TOTAL_ROWS&quot;&#10;--/*15*/ &quot;TOTAL_PAGES&quot;&#10;    --&#10;    OPEN l_cur FOR l_SQL&#10;    USING&#10;      p_offender_id,&#10;      p_probation_area_id,&#10;      p_district_id,&#10;      p_borough_id,&#10;      p_trust_provider_team_id, p_trust_provider_flag,&#10;      p_staff_employee_id, p_trust_provider_flag,&#10;      p_register_type_lst,&#10;      p_offence_type_lst, p_offence_type_lst,&#10;      --&#10;      l_page_size, l_page_number, l_page_size, l_page_number, l_page_size&#10;    ;&#10;    --&#10;--    LOOP&#10;--        FETCH l_cur INTO l_rec;&#10;--        EXIT WHEN l_cur%NOTFOUND;&#10;--        l_row := l_row + 1;&#10;--        EXIT WHEN l_row &gt; NVL(p_max_rows, 100000);&#10;--        --&#10;--        PIPE ROW (l_rec);&#10;--    END LOOP;&#10;--    CLOSE l_cur;&#10;    FETCH l_cur BULK COLLECT INTO l_tab LIMIT NVL(p_max_rows, 10000);&#10;    CLOSE l_cur;&#10;    --&#10;    FOR l_i IN 1..l_tab.COUNT LOOP&#10;        l_row := l_row + 1;&#10;        --EXIT WHEN l_row &gt; NVL(p_max_rows, 100000);&#10;        --&#10;        PIPE ROW (l_tab(l_i));&#10;    END LOOP;&#10;    --&#10;    procDebug(&#10;        &#39;procFindGDPROffendersTAB (rows=&#39; || l_row || &#39;)(&#39; || PKG_Debug.funcgetDbStats || &#39;): &#39; ||&#10;         &#39;num_of_rows=&#39; || l_row || &#39;, &#39; ||&#10;          --&#10;         &#39;(p_probation_area_id=&#39;      || p_probation_area_id      || &#39;)&#39; ||&#10;         &#39;(p_borough_id=&#39; ANSACTION;&#10;    BEGIN&#10;        UPDATE offender SET&#10;          soft_deleted = 1,&#10;          last_updated_datetime = SYSDATE,&#10;          last_updated_user_id = l_user_id&#10;        WHERE offender_id = p_offender_id&#10;          AND soft_deleted = 0;&#10;        --&#10;        COMMIT;&#10;        --&#10;    END do_soft_delete_offender;&#10;    --&#10;    PROCEDURE do_create_destruction_log&#10;    IS&#10;    BEGIN&#10;        INSERT INTO gdpr_destruction_log(&#10;          gdpr_destruction_log_id,&#10;          crn,&#10;          forename,&#10;          surname,&#10;          offender_manager_area_id,&#10;          scheduled_delete_date,&#10;          actual_delete_date&#10;        ) VALUES (&#10;          gdpr_destruction_log_id_SEQ.nextval,&#10;          l_crn,&#10;          l_forename,&#10;          l_surname,&#10;          l_area_id,&#10;          NVL(p_requested_date, SYSDATE),&#10;          SYSDATE );&#10;    END do_create_destruction_log;&#10;    --&#10;    PROCEDURE do_clear_alf_flags IS&#10;    BEGIN&#10;        AlfrescoSupport.removeOffenderFromQueue(p_offender_id);&#10;    END do_clear_alf_flags;&#10;    --&#10;BEGIN&#10;    --&#10;    g_procedure_name := &#39;procDeleteGDPROffender&#39;;&#10;    --&#10;    g_label := &#39;00100&#39;;&#10;    SELECT&#10;      O.ROWID,&#10;      O.crn,&#10;      O.first_name AS forename,&#10;      O.surname,&#10;      OM.probation_area_id&#10;    INTO&#10;       l_row_id,&#10;       l_crn,&#10;       l_forename,&#10;       l_surname,&#10;       l_area_id&#10;    FROM&#10;      offender O&#10;        LEFT OUTER JOIN offender_manager OM ON OM.offender_id = O.offender_id AND active_flag = 1&#10;    WHERE O.offender_id = p_offender_id;&#10;    --&#10;    g_label := &#39;00200&#39;;&#10;    do_set_vpd_ctx(NULL, l_user_id);&#10;    IF l_user_id IS NULL THEN&#10;        g_label := &#39;00210&#39;;&#10;        do_set_vpd_ctx(&#39;GDPR_USER&#39;, l_user_id);&#10;    END IF;&#10;    g_label := &#39;00300&#39;;&#10;
