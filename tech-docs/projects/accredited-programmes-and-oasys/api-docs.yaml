openapi: 3.1.0
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /assessments/{id}/section/{name}:
    get:
      tags:
      - assessment-controller
      operationId: getSection
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JsonNode"
  /assessments/{id}/risk-predictors:
    get:
      tags:
      - assessment-controller
      operationId: getRiskPredictors
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskPrediction"
  /assessments/timeline/{nomsId}:
    get:
      tags:
      - assessment-controller
      operationId: getTimeline
      parameters:
      - name: nomsId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timeline"
  /assessments/pni/{nomsId}:
    get:
      tags:
      - assessment-controller
      operationId: getPniCalculation
      parameters:
      - name: nomsId
        in: path
        required: true
        schema:
          type: string
      - name: community
        in: query
        required: true
        schema:
          type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PniCalculation"
components:
  schemas:
    JsonNode:
      type: object
    RiskPrediction:
      type: object
      properties:
        groupReconvictionScore:
          $ref: "#/components/schemas/YearPredictor"
        violencePredictorScore:
          $ref: "#/components/schemas/YearPredictor"
        generalPredictorScore:
          $ref: "#/components/schemas/YearPredictor"
        riskOfSeriousRecidivismScore:
          $ref: "#/components/schemas/RsrPredictor"
        sexualPredictorScore:
          $ref: "#/components/schemas/SexualPredictor"
    RsrPredictor:
      type: object
      properties:
        scoreLevel:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
          - NOT_APPLICABLE
        percentageScore:
          type: number
    SexualPredictor:
      type: object
      properties:
        ospIndecentPercentageScore:
          type: number
        ospContactPercentageScore:
          type: number
        ospIndecentPercentageScoreLevel:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
          - NOT_APPLICABLE
        ospContactPercentageScoreLevel:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
          - NOT_APPLICABLE
        ospIndirectImagePercentageScore:
          type: number
        ospDirectContactPercentageScore:
          type: number
        ospIndirectImagePercentageScoreLevel:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
          - NOT_APPLICABLE
        ospDirectContactPercentageScoreLevel:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
          - NOT_APPLICABLE
    YearPredictor:
      type: object
      properties:
        oneYear:
          type: number
        twoYears:
          type: number
        scoreLevel:
          type: string
          enum:
          - LOW
          - MEDIUM
          - HIGH
          - VERY_HIGH
          - NOT_APPLICABLE
    AssessmentSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        completedAt:
          type: string
          format: date-time
        type:
          type: string
        status:
          type: string
      required:
      - id
      - status
      - type
    Timeline:
      type: object
      properties:
        crn:
          type: string
        nomsId:
          type: string
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/AssessmentSummary"
      required:
      - timeline
    LevelScore:
      type: object
      properties:
        level:
          type: string
          enum:
          - H
          - M
          - L
        score:
          type: integer
          format: int32
      required:
      - level
      - score
    PniCalculation:
      type: object
      properties:
        sexDomain:
          $ref: "#/components/schemas/LevelScore"
        thinkingDomain:
          $ref: "#/components/schemas/LevelScore"
        relationshipDomain:
          $ref: "#/components/schemas/LevelScore"
        selfManagementDomain:
          $ref: "#/components/schemas/LevelScore"
        riskLevel:
          type: string
          enum:
          - H
          - M
          - L
        needLevel:
          type: string
          enum:
          - H
          - M
          - L
        totalDomainScore:
          type: integer
          format: int32
        pni:
          type: string
          enum:
          - H
          - M
          - A
          - O
        saraRiskLevel:
          $ref: "#/components/schemas/SaraRiskLevel"
        missingFields:
          type: array
          items:
            type: string
      required:
      - missingFields
      - needLevel
      - pni
      - relationshipDomain
      - riskLevel
      - saraRiskLevel
      - selfManagementDomain
      - sexDomain
      - thinkingDomain
      - totalDomainScore
    SaraRiskLevel:
      type: object
      properties:
        toPartner:
          type: integer
          format: int32
        toOther:
          type: integer
          format: int32
      required:
      - toOther
      - toPartner
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
