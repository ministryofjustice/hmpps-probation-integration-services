openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /assessments/{id}/section/{name}:
    get:
      tags:
      - assessment-controller
      operationId: getSection
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonNode'
  /assessments/timeline/{nomsId}:
    get:
      tags:
      - assessment-controller
      operationId: getTimeline
      parameters:
      - name: nomsId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Timeline'
components:
  schemas:
    JsonNode:
      type: object
    AssessmentSummary:
      required:
      - id
      - status
      - type
      type: object
      properties:
        id:
          type: integer
          format: int64
        completedAt:
          type: string
          format: date-time
        type:
          type: string
        status:
          type: string
    Timeline:
      required:
      - timeline
      type: object
      properties:
        crn:
          type: string
        nomsId:
          type: string
        timeline:
          type: array
          items:
            $ref: '#/components/schemas/AssessmentSummary'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
