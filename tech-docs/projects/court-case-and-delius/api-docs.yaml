openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-case/{crn}:
    get:
      tags:
      - probation-record-resource
      operationId: getOffenderDetailSummary
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffenderDetailSummary"
  /probation-case/{crn}/status:
    get:
      tags:
      - probation-status-resource
      operationId: getProbationStatus
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbationStatusDetail"
  /probation-case/{crn}/convictions/{convictionId}:
    get:
      tags:
      - conviction-resource
      operationId: getConvictionForOffenderByCrnAndConvictionId
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conviction"
  /probation-case/{crn}/all:
    get:
      tags:
      - probation-record-resource
      operationId: getOffenderDetail
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffenderDetail"
  /docs/asyncapi:
    get:
      tags:
      - async-api-controller
      operationId: asyncApi
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    ContactDetailsSummary:
      required:
      - emailAddresses
      - phoneNumbers
      type: object
      properties:
        allowSMS:
          type: boolean
        emailAddresses:
          type: array
          items:
            type: string
        phoneNumbers:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumber"
    Disability:
      required:
      - disabilityCondition
      - disabilityId
      - disabilityType
      - isActive
      - lastUpdatedDateTime
      - provisions
      - startDate
      type: object
      properties:
        lastUpdatedDateTime:
          type: string
          format: date-time
        disabilityCondition:
          $ref: "#/components/schemas/KeyValue"
        disabilityId:
          type: integer
          format: int64
        disabilityType:
          $ref: "#/components/schemas/KeyValue"
        endDate:
          type: string
          format: date
        isActive:
          type: boolean
        notes:
          type: string
        provisions:
          type: array
          items:
            $ref: "#/components/schemas/Provision"
        startDate:
          type: string
          format: date
    KeyValue:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    OffenderDetailSummary:
      required:
      - activeProbationManagedSentence
      - contactDetails
      - currentDisposal
      - currentExclusion
      - currentRestriction
      - dateOfBirth
      - firstName
      - gender
      - middleNames
      - offenderId
      - offenderProfile
      - otherIds
      - partitionArea
      - softDeleted
      - surname
      type: object
      properties:
        preferredName:
          type: string
        activeProbationManagedSentence:
          type: boolean
        contactDetails:
          $ref: "#/components/schemas/ContactDetailsSummary"
        currentDisposal:
          type: string
        currentExclusion:
          type: boolean
        currentRestriction:
          type: boolean
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        gender:
          type: string
        middleNames:
          type: array
          items:
            type: string
        offenderId:
          type: integer
          format: int64
        offenderProfile:
          $ref: "#/components/schemas/OffenderProfile"
        otherIds:
          $ref: "#/components/schemas/OtherIds"
        partitionArea:
          type: string
        previousSurname:
          type: string
        softDeleted:
          type: boolean
        surname:
          type: string
        title:
          type: string
    OffenderLanguages:
      required:
      - otherLanguages
      type: object
      properties:
        languageConcerns:
          type: string
        otherLanguages:
          type: array
          items:
            type: string
        primaryLanguage:
          type: string
        requiresInterpreter:
          type: boolean
    OffenderProfile:
      required:
      - disabilities
      - offenderLanguages
      - provisions
      type: object
      properties:
        genderIdentity:
          type: string
        selfDescribedGenderIdentity:
          type: string
        disabilities:
          type: array
          items:
            $ref: "#/components/schemas/Disability"
        ethnicity:
          type: string
        immigrationStatus:
          type: string
        nationality:
          type: string
        notes:
          type: string
        offenderDetails:
          type: string
        offenderLanguages:
          $ref: "#/components/schemas/OffenderLanguages"
        previousConviction:
          $ref: "#/components/schemas/PreviousConviction"
        provisions:
          type: array
          items:
            $ref: "#/components/schemas/Provision"
        religion:
          type: string
        remandStatus:
          type: string
        riskColour:
          type: string
        secondaryNationality:
          type: string
        sexualOrientation:
          type: string
    OtherIds:
      required:
      - crn
      type: object
      properties:
        crn:
          type: string
        croNumber:
          type: string
        immigrationNumber:
          type: string
        mostRecentPrisonerNumber:
          type: string
        niNumber:
          type: string
        nomsNumber:
          type: string
        pncNumber:
          type: string
    PhoneNumber:
      required:
      - type
      type: object
      properties:
        number:
          type: string
        type:
          type: string
    PreviousConviction:
      required:
      - convictionDate
      - detail
      type: object
      properties:
        convictionDate:
          type: string
          format: date
        detail:
          type: object
          additionalProperties:
            type: string
    Provision:
      required:
      - provisionId
      - provisionType
      - startDate
      type: object
      properties:
        category:
          $ref: "#/components/schemas/KeyValue"
        finishDate:
          type: string
          format: date
        notes:
          type: string
        provisionId:
          type: integer
          format: int64
        provisionType:
          $ref: "#/components/schemas/KeyValue"
        startDate:
          type: string
          format: date
    ProbationStatusDetail:
      required:
      - awaitingPsr
      - inBreach
      - preSentenceActivity
      - status
      type: object
      properties:
        status:
          type: string
          enum:
          - NO_RECORD
          - NOT_SENTENCED
          - PREVIOUSLY_KNOWN
          - CURRENT
        terminationDate:
          type: string
          format: date
        inBreach:
          type: boolean
        preSentenceActivity:
          type: boolean
        awaitingPsr:
          type: boolean
    AdditionalSentence:
      required:
      - additionalSentenceId
      - type
      type: object
      properties:
        additionalSentenceId:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/KeyValue"
        amount:
          type: number
        length:
          type: integer
          format: int64
        notes:
          type: string
    Appointments:
      required:
      - acceptableAbsences
      - attended
      - noOutcomeRecorded
      - total
      - unacceptableAbsences
      type: object
      properties:
        total:
          type: integer
          format: int64
        attended:
          type: integer
          format: int64
        acceptableAbsences:
          type: integer
          format: int64
        unacceptableAbsences:
          type: integer
          format: int64
        noOutcomeRecorded:
          type: integer
          format: int64
    Conviction:
      required:
      - active
      - awaitingPsr
      - convictionId
      - failureToComplyCount
      - inBreach
      - index
      - offences
      - referralDate
      type: object
      properties:
        convictionId:
          type: integer
          format: int64
        index:
          type: string
        active:
          type: boolean
        inBreach:
          type: boolean
        failureToComplyCount:
          type: integer
          format: int64
        breachEnd:
          type: string
          format: date
        awaitingPsr:
          type: boolean
        convictionDate:
          type: string
          format: date
        referralDate:
          type: string
          format: date
        offences:
          type: array
          items:
            $ref: "#/components/schemas/Offence"
        sentence:
          $ref: "#/components/schemas/Sentence"
        latestCourtAppearanceOutcome:
          $ref: "#/components/schemas/KeyValue"
        custody:
          $ref: "#/components/schemas/Custody"
        responsibleCourt:
          $ref: "#/components/schemas/Court"
        courtAppearance:
          $ref: "#/components/schemas/CourtAppearanceBasic"
        orderManagers:
          type: array
          items:
            $ref: "#/components/schemas/OrderManager"
    Court:
      required:
      - buildingName
      - code
      - courtId
      - courtType
      - courtTypeId
      - createdDatetime
      - lastUpdatedDatetime
      - probationArea
      - probationAreaId
      - selectable
      type: object
      properties:
        courtId:
          type: integer
          format: int64
        code:
          type: string
        selectable:
          type: boolean
        courtName:
          type: string
        telephoneNumber:
          type: string
        fax:
          type: string
        buildingName:
          type: string
        street:
          type: string
        locality:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        country:
          type: string
        courtTypeId:
          type: integer
          format: int64
        createdDatetime:
          type: string
          format: date-time
        lastUpdatedDatetime:
          type: string
          format: date-time
        probationAreaId:
          type: integer
          format: int64
        secureEmailAddress:
          type: string
        probationArea:
          $ref: "#/components/schemas/KeyValue"
        courtType:
          $ref: "#/components/schemas/KeyValue"
    CourtAppearanceBasic:
      required:
      - appearanceDate
      - appearanceType
      - courtAppearanceId
      - courtCode
      - crn
      type: object
      properties:
        courtAppearanceId:
          type: integer
          format: int64
        appearanceDate:
          type: string
          format: date-time
        courtCode:
          type: string
        courtName:
          type: string
        appearanceType:
          $ref: "#/components/schemas/KeyValue"
        crn:
          type: string
    Custody:
      required:
      - institution
      - keyDates
      - sentenceStartDate
      - status
      type: object
      properties:
        bookingNumber:
          type: string
        institution:
          $ref: "#/components/schemas/Institution"
        keyDates:
          $ref: "#/components/schemas/CustodyRelatedKeyDates"
        status:
          $ref: "#/components/schemas/KeyValue"
        sentenceStartDate:
          type: string
          format: date
    CustodyRelatedKeyDates:
      type: object
      properties:
        conditionalReleaseDate:
          type: string
          format: date
        licenceExpiryDate:
          type: string
          format: date
        hdcEligibilityDate:
          type: string
          format: date
        paroleEligibilityDate:
          type: string
          format: date
        sentenceExpiryDate:
          type: string
          format: date
        expectedReleaseDate:
          type: string
          format: date
        postSentenceSupervisionEndDate:
          type: string
          format: date
        expectedPrisonOffenderManagerHandoverStartDate:
          type: string
          format: date
        expectedPrisonOffenderManagerHandoverDate:
          type: string
          format: date
    Institution:
      required:
      - code
      - description
      - establishmentType
      - institutionId
      - institutionName
      - isEstablishment
      type: object
      properties:
        institutionId:
          type: integer
          format: int64
        isEstablishment:
          type: boolean
        code:
          type: string
        description:
          type: string
        institutionName:
          type: string
        establishmentType:
          $ref: "#/components/schemas/KeyValue"
        isPrivate:
          type: boolean
        nomsPrisonInstitutionCode:
          type: string
    Offence:
      required:
      - createdDatetime
      - detail
      - lastUpdatedDatetime
      - mainOffence
      - offenceId
      - offenderId
      type: object
      properties:
        offenceId:
          type: string
        mainOffence:
          type: boolean
        detail:
          $ref: "#/components/schemas/OffenceDetail"
        offenceDate:
          type: string
          format: date
        offenceCount:
          type: integer
          format: int64
        tics:
          type: integer
          format: int64
        verdict:
          type: string
        offenderId:
          type: integer
          format: int64
        createdDatetime:
          type: string
          format: date-time
        lastUpdatedDatetime:
          type: string
          format: date-time
    OffenceDetail:
      required:
      - code
      - description
      - mainCategoryAbbreviation
      - mainCategoryCode
      - mainCategoryDescription
      - ogrsOffenceCategory
      - subCategoryCode
      - subCategoryDescription
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        abbreviation:
          type: string
        mainCategoryCode:
          type: string
        mainCategoryDescription:
          type: string
        mainCategoryAbbreviation:
          type: string
        ogrsOffenceCategory:
          type: string
        subCategoryCode:
          type: string
        subCategoryDescription:
          type: string
        form20Code:
          type: string
        subCategoryAbbreviation:
          type: string
        cjitCode:
          type: string
    OrderManager:
      required:
      - dateStartOfAllocation
      - officerId
      - probationAreaCode
      - probationAreaId
      type: object
      properties:
        probationAreaId:
          type: integer
          format: int64
        teamId:
          type: integer
          format: int64
        officerId:
          type: integer
          format: int64
        name:
          type: string
        staffCode:
          type: string
        dateStartOfAllocation:
          type: string
          format: date-time
        dateEndOfAllocation:
          type: string
          format: date-time
        gradeCode:
          type: string
        teamCode:
          type: string
        probationAreaCode:
          type: string
    Sentence:
      required:
      - additionalSentences
      - cja2003Order
      - description
      - legacyOrder
      - sentenceId
      - sentenceType
      - startDate
      type: object
      properties:
        sentenceId:
          type: integer
          format: int64
        description:
          type: string
        originalLength:
          type: integer
          format: int64
        originalLengthUnits:
          type: string
        secondLength:
          type: integer
          format: int64
        secondLengthUnits:
          type: string
        defaultLength:
          type: integer
          format: int64
        effectiveLength:
          type: integer
          format: int64
        lengthInDays:
          type: integer
          format: int64
        expectedSentenceEndDate:
          type: string
          format: date
        unpaidWork:
          $ref: "#/components/schemas/UnpaidWork"
        startDate:
          type: string
          format: date
        terminationDate:
          type: string
          format: date
        terminationReason:
          type: string
        sentenceType:
          $ref: "#/components/schemas/KeyValue"
        additionalSentences:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalSentence"
        failureToComplyLimit:
          type: integer
          format: int64
        cja2003Order:
          type: boolean
        legacyOrder:
          type: boolean
    UnpaidWork:
      required:
      - appointments
      - minutesCompleted
      - minutesOrdered
      - status
      type: object
      properties:
        minutesOrdered:
          type: integer
          format: int64
        minutesCompleted:
          type: integer
          format: int64
        appointments:
          $ref: "#/components/schemas/Appointments"
        status:
          type: string
    Address:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        noFixedAbode:
          type: boolean
        notes:
          type: string
        addressNumber:
          type: string
        buildingName:
          type: string
        streetName:
          type: string
        district:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        telephoneNumber:
          type: string
        status:
          $ref: "#/components/schemas/KeyValue"
        type:
          $ref: "#/components/schemas/KeyValue"
        typeVerified:
          type: boolean
        latestAssessmentDate:
          type: string
          format: date-time
        createdDatetime:
          type: string
          format: date-time
        lastUpdatedDatetime:
          type: string
          format: date-time
    ContactDetails:
      required:
      - addresses
      - emailAddresses
      - phoneNumbers
      type: object
      properties:
        allowSMS:
          type: boolean
        emailAddresses:
          type: array
          items:
            type: string
        phoneNumbers:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumber"
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
    Human:
      required:
      - forenames
      - surname
      type: object
      properties:
        forenames:
          type: string
        surname:
          type: string
    OffenderAlias:
      required:
      - firstName
      - gender
      - id
      - middleNames
      - surname
      type: object
      properties:
        id:
          type: integer
          format: int64
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        middleNames:
          type: array
          items:
            type: string
        surname:
          type: string
        gender:
          type: string
    OffenderDetail:
      required:
      - activeProbationManagedSentence
      - contactDetails
      - currentDisposal
      - currentExclusion
      - currentRestriction
      - dateOfBirth
      - firstName
      - gender
      - middleNames
      - offenderAliases
      - offenderId
      - offenderManagers
      - offenderProfile
      - otherIds
      - partitionArea
      - softDeleted
      - surname
      type: object
      properties:
        preferredName:
          type: string
        activeProbationManagedSentence:
          type: boolean
        contactDetails:
          $ref: "#/components/schemas/ContactDetails"
        currentDisposal:
          type: string
        currentExclusion:
          type: boolean
        exclusionMessage:
          type: string
        currentRestriction:
          type: boolean
        restrictionMessage:
          type: string
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        gender:
          type: string
        middleNames:
          type: array
          items:
            type: string
        offenderId:
          type: integer
          format: int64
        offenderProfile:
          $ref: "#/components/schemas/OffenderProfile"
        offenderAliases:
          type: array
          items:
            $ref: "#/components/schemas/OffenderAlias"
        offenderManagers:
          type: array
          items:
            $ref: "#/components/schemas/OffenderManager"
        otherIds:
          $ref: "#/components/schemas/OtherIds"
        partitionArea:
          type: string
        currentTier:
          type: string
        previousSurname:
          type: string
        softDeleted:
          type: boolean
        surname:
          type: string
        title:
          type: string
    OffenderManager:
      required:
      - active
      - fromDate
      - partitionArea
      - probationArea
      - softDeleted
      - staff
      - team
      - trustOfficer
      type: object
      properties:
        trustOfficer:
          $ref: "#/components/schemas/Human"
        staff:
          $ref: "#/components/schemas/StaffHuman"
        providerEmployee:
          $ref: "#/components/schemas/Human"
        partitionArea:
          type: string
        softDeleted:
          type: boolean
        team:
          $ref: "#/components/schemas/Team"
        probationArea:
          $ref: "#/components/schemas/ProbationArea"
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date
        active:
          type: boolean
        allocationReason:
          $ref: "#/components/schemas/KeyValue"
    ProbationArea:
      required:
      - code
      - description
      - nps
      - probationAreaId
      type: object
      properties:
        probationAreaId:
          type: integer
          format: int64
        code:
          type: string
        description:
          type: string
        nps:
          type: boolean
    StaffHuman:
      required:
      - code
      - forename
      - isUnallocated
      - surname
      type: object
      properties:
        code:
          type: string
        forename:
          type: string
        surname:
          type: string
        isUnallocated:
          type: boolean
    Team:
      required:
      - borough
      - code
      - description
      - district
      - localDeliveryUnit
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        telephone:
          type: string
        emailAddress:
          type: string
        localDeliveryUnit:
          $ref: "#/components/schemas/KeyValue"
        district:
          $ref: "#/components/schemas/KeyValue"
        borough:
          $ref: "#/components/schemas/KeyValue"
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
