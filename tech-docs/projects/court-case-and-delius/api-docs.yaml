openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /secure/compare:
    post:
      tags:
      - community-api-controller
      operationId: compare
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Compare"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareReport"
  /secure/compareAll:
    post:
      tags:
      - community-api-controller
      operationId: compareAll
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompareAll"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompareAllReport"
  /secure/offenders/crn/{crn}:
    get:
      tags:
      - community-api-controller
      operationId: offenderSummary
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/convictions:
    get:
      tags:
      - community-api-controller
      operationId: convictions
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: activeOnly
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/convictions/{convictionId}:
    get:
      tags:
      - community-api-controller
      operationId: convictionForOffenderByCrnAndConvictionId
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/convictions/{convictionId}/requirements:
    get:
      tags:
      - community-api-controller
      operationId: convictionRequirements
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: activeOnly
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: excludeSoftDeleted
        in: query
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/convictions/{convictionId}/pssRequirements:
    get:
      tags:
      - community-api-controller
      operationId: pssByCrnAndConvictionId
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/convictions/{convictionId}/nsis:
    get:
      tags:
      - community-api-controller
      operationId: nsisByCrnAndConvictionId
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: nsiCodes
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/all:
    get:
      tags:
      - community-api-controller
      operationId: offenderDetail
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/offenders/crn/{crn}/allOffenderManagers:
    get:
      tags:
      - community-api-controller
      operationId: offenderManagers
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: includeProbationAreaTeams
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
  /secure/**:
    get:
      tags:
      - community-api-controller
      operationId: proxy
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /probation-case/{crn}:
    get:
      tags:
      - probation-record-resource
      operationId: getOffenderDetailSummary
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffenderDetailSummary"
  /probation-case/{crn}/status:
    get:
      tags:
      - probation-status-resource
      operationId: getProbationStatus
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbationStatusDetail"
  /probation-case/{crn}/convictions:
    get:
      tags:
      - conviction-resource
      operationId: getConvictionsForOffenderByCrn
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: activeOnly
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conviction"
  /probation-case/{crn}/convictions/{convictionId}:
    get:
      tags:
      - conviction-resource
      operationId: getConvictionForOffenderByCrnAndConvictionId
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conviction"
  /probation-case/{crn}/convictions/{convictionId}/requirements:
    get:
      tags:
      - conviction-resource
      operationId: getRequirementsForConviction
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: activeOnly
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: excludeSoftDeleted
        in: query
        required: false
        schema:
          type: boolean
          default: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvictionRequirements"
  /probation-case/{crn}/convictions/{convictionId}/pssRequirements:
    get:
      tags:
      - conviction-resource
      operationId: getPssRequirementsByConvictionId
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: convictionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PssRequirements"
  /probation-case/{crn}/convictions/{convictionId}/nsis:
    get:
      tags:
      - conviction-resource
      operationId: getNsisByCrnAndConvictionId
      parameters:
      - name: crn
        in: path
        description: CRN for the offender
        required: true
        schema:
          type: string
        example: A123456
      - name: convictionId
        in: path
        description: ID for the conviction / event
        required: true
        schema:
          type: integer
          format: int64
        example: 2500295345
      - name: nsiCodes
        in: query
        description: list of NSI codes to constrain by
        required: true
        schema:
          type: array
          items:
            type: string
        example: "BRE,BRES"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NsiDetails"
  /probation-case/{crn}/all:
    get:
      tags:
      - probation-record-resource
      operationId: getOffenderDetail
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OffenderDetail"
  /probation-case/{crn}/allOffenderManagers:
    get:
      tags:
      - probation-record-resource
      operationId: getAllOffenderManagers
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: includeProbationAreaTeams
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommunityOrPrisonOffenderManager"
  /docs/asyncapi:
    get:
      tags:
      - async-api-controller
      operationId: asyncApi
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
components:
  schemas:
    Compare:
      required:
      - params
      - uri
      type: object
      properties:
        params:
          type: object
          additionalProperties:
            type: object
        uri:
          type: string
    CompareReport:
      required:
      - endPointName
      - message
      - success
      type: object
      properties:
        endPointName:
          type: string
        message:
          type: string
        url:
          type: string
        testExecuted:
          type: boolean
        success:
          type: boolean
        issues:
          type: array
          items:
            type: string
    CompareAll:
      required:
      - pageNumber
      - pageSize
      - uriConfig
      type: object
      properties:
        crns:
          type: array
          items:
            type: string
        uriConfig:
          type: object
          additionalProperties:
            type: object
            additionalProperties:
              type: object
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
    CompareAllReport:
      required:
      - currentPageNumber
      - failureReports
      - numberOfSuccessfulRequests
      - numberOfUnsuccessfulRequests
      - totalNumberOfCrns
      - totalNumberOfRequests
      - totalPages
      - unableToBeExecuted
      type: object
      properties:
        totalNumberOfCrns:
          type: integer
          format: int32
        totalPages:
          type: integer
          format: int32
        currentPageNumber:
          type: integer
          format: int32
        totalNumberOfRequests:
          type: integer
          format: int32
        numberOfSuccessfulRequests:
          type: integer
          format: int32
        numberOfUnsuccessfulRequests:
          type: integer
          format: int32
        unableToBeExecuted:
          type: integer
          format: int32
        failureReports:
          type: array
          items:
            $ref: "#/components/schemas/CompareReport"
    ContactDetailsSummary:
      type: object
      properties:
        allowSMS:
          type: boolean
        emailAddresses:
          type: array
          items:
            type: string
        phoneNumbers:
          type: array
          items:
            $ref: "#/components/schemas/PhoneNumber"
    Disability:
      required:
      - disabilityCondition
      - disabilityId
      - disabilityType
      - isActive
      - lastUpdatedDateTime
      - startDate
      type: object
      properties:
        lastUpdatedDateTime:
          type: string
          format: date-time
        disabilityCondition:
          $ref: "#/components/schemas/KeyValue"
        disabilityId:
          type: integer
          format: int64
        disabilityType:
          $ref: "#/components/schemas/KeyValue"
        endDate:
          type: string
          format: date
        isActive:
          type: boolean
        notes:
          type: string
        provisions:
          type: array
          items:
            $ref: "#/components/schemas/Provision"
        startDate:
          type: string
          format: date
    KeyValue:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    OffenderDetailSummary:
      required:
      - activeProbationManagedSentence
      - contactDetails
      - currentDisposal
      - currentExclusion
      - currentRestriction
      - dateOfBirth
      - firstName
      - gender
      - middleNames
      - offenderId
      - offenderProfile
      - otherIds
      - partitionArea
      - softDeleted
      - surname
      type: object
      properties:
        preferredName:
          type: string
        activeProbationManagedSentence:
          type: boolean
        contactDetails:
          $ref: "#/components/schemas/ContactDetailsSummary"
        currentDisposal:
          type: string
        currentExclusion:
          type: boolean
        currentRestriction:
          type: boolean
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        gender:
          type: string
        middleNames:
          type: array
          items:
            type: string
        offenderId:
          type: integer
          format: int64
        offenderProfile:
          $ref: "#/components/schemas/OffenderProfile"
        otherIds:
          $ref: "#/components/schemas/OtherIds"
        partitionArea:
          type: string
        previousSurname:
          type: string
        softDeleted:
          type: boolean
        surname:
          type: string
        title:
          type: string
    OffenderLanguages:
      type: object
      properties:
        languageConcerns:
          type: string
        otherLanguages:
          type: array
          items:
            type: string
        primaryLanguage:
          type: string
        requiresInterpreter:
          type: boolean
    OffenderProfile:
      required:
      - offenderLanguages
      - previousConviction
      type: object
      properties:
        genderIdentity:
          type: string
        selfDescribedGender:
          type: string
        disabilities:
          type: array
          items:
            $ref: "#/components/schemas/Disability"
        ethnicity:
          type: string
        immigrationStatus:
          type: string
        nationality:
          type: string
        notes:
          type: string
        offenderDetails:
          type: string
        offenderLanguages:
          $ref: "#/components/schemas/OffenderLanguages"
        previousConviction:
          $ref: "#/components/schemas/PreviousConviction"
        provisions:
          type: array
          items:
            $ref: "#/components/schemas/Provision"
        religion:
          type: string
        remandStatus:
          type: string
        riskColour:
          type: string
        secondaryNationality:
          type: string
        sexualOrientation:
          type: string
    OtherIds:
      required:
      - crn
      type: object
      properties:
        crn:
          type: string
        croNumber:
          type: string
        immigrationNumber:
          type: string
        mostRecentPrisonerNumber:
          type: string
        niNumber:
          type: string
        nomsNumber:
          type: string
        pncNumber:
          type: string
    PhoneNumber:
      required:
      - type
      type: object
      properties:
        number:
          type: string
        type:
          type: string
    PreviousConviction:
      type: object
      properties:
        convictionDate:
          type: string
          format: date
        detail:
          type: object
          additionalProperties:
            type: string
    Provision:
      required:
      - provisionId
      - provisionType
      - startDate
      type: object
      properties:
        category:
          $ref: "#/components/schemas/KeyValue"
        finishDate:
          type: string
          format: date
        notes:
          type: string
        provisionId:
          type: integer
          format: int64
        provisionType:
          $ref: "#/components/schemas/KeyValue"
        startDate:
          type: string
          format: date
    ProbationStatusDetail:
      required:
      - awaitingPsr
      - inBreach
      - preSentenceActivity
      - status
      type: object
      properties:
        status:
          type: string
          enum:
          - NO_RECORD
          - NOT_SENTENCED
          - PREVIOUSLY_KNOWN
          - CURRENT
        terminationDate:
          type: string
          format: date
        inBreach:
          type: boolean
        preSentenceActivity:
          type: boolean
        awaitingPsr:
          type: boolean
    AdditionalSentence:
      required:
      - additionalSentenceId
      - type
      type: object
      properties:
        additionalSentenceId:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/KeyValue"
        amount:
          type: number
        length:
          type: integer
          format: int64
        notes:
          type: string
    Appointments:
      required:
      - acceptableAbsences
      - attended
      - noOutcomeRecorded
      - total
      - unacceptableAbsences
      type: object
      properties:
        total:
          type: integer
          format: int64
        attended:
          type: integer
          format: int64
        acceptableAbsences:
          type: integer
          format: int64
        unacceptableAbsences:
          type: integer
          format: int64
        noOutcomeRecorded:
          type: integer
          format: int64
    Conviction:
      required:
      - active
      - awaitingPsr
      - convictionId
      - failureToComplyCount
      - inBreach
      - index
      - offences
      - referralDate
      type: object
      properties:
        convictionId:
          type: integer
          format: int64
        index:
          type: string
        active:
          type: boolean
        inBreach:
          type: boolean
        failureToComplyCount:
          type: integer
          format: int64
        breachEnd:
          type: string
          format: date
        awaitingPsr:
          type: boolean
        convictionDate:
          type: string
          format: date
        referralDate:
          type: string
          format: date
        offences:
          type: array
          items:
            $ref: "#/components/schemas/Offence"
        sentence:
          $ref: "#/components/schemas/Sentence"
        latestCourtAppearanceOutcome:
          $ref: "#/components/schemas/KeyValue"
        custody:
          $ref: "#/components/schemas/Custody"
        responsibleCourt:
          $ref: "#/components/schemas/Court"
        courtAppearance:
          $ref: "#/components/schemas/CourtAppearanceBasic"
        orderManagers:
          type: array
          items:
            $ref: "#/components/schemas/OrderManager"
    Court:
      required:
      - code
      - courtId
      - courtType
      - courtTypeId
      - createdDatetime
      - lastUpdatedDatetime
      - probationArea
      - probationAreaId
      - selectable
      type: object
      properties:
        courtId:
          type: integer
          format: int64
        code:
          type: string
        selectable:
          type: boolean
        courtName:
          type: string
        telephoneNumber:
          type: string
        fax:
          type: string
        buildingName:
          type: string
        street:
          type: string
        locality:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        country:
          type: string
        courtTypeId:
          type: integer
          format: int64
        createdDatetime:
          type: string
          format: date-time
        lastUpdatedDatetime:
          type: string
          format: date-time
        probationAreaId:
          type: integer
          format: int64
        secureEmailAddress:
          type: string
        probationArea:
          $ref: "#/components/schemas/KeyValue"
        courtType:
          $ref: "#/components/schemas/KeyValue"
    CourtAppearanceBasic:
      required:
      - appearanceDate
      - appearanceType
      - courtAppearanceId
      - courtCode
      - crn
      type: object
      properties:
        courtAppearanceId:
          type: integer
          format: int64
        appearanceDate:
          type: string
          format: date-time
        courtCode:
          type: string
        courtName:
          type: string
        appearanceType:
          $ref: "#/components/schemas/KeyValue"
        crn:
          type: string
    Custody:
      required:
      - institution
      - keyDates
      - sentenceStartDate
      - status
      type: object
      properties:
        bookingNumber:
          type: string
        institution:
          $ref: "#/components/schemas/Institution"
        keyDates:
          $ref: "#/components/schemas/CustodyRelatedKeyDates"
        status:
          $ref: "#/components/schemas/KeyValue"
        sentenceStartDate:
          type: string
          format: date
    CustodyRelatedKeyDates:
      type: object
      properties:
        conditionalReleaseDate:
          type: string
          format: date
        licenceExpiryDate:
          type: string
          format: date
        hdcEligibilityDate:
          type: string
          format: date
        paroleEligibilityDate:
          type: string
          format: date
        sentenceExpiryDate:
          type: string
          format: date
        expectedReleaseDate:
          type: string
          format: date
        postSentenceSupervisionEndDate:
          type: string
          format: date
        expectedPrisonOffenderManagerHandoverStartDate:
          type: string
          format: date
        expectedPrisonOffenderManagerHandoverDate:
          type: string
          format: date
    Institution:
      required:
      - code
      - description
      - institutionId
      - isEstablishment
      type: object
      properties:
        institutionId:
          type: integer
          format: int64
        isEstablishment:
          type: boolean
        code:
          type: string
        description:
          type: string
        institutionName:
          type: string
        establishmentType:
          $ref: "#/components/schemas/KeyValue"
        isPrivate:
          type: boolean
        nomsPrisonInstitutionCode:
          type: string
    Offence:
      required:
      - createdDatetime
      - detail
      - lastUpdatedDatetime
      - mainOffence
      - offenceId
      - offenderId
      type: object
      properties:
        offenceId:
          type: string
        mainOffence:
          type: boolean
        detail:
          $ref: "#/components/schemas/OffenceDetail"
        offenceDate:
          type: string
          format: date-time
        offenceCount:
          type: integer
          format: int64
        tics:
          type: integer
          format: int64
        verdict:
          type: string
        offenderId:
          type: integer
          format: int64
        createdDatetime:
          type: string
          format: date-time
        lastUpdatedDatetime:
          type: string
          format: date-time
    OffenceDetail:
      required:
      - code
      - description
      - mainCategoryAbbreviation
      - mainCategoryCode
      - mainCategoryDescription
      - ogrsOffenceCategory
      - subCategoryCode
      - subCategoryDescription
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        abbreviation:
          type: string
        mainCategoryCode:
          type: string
        mainCategoryDescription:
          type: string
        mainCategoryAbbreviation:
          type: string
        ogrsOffenceCategory:
          type: string
        subCategoryCode:
          type: string
        subCategoryDescription:
          type: string
        form20Code:
          type: string
        subCategoryAbbreviation:
          type: string
        cjitCode:
          type: string
    OrderManager:
      required:
      - dateStartOfAllocation
      - officerId
      - probationAreaCode
      - probationAreaId
      type: object
      properties:
