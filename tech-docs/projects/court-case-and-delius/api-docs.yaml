openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-case/{crn}:
    get:
      tags:
      - probation-record-resource
      operationId: getOffenderDetailSummary
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OffenderDetailSummary'
  /probation-case/{crn}/status:
    get:
      tags:
      - probation-status-resource
      operationId: getProbationStatus
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbationStatusDetail'
  /probation-case/{crn}/all:
    get:
      tags:
      - probation-record-resource
      operationId: getOffenderDetail
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OffenderDetail'
components:
  schemas:
    ContactDetailsSummary:
      required:
      - emailAddresses
      - phoneNumbers
      type: object
      properties:
        allowSMS:
          type: boolean
        emailAddresses:
          type: array
          items:
            type: string
        phoneNumbers:
          type: array
          items:
            $ref: '#/components/schemas/PhoneNumber'
    Disability:
      required:
      - disabilityCondition
      - disabilityId
      - disabilityType
      - isActive
      - lastUpdatedDateTime
      - provisions
      - startDate
      type: object
      properties:
        lastUpdatedDateTime:
          type: string
          format: date-time
        disabilityCondition:
          $ref: '#/components/schemas/KeyValue'
        disabilityId:
          type: integer
          format: int64
        disabilityType:
          $ref: '#/components/schemas/KeyValue'
        endDate:
          type: string
          format: date
        isActive:
          type: boolean
        notes:
          type: string
        provisions:
          type: array
          items:
            $ref: '#/components/schemas/Provision'
        startDate:
          type: string
          format: date
    KeyValue:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    OffenderDetailSummary:
      required:
      - activeProbationManagedSentence
      - contactDetails
      - currentDisposal
      - currentExclusion
      - currentRestriction
      - dateOfBirth
      - firstName
      - gender
      - middleNames
      - offenderId
      - offenderProfile
      - otherIds
      - partitionArea
      - softDeleted
      - surname
      type: object
      properties:
        preferredName:
          type: string
        activeProbationManagedSentence:
          type: boolean
        contactDetails:
          $ref: '#/components/schemas/ContactDetailsSummary'
        currentDisposal:
          type: string
        currentExclusion:
          type: boolean
        currentRestriction:
          type: boolean
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        gender:
          type: string
        middleNames:
          type: array
          items:
            type: string
        offenderId:
          type: integer
          format: int64
        offenderProfile:
          $ref: '#/components/schemas/OffenderProfile'
        otherIds:
          $ref: '#/components/schemas/OtherIds'
        partitionArea:
          type: string
        previousSurname:
          type: string
        softDeleted:
          type: boolean
        surname:
          type: string
        title:
          type: string
    OffenderLanguages:
      required:
      - otherLanguages
      type: object
      properties:
        languageConcerns:
          type: string
        otherLanguages:
          type: array
          items:
            type: string
        primaryLanguage:
          type: string
        requiresInterpreter:
          type: boolean
    OffenderProfile:
      required:
      - disabilities
      - offenderLanguages
      - provisions
      type: object
      properties:
        genderIdentity:
          type: string
        selfDescribedGenderIdentity:
          type: string
        disabilities:
          type: array
          items:
            $ref: '#/components/schemas/Disability'
        ethnicity:
          type: string
        immigrationStatus:
          type: string
        nationality:
          type: string
        notes:
          type: string
        offenderDetails:
          type: string
        offenderLanguages:
          $ref: '#/components/schemas/OffenderLanguages'
        previousConviction:
          $ref: '#/components/schemas/PreviousConviction'
        provisions:
          type: array
          items:
            $ref: '#/components/schemas/Provision'
        religion:
          type: string
        remandStatus:
          type: string
        riskColour:
          type: string
        secondaryNationality:
          type: string
        sexualOrientation:
          type: string
    OtherIds:
      required:
      - crn
      type: object
      properties:
        crn:
          type: string
        croNumber:
          type: string
        immigrationNumber:
          type: string
        mostRecentPrisonerNumber:
          type: string
        niNumber:
          type: string
        nomsNumber:
          type: string
        pncNumber:
          type: string
    PhoneNumber:
      required:
      - type
      type: object
      properties:
        number:
          type: string
        type:
          type: string
    PreviousConviction:
      required:
      - convictionDate
      - detail
      type: object
      properties:
        convictionDate:
          type: string
          format: date
        detail:
          type: object
          additionalProperties:
            type: string
    Provision:
      required:
      - provisionId
      - provisionType
      - startDate
      type: object
      properties:
        category:
          $ref: '#/components/schemas/KeyValue'
        finishDate:
          type: string
          format: date
        notes:
          type: string
        provisionId:
          type: integer
          format: int64
        provisionType:
          $ref: '#/components/schemas/KeyValue'
        startDate:
          type: string
          format: date
    ProbationStatusDetail:
      required:
      - awaitingPsr
      - inBreach
      - preSentenceActivity
      - status
      type: object
      properties:
        status:
          type: string
          enum:
          - NO_RECORD
          - NOT_SENTENCED
          - PREVIOUSLY_KNOWN
          - CURRENT
        terminationDate:
          type: string
          format: date
        inBreach:
          type: boolean
        preSentenceActivity:
          type: boolean
        awaitingPsr:
          type: boolean
    Address:
      type: object
      properties:
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        noFixedAbode:
          type: boolean
        notes:
          type: string
        addressNumber:
          type: string
        buildingName:
          type: string
        streetName:
          type: string
        district:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        telephoneNumber:
          type: string
        status:
          $ref: '#/components/schemas/KeyValue'
        type:
          $ref: '#/components/schemas/KeyValue'
        typeVerified:
          type: boolean
        latestAssessmentDate:
          type: string
          format: date-time
        createdDatetime:
          type: string
          format: date-time
        lastUpdatedDatetime:
          type: string
          format: date-time
    ContactDetails:
      required:
      - addresses
      - emailAddresses
      - phoneNumbers
      type: object
      properties:
        allowSMS:
          type: boolean
        emailAddresses:
          type: array
          items:
            type: string
        phoneNumbers:
          type: array
          items:
            $ref: '#/components/schemas/PhoneNumber'
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
    Human:
      required:
      - forenames
      - surname
      type: object
      properties:
        forenames:
          type: string
        surname:
          type: string
    OffenderAlias:
      required:
      - firstName
      - gender
      - id
      - middleNames
      - surname
      type: object
      properties:
        id:
          type: integer
          format: int64
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        middleNames:
          type: array
          items:
            type: string
        surname:
          type: string
        gender:
          type: string
    OffenderDetail:
      required:
      - activeProbationManagedSentence
      - contactDetails
      - currentDisposal
      - currentExclusion
      - currentRestriction
      - dateOfBirth
      - firstName
      - gender
      - middleNames
      - offenderAliases
      - offenderId
      - offenderManagers
      - offenderProfile
      - otherIds
      - partitionArea
      - softDeleted
      - surname
      type: object
      properties:
        preferredName:
          type: string
        activeProbationManagedSentence:
          type: boolean
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
        currentDisposal:
          type: string
        currentExclusion:
          type: boolean
        exclusionMessage:
          type: string
        currentRestriction:
          type: boolean
        restrictionMessage:
          type: string
        dateOfBirth:
          type: string
          format: date
        firstName:
          type: string
        gender:
          type: string
        middleNames:
          type: array
          items:
            type: string
        offenderId:
          type: integer
          format: int64
        offenderProfile:
          $ref: '#/components/schemas/OffenderProfile'
        offenderAliases:
          type: array
          items:
            $ref: '#/components/schemas/OffenderAlias'
        offenderManagers:
          type: array
          items:
            $ref: '#/components/schemas/OffenderManager'
        otherIds:
          $ref: '#/components/schemas/OtherIds'
        partitionArea:
          type: string
        currentTier:
          type: string
        previousSurname:
          type: string
        softDeleted:
          type: boolean
        surname:
          type: string
        title:
          type: string
    OffenderManager:
      required:
      - active
      - fromDate
      - partitionArea
      - probationArea
      - softDeleted
      - staff
      - team
      - trustOfficer
      type: object
      properties:
        trustOfficer:
          $ref: '#/components/schemas/Human'
        staff:
          $ref: '#/components/schemas/StaffHuman'
        providerEmployee:
          $ref: '#/components/schemas/Human'
        partitionArea:
          type: string
        softDeleted:
          type: boolean
        team:
          $ref: '#/components/schemas/Team'
        probationArea:
          $ref: '#/components/schemas/ProbationArea'
        fromDate:
          type: string
          format: date
        toDate:
          type: string
          format: date
        active:
          type: boolean
        allocationReason:
          $ref: '#/components/schemas/KeyValue'
    ProbationArea:
      required:
      - code
      - description
      - nps
      - probationAreaId
      type: object
      properties:
        probationAreaId:
          type: integer
          format: int64
        code:
          type: string
        description:
          type: string
        nps:
          type: boolean
    StaffHuman:
      required:
      - code
      - forename
      - isUnallocated
      - surname
      type: object
      properties:
        code:
          type: string
        forename:
          type: string
        surname:
          type: string
        isUnallocated:
          type: boolean
    Team:
      required:
      - borough
      - code
      - description
      - district
      - localDeliveryUnit
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        telephone:
          type: string
        emailAddress:
          type: string
        localDeliveryUnit:
          $ref: '#/components/schemas/KeyValue'
        district:
          $ref: '#/components/schemas/KeyValue'
        borough:
          $ref: '#/components/schemas/KeyValue'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
