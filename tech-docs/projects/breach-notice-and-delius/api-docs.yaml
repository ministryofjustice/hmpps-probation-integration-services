openapi: 3.1.0
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /warning-types:
    get:
      tags:
      - warning-controller
      operationId: getWaringTypes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarningTypes"
  /warning-details/{crn}/{breachNoticeId}:
    get:
      tags:
      - warning-controller
      operationId: getWaringTypes_1
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: breachNoticeId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarningDetails"
  /next-appointment-details/{crn}:
    get:
      tags:
      - appointment-controller
      operationId: getFutureAppointments
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NextAppointmentDetails"
  /docs/asyncapi:
    get:
      tags:
      - async-api-controller
      operationId: asyncApi
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /basic-details/{crn}/{username}:
    get:
      tags:
      - breach-notice-controller
      operationId: getBasicDetails
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BasicDetails"
components:
  schemas:
    CodedDescription:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
      required:
      - code
      - description
    WarningTypes:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/CodedDescription"
      required:
      - content
    EnforceableContact:
      type: object
      properties:
        id:
          type: integer
          format: int64
        datetime:
          type: string
          format: date-time
        description:
          type: string
        type:
          $ref: "#/components/schemas/CodedDescription"
        outcome:
          $ref: "#/components/schemas/CodedDescription"
        notes:
          type: string
        requirement:
          $ref: "#/components/schemas/Requirement"
      required:
      - datetime
      - id
      - outcome
      - type
    Requirement:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/CodedDescription"
        subType:
          $ref: "#/components/schemas/CodedDescription"
      required:
      - id
      - type
    SentenceType:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        conditionBeingEnforced:
          type: string
      required:
      - code
      - conditionBeingEnforced
      - description
    WarningDetails:
      type: object
      properties:
        breachReasons:
          type: array
          items:
            $ref: "#/components/schemas/CodedDescription"
        sentenceTypes:
          type: array
          items:
            $ref: "#/components/schemas/SentenceType"
        defaultSentenceTypeCode:
          type: string
        enforceableContacts:
          type: array
          items:
            $ref: "#/components/schemas/EnforceableContact"
      required:
      - breachReasons
      - defaultSentenceTypeCode
      - enforceableContacts
      - sentenceTypes
    Address:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
        buildingName:
          type: string
        buildingNumber:
          type: string
        streetName:
          type: string
        townCity:
          type: string
        district:
          type: string
        county:
          type: string
        postcode:
          type: string
      required:
      - id
    Appointment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: "#/components/schemas/CodedDescription"
        datetime:
          type: string
          format: date-time
        description:
          type: string
        location:
          $ref: "#/components/schemas/Address"
        officer:
          $ref: "#/components/schemas/Officer"
      required:
      - datetime
      - id
      - officer
      - type
    Name:
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
      required:
      - forename
      - surname
    NextAppointmentDetails:
      type: object
      properties:
        responsibleOfficer:
          $ref: "#/components/schemas/ResponsibleOfficer"
        futureAppointments:
          type: array
          items:
            $ref: "#/components/schemas/Appointment"
      required:
      - futureAppointments
      - responsibleOfficer
    Officer:
      type: object
      properties:
        code:
          type: string
        name:
          $ref: "#/components/schemas/Name"
      required:
      - code
      - name
    ResponsibleOfficer:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        telephoneNumber:
          type: string
      required:
      - name
    BasicDetails:
      type: object
      properties:
        title:
          type: string
        name:
          $ref: "#/components/schemas/Name"
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        replyAddresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
      required:
      - addresses
      - name
      - replyAddresses
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
