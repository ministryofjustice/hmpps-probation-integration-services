openapi: 3.1.0
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://moj.enterprise.slack.com/archives/C02QSERFGMB
    email: probation-integration@JusticeUK.onmicrosoft.com
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /case-list/{username}:
    get:
      tags:
      - single-accommodation-controller
      operationId: getCaseList
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseListResponse"
components:
  schemas:
    Case:
      type: object
      properties:
        crn:
          type: string
        name:
          $ref: "#/components/schemas/Name"
        nomsNumber:
          type: string
        pncNumber:
          type: string
        dateOfBirth:
          type: string
          format: date
        staff:
          $ref: "#/components/schemas/Officer"
        team:
          $ref: "#/components/schemas/CodeDescription"
        gender:
          type: string
        roshLevel:
          $ref: "#/components/schemas/CodeDescription"
        expectedReleaseDate:
          type: string
          format: date
      required:
      - crn
      - dateOfBirth
      - gender
      - name
      - staff
      - team
    CaseListResponse:
      type: object
      properties:
        cases:
          type: array
          items:
            $ref: "#/components/schemas/Case"
      required:
      - cases
    CodeDescription:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
      required:
      - code
      - description
    Name:
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
      required:
      - forename
      - surname
    Officer:
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        username:
          type: string
        code:
          type: string
      required:
      - code
      - name
      - username
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
