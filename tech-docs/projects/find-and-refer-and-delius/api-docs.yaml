openapi: 3.1.0
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /users/{username}/access/{identifier}:
    get:
      tags:
      - user-controller
      summary: Provides the case access for a given user and case identifier (crn
        or prisoner number)
      operationId: checkAccess
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: identifier
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseAccess"
  /person/find/{identifier}:
    get:
      tags:
      - Person
      summary: Finds an offender with the provided identifier (crn or prisoner number)
      operationId: findPerson
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonResponse"
components:
  schemas:
    CaseAccess:
      type: object
      properties:
        crn:
          type: string
        userExcluded:
          type: boolean
        userRestricted:
          type: boolean
        exclusionMessage:
          type: string
        restrictionMessage:
          type: string
      required:
      - crn
      - userExcluded
      - userRestricted
    Name:
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
      required:
      - forename
      - surname
    PersonResponse:
      type: object
      properties:
        crn:
          type: string
        nomsNumber:
          type: string
        name:
          $ref: "#/components/schemas/Name"
        dateOfBirth:
          type: string
          format: date
        ethnicity:
          type: string
        gender:
          type: string
        probationDeliveryUnit:
          $ref: "#/components/schemas/ProbationDeliveryUnit"
        setting:
          type: string
      required:
      - crn
      - dateOfBirth
      - name
      - setting
    ProbationDeliveryUnit:
      type: object
      properties:
        code:
          type: string
        description:
          type: string
      required:
      - description
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
