openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-case/{prisonerId}/community-manager:
    get:
      tags:
      - api-controller
      summary: Get the current active community manager for a probation case
      description: "Accepts the prisoner identifier (NOMS number) and returns the\
        \ \n            currently active community manager of the probation case.\n\
        \            <p>Requires `ROLE_PRISON_EDUCATION_AND_DELIUS`.\n        "
      operationId: getCommunityManager
      parameters:
      - name: prisonerId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityManagerResponse'
        "404":
          description: No probation case found with the given prisoner identifier.
            This could mean the Prison and Probation cases have not been linked yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: 404
                message: Person with prisonerId of A0000AA not found
components:
  schemas:
    ErrorResponse:
      required:
      - status
      type: object
      properties:
        status:
          type: integer
          format: int32
        message:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    FieldError:
      type: object
      properties:
        type:
          type: string
        message:
          type: string
        field:
          type: string
    CommunityManagerResponse:
      required:
      - firstName
      - lastName
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
