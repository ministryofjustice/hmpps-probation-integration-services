openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /sentence/{crn}:
    get:
      tags:
      - Sentence
      summary: 'Display the most recent ‘Active Event’ '
      operationId: getOverview
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentenceOverview'
  /schedule/{crn}/upcoming:
    get:
      tags:
      - Sentence
      summary: 'Gets upcoming schedule information’ '
      operationId: getUpcomingSchedule
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
  /schedule/{crn}/previous:
    get:
      tags:
      - Sentence
      summary: 'Gets previous schedule information’ '
      operationId: getPreviousSchedule
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schedule'
  /schedule/{crn}/appointment/{contactId}:
    get:
      tags:
      - Sentence
      summary: 'Gets individual appointment information’ '
      operationId: getContact
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: contactId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonAppointment'
  /personal-details/{crn}:
    get:
      tags:
      - Personal Details
      summary: "Personal Details containing address, personal contacts and documents "
      operationId: getPersonalDetails
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalDetails'
  /personal-details/{crn}/summary:
    get:
      tags:
      - Personal Details
      summary: Person Summary
      operationId: getPersonSummary
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonSummary'
  /personal-details/{crn}/provisions:
    get:
      tags:
      - Personal Details
      summary: Person Provisions
      operationId: getPersonProvisions
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisionOverview'
  /personal-details/{crn}/personal-contact/{id}:
    get:
      tags:
      - Personal Details
      summary: Person Contact
      operationId: getPersonContact
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonalContact'
  /personal-details/{crn}/document/{documentId}:
    get:
      tags:
      - Personal Details
      summary: Download document
      operationId: downloadDocument
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: documentId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamingResponseBody'
  /personal-details/{crn}/disabilities:
    get:
      tags:
      - Personal Details
      summary: Person Disabilities
      operationId: getPersonDisabilities
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisabilityOverview'
  /personal-details/{crn}/circumstances:
    get:
      tags:
      - Personal Details
      summary: Person Circumstances
      operationId: getPersonCircumstances
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircumstanceOverview'
  /personal-details/{crn}/addresses:
    get:
      tags:
      - Personal Details
      summary: Person Addresses
      operationId: getPersonAddresses
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressOverview'
  /overview/{crn}:
    get:
      tags:
      - Overview
      summary: "MAS Overview containing Personal Details, Activity, Compliance, Schedule,\
        \ Orders and Sentences "
      operationId: getOverview_1
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Overview'
components:
  schemas:
    AdditionalSentence:
      required:
      - description
      type: object
      properties:
        length:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        notes:
          type: string
        description:
          type: string
    Conviction:
      required:
      - additionalSentences
      type: object
      properties:
        sentencingCourt:
          type: string
        responsibleCourt:
          type: string
        convictionDate:
          type: string
          format: date
        additionalSentences:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalSentence'
    Offence:
      required:
      - count
      - description
      type: object
      properties:
        description:
          type: string
        count:
          type: integer
          format: int64
    OffenceDetails:
      required:
      - additionalOffences
      type: object
      properties:
        offence:
          $ref: '#/components/schemas/Offence'
        dateOfOffence:
          type: string
          format: date
        notes:
          type: string
        additionalOffences:
          type: array
          items:
            $ref: '#/components/schemas/Offence'
    Sentence:
      required:
      - offence
      type: object
      properties:
        offence:
          $ref: '#/components/schemas/OffenceDetails'
        conviction:
          $ref: '#/components/schemas/Conviction'
    SentenceOverview:
      required:
      - sentences
      type: object
      properties:
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/Sentence'
    Appointment:
      required:
      - documents
      - hasOutcome
      - id
      - isInitial
      - isNationalStandard
      - lastUpdated
      - lastUpdatedBy
      - rescheduled
      - startDateTime
      - type
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        rarToolKit:
          type: string
        notes:
          type: string
        isSensitive:
          type: boolean
        hasOutcome:
          type: boolean
        wasAbsent:
          type: boolean
        officerName:
          $ref: '#/components/schemas/Name'
        isInitial:
          type: boolean
        isNationalStandard:
          type: boolean
        location:
          $ref: '#/components/schemas/OfficeAddress'
        rescheduled:
          type: boolean
        didTheyComply:
          type: boolean
        absentWaitingEvidence:
          type: boolean
        rearrangeOrCancelReason:
          type: string
        rescheduledBy:
          $ref: '#/components/schemas/Name'
        repeating:
          type: boolean
        nonComplianceReason:
          type: string
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        rarCategory:
          type: string
        acceptableAbsence:
          type: boolean
        acceptableAbsenceReason:
          type: string
        lastUpdated:
          type: string
          format: date-time
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
    Document:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        lastUpdated:
          type: string
          format: date-time
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
    OfficeAddress:
      required:
      - ldu
      - officeName
      type: object
      properties:
        officeName:
          type: string
        buildingName:
          type: string
        buildingNumber:
          type: string
        streetName:
          type: string
        district:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        ldu:
          type: string
        telephoneNumber:
          type: string
    PersonSummary:
      required:
      - crn
      - dateOfBirth
      - name
      - offenderId
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        crn:
          type: string
        offenderId:
          type: integer
          format: int64
        pnc:
          type: string
        dateOfBirth:
          type: string
          format: date
    Schedule:
      required:
      - appointments
      - personSummary
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        appointments:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
    PersonAppointment:
      required:
      - appointment
      - personSummary
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        appointment:
          $ref: '#/components/schemas/Appointment'
    Address:
      required:
      - from
      - lastUpdatedBy
      type: object
      properties:
        buildingName:
          type: string
        buildingNumber:
          type: string
        streetName:
          type: string
        district:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        telephoneNumber:
          type: string
        from:
          type: string
          format: date
        to:
          type: string
          format: date
        verified:
          type: boolean
        lastUpdated:
          type: string
          format: date
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
        type:
          type: string
        status:
          type: string
    Circumstances:
      required:
      - circumstances
      type: object
      properties:
        circumstances:
          type: array
          items:
            $ref: '#/components/schemas/PersonalCircumstance'
        lastUpdated:
          type: string
          format: date
    ContactAddress:
      required:
      - lastUpdated
      - lastUpdatedBy
      type: object
      properties:
        buildingName:
          type: string
        buildingNumber:
          type: string
        streetName:
          type: string
        district:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        lastUpdated:
          type: string
          format: date
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
    Disabilities:
      required:
      - disabilities
      type: object
      properties:
        disabilities:
          type: array
          items:
            type: string
        lastUpdated:
          type: string
          format: date
    PersonalCircumstance:
      required:
      - subType
      - type
      type: object
      properties:
        subType:
          type: string
        type:
          type: string
    PersonalContact:
      required:
      - contactId
      - lastUpdated
      - lastUpdatedBy
      - name
      - personSummary
      - relationshipType
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        contactId:
          type: integer
          format: int64
        name:
          $ref: '#/components/schemas/Name'
        relationship:
          type: string
        relationshipType:
          type: string
        address:
          $ref: '#/components/schemas/ContactAddress'
        notes:
          type: string
        phone:
          type: string
        email:
          type: string
        startDate:
          type: string
          format: date
        lastUpdated:
          type: string
          format: date
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
    PersonalDetails:
      required:
      - aliases
      - circumstances
      - contacts
      - crn
      - dateOfBirth
      - disabilities
      - documents
      - name
      - otherAddressCount
      - preferredGender
      - previousAddressCount
      - provisions
      - sex
      type: object
      properties:
        crn:
          type: string
        name:
          $ref: '#/components/schemas/Name'
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/PersonalContact'
        mainAddress:
          $ref: '#/components/schemas/Address'
        otherAddressCount:
          type: integer
          format: int32
        previousAddressCount:
          type: integer
          format: int32
        preferredGender:
          type: string
        dateOfBirth:
          type: string
          format: date
        preferredName:
          type: string
        previousSurname:
          type: string
        preferredLanguage:
          type: string
        genderIdentity:
          type: string
        selfDescribedGender:
          type: string
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/Name'
        telephoneNumber:
          type: string
        mobileNumber:
          type: string
        email:
          type: string
        circumstances:
          $ref: '#/components/schemas/Circumstances'
        disabilities:
          $ref: '#/components/schemas/Disabilities'
        provisions:
          $ref: '#/components/schemas/Provisions'
        pnc:
          type: string
        sex:
          type: string
        religionOrBelief:
          type: string
        sexualOrientation:
          type: string
        requiresInterpreter:
          type: boolean
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
    Provisions:
      required:
      - provisions
      type: object
      properties:
        provisions:
          type: array
          items:
            type: string
        lastUpdated:
          type: string
          format: date
    Provision:
      required:
      - description
      - lastUpdated
      - lastUpdatedBy
      - startDate
      type: object
      properties:
        description:
          type: string
        notes:
          type: string
        startDate:
          type: string
          format: date
        lastUpdated:
          type: string
          format: date
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
    ProvisionOverview:
      required:
      - personSummary
      - provisions
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        provisions:
          type: array
          items:
            $ref: '#/components/schemas/Provision'
    StreamingResponseBody:
      type: object
    Disability:
      required:
      - description
      - lastUpdated
      - lastUpdatedBy
      - startDate
      type: object
      properties:
        description:
          type: string
        notes:
          type: string
        startDate:
          type: string
          format: date
        lastUpdated:
          type: string
          format: date
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
    DisabilityOverview:
      required:
      - disabilities
      - personSummary
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        disabilities:
          type: array
          items:
            $ref: '#/components/schemas/Disability'
    Circumstance:
      required:
      - lastUpdated
      - lastUpdatedBy
      - startDate
      - subType
      - type
      type: object
      properties:
        type:
          type: string
        subType:
          type: string
        notes:
          type: string
        verified:
          type: boolean
        startDate:
          type: string
          format: date
        lastUpdated:
          type: string
          format: date
        lastUpdatedBy:
          $ref: '#/components/schemas/Name'
    CircumstanceOverview:
      required:
      - circumstances
      - personSummary
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        circumstances:
          type: array
          items:
            $ref: '#/components/schemas/Circumstance'
    AddressOverview:
      required:
      - otherAddresses
      - personSummary
      - previousAddresses
      type: object
      properties:
        personSummary:
          $ref: '#/components/schemas/PersonSummary'
        mainAddress:
          $ref: '#/components/schemas/Address'
        otherAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
        previousAddresses:
          type: array
          items:
            $ref: '#/components/schemas/Address'
    Activity:
      required:
      - acceptableAbsences
      - complied
      - nationalStandardsAppointments
      - rescheduled
      type: object
      properties:
        acceptableAbsences:
          type: integer
          format: int32
        complied:
          type: integer
          format: int32
        nationalStandardsAppointments:
          type: integer
          format: int32
        rescheduled:
          type: integer
          format: int32
    Compliance:
      required:
      - currentBreaches
      - failureToComplyInLast12Months
      type: object
      properties:
        currentBreaches:
          type: integer
          format: int32
        failureToComplyInLast12Months:
          type: integer
          format: int32
    Overview:
      required:
      - absencesWithoutEvidence
      - appointmentsWithoutOutcome
      - personalDetails
      - previousOrders
      - registrations
      - schedule
      - sentences
      type: object
      properties:
        appointmentsWithoutOutcome:
          type: integer
          format: int32
        absencesWithoutEvidence:
          type: integer
          format: int32
        activity:
          $ref: '#/components/schemas/Activity'
        compliance:
          $ref: '#/components/schemas/Compliance'
        personalDetails:
          $ref: '#/components/schemas/PersonalDetails'
        previousOrders:
          $ref: '#/components/schemas/PreviousOrders'
        schedule:
          $ref: '#/components/schemas/Schedule'
        sentences:
          type: array
          items:
            $ref: '#/components/schemas/Sentence'
        registrations:
          type: array
          items:
            type: string
    PreviousOrders:
      required:
      - breaches
      - count
      type: object
      properties:
        breaches:
          type: integer
          format: int32
        count:
          type: integer
          format: int32
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
