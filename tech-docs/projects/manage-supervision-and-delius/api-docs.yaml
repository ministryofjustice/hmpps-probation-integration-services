openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /caseload/user/{username}/search:
    post:
      tags:
      - Caseload Info
      summary: Gets caseloads for the user based on search filter
      operationId: searchUserCaseload
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
          default: nextContact.asc
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserSearchFilter"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffCaseload"
  /user/{username}/access/{crn}:
    get:
      tags:
      - User access
      operationId: checkAccess
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseAccess"
  /sentence/{crn}:
    get:
      tags:
      - Sentence
      summary: Display active events
      operationId: getOverview
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SentenceOverview"
  /sentence/{crn}/previous-orders:
    get:
      tags:
      - Sentence
      summary: Display inactive events
      operationId: getPreviousEvents
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviousOrderHistory"
  /sentence/{crn}/offences/{eventNumber}:
    get:
      tags:
      - Sentence
      summary: Display additional offence details
      operationId: getAdditionalOffenceDetails
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: eventNumber
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Offences"
  /sentence/{crn}/licence-condition/{licenceConditionId}/note/{noteId}:
    get:
      tags:
      - Sentence
      summary: Get licence condition note
      operationId: getLicenceConditionNote
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: licenceConditionId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: noteId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicenceConditionNoteDetail"
  /sentence/{crn}/contacts:
    get:
      tags:
      - Sentence
      summary: Display contacts
      operationId: getContacts
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalContact"
  /schedule/{crn}/upcoming:
    get:
      tags:
      - Schedule
      summary: 'Gets upcoming schedule information’ '
      operationId: getUpcomingSchedule
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
  /schedule/{crn}/previous:
    get:
      tags:
      - Schedule
      summary: 'Gets previous schedule information’ '
      operationId: getPreviousSchedule
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
  /schedule/{crn}/appointment/{contactId}:
    get:
      tags:
      - Schedule
      summary: 'Gets individual appointment information’ '
      operationId: getContact
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: contactId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonAppointment"
  /risk-flags/{crn}:
    get:
      tags:
      - Risk Flags
      summary: 'Gets all risk flags for an offender’ '
      operationId: getPersonRiskFlags
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonRiskFlags"
  /risk-flags/{crn}/{riskFlagId}:
    get:
      tags:
      - Risk Flags
      summary: 'Gets an individual risk flag for an offender’ '
      operationId: getPersonRiskFlag
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: riskFlagId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonRiskFlag"
  /personal-details/{crn}:
    get:
      tags:
      - Personal Details
      summary: "Personal Details containing address, personal contacts and documents "
      operationId: getPersonalDetails
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalDetails"
  /personal-details/{crn}/summary:
    get:
      tags:
      - Personal Details
      summary: Person Summary
      operationId: getPersonSummary
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonSummary"
  /personal-details/{crn}/provisions:
    get:
      tags:
      - Personal Details
      summary: Person Provisions
      operationId: getPersonProvisions
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProvisionOverview"
  /personal-details/{crn}/personal-contact/{id}:
    get:
      tags:
      - Personal Details
      summary: Person Contact
      operationId: getPersonContact
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonalContact"
  /personal-details/{crn}/document/{documentId}:
    get:
      tags:
      - Personal Details
      summary: Download document
      operationId: downloadDocument
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: documentId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamingResponseBody"
  /personal-details/{crn}/disabilities:
    get:
      tags:
      - Personal Details
      summary: Person Disabilities
      operationId: getPersonDisabilities
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisabilityOverview"
  /personal-details/{crn}/circumstances:
    get:
      tags:
      - Personal Details
      summary: Person Circumstances
      operationId: getPersonCircumstances
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircumstanceOverview"
  /personal-details/{crn}/addresses:
    get:
      tags:
      - Personal Details
      summary: Person Addresses
      operationId: getPersonAddresses
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressOverview"
  /overview/{crn}:
    get:
      tags:
      - Overview
      summary: "MAS Overview containing Personal Details, Activity, Compliance, Schedule,\
        \ Orders and Sentences "
      operationId: getOverview_1
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Overview"
  /compliance/{crn}:
    get:
      tags:
      - Compliance
      summary: Gets all compliance info for a person
      operationId: getPersonCompliance
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonCompliance"
  /caseload/user/{username}:
    get:
      tags:
      - Caseload Info
      summary: Gets caseloads for the user
      operationId: getUserCaseload
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffCaseload"
  /caseload/user/{username}/teams:
    get:
      tags:
      - Caseload Info
      summary: Gets the users teams
      operationId: getUserTeams
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTeam"
  /caseload/team/{teamCode}:
    get:
      tags:
      - Caseload Info
      summary: Gets the caseload for the team
      operationId: getTeamCaseload
      parameters:
      - name: teamCode
        in: path
        required: true
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCaseload"
  /caseload/team/{teamCode}/staff:
    get:
      tags:
      - Caseload Info
      summary: Gets the staff within the team
      operationId: getTeamStaff
      parameters:
      - name: teamCode
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamStaff"
  /activity/{crn}:
    get:
      tags:
      - Activity
      summary: 'Gets all activity for a person’ '
      operationId: getPersonActivity
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonActivity"
components:
  schemas:
    UserSearchFilter:
      type: object
      properties:
        nameOrCrn:
          type: string
        sentenceCode:
          type: string
        nextContactCode:
          type: string
    Appointment:
      required:
      - date
      - description
      - id
      type: object
      properties:
        id:
          type: integer
          format: int64
        date:
          type: string
          format: date-time
        description:
          type: string
    KeyPair:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    MetaData:
      required:
      - contactTypes
      - sentenceTypes
      type: object
      properties:
        sentenceTypes:
          type: array
          items:
            $ref: "#/components/schemas/KeyPair"
        contactTypes:
          type: array
          items:
            $ref: "#/components/schemas/KeyPair"
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
    StaffCase:
      required:
      - caseName
      - crn
      - dob
      - numberOfAdditionalSentences
      type: object
      properties:
        caseName:
          $ref: "#/components/schemas/Name"
        crn:
          type: string
        dob:
          type: string
          format: date
        nextAppointment:
          $ref: "#/components/schemas/Appointment"
        previousAppointment:
          $ref: "#/components/schemas/Appointment"
        latestSentence:
          type: string
        numberOfAdditionalSentences:
          type: integer
          format: int64
    StaffCaseload:
      required:
      - caseload
      - staff
      - totalElements
      - totalPages
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int32
        sortedBy:
          type: string
        provider:
          type: string
        staff:
          $ref: "#/components/schemas/Name"
        caseload:
          type: array
          items:
            $ref: "#/components/schemas/StaffCase"
        metaData:
          $ref: "#/components/schemas/MetaData"
    CaseAccess:
      required:
      - crn
      - userExcluded
      - userRestricted
      type: object
      properties:
        crn:
          type: string
        userExcluded:
          type: boolean
        userRestricted:
          type: boolean
        exclusionMessage:
          type: string
        restrictionMessage:
          type: string
    AdditionalSentence:
      required:
      - description
      type: object
      properties:
        length:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        notes:
          type: string
        description:
          type: string
    Conviction:
      required:
      - additionalSentences
      type: object
      properties:
        sentencingCourt:
          type: string
        responsibleCourt:
          type: string
        convictionDate:
          type: string
          format: date
        additionalSentences:
          type: array
          items:
            $ref: "#/components/schemas/AdditionalSentence"
    CourtDocument:
      required:
      - id
      type: object
      properties:
        id:
          type: string
        lastSaved:
          type: string
          format: date
        documentName:
          type: string
    LicenceCondition:
      required:
      - id
      - imposedReleasedDate
      - mainDescription
      type: object
      properties:
        id:
          type: integer
          format: int64
        mainDescription:
          type: string
        subTypeDescription:
          type: string
        imposedReleasedDate:
          type: string
          format: date
        actualStartDate:
          type: string
          format: date
        licenceConditionNotes:
          type: array
          items:
            $ref: "#/components/schemas/LicenceConditionNote"
        licenceConditionNote:
          $ref: "#/components/schemas/LicenceConditionNote"
    LicenceConditionNote:
      required:
      - id
      - note
      type: object
      properties:
        id:
          type: integer
          format: int32
        createdBy:
          type: string
        createdByDate:
          type: string
          format: date
        note:
          type: string
        hasNoteBeenTruncated:
          type: boolean
    Offence:
      required:
      - count
      - description
      type: object
      properties:
        description:
          type: string
        count:
          type: integer
          format: int64
    OffenceDetails:
      required:
      - additionalOffences
      - eventNumber
      type: object
      properties:
        eventNumber:
          type: string
        offence:
          $ref: "#/components/schemas/Offence"
        dateOfOffence:
          type: string
          format: date
        notes:
          type: string
        additionalOffences:
          type: array
          items:
            $ref: "#/components/schemas/Offence"
    Order:
      required:
      - description
      - startDate
      type: object
      properties:
        description:
          type: string
        length:
          type: integer
          format: int64
        endDate:
          type: string
          format: date
        startDate:
          type: string
          format: date
        status:
          type: string
        mainOffence:
          type: string
        breaches:
          type: integer
          format: int32
    PersonSummary:
      required:
      - crn
      - dateOfBirth
      - name
      - offenderId
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        crn:
          type: string
        offenderId:
          type: integer
          format: int64
        pnc:
          type: string
        dateOfBirth:
          type: string
          format: date
    ProbationHistory:
      required:
      - numberOfProfessionalContacts
      - numberOfTerminatedEventBreaches
      - numberOfTerminatedEvents
      type: object
      properties:
        numberOfTerminatedEvents:
          type: integer
          format: int32
        dateOfMostRecentTerminatedEvent:
          type: string
          format: date
        numberOfTerminatedEventBreaches:
          type: integer
          format: int32
        numberOfProfessionalContacts:
          type: integer
          format: int64
    Rar:
      required:
      - completed
      - scheduled
      - totalDays
      type: object
      properties:
        completed:
          type: integer
          format: int32
        scheduled:
          type: integer
          format: int32
        totalDays:
          type: integer
          format: int32
    Requirement:
      required:
      - actualStartDate
      - code
      - description
      type: object
      properties:
        code:
          type: string
        expectedStartDate:
          type: string
          format: date
        actualStartDate:
          type: string
          format: date
        expectedEndDate:
          type: string
          format: date
        actualEndDate:
          type: string
          format: date
        terminationReason:
          type: string
        description:
          type: string
        length:
          type: integer
          format: int64
        lengthUnitValue:
          type: string
        notes:
          type: string
        rar:
          $ref: "#/components/schemas/Rar"
    Sentence:
      required:
      - courtDocuments
      - licenceConditions
      - offenceDetails
      - requirements
      type: object
      properties:
        offenceDetails:
          $ref: "#/components/schemas/OffenceDetails"
        conviction:
          $ref: "#/components/schemas/Conviction"
        order:
          $ref: "#/components/schemas/Order"
        requirements:
          type: array
          items:
            $ref: "#/components/schemas/Requirement"
        courtDocuments:
          type: array
          items:
            $ref: "#/components/schemas/CourtDocument"
        unpaidWorkProgress:
          type: string
        licenceConditions:
          type: array
          items:
            $ref: "#/components/schemas/LicenceCondition"
    SentenceOverview:
      required:
      - personSummary
      - probationHistory
      - sentences
      type: object
      properties:
        personSummary:
          $ref: "#/components/schemas/PersonSummary"
        sentences:
          type: array
          items:
            $ref: "#/components/schemas/Sentence"
        probationHistory:
          $ref: "#/components/schemas/ProbationHistory"
    PreviousOrder:
      required:
      - title
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        terminationDate:
          type: string
          format: date
    PreviousOrderHistory:
      required:
      - name
      - previousOrders
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        previousOrders:
          type: array
          items:
            $ref: "#/components/schemas/PreviousOrder"
    Offences:
      required:
      - additionalOffences
      - mainOffence
      - name
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        mainOffence:
          $ref: "#/components/schemas/Offence"
        additionalOffences:
          type: array
          items:
            $ref: "#/components/schemas/Offence"
    LicenceConditionNoteDetail:
      required:
      - personSummary
      type: object
      properties:
        personSummary:
          $ref: "#/components/schemas/PersonSummary"
        licenceCondition:
          $ref: "#/components/schemas/LicenceCondition"
    Contact:
      required:
      - name
      - probationDeliveryUnit
      - provider
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        telephoneNumber:
          type: string
        provider:
          type: string
        probationDeliveryUnit:
          type: string
        team:
          type: string
        allocatedUntil:
          type: string
          format: date
    ProfessionalContact:
      required:
      - contacts
      - name
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        contacts:
          type: array
          items:
            $ref: "#/components/schemas/Contact"
    Activity:
      required:
      - documents
      - hasOutcome
      - id
      - isAppointment
      - isCommunication
      - isInitial
      - isNationalStandard
      - isPastAppointment
      - lastUpdated
      - lastUpdatedBy
      - rescheduled
      - rescheduledPop
      - rescheduledStaff
      - startDateTime
      - type
      type: object
      properties:
        id:
          type: integer
          format: int64
        eventNumber:
          type: string
        type:
          type: string
        startDateTime:
          type: string
          format: date-time
        endDateTime:
          type: string
          format: date-time
        rarToolKit:
          type: string
        notes:
          type: string
        isSensitive:
          type: boolean
        hasOutcome:
          type: boolean
        wasAbsent:
          type: boolean
        officerName:
          $ref: "#/components/schemas/Name"
        isInitial:
          type: boolean
        isNationalStandard:
          type: boolean
        location:
          $ref: "#/components/schemas/OfficeAddress"
        rescheduled:
          type: boolean
        rescheduledStaff:
          type: boolean
        rescheduledPop:
          type: boolean
        didTheyComply:
          type: boolean
        absentWaitingEvidence:
          type: boolean
        rearrangeOrCancelReason:
          type: string
        rescheduledBy:
          $ref: "#/components/schemas/Name"
        repeating:
          type: boolean
        nonComplianceReason:
          type: string
        documents:
          type: array
          items:
