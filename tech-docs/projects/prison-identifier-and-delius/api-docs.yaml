openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /person/populate-noms-number:
    get:
      tags:
      - person-update-controller
      operationId: populateNomsNumbers
      parameters:
      - name: trialOnly
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: crns
        in: query
        required: true
        schema:
          maxItems: 500
          minItems: 1
          type: array
          items:
            maxLength: 500
            minLength: 1
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NomsUpdates'
    post:
      tags:
      - person-update-controller
      operationId: populateNomsNumbers_1
      parameters:
      - name: trialOnly
        in: query
        required: false
        schema:
          type: boolean
          default: true
      requestBody:
        content:
          application/json:
            schema:
              maxItems: 500
              minItems: 1
              type: array
              items:
                maxLength: 500
                minLength: 1
                type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NomsUpdates'
components:
  schemas:
    MatchDetail:
      required:
      - nomsNumber
      - sentenceDate
      type: object
      properties:
        nomsNumber:
          type: string
        bookingRef:
          type: string
        sentenceDate:
          type: string
          format: date
    MatchReason:
      required:
      - message
      - potentialMatches
      type: object
      properties:
        message:
          type: string
        potentialMatches:
          type: array
          items:
            $ref: '#/components/schemas/MatchDetail'
    NomsUpdates:
      required:
      - personMatches
      type: object
      properties:
        personMatches:
          type: array
          items:
            $ref: '#/components/schemas/PersonMatch'
    PersonMatch:
      required:
      - crn
      - matchReason
      type: object
      properties:
        crn:
          type: string
        matchDetail:
          $ref: '#/components/schemas/MatchDetail'
        matchReason:
          $ref: '#/components/schemas/MatchReason'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
