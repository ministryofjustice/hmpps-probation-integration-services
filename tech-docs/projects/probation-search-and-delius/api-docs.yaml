openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-search/audit/contact-search:
    post:
      tags:
      - search-audit-resource
      operationId: auditContactSearch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactSearchAuditRequest'
        required: true
      responses:
        "201":
          description: Created
components:
  schemas:
    ContactSearchAuditRequest:
      required:
      - dateTime
      - pagination
      - search
      - username
      type: object
      properties:
        search:
          $ref: '#/components/schemas/ContactSearchRequest'
        username:
          type: string
        pagination:
          $ref: '#/components/schemas/PageRequest'
        dateTime:
          type: string
          format: date-time
    ContactSearchRequest:
      required:
      - crn
      - matchAllTerms
      type: object
      properties:
        crn:
          type: string
        query:
          type: string
        matchAllTerms:
          type: boolean
    PageRequest:
      required:
      - page
      - pageSize
      type: object
      properties:
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        sort:
          type: string
        direction:
          type: string
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
