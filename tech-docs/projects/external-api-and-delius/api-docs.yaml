openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
tags:
- name: Case Details
  description: Requires PROBATION_API__HMPPS_API__CASE_DETAIL
paths:
  /case/{crn}/supervisions:
    get:
      tags:
      - Case Details
      summary: "Get a list of supervisions (called “events” in Delius) for a probation\
        \ case, by CRN"
      operationId: supervisions
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupervisionResponse'
components:
  schemas:
    CourtAppearance:
      required:
      - court
      - date
      - type
      type: object
      properties:
        type:
          type: string
        date:
          type: string
          format: date-time
        court:
          type: string
        plea:
          type: string
    Manager:
      required:
      - allocated
      - code
      - name
      - team
      type: object
      properties:
        code:
          type: string
        name:
          $ref: '#/components/schemas/Name'
        username:
          type: string
        email:
          type: string
        telephoneNumber:
          type: string
        team:
          $ref: '#/components/schemas/Team'
        allocated:
          type: boolean
    MappaDetail:
      required:
      - startDate
      type: object
      properties:
        level:
          type: integer
          format: int32
        levelDescription:
          type: string
        category:
          type: integer
          format: int32
        categoryDescription:
          type: string
        startDate:
          type: string
          format: date
        reviewDate:
          type: string
          format: date
        notes:
          type: string
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        surname:
          type: string
    Offence:
      required:
      - code
      - description
      type: object
      properties:
        date:
          type: string
          format: date
        count:
          type: integer
          format: int32
        code:
          type: string
        description:
          type: string
        mainCategory:
          $ref: '#/components/schemas/OffenceCategory'
        subCategory:
          $ref: '#/components/schemas/OffenceCategory'
        schedule15SexualOffence:
          type: boolean
        schedule15ViolentOffence:
          type: boolean
    OffenceCategory:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Provider:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Sentence:
      required:
      - custodial
      - date
      - description
      type: object
      properties:
        description:
          type: string
        date:
          type: string
          format: date
        length:
          type: integer
          format: int32
        lengthUnits:
          type: string
          enum:
          - Hours
          - Days
          - Weeks
          - Months
          - Years
        custodial:
          type: boolean
    Supervision:
      required:
      - active
      - number
      type: object
      properties:
        number:
          type: integer
          format: int32
        active:
          type: boolean
        date:
          type: string
          format: date
        sentence:
          $ref: '#/components/schemas/Sentence'
        mainOffence:
          $ref: '#/components/schemas/Offence'
        additionalOffences:
          type: array
          items:
            $ref: '#/components/schemas/Offence'
        courtAppearances:
          type: array
          items:
            $ref: '#/components/schemas/CourtAppearance'
    SupervisionResponse:
      required:
      - communityManager
      - supervisions
      type: object
      properties:
        communityManager:
          $ref: '#/components/schemas/Manager'
        mappaDetail:
          $ref: '#/components/schemas/MappaDetail'
        supervisions:
          type: array
          items:
            $ref: '#/components/schemas/Supervision'
    Team:
      required:
      - code
      - description
      - provider
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        email:
          type: string
        telephoneNumber:
          type: string
        provider:
          $ref: '#/components/schemas/Provider'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
