openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-cases/{crn}/release:
    get:
      tags:
      - sentence-resource
      operationId: getReleaseRecall
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseRecall'
  /probation-cases/{crn}/registrations:
    get:
      tags:
      - registration-resource
      operationId: getActiveRegistrations
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registrations'
components:
  schemas:
    CodeDescription:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Institution:
      required:
      - code
      - description
      - institutionId
      - isEstablishment
      type: object
      properties:
        institutionId:
          type: integer
          format: int64
        isEstablishment:
          type: boolean
        code:
          type: string
        description:
          type: string
        institutionName:
          type: string
        establishmentType:
          $ref: '#/components/schemas/CodeDescription'
        isPrivate:
          type: boolean
        nomsPrisonInstitutionCode:
          type: string
    Recall:
      required:
      - date
      - reason
      type: object
      properties:
        date:
          type: string
          format: date
        reason:
          $ref: '#/components/schemas/CodeDescription'
        notes:
          type: string
    Release:
      required:
      - date
      - reason
      type: object
      properties:
        date:
          type: string
          format: date
        notes:
          type: string
        institution:
          $ref: '#/components/schemas/Institution'
        reason:
          $ref: '#/components/schemas/CodeDescription'
    ReleaseRecall:
      type: object
      properties:
        lastRelease:
          $ref: '#/components/schemas/Release'
        lastRecall:
          $ref: '#/components/schemas/Recall'
    Officer:
      required:
      - code
      - forename
      - isUnallocated
      - surname
      type: object
      properties:
        code:
          type: string
        forename:
          type: string
        surname:
          type: string
        isUnallocated:
          type: boolean
    Registration:
      required:
      - active
      - offenderId
      - registeringOfficer
      - registeringProbationArea
      - registeringTeam
      - registrationId
      - registrationReviews
      - startDate
      - type
      - warnUser
      type: object
      properties:
        registrationId:
          type: integer
          format: int64
        offenderId:
          type: integer
          format: int64
        register:
          $ref: '#/components/schemas/CodeDescription'
        type:
          $ref: '#/components/schemas/CodeDescription'
        riskColour:
          type: string
        startDate:
          type: string
          format: date
        nextReviewDate:
          type: string
          format: date
        reviewPeriodMonths:
          type: integer
          format: int64
        notes:
          type: string
        registeringTeam:
          $ref: '#/components/schemas/CodeDescription'
        registeringOfficer:
          $ref: '#/components/schemas/Officer'
        registeringProbationArea:
          $ref: '#/components/schemas/CodeDescription'
        registerLevel:
          $ref: '#/components/schemas/CodeDescription'
        registerCategory:
          $ref: '#/components/schemas/CodeDescription'
        warnUser:
          type: boolean
        active:
          type: boolean
        registrationReviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
    Registrations:
      required:
      - registrations
      type: object
      properties:
        registrations:
          type: array
          items:
            $ref: '#/components/schemas/Registration'
    Review:
      required:
      - completed
      - reviewDate
      - reviewingOfficer
      - reviewingTeam
      type: object
      properties:
        reviewDate:
          type: string
          format: date
        reviewDateDue:
          type: string
          format: date
        notes:
          type: string
        reviewingTeam:
          $ref: '#/components/schemas/CodeDescription'
        reviewingOfficer:
          $ref: '#/components/schemas/Officer'
        completed:
          type: boolean
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
