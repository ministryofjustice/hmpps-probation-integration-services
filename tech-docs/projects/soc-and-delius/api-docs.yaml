openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-areas:
    get:
      tags:
      - probation-areas-controller
      operationId: probationAreas
      parameters:
      - name: includeNonSelectable
        in: query
        description: Include (true) or exclude (false) any probation areas that are
          not selectable
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbationAreaContainer'
  /detail/{value}:
    get:
      tags:
      - detail-controller
      operationId: convictions
      parameters:
      - name: value
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
          default: CRN
          enum:
          - CRN
          - NOMS
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Detail'
  /court-appearances/{value}:
    get:
      tags:
      - court-appearances-controller
      operationId: courtAppearances
      parameters:
      - name: value
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
          default: CRN
          enum:
          - CRN
          - NOMS
      - name: fromDate
        in: query
        required: false
        schema:
          type: string
          format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourtAppearancesContainer'
  /convictions/{value}:
    get:
      tags:
      - conviction-controller
      operationId: convictions_1
      parameters:
      - name: value
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
          default: CRN
          enum:
          - CRN
          - NOMS
      - name: activeOnly
        in: query
        required: false
        schema:
          type: boolean
          default: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvictionsContainer'
components:
  schemas:
    LocalDeliveryUnit:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    ProbationArea:
      required:
      - code
      - description
      - localDeliveryUnits
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        localDeliveryUnits:
          type: array
          items:
            $ref: '#/components/schemas/LocalDeliveryUnit'
    ProbationAreaContainer:
      required:
      - probationAreas
      type: object
      properties:
        probationAreas:
          type: array
          items:
            $ref: '#/components/schemas/ProbationArea'
    Detail:
      required:
      - activeProbationManagedSentence
      - crn
      - currentlyInPrison
      - dateOfBirth
      - keyDates
      - name
      - offenderManager
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        dateOfBirth:
          type: string
          format: date
        crn:
          type: string
        nomisId:
          type: string
        pncNumber:
          type: string
        offenderManager:
          $ref: '#/components/schemas/Manager'
        activeProbationManagedSentence:
          type: boolean
        currentlyInPrison:
          type: boolean
        mainOffence:
          type: string
        profile:
          $ref: '#/components/schemas/Profile'
        keyDates:
          type: array
          items:
            $ref: '#/components/schemas/KeyDate'
        releaseDate:
          type: string
          format: date
        releaseReason:
          type: string
        releaseLocation:
          type: string
        lastRecallDate:
          type: string
          format: date
        recallReason:
          type: string
        nsiRecallDate:
          type: string
          format: date
        nsiBreachDate:
          type: string
          format: date
    KeyDate:
      required:
      - code
      - data
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        data:
          type: string
          format: date
    Ldu:
      required:
      - code
      - name
      type: object
      properties:
        code:
          type: string
        name:
          type: string
    Manager:
      required:
      - name
      - provider
      - team
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        team:
          $ref: '#/components/schemas/Team'
        provider:
          $ref: '#/components/schemas/Provider'
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
    Profile:
      type: object
      properties:
        nationality:
          type: string
        religion:
          type: string
    Provider:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Team:
      required:
      - code
      - localDeliveryUnit
      type: object
      properties:
        code:
          type: string
        localDeliveryUnit:
          $ref: '#/components/schemas/Ldu'
    CourtAppearance:
      required:
      - appearanceDate
      - courtAppearanceId
      - courtCode
      - courtName
      - crn
      - offenderId
      - type
      type: object
      properties:
        appearanceDate:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/Type'
        courtCode:
          type: string
        courtName:
          type: string
        crn:
          type: string
        courtAppearanceId:
          type: integer
          format: int64
        offenderId:
          type: integer
          format: int64
    CourtAppearancesContainer:
      required:
      - courtAppearances
      type: object
      properties:
        courtAppearances:
          type: array
          items:
            $ref: '#/components/schemas/CourtAppearance'
    Type:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Conviction:
      required:
      - convictionId
      - offences
      - outcome
      - referralDate
      type: object
      properties:
        convictionId:
          type: integer
          format: int64
        convictionDate:
          type: string
          format: date
        referralDate:
          type: string
          format: date
        outcome:
          type: string
        offences:
          type: array
          items:
            $ref: '#/components/schemas/Offence'
        sentence:
          $ref: '#/components/schemas/Sentence'
    ConvictionsContainer:
      required:
      - convictions
      type: object
      properties:
        convictions:
          type: array
          items:
            $ref: '#/components/schemas/Conviction'
    Custody:
      required:
      - keyDates
      - status
      type: object
      properties:
        bookingNumber:
          type: string
        status:
          $ref: '#/components/schemas/CustodyStatus'
        keyDates:
          type: array
          items:
            $ref: '#/components/schemas/KeyDate'
    CustodyStatus:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Offence:
      required:
      - description
      - mainOffence
      - offenceId
      type: object
      properties:
        offenceId:
          type: integer
          format: int64
        description:
          type: string
        mainCategoryDescription:
          type: string
        mainOffence:
          type: boolean
    Sentence:
      required:
      - sentenceId
      - startDate
      type: object
      properties:
        sentenceId:
          type: integer
          format: int64
        startDate:
          type: string
          format: date
        expectedEndDate:
          type: string
          format: date
        custody:
          $ref: '#/components/schemas/Custody'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
