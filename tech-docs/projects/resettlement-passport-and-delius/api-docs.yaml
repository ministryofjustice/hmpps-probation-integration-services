openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /duty-to-refer-nsi/{value}:
    get:
      tags:
      - api-controller
      operationId: findPerson
      parameters:
      - name: value
        in: path
        required: true
        schema:
          type: string
      - name: type
        in: query
        required: false
        schema:
          type: string
          default: CRN
          enum:
          - CRN
          - NOMS
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DutyToReferNSI'
components:
  schemas:
    DutyToReferNSI:
      required:
      - nsiSubType
      - referralDate
      - status
      type: object
      properties:
        nsiSubType:
          type: string
        referralDate:
          type: string
          format: date
        provider:
          type: string
        team:
          type: string
        officer:
          $ref: '#/components/schemas/Officer'
        status:
          type: string
        startDateTime:
          type: string
          format: date-time
        notes:
          type: string
        mainAddress:
          $ref: '#/components/schemas/MainAddress'
    MainAddress:
      type: object
      properties:
        buildingName:
          type: string
        addressNumber:
          type: string
        streetName:
          type: string
        district:
          type: string
        town:
          type: string
        county:
          type: string
        postcode:
          type: string
        noFixedAbode:
          type: boolean
    Officer:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        surname:
          type: string
        middleName:
          type: string
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
