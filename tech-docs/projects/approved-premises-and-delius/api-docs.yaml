openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /users/access:
    get:
      tags:
      - user-controller
      operationId: userAccessCheck
      parameters:
      - name: username
        in: query
        required: false
        schema:
          type: string
      - name: crns
        in: query
        required: true
        schema:
          maxItems: 500
          minItems: 1
          type: array
          items:
            maxLength: 500
            minLength: 1
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccess'
    post:
      tags:
      - user-controller
      operationId: userAccessCheck_1
      parameters:
      - name: username
        in: query
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              maxItems: 500
              minItems: 1
              type: array
              items:
                maxLength: 500
                minLength: 1
                type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserAccess'
  /probation-cases/summaries:
    get:
      tags:
      - case-controller
      operationId: getCaseSummaries
      parameters:
      - name: crns
        in: query
        required: true
        schema:
          maxItems: 500
          minItems: 1
          type: array
          items:
            maxLength: 500
            minLength: 1
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseSummaries'
    post:
      tags:
      - case-controller
      operationId: getCaseSummaries_1
      requestBody:
        content:
          application/json:
            schema:
              maxItems: 500
              minItems: 1
              type: array
              items:
                maxLength: 500
                minLength: 1
                type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseSummaries'
  /teams/managingCase/{crn}:
    get:
      tags:
      - team-controller
      summary: List all teams involved in managing the probation case
      description: "A probation case may be managed by staff members who\n       \
        \     are associated with multiple teams in Delius. Approve Premises users\n\
        \            need to view all applications that may be covered by direct colleagues\n\
        \            in order to cover absence and other workload-related issues.\
        \ Respond\n            with a list of every team code that covers the probation\
        \ case identified\n            by the CRN to enable the Approved Premises\
        \ service to present the\n            relevant list of Approved Premises applications\
        \ to it's users.\n        "
      operationId: getTeamsManagingCase
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: staffCode
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCodeResponse'
  /staff/{userName}:
    get:
      tags:
      - staff-controller
      summary: Get the staff name by username
      description: "Returns the Staff name associated with the given username.\n \
        \           "
      operationId: getStaffByUsername
      parameters:
      - name: userName
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffDetail'
  /probation-cases/{crn}/details:
    get:
      tags:
      - case-controller
      operationId: getCaseDetail
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseDetail'
  /probation-case/{crn}/referrals:
    get:
      tags:
      - referral-controller
      operationId: findReferralsForCrn
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistingReferrals'
  /documents/{crn}/{id}:
    get:
      tags:
      - Documents
      summary: Download document content
      operationId: downloadDocument
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
                format: binary
  /documents/{crn}/all:
    get:
      tags:
      - Documents
      summary: List of documents held in Delius for the probation case
      description: "List of documents available in Delius for the probation\n    \
        \        case identified by the CRN provided in the request. Document list\n\
        \            includes summary information on the type and purpose of document\
        \ held.\n        "
      operationId: findDocuments
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APDocument'
  /approved-premises/{code}/staff:
    get:
      tags:
      - staff-controller
      summary: List all members of staff that are keyworkers in the Approved Premises
      description: "An Approved Premises is defined in Delius as part of reference\
        \ data.\n            Probation staff members can be linked to an Approved\
        \ Premises as either staff\n            members or keyworkers via the \"Approved\
        \ Premises and Teams\" screen of the Delius\n            user interface. Keyworkers\
        \ are defined via the \"Approved Premises and Key Workers\"\n            screen\
        \ of the Delius user interface. Respond with a list of all members of staff\n\
        \            defined as keyworkers for the Approved Premises identified by\
        \ the requested code.\n            "
      operationId: getStaff
      parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
      - name: keyWorker
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: pageable
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/Pageable'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageStaffResponse'
components:
  schemas:
    CaseAccess:
      required:
      - crn
      - userExcluded
      - userRestricted
      type: object
      properties:
        crn:
          type: string
        userExcluded:
          type: boolean
        userRestricted:
          type: boolean
        exclusionMessage:
          type: string
        restrictionMessage:
          type: string
    UserAccess:
      required:
      - access
      type: object
      properties:
        access:
          type: array
          items:
            $ref: '#/components/schemas/CaseAccess'
    CaseSummaries:
      required:
      - cases
      type: object
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/CaseSummary'
    CaseSummary:
      required:
      - crn
      - currentExclusion
      - currentRestriction
      - dateOfBirth
      - manager
      - name
      type: object
      properties:
        crn:
          type: string
        nomsId:
          type: string
        name:
          $ref: '#/components/schemas/Name'
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
        profile:
          $ref: '#/components/schemas/Profile'
        manager:
          $ref: '#/components/schemas/Manager'
        currentExclusion:
          type: boolean
        currentRestriction:
          type: boolean
    Ldu:
      required:
      - code
      - name
      type: object
      properties:
        code:
          type: string
        name:
          type: string
    Manager:
      required:
      - team
      type: object
      properties:
        team:
          $ref: '#/components/schemas/Team'
    Name:
      required:
      - forename
      - middleNames
      - surname
      type: object
      properties:
        forename:
          type: string
        surname:
          type: string
        middleNames:
          type: array
          items:
            type: string
    Profile:
      type: object
      properties:
        ethnicity:
          type: string
        genderIdentity:
          type: string
        nationality:
          type: string
        religion:
          type: string
    Team:
      required:
      - code
      - ldu
      - name
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        ldu:
          $ref: '#/components/schemas/Ldu'
    TeamCodeResponse:
      required:
      - teamCodes
      type: object
      properties:
        teamCodes:
          type: array
          items:
            type: string
    PersonName:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        surname:
          type: string
        middleName:
          type: string
    StaffDetail:
      required:
      - code
      - name
      - username
      type: object
      properties:
        username:
          type: string
        name:
          $ref: '#/components/schemas/PersonName'
        code:
          type: string
    CaseDetail:
      required:
      - case
      - offences
      - registrations
      type: object
      properties:
        case:
          $ref: '#/components/schemas/CaseSummary'
        offences:
          type: array
          items:
            $ref: '#/components/schemas/Offence'
        registrations:
          type: array
          items:
            $ref: '#/components/schemas/Registration'
        mappaDetail:
          $ref: '#/components/schemas/MappaDetail'
    MappaDetail:
      required:
      - lastUpdated
      - startDate
      type: object
      properties:
        level:
          type: integer
          format: int32
        levelDescription:
          type: string
        category:
          type: integer
          format: int32
        categoryDescription:
          type: string
        startDate:
          type: string
          format: date
        lastUpdated:
          type: string
          format: date-time
    Offence:
      required:
      - description
      - eventNumber
      - main
      type: object
      properties:
        description:
          type: string
        date:
          type: string
          format: date
        main:
          type: boolean
        eventNumber:
          type: string
    Registration:
      required:
      - description
      - startDate
      type: object
      properties:
        description:
          type: string
        startDate:
          type: string
          format: date
    ApReferral:
      required:
      - approvedPremises
      - referralDate
      type: object
      properties:
        referralDate:
          type: string
          format: date
        expectedArrivalDate:
          type: string
          format: date
        expectedDepartureDate:
          type: string
          format: date
        decisionDate:
          type: string
          format: date-time
        approvedPremises:
          $ref: '#/components/schemas/ApprovedPremises'
    ApprovedPremises:
      required:
      - description
      type: object
      properties:
        description:
          type: string
    ExistingReferrals:
      required:
      - crn
      - referrals
      type: object
      properties:
        crn:
          type: string
        referrals:
          type: array
          items:
            $ref: '#/components/schemas/ApReferral'
    APDocument:
      required:
      - filename
      - level
      - typeCode
      - typeDescription
      type: object
      properties:
        id:
          type: string
        level:
          type: string
        eventNumber:
          type: string
        filename:
          type: string
        typeCode:
          type: string
        typeDescription:
          type: string
        dateSaved:
          type: string
          format: date-time
        dateCreated:
          type: string
          format: date-time
        description:
          type: string
    Pageable:
      type: object
      properties:
        page:
          minimum: 0
          type: integer
          format: int32
        size:
          minimum: 1
          type: integer
          format: int32
        sort:
          type: array
          items:
            type: string
    PageStaffResponse:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/StaffResponse'
        number:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: '#/components/schemas/SortObject'
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
    StaffGrade:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    StaffResponse:
      required:
      - code
      - keyWorker
      - name
      type: object
      properties:
        code:
          type: string
        name:
          $ref: '#/components/schemas/PersonName'
        grade:
          $ref: '#/components/schemas/StaffGrade'
        keyWorker:
          type: boolean
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
