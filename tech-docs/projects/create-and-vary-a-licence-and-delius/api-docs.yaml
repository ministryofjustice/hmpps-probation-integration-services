openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-case/{crn}/responsible-community-manager:
    get:
      tags:
      - probation-case-resource
      operationId: handle
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manager'
components:
  schemas:
    Borough:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    District:
      required:
      - borough
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        borough:
          $ref: '#/components/schemas/Borough'
    Manager:
      required:
      - code
      - name
      - provider
      - team
      type: object
      properties:
        code:
          type: string
        name:
          $ref: '#/components/schemas/Name'
        provider:
          $ref: '#/components/schemas/Provider'
        team:
          $ref: '#/components/schemas/Team'
        username:
          type: string
        email:
          type: string
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
    Provider:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Team:
      required:
      - code
      - description
      - district
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        district:
          $ref: '#/components/schemas/District'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
