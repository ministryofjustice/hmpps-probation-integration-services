openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /probation-cases/{identifier}:
    get:
      tags:
      - person-resource
      operationId: getPersonDetails
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PersonDetail"
  /all-probation-cases:
    get:
      tags:
      - person-resource
      operationId: getPersonDetails_1
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagePersonDetail"
components:
  schemas:
    Address:
      required:
      - postcode
      type: object
      properties:
        postcode:
          type: string
    Alias:
      required:
      - dateOfBirth
      - name
      type: object
      properties:
        name:
          $ref: "#/components/schemas/Name"
        dateOfBirth:
          type: string
          format: date
    CodeDescription:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    ContactDetails:
      type: object
      properties:
        telephone:
          type: string
        mobile:
          type: string
        email:
          type: string
    Identifiers:
      required:
      - crn
      - deliusId
      type: object
      properties:
        deliusId:
          type: integer
          format: int64
        crn:
          type: string
        nomsId:
          type: string
        prisonerNumber:
          type: string
        pnc:
          type: string
        cro:
          type: string
        ni:
          type: string
    LimitedAccess:
      required:
      - users
      type: object
      properties:
        message:
          type: string
        users:
          type: array
          items:
            $ref: "#/components/schemas/LimitedAccessUser"
    LimitedAccessUser:
      required:
      - username
      type: object
      properties:
        username:
          type: string
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
        previousSurname:
          type: string
        preferred:
          type: string
    PersonDetail:
      required:
      - addresses
      - aliases
      - dateOfBirth
      - identifiers
      - name
      type: object
      properties:
        identifiers:
          $ref: "#/components/schemas/Identifiers"
        name:
          $ref: "#/components/schemas/Name"
        dateOfBirth:
          type: string
          format: date
        title:
          $ref: "#/components/schemas/CodeDescription"
        gender:
          $ref: "#/components/schemas/CodeDescription"
        nationality:
          $ref: "#/components/schemas/CodeDescription"
        ethnicity:
          $ref: "#/components/schemas/CodeDescription"
        ethnicityDescription:
          type: string
        contactDetails:
          $ref: "#/components/schemas/ContactDetails"
        aliases:
          type: array
          items:
            $ref: "#/components/schemas/Alias"
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/Address"
        excludedFrom:
          $ref: "#/components/schemas/LimitedAccess"
        restrictedTo:
          $ref: "#/components/schemas/LimitedAccess"
    Pageable:
      type: object
      properties:
        page:
          minimum: 0
          type: integer
          format: int32
        size:
          minimum: 1
          type: integer
          format: int32
        sort:
          type: array
          items:
            type: string
    PagePersonDetail:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/PersonDetail"
        number:
          type: integer
          format: int32
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        first:
          type: boolean
        last:
          type: boolean
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          type: array
          items:
            $ref: "#/components/schemas/SortObject"
        paged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        direction:
          type: string
        nullHandling:
          type: string
        ascending:
          type: boolean
        property:
          type: string
        ignoreCase:
          type: boolean
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
