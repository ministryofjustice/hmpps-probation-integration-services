openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /detail:
    post:
      tags:
      - detail-controller
      operationId: batchDetails
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Detail'
  /court-appearances:
    post:
      tags:
      - court-appearances-controller
      operationId: courtAppearances
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourtAppearancesContainer'
  /convictions:
    post:
      tags:
      - conviction-controller
      operationId: convictions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConvictionsContainer'
  /probation-areas:
    get:
      tags:
      - probation-areas-controller
      operationId: probationAreas
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbationAreaContainer'
components:
  schemas:
    BatchRequest:
      required:
      - crns
      type: object
      properties:
        crns:
          maxItems: 500
          minItems: 1
          type: array
          items:
            maxLength: 500
            minLength: 1
            type: string
    Detail:
      required:
      - crn
      - dateOfBirth
      - keyDates
      - ldu
      - name
      - offenderManager
      - probationArea
      type: object
      properties:
        name:
          $ref: '#/components/schemas/Name'
        dateOfBirth:
          type: string
          format: date
        crn:
          type: string
        nomisId:
          type: string
        pncNumber:
          type: string
        ldu:
          type: string
        probationArea:
          type: string
        offenderManager:
          $ref: '#/components/schemas/Name'
        mainOffence:
          type: string
        religion:
          type: string
        keyDates:
          type: array
          items:
            $ref: '#/components/schemas/KeyDate'
        releaseDate:
          type: string
          format: date
        releaseLocation:
          type: string
    KeyDate:
      required:
      - code
      - data
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        data:
          type: string
          format: date
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        middleName:
          type: string
        surname:
          type: string
    CourtAppearance:
      required:
      - appearanceDate
      - courtCode
      - courtName
      - crn
      - type
      type: object
      properties:
        appearanceDate:
          type: string
          format: date
        type:
          $ref: '#/components/schemas/Type'
        courtCode:
          type: string
        courtName:
          type: string
        crn:
          type: string
    CourtAppearancesContainer:
      required:
      - courtAppearances
      type: object
      properties:
        courtAppearances:
          type: array
          items:
            $ref: '#/components/schemas/CourtAppearance'
    Type:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Conviction:
      required:
      - offences
      - outcome
      type: object
      properties:
        convictionDate:
          type: string
          format: date
        outcome:
          type: string
        offences:
          type: array
          items:
            $ref: '#/components/schemas/Offence'
    ConvictionsContainer:
      required:
      - personConvictions
      type: object
      properties:
        personConvictions:
          type: array
          items:
            $ref: '#/components/schemas/PersonConviction'
    Offence:
      required:
      - description
      - mainOffence
      type: object
      properties:
        description:
          type: string
        mainOffence:
          type: boolean
    PersonConviction:
      required:
      - convictions
      - crn
      type: object
      properties:
        crn:
          type: string
        convictions:
          type: array
          items:
            $ref: '#/components/schemas/Conviction'
    LocalDeliveryUnit:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    ProbationArea:
      required:
      - code
      - description
      - localDeliveryUnits
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        localDeliveryUnits:
          type: array
          items:
            $ref: '#/components/schemas/LocalDeliveryUnit'
    ProbationAreaContainer:
      required:
      - probationAreas
      type: object
      properties:
        probationAreas:
          type: array
          items:
            $ref: '#/components/schemas/ProbationArea'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
