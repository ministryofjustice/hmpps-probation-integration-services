openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /case-records/{identifier}:
    get:
      tags:
      - probation-record-resource
      operationId: handle
      parameters:
      - name: identifier
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProbationRecord'
components:
  schemas:
    LocalDeliveryUnit:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
    Manager:
      required:
      - team
      type: object
      properties:
        team:
          $ref: '#/components/schemas/Team'
        code:
          type: string
        name:
          $ref: '#/components/schemas/Name'
        email:
          type: string
    Name:
      required:
      - forename
      - surname
      type: object
      properties:
        forename:
          type: string
        surname:
          type: string
    ProbationRecord:
      required:
      - crn
      - manager
      - mappaLevel
      - nomsId
      - vloAssigned
      type: object
      properties:
        crn:
          type: string
        nomsId:
          type: string
        currentTier:
          type: string
        resourcing:
          type: string
          enum:
          - ENHANCED
          - NORMAL
        manager:
          $ref: '#/components/schemas/Manager'
        mappaLevel:
          type: integer
          format: int32
        vloAssigned:
          type: boolean
    Team:
      required:
      - code
      - description
      type: object
      properties:
        code:
          type: string
        description:
          type: string
        localDeliveryUnit:
          $ref: '#/components/schemas/LocalDeliveryUnit'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
