generic-service:
  ingress:
    host: core-person-record-and-delius-dev.hmpps.service.justice.gov.uk

  scheduledDowntime:
    enabled: true

  env:
    SENTRY_ENVIRONMENT: dev
    LOGGING_LEVEL_UK_GOV_DIGITAL_JUSTICE_HMPPS: DEBUG
    INTEGRATIONS_CORE_PERSON_RECORD_URL: https://hmpps-person-record-dev.hmpps.service.justice.gov.uk
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://sign-in-dev.hmpps.service.justice.gov.uk/auth/.well-known/jwks.json
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://sign-in-dev.hmpps.service.justice.gov.uk/auth/issuer
    MESSAGING_CONSUMER_DETAIL_URLS: https://hmpps-person-record-dev.hmpps.service.justice.gov.uk

generic-prometheus-alerts:
  businessHoursOnly: true
