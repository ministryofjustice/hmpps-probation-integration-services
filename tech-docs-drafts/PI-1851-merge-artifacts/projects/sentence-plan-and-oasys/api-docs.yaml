openapi: 3.0.1
info:
  title: API Reference
  contact:
    name: Probation Integration Team
    url: https://mojdt.slack.com/archives/C02HQ4M2YQN
    email: probation-integration-team@digital.justice.gov.uk
  license:
    name: MIT
    url: https://github.com/ministryofjustice/hmpps-probation-integration-services/blob/main/LICENSE
  version: "1.0"
servers:
- url: /
security:
- hmpps-auth-token: []
paths:
  /needs/{crn}:
    get:
      tags:
      - api-controller
      operationId: getNeeds
      parameters:
      - name: crn
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Needs'
components:
  schemas:
    Need:
      required:
      - description
      - key
      type: object
      properties:
        key:
          type: string
        description:
          type: string
    Needs:
      required:
      - criminogenicNeeds
      type: object
      properties:
        criminogenicNeeds:
          type: array
          items:
            $ref: '#/components/schemas/Need'
  securitySchemes:
    hmpps-auth-token:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT
