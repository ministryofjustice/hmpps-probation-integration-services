name: Get build info
description: Generate build info files for Gradle projects

inputs:
  project:
    description: The name of the project
    required: true
  version:
    description: The version of the service to deploy
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Get build info
      run: |
        echo '::group::Generate build info'
        ./gradlew "${PROJECT}:buildInfo" "${PROJECT}:generateGitProperties"
        echo '::endgroup::'
      shell: bash
      env:
        ORG_GRADLE_PROJECT_version: ${{ inputs.version }}
        PROJECT: ${{ inputs.project }}

    - name: Store build info
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: build-info-${{ inputs.project }}
        path: projects/${{ inputs.project }}/build/info/build-info.properties

    - name: Store git info
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: git-info-${{ inputs.project }}
        path: projects/${{ inputs.project }}/build/info/git-info.properties
