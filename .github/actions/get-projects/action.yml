name: Parse projects input
description: Accept a list of one or more projects, the string "All", or the string "Changed", and output a JSON array of project names

inputs:
  projects:
    description: Projects string
    required: true
  change-filters:
    description: Path patterns to use for matching changes
    required: false

outputs:
  projects:
    description: A JSON array of project names
    value: ${{ steps.check-changes.outputs.projects || steps.parse.outputs.projects }}

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Output changed projects
      id: check-changes
      if: inputs.projects == 'Changed'
      uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/check-changes@main
      with:
        filters: ${{ inputs.change-filters }}

    - name: Parse and map project list
      id: parse
      if: inputs.projects != 'Changed'
      shell: bash # language=bash
      run: |
        all_projects="$(find projects -mindepth 1 -maxdepth 1 -printf "%f\n" | jq --raw-input . | jq --slurp --compact-output .)"
        
        if [ "$INPUT" == 'All' ]
          # Return all projects
          then output="$all_projects"
        elif jq <<< "$INPUT" &>/dev/null
          # Input is already JSON
          then output="$INPUT"
        else 
          # Input is not JSON, so wrap it in a JSON array
          output="$(jq --compact-output -n --arg INPUT "$INPUT" '[$INPUT]')"
        fi
        
        # Filter to existing projects and sort alphabetically
        output="$(jq --compact-output -n --argjson A "$output" --argjson B "$all_projects" '$A - ($A - $B) | sort')"
        
        # Output
        echo "projects=$output" | tee -a "$GITHUB_OUTPUT"
      env:
        INPUT: ${{ inputs.projects }}
