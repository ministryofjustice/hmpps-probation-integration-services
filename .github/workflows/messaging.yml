name: Replay messages
# Copy HMPPS Domain Event messages from production to pre-production

on:
  workflow_dispatch:
    inputs:
      start_time:
        description: Start time
        type: string
        required: true
        default: 'ago(1d)'
      end_time:
        description: End time
        type: string
        required: true
        default: 'now()'
      queue_name:
        description: Queue
        type: choice
        required: true
        options:
          - accredited-programmes-and-delius-queue
          - approved-premises-and-delius-queue
          - assessment-summary-and-delius-queue
          - breach-notice-and-delius-queue
          - cas2-and-delius-queue
          - cas3-and-delius-queue
          - common-platform-and-delius-queue
          - create-and-vary-a-licence-and-delius-queue
          - custody-key-dates-and-delius-queue
          - esupervision-and-delius-queue
          - make-recall-decisions-and-delius-queue
          - manage-offences-and-delius-queue
          - manage-pom-cases-and-delius-queue
          - opd-and-delius-queue
          - pre-sentence-reports-to-delius-queue
          - prison-case-notes-to-probation-queue
          - prison-custody-status-to-delius-queue
          - prison-identifier-and-delius-queue
          - refer-and-monitor-and-delius-queue
          - risk-assessment-scores-to-delius-queue
          - tier-to-delius-queue
          - unpaid-work-and-delius-queue
          - workforce-allocations-to-delius-queue
          - suicide-risk-form-and-delius-queue
          - community-payback-and-delius-queue
          - cosso-and-delius-queue
          - warrant-risk-assessment-and-delius-queue
          # ^ add new queues here

jobs:
  replay:
    environment: azure-prod
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate with Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.APP_INSIGHTS_CLIENT_ID }}
          tenant-id: ${{ secrets.APP_INSIGHTS_TENANT_ID }}
          subscription-id: ${{ secrets.APP_INSIGHTS_SUBSCRIPTION_ID }}

      - name: Authenticate with MOJ Cloud Platform
        uses: ./.github/actions/cloud-platform-auth
        with:
          api: ${{ secrets.KUBE_ENV_API }}
          cert: ${{ secrets.PREPROD_KUBE_CERT }}
          cluster: ${{ secrets.PREPROD_KUBE_CLUSTER }}
          namespace: ${{ secrets.PREPROD_KUBE_NAMESPACE }}
          token: ${{ secrets.PREPROD_KUBE_TOKEN }}

      - name: Install Terraform for parsing files
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Replay messages
        run: |
          APP_INSIGHTS_TOKEN=$(az account get-access-token --resource https://api.applicationinsights.io --query accessToken -o tsv) \
          ./script/replay-messages.sh
        env:
          APP_INSIGHTS_APPLICATION_GUID: ${{ secrets.APP_INSIGHTS_APPLICATION_GUID }}
          START_TIME: ${{ inputs.start_time }}
          END_TIME: ${{ inputs.end_time }}
          QUEUE_NAME: ${{ inputs.queue_name }}
