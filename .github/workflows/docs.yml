name: Documentation

on:
  push:
    paths:
      - .github/workflows/docs.yml
      - 'doc/tech-docs/**'
      - '**/README.md'
  schedule:
    - cron: "30 5 * * MON-FRI" # Every weekday at 05:30 UTC
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy?
        type: boolean
        default: false

concurrency:
  group: github-pages-site
  cancel-in-progress: false

permissions: {}

jobs:
  build-docs:
    name: Build tech docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-gradle
        with:
          cache-role: ${{ secrets.GRADLE_CACHE_S3_ROLE_TO_ASSUME }}
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Prepare API specs
        run: ./script/prepare-api-specs.sh

      - name: Build
        run: |
          make package
          sudo chown -R "$USER:$USER" docs
        working-directory: doc/tech-docs

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tech-docs-site
          path: doc/tech-docs/docs
  
  build-schema-spy:
    name: Build SchemaSpy report
    runs-on: ubuntu-latest
    environment: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/cloud-platform-auth
        with:
          api: ${{ secrets.KUBE_ENV_API }}
          cert: ${{ secrets.KUBE_CERT }}
          cluster: ${{ secrets.KUBE_CLUSTER }}
          namespace: ${{ secrets.KUBE_NAMESPACE }}
          token: ${{ secrets.KUBE_TOKEN }}

      - name: Build
        run: tools/schema-spy/run.sh
        env:
          DB: ${{ secrets.SCHEMA_SPY_DB }}
          HOST: ${{ secrets.SCHEMA_SPY_HOST }}
          PORT: ${{ secrets.SCHEMA_SPY_PORT }}
          SCHEMA: ${{ secrets.SCHEMA_SPY_SCHEMA }}
          DB_USERNAME: ${{ secrets.SCHEMA_SPY_USERNAME }}
          DB_PASSWORD: ${{ secrets.SCHEMA_SPY_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: schema-spy-site
          path: schema-spy-report
          if-no-files-found: error

  deploy:
    name: Deploy
    if: github.ref_name == 'main' || github.event_name == 'schedule' || inputs.deploy
    runs-on: ubuntu-latest
    needs:
      - build-docs
      - build-schema-spy
    permissions:
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download tech docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tech-docs-site
          path: _site/tech-docs

      - name: Download SchemaSpy artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: schema-spy-site
          path: _site/schema-spy-report

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Add URLs to the job summary
        run: |
          echo "[Technical Documentation](${{ steps.deployment.outputs.page_url }}tech-docs/)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "[Schema Spy Report](${{ steps.deployment.outputs.page_url }}schema-spy-report/)" | tee -a "$GITHUB_STEP_SUMMARY"