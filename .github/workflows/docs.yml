name: Documentation

on:
  push:
    paths:
      - .github/workflows/docs.yml
      - 'doc/tech-docs/**'
      - '**/README.md'
  schedule:
    - cron: "30 5 * * MON-FRI" # Every weekday at 05:30 UTC
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy?
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-gradle
        with:
          cache-role: ${{ secrets.GRADLE_CACHE_S3_ROLE_TO_ASSUME }}
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Prepare API specs
        run: ./script/prepare-api-specs.sh

      - name: Build
        run: |
          make package
          sudo chown -R "$USER:$USER" docs
        working-directory: doc/tech-docs

      - name: Publish
        if: github.ref_name == 'main' || inputs.deploy
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: doc/tech-docs/docs
          target-folder: tech-docs

      - name: Publish
        if: github.ref_name == 'main' || inputs.deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:gh-pages
          git worktree add .gh-pages gh-pages
          rm -r .ghpages/"$target-folder"
          mv "$folder" .gh-pages/"$target-folder"
          cd .gh-pages
          git add tech-docs
          git commit -m "Publish to GitHub Pages: ${{ github.sha }}" && git push origin gh-pages --force-with-lease || echo "Nothing to commit"
        env:
          folder: doc/tech-docs/docs
          target-folder: tech-docs
