name: Security

on:
  schedule:
    - cron: "30 5 * * MON-FRI" # Every weekday at 05:30 UTC
  workflow_dispatch:

jobs:
  get-projects:
    permissions:
      contents: read
    uses: ./.github/workflows/get-projects.yml
    with:
      projects: All

  snyk-scan:
    permissions:
      contents: read
      checks: write
      id-token: write
      issues: write
      security-events: write
    runs-on: ubuntu-latest
    needs:
      - get-projects
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.get-projects.outputs.projects) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-gradle
        with:
          cache-role: ${{ secrets.GRADLE_CACHE_S3_ROLE_TO_ASSUME }}
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      - uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
      - name: Snyk scan
        continue-on-error: true
        # language=bash
        run: |
          snyk auth --client-id "$CLIENT_ID" --client-secret "$CLIENT_SECRET"
          snyk container test \
            --severity-threshold=high \
            --json-file-output=snyk-results.json \
            --sarif-file-output=snyk-results.sarif \
            "ghcr.io/ministryofjustice/hmpps-probation-integration-services/${{ matrix.project }}:latest"
        env:
          PROJECT: ${{ matrix.project }}
          CLIENT_ID: ${{ secrets.SNYK_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SNYK_CLIENT_SECRET }}

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7434149006143a4d75b82a2f411ef15b03ccc2d7 # v4.35.4
        with:
          sarif_file: snyk-results.sarif

