name: Bootstrap
# Perform initial project setup to enable development of a new service

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number (e.g. PI-123)
        required: true
        type: string
      project_name:
        description: Project name
        required: true
        type: string
      project_template:
        description: Project template
        required: true
        type: choice
        default: message-listener-with-api-client
        options:
          - api-client-and-server
          - api-server
          - message-listener
          - message-listener-with-api-client
          - message-listener-with-api-client-and-server
          - 'No template - I want to create the project from scratch'
      create_sentry_project:
        description: Will the service use Sentry for capturing exceptions?
        default: true
        required: true
        type: boolean
      create_oauth_client:
        description: Will the service consume another HTTP API that requires HMPPS Auth client credentials?
        default: true
        required: true
        type: boolean
      create_queue:
        description: Will the service consume HMPPS domain event messages?
        default: true
        required: true
        type: boolean
      create_infra:
        description: Will the service be deployed to MOJ Cloud Platform?
        default: true
        required: true
        type: boolean

permissions: { }

jobs:
  auth-setup:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_oauth_client }}
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create issue for manual steps
        run: |
          gh issue create \
            --title "$issue_number Request HMPPS Auth client for $project_name" \
            --body '
          - [ ] Clone Jira ticket: [HAAR-1662](https://dsdmoj.atlassian.net/browse/HAAR-1662)
          - [ ] Raise in Slack: [#hmpps-auth-audit-registers](https://mojdt.slack.com/archives/C02S71KUBED)' \
            --label bootstrap
        env:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          GH_TOKEN: ${{ github.token }}

  project-setup:
    if: ${{ inputs.project_template != 'No template - I want to create the project from scratch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.pr.outputs.pull-request-url }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          owner: ministryofjustice
          repositories: hmpps-probation-integration-services,hmpps-probation-integration-e2e-tests
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: fix-bootstrap-token-2
          token: ${{ steps.app-token.outputs.token }}

      - name: Render project template
        uses: ./.github/actions/render-project-template
        with:
          project_name: ${{ inputs.project_name }}
          project_template: ${{ inputs.project_template }}

      - name: Create pull request
        id: pr
        uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/create-signed-pull-request@fix-bootstrap-token-2
        with:
          add-paths: |
            settings.gradle.kts
            .github/workflows
            .idea/runConfigurations
            doc/tech-docs
            projects/${{ inputs.project_name }}
          branch: bootstrap/${{ inputs.project_name }}
          commit-message: ${{ inputs.issue_number }} Create initial project for ${{ inputs.project_name }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          path: hmpps-probation-integration-e2e-tests
          repository: ministryofjustice/hmpps-probation-integration-e2e-tests
          token: ${{ steps.app-token.outputs.token }}

  e2e-test-setup:
    if: ${{ inputs.project_template != 'No template - I want to create the project from scratch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.e2e-pr.outputs.pull-request-url }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          owner: ministryofjustice
          repositories: hmpps-probation-integration-e2e-tests
          client-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          repository: ministryofjustice/hmpps-probation-integration-e2e-tests
          token: ${{ steps.app-token.outputs.token }}

      - name: Update e2e test repo
        run: sed -i '/add new projects here/i \          - '"'"'["'"$project_name"'"]'"'"'' .github/workflows/test-single-project.yml
        env:
          project_name: ${{ inputs.project_name }}

      - name: Create pull request
        id: e2e-pr
        uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/create-signed-pull-request@fix-bootstrap-token-2
        with:
          add-paths: .github/workflows
          branch: ${{ inputs.issue_number }}-create-${{ inputs.project_name }}-project
          commit-message: ${{ inputs.issue_number }} Add option to run tests for ${{ inputs.project_name }}
          token: ${{ steps.app-token.outputs.token }}

  issue-for-project-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs:
      - project-setup
      - e2e-test-setup
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create issue for manual steps
        run: |
          gh issue create \
            --title "$issue_number Complete project setup for $project_name" \
            --body '
          - [ ] Merge project pull request: ${{ needs.project-setup.outputs.pull-request-url }}
          - [ ] Merge e2e tests pull request: ${{ needs.e2e-test-setup.outputs.pull-request-url }}' \
            --label bootstrap
        env:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          GH_TOKEN: ${{ github.token }}

  sentry-setup:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_sentry_project }}
    permissions:
      contents: read
    outputs:
      project_slug: ${{ steps.project.outputs.slug }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Create project
        id: project
        run: |
          response=$(curl https://sentry.io/api/0/teams/ministryofjustice/probation-integration/projects/ --fail \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data '{"name":"'"$project_name"'"}')
          echo "slug=$(echo "$response" | jq -r '.slug')" | tee -a "$GITHUB_OUTPUT"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          project_name: ${{ inputs.project_name }}

      - name: Set platform to Kotlin
        run: |
          curl -X PUT "https://sentry.io/api/0/projects/ministryofjustice/$SLUG/" --fail \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data '{"platform":"kotlin"}'
        env:
          SLUG: ${{ steps.project.outputs.slug }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Get client key id
        id: client_key
        run: |
          response=$(curl "https://sentry.io/api/0/projects/ministryofjustice/$SLUG/keys/" --fail \
                  -H "Authorization: Bearer $SENTRY_AUTH_TOKEN")
          echo "id=$(echo "$response" | jq -r '.[0].id')" | tee -a "$GITHUB_OUTPUT"
        env:
          SLUG: ${{ steps.project.outputs.slug }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Set rate limit (10/minute)
        run: |
          curl -X PUT "https://sentry.io/api/0/projects/ministryofjustice/$SLUG/keys/$KEY_ID/" --fail \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data '{"rateLimit":{"count":10,"window":60}}'
        env:
          SLUG: ${{ steps.project.outputs.slug }}
          KEY_ID: ${{ steps.client_key.outputs.id }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Create alert for new issues
        run: |
          curl "https://sentry.io/api/0/projects/ministryofjustice/$SLUG/rules/?duplicateRule=true&wizardV3=true" --fail \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            -H 'Content-Type: application/json' --data "$(jq --arg env "$env" --arg project_slug "$SLUG" -n '{
              "actionMatch": "any",
              "actions": [
                {
                  "channel": "probation-integration-notifications",
                  "channel_id": "C033HPR0W91",
                  "id": "sentry.integrations.slack.notify_action.SlackNotifyServiceAction",
                  "name": "Send a notification to the MOJ Digital & Technology Slack workspace to probation-integration-notifications (optionally, an ID: C033HPR0W91) and show tags [] in notification",
                  "tags": "environment",
                  "workspace": "50134"
                }
              ],
              "conditions": [
                { "id": "sentry.rules.conditions.first_seen_event.FirstSeenEventCondition", "name": "A new issue is created" },
                { "id": "sentry.rules.conditions.regression_event.RegressionEventCondition", "name": "The issue changes state from resolved to unresolved" },
                { "id": "sentry.rules.conditions.reappeared_event.ReappearedEventCondition", "name": "The issue changes state from ignored to unresolved" }
              ],
              "environment": null,
              "filterMatch": "all",
              "filters": [],
              "frequency": 5,
              "name": "New issues",
              "owner": "team:1611212",
              "projects": [$project_slug]
          }')"
        env:
          SLUG: ${{ steps.project.outputs.slug }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  sentry-secrets:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_sentry_project }}
    permissions:
      contents: read
    needs: sentry-setup
    strategy:
      matrix:
        environment: [ "test", "preprod", "prod" ]
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: ./.github/actions/cloud-platform-auth
        with:
          api: ${{ secrets.KUBE_ENV_API }}
          cert: ${{ secrets.KUBE_CERT }}
          cluster: ${{ secrets.KUBE_CLUSTER }}
          namespace: ${{ secrets.KUBE_NAMESPACE }}
          token: ${{ secrets.KUBE_TOKEN }}

      - name: Get client key DSN
        id: client_key
        run: |
          response=$(curl "https://sentry.io/api/0/projects/ministryofjustice/$SLUG/keys/" --fail \
                  -H "Authorization: Bearer $SENTRY_AUTH_TOKEN")
          dsn=$(echo "$response" | jq -r '.[0].dsn.public')
          echo "::add-mask::$dsn"
          echo "dsn=$dsn" | tee -a "$GITHUB_OUTPUT"
        env:
          SLUG: ${{ needs.sentry-setup.outputs.project_slug }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Store DSN as Kubernetes secret
        run: kubectl create secret generic "$PROJECT-sentry" --from-literal "SENTRY_DSN=$VALUE" --from-literal "SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN"
        env:
          PROJECT: ${{ inputs.project_name }}
          VALUE: ${{ steps.client_key.outputs.dsn }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  sqs-queue-setup-dev:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_queue }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.render-template.outputs.pull-request-url }}
    steps:
      - uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/render-sqs-template@fix-bootstrap-token-2
        id: render-template
        with:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          environment: dev

  sqs-queue-setup-preprod:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_queue }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.render-template.outputs.pull-request-url }}
    steps:
      - uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/render-sqs-template@fix-bootstrap-token-2
        id: render-template
        with:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          environment: preprod

  sqs-queue-setup-prod:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_queue }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.render-template.outputs.pull-request-url }}
    steps:
      - uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/render-sqs-template@fix-bootstrap-token-2
        id: render-template
        with:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          environment: prod

  issue-for-sqs-queue-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs:
      - sqs-queue-setup-dev
      - sqs-queue-setup-preprod
      - sqs-queue-setup-prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create issue for manual steps
        run: |
          gh issue create \
            --title "$issue_number Complete queue setup for $project_name" \
            --body "
          - [ ] Enter the event types the service will consume into the filter_policy for dev: [Edit file](https://github.com/ministryofjustice/cloud-platform-environments/edit/${issue_number}-create-${project_name}-queue-hmpps-probation-integration-services-dev/namespaces/live.cloud-platform.service.justice.gov.uk/hmpps-probation-integration-services-dev/resources/${project_name}-queue.tf)
          - [ ] Enter the event types the service will consume into the filter_policy for preprod: [Edit file](https://github.com/ministryofjustice/cloud-platform-environments/edit/${issue_number}-create-${project_name}-queue-hmpps-probation-integration-services-preprod/namespaces/live.cloud-platform.service.justice.gov.uk/hmpps-probation-integration-services-preprod/resources/${project_name}-queue.tf)
          - [ ] Enter the event types the service will consume into the filter_policy for prod: [Edit file](https://github.com/ministryofjustice/cloud-platform-environments/edit/${issue_number}-create-${project_name}-queue-hmpps-probation-integration-services-prod/namespaces/live.cloud-platform.service.justice.gov.uk/hmpps-probation-integration-services-prod/resources/${project_name}-queue.tf)
          - [ ] Request approval in [#ask-cloud-platform](https://mojdt.slack.com/archives/C57UPMZLY)
          > ${{ needs.sqs-queue-setup-dev.outputs.pull-request-url }}
          > ${{ needs.sqs-queue-setup-preprod.outputs.pull-request-url }}
          > ${{ needs.sqs-queue-setup-prod.outputs.pull-request-url }}
          - [ ] Merge the pull requests" \
            --label bootstrap
        env:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          GH_TOKEN: ${{ github.token }}

  infra-setup-dev:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_infra }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.render-template.outputs.pull-request-url }}
    steps:
      - uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/render-infra-template@fix-bootstrap-token-2
        id: render-template
        with:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          environment: dev

  infra-setup-preprod:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_infra }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.render-template.outputs.pull-request-url }}
    steps:
      - uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/render-infra-template@fix-bootstrap-token-2
        id: render-template
        with:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          environment: preprod

  infra-setup-prod:
    runs-on: ubuntu-latest
    if: ${{ inputs.create_infra }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      pull-request-url: ${{ steps.render-template.outputs.pull-request-url }}
    steps:
      - uses: ministryofjustice/hmpps-probation-integration-services/.github/actions/render-infra-template@fix-bootstrap-token-2
        id: render-template
        with:
          issue_number: ${{ inputs.issue_number }}
          project_name: ${{ inputs.project_name }}
          environment: prod

  issue-for-infra-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs:
      - infra-setup-dev
      - infra-setup-preprod
      - infra-setup-prod
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create issue for manual steps
        run: |
          gh issue create \
            --title "$issue_number Complete infrastructure setup for $project_name" \
            --body '
          - [ ] Request approval in [#ask-cloud-platform](https://mojdt.slack.com/archives/C57UPMZLY) for the following pull requests
          > ${{ needs.infra-setup-dev.outputs.pull-request-url }}
          > ${{ needs.infra-setup-preprod.outputs.pull-request-url }}
          > ${{ needs.infra-setup-prod.outputs.pull-request-url }}
          - [ ] Merge the pull requests' \
            --label bootstrap
        env:
          project_name: ${{ inputs.project_name }}
          issue_number: ${{ inputs.issue_number }}
          GH_TOKEN: ${{ github.token }}
