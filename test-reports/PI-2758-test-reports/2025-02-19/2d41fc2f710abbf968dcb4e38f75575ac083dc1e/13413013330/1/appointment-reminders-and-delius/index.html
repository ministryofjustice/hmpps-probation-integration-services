<html lang="en">
<head>
    <title>Probation Integration Test Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/base-min.css">
</head>
<body style="margin: 20px">
<h1>Probation Integration Test Reports</h1>
<p>Use the links below to browse the available test reports.</p>
<div id="browser"></div>
<script>
    (async () => {
        const path = new URLSearchParams(window.location.search).get('path') || 'test-reports/PI-2758-test-reports/2025-02-19/2d41fc2f710abbf968dcb4e38f75575ac083dc1e/13413013330/1/appointment-reminders-and-delius'
        const response = await fetch(`https://api.github.com/repos/ministryofjustice/hmpps-probation-integration-services/contents/${path}?ref=gh-pages`)
        const data = await response.json()
        const list = data.map(file => `<li><a href='${file.type === 'dir' ? `?path=${file.path}` : file.path}'>${file.path.replace(path, '')}</a></li>`).join('')
        document.getElementById('browser').innerHTML = `<strong>${path}</strong><ul>${list}</ul>`
    })()
</script>
</body>
</html>
